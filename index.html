<!DOCTYPE html>   
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Master - v27.96 PLATINUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #a855f7 100%);
            transition: all 0.3s ease;
        }

        .view-section {
            display: none;
            min-height: 100vh;
            width: 100%;
            flex-direction: column;
        }

        .view-active {
            display: flex !important;
        }

        .card-bi {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
        }

        #modalGestao {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.98);
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .input-compact {
            padding: 0.8rem !important;
            border-radius: 1rem !important;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 100%;
            outline: none;
        }

        .day-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            padding: 12px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: 800;
            color: white;
        }

        .day-btn.active {
            background: #3b82f6 !important;
            border-color: #60a5fa !important;
        }

        .label-custo {
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 4px;
            margin-left: 4px;
            display: block;
        }

        /* ESTILO DO LED */
        .led-bot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .led-offline {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }

        .led-online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
    </style>
</head>

<body>

    <div id="modalGestao">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 shadow-2xl text-white mx-auto mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="gestao-titulo" class="text-lg font-black uppercase text-blue-400">Gestão</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase text-sm">Registrar Venda</button>
                <button onclick="window.fluxoNQ()" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">Marcar NQ</button>
                <button onclick="window.limparRegistroVisita()" class="bg-slate-700/50 border border-white/10 p-3 rounded-2xl text-white font-black uppercase text-[10px]">Limpar Registro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir Registro</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 pb-6 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center text-white">
            <div class="flex flex-col">
                <span class="text-lg font-black uppercase italic tracking-tighter text-white">Portal <span class="text-blue-500">Elite</span></span>
                <div class="flex items-center mt-[-4px]">
                    <span id="bot-led" class="led-bot led-offline"></span>
                    <span id="bot-status-text" class="text-[7px] font-bold uppercase text-slate-500">Bot Offline</span>
                </div>
            </div>
            <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase text-white">ADM</button>
        </header>
        <div class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-6 rounded-[2.5rem] w-full max-w-sm text-center">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 leading-none italic">AGUARDE...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-500 mb-4 uppercase italic">CONECTANDO</h3>
                <div class="grid grid-cols-2 gap-1 mb-3" id="day-selector"></div>
                <form id="form-agendamento" class="space-y-2">
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="input-compact text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="input-compact text-white">
                    <select id="horario" required class="input-compact text-white">
                        <option value="">Selecione o Dia</option>
                    </select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="input-compact text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-sm">Agendar Visita</button>
                </form>
            </div>
        </div>
    </section>

    <section id="view-logistica" class="view-section p-4">
        <nav class="flex justify-between items-center mb-6 text-white">
            <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Sair</button>
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button class="bg-blue-600 px-4 py-1.5 rounded-lg text-[10px] font-black">Visitas</button>
                <button onclick="window.switchView('view-financeiro')" class="px-4 py-1.5 text-slate-400 text-[10px] font-black uppercase">Dashboard BI</button>
            </div>
        </nav>

        <div class="glass mx-auto max-w-sm mb-4 p-3 rounded-2xl flex justify-between items-center border-l-4 border-amber-500">
            <div>
                <p class="text-[8px] text-slate-500 uppercase font-black">Projeto Ativo</p>
                <h4 id="nome-projeto-logistica" class="text-[10px] font-black text-amber-500 uppercase italic">Carregando...</h4>
            </div>
            <button onclick="window.abrirSeletorProjetos()" class="bg-white/10 hover:bg-white/20 px-3 py-2 rounded-xl text-[8px] font-black uppercase text-white transition-all">
                🔄 Trocar
            </button>
        </div>

        <div id="controles-admin" class="hidden flex flex-wrap gap-2 mb-4 justify-center">
            <button onclick="window.abrirNovoProjeto()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-emerald-400 uppercase">Novo Projeto</button>
            <button onclick="window.abrirGestaoCentralizada()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-blue-400 uppercase">Dados Projeto</button>
            <button onclick="window.abrirGestaoVales()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-rose-400 uppercase">Lançar Vales</button>
            <button onclick="window.switchView('view-automacao')" class="bg-amber-500/20 border border-amber-500/30 px-4 py-2 rounded-xl text-[8px] font-black text-amber-500 uppercase italic">Automação PC 🚀</button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none">
            <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ AVULSO</button>
        </div>
        <div id="lista-visitas" class="space-y-3 pb-10"></div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-4 text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <div class="flex gap-2">
                <button onclick="window.menuRelatorio()" class="bg-emerald-600 px-3 py-2 rounded-xl text-[9px] font-black uppercase italic">Copiar Relatório 📋</button>
                <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white outline-none">
            </div>
        </nav>
        <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 text-white"></div>
        <div id="individual-performance" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-white"></div>
        <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-6 text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div id="comissao-card" class="lg:col-span-1 glass rounded-[2rem] p-5 border-l-4 border-blue-500 text-white"></div>
            <div class="lg:col-span-2 glass rounded-[2rem] p-4 min-h-[250px] text-white">
                <canvas id="weeklyChart"></canvas>
            </div>
        </div>
        <div id="saldo-card" class="glass rounded-[2rem] p-6 border-l-8 border-emerald-500 mb-6 text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-10">
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <div class="flex justify-between items-center mb-3 text-white">
                    <h4 class="text-emerald-400 font-black text-[10px] uppercase">Extrato Vendas</h4>
                    <span class="text-[8px] text-slate-500 text-white">VALOR</span>
                </div>
                <div id="extrato-tabela" class="text-xs text-white"></div>
            </div>
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <h4 class="text-rose-500 font-black text-[10px] mb-3 uppercase text-white">NQ</h4>
                <div id="nq-tabela" class="text-xs text-white"></div>
            </div>
        </div>
    </section>

    <section id="view-automacao" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-6 text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <span class="text-amber-500 font-black text-[10px] uppercase italic text-white">Motor Elite Auto-Zap</span>
        </nav>
        <div class="glass p-8 rounded-[3rem] text-center mb-6 text-white">
            <div id="status-automacao" class="text-[9px] font-black text-slate-500 uppercase mb-2 text-white">Pronto para iniciar</div>
            <div id="timer-display" class="text-5xl font-black text-white mb-6">00:00</div>
            <div class="flex gap-3 justify-center">
                <button id="btn-start-auto" onclick="window.iniciarCampanha()" class="bg-emerald-600 px-8 py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Iniciar Campanha</button>
                <button id="btn-stop-auto" onclick="window.pararCampanha()" class="bg-rose-600 hidden px-8 py-4 rounded-2xl font-black uppercase text-xs">Pausar</button>
            </div>
        </div>
        <div class="glass p-5 rounded-[2rem]">
            <div class="flex justify-between items-center mb-4 text-white">
                <h4 class="text-[10px] font-black uppercase text-blue-400">Fila de Envios</h4>
                <button onclick="window.resetIndex()" class="text-[8px] text-slate-600 font-bold uppercase">Reiniciar Fila</button>
            </div>
            <div id="lista-fila" class="space-y-2 max-h-64 overflow-y-auto text-[10px] text-white"></div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        let projId = "";
        window.dadosCompletos = [];
        let custosDB = {};
        let valesDB = {};
        let projetoDB = {};
        let weeklyChart = null;

        // --- CONEXÃO DINÂMICA ---
        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projId = snap.val() || "guaratingueta-guilherme";
            const pS = await get(ref(db, `projetos/${projId}`));
            if (pS.exists()) {
                projetoDB = pS.val();
                document.getElementById('escola-titulo').innerText = projetoDB.cidade;
                document.getElementById('sub-escola').innerText = projetoDB.escola || projetoDB.school;
                
                if(document.getElementById('nome-projeto-logistica')) {
                    document.getElementById('nome-projeto-logistica').innerText = projetoDB.cidade + " - " + (projetoDB.escola || projetoDB.school || "Escola não informada");
                }

                if (projetoDB.data_inicio) {
                    window.gerarBotoesDatas(projetoDB.data_inicio, projetoDB.data_fim);
                }

                window.carregarRelatorio();

                if (sessionStorage.getItem('isAdm') === 'true') {
                    document.getElementById('controles-admin').classList.remove('hidden');
                }

                onValue(ref(db, `projetos/${projId}/bot`), (botSnap) => {
                    const led = document.getElementById('bot-led');
                    const txt = document.getElementById('bot-status-text');
                    const botData = botSnap.val();

                    if (botData && botData.status === 'Online') {
                        led.className = 'led-bot led-online';
                        txt.innerText = 'Bot Ativo';
                        txt.className = 'text-[7px] font-bold uppercase text-emerald-400';
                    } else {
                        led.className = 'led-bot led-offline';
                        txt.innerText = 'Bot Offline';
                        txt.className = 'text-[7px] font-bold uppercase text-slate-500';
                    }
                });
            }
        });

        // --- MOTOR AUTOMAÇÃO ---
        let autoAtivo = false;
        let timerInterval = null;

        window.iniciarCampanha = async () => {
            const lista = projetoDB.automacao?.lista || projetoDB.campanha?.lista;
            if (!lista) return alert("Configure a lista nos Dados do Projeto!");
            autoAtivo = true;
            document.getElementById('btn-start-auto').classList.add('hidden');
            document.getElementById('btn-stop-auto').classList.remove('hidden');
            await window.dispararProximo();
        };

        window.pararCampanha = async () => {
            autoAtivo = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('btn-start-auto').classList.remove('hidden');
            document.getElementById('btn-stop-auto').classList.add('hidden');
            document.getElementById('timer-display').innerText = "00:00";
            await update(ref(db, `projetos/${projId}/campanha`), { status: 'Pausada' });
        };

        window.dispararProximo = async () => {
            if (!autoAtivo) return;
            try {
                const m1 = document.getElementById('m1')?.value || projetoDB.campanha?.msg1 || "";
                const m2 = document.getElementById('m2')?.value || projetoDB.campanha?.msg2 || "";
                const m3 = document.getElementById('m3')?.value || projetoDB.campanha?.msg3 || "";
                const m4 = document.getElementById('m4')?.value || projetoDB.campanha?.msg4 || "";
                const lista = document.getElementById('pLista')?.value || projetoDB.campanha?.lista || "";

                await update(ref(db, `projetos/${projId}/campanha`), {
                    status: 'Iniciada',
                    index_atual: projetoDB.campanha?.index_atual || 0,
                    msg1: m1, msg2: m2, msg3: m3, msg4: m4,
                    lista: lista
                });
                document.getElementById('status-automacao').innerText = "BOT ASSUMIU O CONTROLE 🤖";
            } catch (err) { console.error(err); }
        };

        // --- RELATÓRIOS E BI ---
        window.menuRelatorio = () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form');
            f.classList.remove('hidden');
            f.innerHTML = `<h3 class="text-blue-400 font-black text-xs uppercase mb-4 text-center">Relatórios</h3><div class="grid grid-cols-1 gap-3 text-white"><button onclick="window.copyRel('Geral')" class="bg-slate-800 p-4 rounded-2xl text-[10px] font-black uppercase text-white">📋 Geral</button><button onclick="window.copyRel('Evanio')" class="bg-blue-900/40 p-4 rounded-2xl text-[10px] font-black uppercase text-white">📋 Evanio</button><button onclick="window.copyRel('Willian')" class="bg-cyan-900/40 p-4 rounded-2xl text-[10px] font-black uppercase text-white">📋 Willian</button></div>`;
        };

        window.copyRel = (tipo) => {
            const fD = document.getElementById('filtro-bi').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            if (tipo !== 'Geral') list = list.filter(i => i.vendedor === tipo);
            let r = { v: 0, nq: 0, tot: 0, pix: 0, din: 0, deb: 0, cre: 0, bol: 0, ent: 0 };
            list.forEach(i => {
                if (i.resultado === "Venda") {
                    r.v++; r.tot += Number(i.valor) || 0;
                    if (i.pagamentos) i.pagamentos.forEach(p => {
                        const vP = Number(p.valor) || 0;
                        const t = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        if (t.includes("pix")) r.pix += vP;
                        else if (t.includes("dinheiro")) r.din += vP;
                        else if (t.includes("debito")) r.deb += vP;
                        else if (t.includes("credito")) r.cre += vP;
                        else if (t.includes("boleto")) r.bol += vP;
                        if (t.includes("entrada") && (t.includes("pix") || t.includes("dinheiro"))) r.ent += vP;
                    });
                } else if (i.resultado === "NQ") r.nq++;
            });
            const texto = `Relatório de Vendas\nProjeto: ${projetoDB.cidade} - ${projetoDB.escola || projetoDB.school || ""}\nData: ${fD ? fD.split('-').reverse().join('/') : "ACUMULADO GERAL"}\n\n✅ Vendas: ${r.v}\n❌ NQ: ${r.nq}\n\n💵 Dinheiro: ${fBR(r.din)}\n💎 Pix: ${fBR(r.pix)}\n💳 Débito: ${fBR(r.deb)}\n💳 Crédito: ${fBR(r.cre)}\n📄 Boleto: ${fBR(r.bol)}\n💸 Vales: ${fBR(r.ent)}\n\n💰 Total Vendido: ${fBR(r.tot)}\n🎯 Ticket Médio: ${fBR(r.v ? r.tot / r.v : 0)}`;
            navigator.clipboard.writeText(texto).then(() => { alert("Relatório Copiado!"); window.fecharModalGestao(); });
        };

        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v: 0, nq: 0, tot: 0, pix: 0, din: 0, deb: 0, cre: 0, bol: 0, com: 0 };
            let vend = { Evanio: { v: 0, nq: 0, tot: 0, com: 0, ent: 0 }, Willian: { v: 0, nq: 0, tot: 0, com: 0, ent: 0 } };
            let chartData = {};
            list.forEach(i => {
                const vn = i.vendedor || "Willian"; const d = i.data;
                if (!chartData[d]) chartData[d] = { v: 0, nq: 0 };
                if (i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor) || 0; vend[vn].v++; vend[vn].tot += Number(i.valor) || 0; chartData[d].v++;
                    let cV = 0;
                    if (i.pagamentos) i.pagamentos.forEach(p => {
                        const vP = Number(p.valor) || 0; const t = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        if (t.includes("pix")) m.pix += vP; else if (t.includes("dinheiro")) m.din += vP; else if (t.includes("debito")) m.deb += vP; else if (t.includes("credito")) m.cre += vP; else if (t.includes("boleto")) m.bol += vP;
                        if (t.includes("entrada")) { cV += vP * 0.12; if (t.includes("pix") || t.includes("dinheiro")) vend[vn].ent += vP; } else cV += vP * 0.08;
                    });
                    m.com += cV; const metadeComis = cV / 2; vend.Evanio.com += metadeComis; vend.Willian.com += metadeComis;
                } else if (i.resultado === "NQ") { m.nq++; vend[vn].nq++; chartData[d].nq++; }
            });
            const rI = (parseFloat(custosDB.km_valor) || 0.7) * (parseFloat(custosDB.km_total) || 0) + (parseFloat(custosDB.pedagio_total) || 0) + ((parseFloat(custosDB.hosp_valor) || 0) * parseInt(custosDB.hosp_qtd || 0)) + ((parseFloat(custosDB.alim_valor) || 0) * parseInt(custosDB.alim_qtd || 0));
            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black text-emerald-400 uppercase">Faturamento</p><p class="text-xl font-black text-white">${fBR(m.tot)}</p></div><div class="card-bi p-4 rounded-3xl text-center border-blue-500"><p class="text-[8px] font-black text-blue-400 uppercase">Eficiência</p><p class="text-xl font-black text-white">${(m.v+m.nq)?(m.v/(m.v+m.nq)*100).toFixed(0):0}%</p></div><div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black uppercase">Vendas/NQ</p><p class="text-xl font-black text-white">${m.v}/${m.nq}</p></div><div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black uppercase text-white">Ticket Médio</p><p class="text-xl font-black text-white">${fBR(m.v?m.tot/m.v:0)}</p></div>`;
            document.getElementById('individual-performance').innerHTML = Object.keys(vend).map(v => `<div class="glass p-4 rounded-3xl border-t-2 ${v==='Evanio'?'border-blue-400':'border-cyan-400'}"><p class="font-black text-xs uppercase mb-2 text-white">${v}</p><div class="grid grid-cols-3 gap-2 text-center text-white"><div><p class="text-[7px] text-slate-400 uppercase">Venda</p><p class="text-xs font-bold">${fBR(vend[v].tot)}</p></div><div><p class="text-[7px] text-slate-400 uppercase">Efic.</p><p class="text-xs font-bold">${(vend[v].v+vend[v].nq)?(vend[v].v/(vend[v].v+vend[v].nq)*100).toFixed(0):0}%</p></div><div><p class="text-[7px] text-slate-400 uppercase">NQ</p><p class="text-xs font-bold">${vend[v].nq}</p></div></div></div>`).join('');
            const getPerc = (val) => m.tot > 0 ? ((val / m.tot) * 100).toFixed(1) : 0;
            const totVales = parseFloat(valesDB.evanio||0) + parseFloat(valesDB.willian||0) + vend.Evanio.ent + vend.Willian.ent;
            document.getElementById('finance-grid').innerHTML = `<div class="glass p-2 rounded-xl text-center text-[8px]">PIX<br><b>${fBR(m.pix)}</b><br><span class="text-slate-500 font-bold">${getPerc(m.pix)}%</span></div><div class="glass p-2 rounded-xl text-center text-emerald-400 text-[8px]">CRÉDITO<br><b>${fBR(m.cre)}</b><br><span class="text-emerald-600/50 font-bold">${getPerc(m.cre)}%</span></div><div class="glass p-2 rounded-xl text-center border-white/10 text-[8px]">BOLETO<br><b>${fBR(m.bol)}</b><br><span class="text-slate-500 font-bold">${getPerc(m.bol)}%</span></div><div class="glass p-2 rounded-xl text-center border-white/10 text-[8px]">DIN/DÉB<br><b>${fBR(m.din + m.deb)}</b><br><span class="text-slate-500 font-bold">${getPerc(m.din + m.deb)}%</span></div><div class="glass p-2 rounded-xl text-center border-rose-500/30 text-rose-500 text-[8px]">VALES<br><b>${fBR(totVales)}</b></div><div class="glass p-2 rounded-xl text-center border-blue-500/30 text-blue-400 text-[8px]">REEMB.<br><b>${fBR(rI)}</b></div>`;
            document.getElementById('comissao-card').innerHTML = `<h5 class="text-[10px] font-black text-blue-400 mb-3 uppercase text-center">Resumo</h5><div class="flex flex-col items-center justify-center h-full"><p class="text-[8px] text-slate-500 uppercase">Total Comissões</p><p class="text-2xl font-black">${fBR(m.com)}</p></div>`;
            document.getElementById('saldo-card').innerHTML = `<div class="text-center mb-4 border-b border-white/10 pb-2 font-black text-[10px] uppercase">Acerto Individual</div><div class="grid grid-cols-2 gap-4"><div class="bg-white/5 p-4 rounded-2xl"><p class="text-[10px] font-black text-blue-400 uppercase mb-2">EVANIO</p><div class="text-[9px] space-y-1"><div>Comis: <b>+ ${fBR(vend.Evanio.com)}</b></div><div>Reemb: <b>+ ${fBR(rI)}</b></div><div class="text-rose-400">Vales: <b>- ${fBR(parseFloat(valesDB.evanio||0))}</b></div><div class="text-orange-400">Entr: <b>- ${fBR(vend.Evanio.ent)}</b></div><div class="text-xs font-black pt-1 border-t border-white/5">Saldo: <span class="text-emerald-400">${fBR(vend.Evanio.com + rI - (parseFloat(valesDB.evanio)||0) - vend.Evanio.ent)}</span></div></div></div><div class="bg-white/5 p-4 rounded-2xl"><p class="text-[10px] font-black text-cyan-400 uppercase mb-2">WILLIAN</p><div class="text-[9px] space-y-1"><div>Comis: <b>+ ${fBR(vend.Willian.com)}</b></div><div>Reemb: <b>+ ${fBR(rI)}</b></div><div class="text-rose-400">Vales: <b>- ${fBR(parseFloat(valesDB.willian||0))}</b></div><div class="text-orange-400">Entr: <b>- ${fBR(vend.Willian.ent)}</b></div><div class="text-xs font-black pt-1 border-t border-white/5">Saldo: <span class="text-emerald-400">${fBR(vend.Willian.com + rI - (parseFloat(valesDB.willian)||0) - vend.Willian.ent)}</span></div></div></div></div>`;
            document.getElementById('extrato-tabela').innerHTML = list.filter(i => i.resultado === "Venda").map(i => `<div class="flex justify-between py-1.5 border-b border-white/5"><span class="truncate max-w-[120px] font-bold">#${i.vendedor?.charAt(0)||'W'} ${i.nome_formando}</span><b class="text-emerald-400">${fBR(i.valor)}</b></div>`).join('');
            document.getElementById('nq-tabela').innerHTML = list.filter(i => i.resultado === "NQ").map(i => `<div class="py-1 border-b border-white/5 text-slate-500">${i.nome_formando}</div>`).join('');
            window.updateChart(chartData);
        };

        window.updateChart = (data) => {
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            const labels = Object.keys(data).sort().map(d => d.split('-').reverse().slice(0, 2).join('/'));
            if (weeklyChart) weeklyChart.destroy();
            weeklyChart = new Chart(ctx, { type: 'bar', data: { labels: labels, datasets: [{ label: 'V', data: Object.keys(data).sort().map(d => data[d].v), backgroundColor: '#10b981', borderRadius: 5 }, { label: 'N', data: Object.keys(data).sort().map(d => data[d].nq), backgroundColor: '#f43f5e', borderRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 8 } } } } } });
        };

        // --- GESTÃO E DADOS ---
        window.abrirGestaoCentralizada = () => {
            const c = custosDB || {}; const p = projetoDB || {};
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const auto = p.automacao || { lista: "", msg1: "", msg2: "", msg3: "", msg4: "" };
            f.innerHTML = `<h3 class="text-blue-400 font-black text-[10px] uppercase mb-4">Dados do Projeto</h3><div class="space-y-3"><div><p class="text-[8px] text-slate-500 uppercase">Período Ativo</p><div class="flex gap-2 mb-2"><input type="date" id="pDi" value="${p.data_inicio || ''}" class="input-compact flex-grow text-[10px]"><input type="date" id="pDf" value="${p.data_fim || ''}" class="input-compact flex-grow text-[10px]"></div></div><div><p class="text-[8px] text-amber-500 uppercase font-bold">Lista Disparo</p><textarea id="pLista" class="input-compact h-24 text-[10px]">${auto.lista || ''}</textarea></div><div><p class="text-[8px] text-blue-400 uppercase font-bold">Mensagens</p><textarea id="m1" class="input-compact h-10 text-[10px] mb-1">${auto.msg1 || ''}</textarea><textarea id="m2" class="input-compact h-10 text-[10px] mb-1">${auto.msg2 || ''}</textarea><textarea id="m3" class="input-compact h-10 text-[10px] mb-1">${auto.msg3 || ''}</textarea><textarea id="m4" class="input-compact h-10 text-[10px] mb-1">${auto.msg4 || ''}</textarea></div><hr class="opacity-10"><p class="text-[8px] text-emerald-400 uppercase font-black mb-2">Despesas de Viagem</p><div class="grid grid-cols-2 gap-3"><div><label class="label-custo">VALOR KM</label><input type="number" id="cKv" value="${c.km_valor || 0.7}" class="input-compact"></div><div><label class="label-custo">KM TOTAL</label><input type="number" id="cKt" value="${c.km_total || 0}" class="input-compact"></div></div><div><label class="label-custo">TOTAL PEDÁGIO</label><input type="number" id="cPt" value="${c.pedagio_total || 0}" class="input-compact"></div><div class="grid grid-cols-2 gap-3"><div><label class="label-custo">DIÁRIAS HOSP.</label><input type="number" id="cHq" value="${c.hosp_qtd || 0}" class="input-compact"></div><div><label class="label-custo">VALOR DIÁRIA</label><input type="number" id="cHv" value="${c.hosp_valor || 0}" class="input-compact"></div></div><div class="grid grid-cols-2 gap-3"><div><label class="label-custo">QTD ALIMENT.</label><input type="number" id="cAq" value="${c.alim_qtd || 0}" class="input-compact"></div><div><label class="label-custo">VALOR UNIT.</label><input type="number" id="cAv" value="${c.alim_valor || 0}" class="input-compact"></div></div></div><button onclick="window.salvarTudoProjeto()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs mt-6">Gravar Tudo</button>`;
        };

        window.salvarTudoProjeto = async () => {
            await update(ref(db, `projetos/${projId}`), {
                data_inicio: document.getElementById('pDi').value,
                data_fim: document.getElementById('pDf').value,
                automacao: { lista: document.getElementById('pLista').value, msg1: document.getElementById('m1').value, msg2: document.getElementById('m2').value, msg3: document.getElementById('m3').value, msg4: document.getElementById('m4').value, index_atual: projetoDB.automacao?.index_atual || 0 },
                campanha: { lista: document.getElementById('pLista').value, msg1: document.getElementById('m1').value, msg2: document.getElementById('m2').value, msg3: document.getElementById('m3').value, msg4: document.getElementById('m4').value, index_atual: projetoDB.automacao?.index_atual || 0, status: "Pendente" }
            });
            await update(ref(db, `custos/${projId}`), { km_valor: document.getElementById('cKv').value, km_total: document.getElementById('cKt').value, pedagio_total: document.getElementById('cPt').value, hosp_valor: document.getElementById('cHv').value, hosp_qtd: document.getElementById('cHq').value, alim_valor: document.getElementById('cAv').value, alim_qtd: document.getElementById('cAq').value });
            location.reload();
        };

        window.filtrarLogistica = () => {
            const cont = document.getElementById('lista-visitas'); if (!cont) return; cont.innerHTML = '';
            const fD = document.getElementById('filtro-data-logistica').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            list.sort((a, b) => new Date(`${a.data}T${a.horario || '23:59'}`) - new Date(`${b.data}T${b.horario || '23:59'}`));
            list.forEach(i => {
                let status = i.resultado || "PENDENTE"; let cor = status === "Venda" ? "text-emerald-500" : status === "NQ" ? "text-rose-500" : "text-slate-400";
                cont.innerHTML += `<div class="glass p-4 rounded-3xl flex flex-col gap-3 border border-white/5"><div class="flex justify-between items-start"><div class="flex flex-col text-left"><span class="text-xs text-slate-400 font-bold">📅 ${i.data?.split('-').reverse().join('/')}</span><span class="text-xl font-black text-blue-400">⏰ ${i.horario || '--:--'}</span></div><div class="flex flex-col items-end text-right"><span class="text-[10px] font-black uppercase ${cor}">${status === "Venda" ? "VENDIDO" : status}</span><span class="text-sm font-black uppercase truncate max-w-[150px]">#${i.num_album || ''} ${i.nome_formando}</span></div></div><div class="bg-white/5 p-3 rounded-2xl"><p class="text-[10px] text-slate-400 uppercase font-black mb-1">📍 Endereço</p><p class="text-xs font-bold break-words">${i.endereco || 'Não informado'}</p></div><div class="flex gap-2"><button onclick="window.gerenciarItem('${i.path}')" class="btn-primary flex-grow py-3 rounded-xl text-[10px] font-black uppercase">Gerenciar</button><a href="https://wa.me/55${(i.telefone || '').replace(/\D/g,'')}" target="_blank" class="bg-emerald-600/20 border border-emerald-500/30 px-5 py-3 rounded-xl text-emerald-400 text-[10px] font-black uppercase">Zap</a><a href="https://www.waze.com/ul?q=${encodeURIComponent(i.endereco || '')}&navigate=yes" target="_blank" class="bg-blue-600/20 border border-blue-500/30 px-5 py-3 rounded-xl text-blue-400 text-[10px] font-black uppercase">Waze</a></div></div>`;
            });
        };

        window.switchView = (v) => { document.querySelectorAll('.view-section').forEach(x => x.classList.remove('view-active')); document.getElementById(v).classList.add('view-active'); };

        window.acessoAdmin = () => {
            if (sessionStorage.getItem('isAdm') === 'true') { window.switchView('view-logistica'); return; }
            const s = prompt("Senha:"); if (s === "2025") { sessionStorage.setItem('isAdm', 'true'); document.getElementById('controles-admin').classList.remove('hidden'); window.switchView('view-logistica'); } else { alert("Acesso Negado!"); }
        };

        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };

        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display = 'flex'; };

        window.abrirAvulso = () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            f.innerHTML = `<h3 class="text-white font-black text-xs uppercase mb-3">Novo Avulso</h3><input type="text" id="avN" placeholder="Nome" class="input-compact mb-2"><input type="date" id="avD" class="input-compact mb-2"><button onclick="window.salvarAvulso()" class="btn-primary w-full p-3 rounded-xl text-[10px] font-black uppercase">Salvar</button>`;
        };

        window.salvarAvulso = async () => {
            const n = document.getElementById('avN').value; const d = document.getElementById('avD').value;
            if (!n || !d) return alert("Preencha tudo!");
            try {
                const id = "AV-" + Date.now();
                await set(ref(db, `vendas/${projId}/avulsos/${d}/${id}`), { nome_formando: n, data: d, resultado: "Pendente", vendedor: "Willian", valor: 0 });
                alert("✅ Salvo!"); window.fecharModalGestao(); window.carregarRelatorio();
            } catch (e) { alert("Erro ao salvar!"); }
        };

        // --- FUNÇÕES DE CALENDÁRIO MANTIDAS ---
        window.obterHorariosArray = (d, a = false) => {
            const doB = new Date(d + "T00:00:00"); const fds = (doB.getDay() === 0 || doB.getDay() === 6);
            let hL = []; const f = fds ? 17 : 20.5;
            for (let h = 9; h <= f; h += 0.5) { const hh = Math.floor(h).toString().padStart(2, '0'); const mm = (h % 1 === 0) ? '00' : '30'; hL.push(`${hh}:${mm}`); }
            if (!a) { const ag = new Date(); const hj = ag.toLocaleDateString('en-CA'); if (d === hj) { const mL = (ag.getHours() * 60) + ag.getMinutes() + 180; hL = hL.filter(h => { const p = h.split(':').map(Number); return (p[0] * 60 + p[1]) >= mL; }); } }
            return hL;
        };

        window.gerarBotoesDatas = (i, f) => {
            const c = document.getElementById('day-selector'); if(!c) return; c.innerHTML = "";
            let cur = new Date(i + "T00:00:00"); const hj = new Date().toLocaleDateString('en-CA');
            while (cur <= new Date(f + "T00:00:00")) { const iso = cur.toISOString().split('T')[0]; if (iso >= hj) { if (!(iso === hj && window.obterHorariosArray(iso, false).length === 0)) { c.innerHTML += `<button type="button" onclick="window.selecionarDia(this, '${iso}')" class="day-btn text-white">${cur.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</button>`; } } cur.setDate(cur.getDate() + 1); }
        };

        window.selecionarDia = async (b, iso) => {
            document.querySelectorAll('.day-btn').forEach(x => x.classList.remove('active')); b.classList.add('active');
            document.getElementById('data-selecionada').value = iso;
            const sH = document.getElementById('horario'); sH.innerHTML = '<option value="">Buscando...</option>';
            try {
                const snap = await get(ref(db, `dados/${projId}/agendamentos/${iso}`)); const ags = snap.exists() ? snap.val() : {};
                const hArr = window.obterHorariosArray(iso, false); sH.innerHTML = '<option value="">Selecione o Horário</option>';
                hArr.forEach(h => { let ct = 0; Object.values(ags).forEach(ag => { if (ag.horario === h) ct++; }); if (ct < 2) sH.innerHTML += `<option value="${h}">${h}</option>`; });
                if (sH.options.length <= 1) sH.innerHTML = '<option value="">Agenda lotada!</option>';
            } catch (e) { sH.innerHTML = '<option value="">Erro!</option>'; }
        };

        document.getElementById('form-agendamento').onsubmit = async (e) => {
            e.preventDefault(); const dt = document.getElementById('data-selecionada').value; if (!dt) return alert("Selecione o Dia!");
            await set(ref(db, `dados/${projId}/agendamentos/${dt}/AG-${Date.now()}`), { nome_formando: document.getElementById('nome').value, telefone: document.getElementById('telefone').value, endereco: document.getElementById('endereco').value, horario: document.getElementById('horario').value, resultado: "Pendente" });
            alert("✅ VISITA AGENDADA!"); e.target.reset();
        };

        window.renderFila = () => {
            const cont = document.getElementById('lista-fila'); if (!cont) return;
            const lista = projetoDB.automacao?.lista?.split('\n').filter(l => l.trim() !== "") || [];
            const atual = projetoDB.automacao?.index_atual || 0;
            cont.innerHTML = lista.map((l, i) => `<div class="flex justify-between p-2 rounded-lg ${i < atual ? 'bg-emerald-500/10 text-emerald-500' : 'bg-white/5'}"><span>${i+1}. ${l.split(',')[0]}</span><b>${i < atual ? 'OK' : 'PENDENTE'}</b></div>`).join('');
        };
        
        window.switchView('view-agendamento');
    </script>
</body>
</html>
