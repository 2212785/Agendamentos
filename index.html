<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Dashboard PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        #admin-modal { display: none; position: fixed; inset: 0; z-index: 50; padding: 20px; overflow-y: auto; background: rgba(2, 6, 23, 0.98); }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; padding: 20px; overflow-y: auto; background: rgba(2, 6, 23, 0.95); align-items: center; justify-content: center; }
        .day-btn { transition: all 0.2s; border-color: rgba(255,255,255,0.1); color: #94a3b8; background: rgba(255,255,255,0.03); cursor: pointer; }
        .day-btn.active { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        canvas { max-height: 200px !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col text-white">

    <div id="modalGestao" class="flex">
        <div class="glass w-full max-w-xl rounded-[2.5rem] p-8 border border-white/20 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-2xl font-black uppercase italic text-blue-400">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-2 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/50 p-6 rounded-2xl hover:bg-emerald-600 transition group text-center">
                    <span class="block text-emerald-400 group-hover:text-white font-black text-xs uppercase">1. Resultado</span>
                </button>
                <button onclick="window.fluxoAlterarData()" class="bg-blue-600/20 border border-blue-500/50 p-6 rounded-2xl hover:bg-blue-600 transition group text-center">
                    <span class="block text-blue-400 group-hover:text-white font-black text-xs uppercase">2. Mudar Data</span>
                </button>
                <button onclick="window.confirmarExclusao()" class="bg-rose-600/20 border border-rose-500/50 p-6 rounded-2xl hover:bg-rose-600 transition group text-center">
                    <span class="block text-rose-400 group-hover:text-white font-black text-xs uppercase">3. Excluir</span>
                </button>
            </div>
            <div id="gestao-form" class="mt-8 hidden space-y-4"></div>
        </div>
    </div>

    <main id="admin-modal">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4">
                <h1 class="text-3xl font-extrabold italic uppercase">Master <span class="text-blue-500 font-black">Dashboard PRO</span></h1>
                <div class="flex flex-wrap gap-3 w-full lg:w-auto">
                    <button onclick="window.lancarVendaDireta()" class="flex-1 lg:flex-none bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase shadow">Venda Direta</button>
                    <button onclick="window.enviarRelatorioWhats()" class="flex-1 lg:flex-none bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase shadow">Relatório WhatsApp</button>
                    <button onclick="window.fecharAdmin()" class="flex-1 lg:flex-none bg-rose-600/20 text-rose-500 border border-rose-500/50 px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase font-black">Sair</button>
                </div>
            </div>

            <div id="resumo-financeiro" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-9 gap-3 mb-6"></div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass p-6 rounded-[2rem] border-white/5">
                        <h3 class="text-sm font-bold uppercase mb-4 flex items-center gap-2">Vendas por Período</h3>
                        <canvas id="graficoVendas"></canvas>
                    </div>
                    <div class="glass rounded-[2rem] overflow-hidden border-white/5">
                        <div class="p-6 pb-0 flex justify-between items-center">
                            <h3 class="text-lg font-bold uppercase text-white">Roteiro de Atendimento</h3>
                            <input type="text" id="busca-admin" onkeyup="window.filtrarLista()" placeholder="Pesquisar..." class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm text-white outline-none w-48 sm:w-64">
                        </div>
                        <div id="admin-content" class="overflow-x-auto p-4"></div>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="glass rounded-[2rem] p-6 border-white/5">
                        <h3 class="text-lg font-bold text-white uppercase italic mb-4 text-center">Extrato Comissões</h3>
                        <div id="comissao-content" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
                        <div id="fechamento-final" class="mt-6 border-t border-white/10 pt-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <header class="p-6 flex justify-between items-center">
        <span class="text-2xl font-black italic uppercase">Portal <span class="text-blue-500">do formando</span></span>
        <button onclick="window.acessoAdmin()" class="glass px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase border-white/20">Login ADM</
