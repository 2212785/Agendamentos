<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Intelligence - BI v11.8 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: center; justify-content: center; padding: 20px; }
        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 3px solid #3b82f6; transition: all 0.3s; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: none; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-xl font-black uppercase text-blue-400">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-8 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 transition">1. Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 border border-rose-500/30 p-4 rounded-2xl text-rose-500 font-black uppercase text-xs">2. Marcar NQ</button>
                <button onclick="window.fluxoEditar()" class="bg-blue-600/10 border border-blue-500/30 p-4 rounded-2xl text-blue-400 font-black uppercase text-xs">3. Editar Cadastro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[10px] uppercase font-bold mt-4 text-center">Excluir Registro</button>
            </div>
            <div id="gestao-form" class="hidden space-y-4"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-6 flex justify-between items-center w-full">
            <span class="text-xl font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase">ADM</button>
        </header>
        <main class="flex-grow flex items-center justify-center p-4 text-white">
            <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl text-center border border-white/5">
                <h2 id="escola-titulo" class="text-2xl font-extrabold uppercase text-blue-400 italic">Guaratinguetá</h2>
                <h3 id="sub-escola" class="text-xs font-bold text-slate-400 uppercase tracking-widest italic mb-8">Dr. Guilherme Filippo</h3>
                <form id="form-agendamento" class="space-y-4">
                    <div class="grid grid-cols-2 gap-2 mb-4" id="day-selector">
                        <button type="button" data-date="2026-03-08" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase">Dom 08/03</button>
                        <button type="button" data-date="2026-03-09" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase">Seg 09/03</button>
                    </div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500 text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white"><option value="">Horário</option></select>
                    <textarea id="endereco" required placeholder="Endereço de Visita" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none transition" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-5 rounded-2xl font-black uppercase shadow-lg text-white">Finalizar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-logistica" class="view-section p-6 text-white text-white">
        <div class="max-w-4xl mx-auto w-full text-white text-white">
            <nav class="flex justify-between items-center mb-10 text-white text-white">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white text-white">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5 text-white">
                    <button class="bg-blue-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg">Visitas</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400">Dashboard BI</button>
                    <button onclick="window.switchView('view-config')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400">⚙️</button>
                </div>
            </nav>
            <div class="mb-8">
                <h1 class="text-3xl font-black italic uppercase mb-4 text-white">Minha <span class="text-blue-500 text-white">Rota</span></h1>
                <div class="flex flex-col md:flex-row gap-4 text-white">
                    <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-2xl px-6 py-4 text-sm font-bold outline-none text-white">
                    <button onclick="window.abrirAvulso()" class="bg-white text-black px-8 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-blue-50 transition">+ Avulso</button>
                </div>
            </div>
            <div id="lista-visitas" class="space-y-4"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section p-6 text-white text-white text-white">
        <div class="max-w-7xl mx-auto w-full text-white text-white">
            <nav class="flex justify-between items-center mb-10 text-white">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white text-white text-white">← Voltar</button>
                <div class="flex gap-4">
                    <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none">
                    <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">Copiar Zap</button>
                </div>
            </nav>
            <div id="kpi-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>
            <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
                <div class="lg:col-span-2 glass rounded-[3rem] p-8 border border-white/5">
                    <canvas id="chartWeekly" style="max-height: 250px;"></canvas>
                </div>
                <div id="saldo-card" class="glass rounded-[3rem] p-8 border-l-8 border-emerald-500 flex flex-col justify-center"></div>
            </div>
            <div class="glass rounded-[3rem] p-8 overflow-x-auto border border-white/5">
                <table class="w-full text-left min-w-[800px]">
                    <thead><tr class="border-b border-white/5 text-[10px] text-slate-500 font-black uppercase text-white"><th>Cliente</th><th>Venda Bruta</th><th>Pagamento</th><th>Comissão</th></tr></thead>
                    <tbody id="extrato-tabela"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="view-config" class="view-section p-6 text-white text-white">
        <div class="max-w-4xl mx-auto w-full text-white text-white text-white">
            <nav class="flex justify-between items-center mb-10">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white text-white">← Voltar</button>
                <h1 class="text-xl font-black uppercase italic">Central <span class="text-blue-500">Config</span></h1>
            </nav>
            <div class="glass p-6 rounded-3xl mb-8 border-l-8 border-blue-500 text-white">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Projeto Ativo:</p>
                <h2 id="status-projeto-ativo" class="text-2xl font-black text-white mt-1">Carregando...</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-white">
                <div class="glass p-8 rounded-[2.5rem]">
                    <h3 class="font-black uppercase text-xs mb-6 text-blue-400">Cadastrar Novo</h3>
                    <input type="text" id="new-proj-id" placeholder="ID técnico" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-sm mb-4">
                    <input type="text" id="new-proj-cidade" placeholder="Cidade" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-sm mb-4">
                    <input type="text" id="new-proj-escola" placeholder="Escola" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-sm mb-4 text-white">
                    <button onclick="window.criarProjeto()" class="btn-primary w-full py-4 rounded-xl font-bold uppercase text-xs text-white">Salvar</button>
                </div>
                <div class="glass p-8 rounded-[2.5rem]">
                    <h3 class="font-black uppercase text-xs mb-6 text-emerald-400">Ativar</h3>
                    <select id="config-projeto-ativo" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-sm font-bold text-blue-400 mb-4"></select>
                    <button onclick="window.ativarProjeto()" class="bg-emerald-600 w-full py-4 rounded-xl font-bold uppercase text-xs text-white">Ativar</button>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        let projetoAtualId = "";
        let chartWeekly = null;

        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projetoAtualId = snap.val() || "guaratingueta-guilherme";
            const projSnap = await get(ref(db, `config/projetos/${projetoAtualId}`));
            if(projSnap.exists()){
                const d = projSnap.val();
                document.getElementById('escola-titulo').innerText = d.cidade;
                document.getElementById('sub-escola').innerText = d.escola;
                const st = document.getElementById('status-projeto-ativo');
                if(st) st.innerText = `${d.cidade} - ${d.escola}`;
                window.carregarRelatorio();
            }
        });

        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            window.carregarRelatorio();
            if(id === 'view-config') window.carregarConfiguracoes();
        };

        window.acessoAdmin = () => { if(prompt("Senha:") === "2025") window.switchView('view-logistica'); };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; };

        window.carregarRelatorio = async () => {
            if(!projetoAtualId) return;
            const [sA, sV] = await Promise.all([get(ref(db, `dados/${projetoAtualId}/agendamentos`)), get(ref(db, `dados/${projetoAtualId}/avulsos`))]);
            window.dadosCompletos = [];
            const ags = sA.val() || {};
            Object.keys(ags).forEach(d => { if(ags[d]) Object.keys(ags[d]).forEach(id => window.dadosCompletos.push({...ags[d][id], id, data: d, path: `dados/${projetoAtualId}/agendamentos/${d}/${id}`})); });
            const avs = sV.val() || {};
            Object.keys(avs).forEach(id => window.dadosCompletos.push({...avs[id], id, path: `dados/${projetoAtualId}/avulsos/${id}`, data: avs[id].data}));
            window.filtrarLogistica();
            window.filtrarBI();
        };

        window.filtrarLogistica = () => {
            const container = document.getElementById('lista-visitas');
            if(!container) return;
            const fD = document.getElementById('filtro-data-logistica').value;
            let lista = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            lista.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            container.innerHTML = '';
            lista.forEach(i => {
                const cor = i.resultado === "Venda" ? "border-emerald-500/40 bg-emerald-500/5" : (i.resultado === "NQ" ? "border-rose-500/40 bg-rose-500/5" : "border-white/10");
                const waNum = (i.telefone || '').replace(/\D/g, '');
                const waLink = waNum ? `https://wa.me/55${waNum}` : '#';
                const mapLink = `https://www.waze.com/ul?q=${encodeURIComponent(i.endereco||'')}&navigate=yes`;
                container.innerHTML += `
                    <div class="glass p-6 rounded-[2.5rem] border-l-8 ${cor} flex flex-col md:flex-row justify-between items-center gap-4 text-white">
                        <div class="flex-grow text-center md:text-left">
                            <div class="mb-2"><span class="text-3xl font-black block">${pDT(i.data)}</span><span class="text-xl font-bold text-blue-400 uppercase">${i.horario || 'DIR'}</span></div>
                            <h3 class="text-2xl font-black uppercase mt-2">${i.nome_formando}</h3>
                            <div class="mt-4 flex flex-col gap-2">
                                <a href="${waLink}" target="_blank" class="text-emerald-400 font-bold text-base italic">📱 WhatsApp: ${i.telefone}</a>
                                <a href="${mapLink}" target="_blank" class="text-slate-400 text-sm italic">📍 GPS: ${i.endereco}</a>
                            </div>
                        </div>
                        <button onclick="window.gerenciarItem('${i.path}', '${i.nome_formando}', '${i.endereco}')" class="btn-primary px-12 py-6 rounded-3xl font-black uppercase text-xs shadow-xl">Gerenciar</button>
                    </div>`;
            });
        };

        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let lista = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, vales:0, com:0 };
            let daily = [0,0,0,0,0,0,0];
            let rows = '';

            lista.forEach(i => {
                if(i.resultado === "Venda") {
                    m.v++; const vV = Number(i.valor)||0; m.tot += vV;
                    daily[new Date(i.data + "T00:00:00").getDay()]++;
                    let comI = 0, pgsI = [];
                    if(Array.isArray(i.pagamentos)) {
                        i.pagamentos.forEach(p => {
                            const val = Number(p.valor)||0; const ent = Number(p.entrada)||0; const t = p.tipo.toLowerCase(); pgsI.push(p.tipo);
                            if(t.includes("pix")) m.pix += val; else if(t.includes("dinheiro")) m.din += val; else if(t.includes("crédito") || t.includes("credito")) m.cre += val; else if(t.includes("débito") || t.includes("debito")) m.deb += val;
                            else if(t.includes("boleto")) { m.bol += (val - ent); comI += (ent * 0.12) + ((val - ent) * 0.08); if(p.forma_entrada === "Pix") m.pix += ent; else if(p.forma_entrada === "Dinheiro") m.din += ent; if(p.forma_entrada === "Pix" || p.forma_entrada === "Dinheiro") m.vales += ent; }
                            if(!t.includes("boleto")) { comI += val * 0.12; if(t.includes("pix") || t.includes("dinheiro")) m.vales += val; }
                        });
                    } else { comI = vV * 0.12; }
                    m.com += comI;
                    rows += `<tr class="border-b border-white/5 hover:bg-white/5 text-white"><td>${i.nome_formando}</td><td>${fBR(i.valor)}</td><td>${pgsI.join('+')}</td><td>${fBR(comI)}</td></tr>`;
                } else if(i.resultado === "NQ") m.nq++;
            });

            const tx = (m.v + m.nq) > 0 ? ((m.v / (m.v + m.nq)) * 100).toFixed(0) : 0;
            const perc = (v) => m.tot > 0 ? ((v / m.tot) * 100).toFixed(0) + '%' : '0%';
            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-6 rounded-[2rem] border-emerald-500 bg-emerald-950/10"><p class="text-[9px] text-emerald-500 font-black mb-1 uppercase">Vendas</p><p class="text-3xl font-black">${m.v}</p></div><div class="card-bi p-6 rounded-[2rem] border-rose-500 bg-rose-950/10"><p class="text-[9px] text-rose-500 font-black mb-1 uppercase">NQ</p><p class="text-3xl font-black">${m.nq}</p></div><div class="card-bi p-6 rounded-[2rem] border-blue-500 bg-blue-950/10"><p class="text-[9px] text-blue-500 font-black mb-1 uppercase">Conversão</p><p class="text-3xl font-black">${tx}%</p></div><div class="card-bi p-6 rounded-[2rem] border-cyan-500 bg-cyan-950/10"><p class="text-[9px] text-cyan-500 font-black mb-1 uppercase">Ticket Médio</p><p class="text-3xl font-black">${fBR(m.v?m.tot/m.v:0)}</p></div>`;
            document.getElementById('finance-grid').innerHTML = `<div class="card-bi p-4 rounded-2xl"><p class="text-[8px] text-slate-500 font-black uppercase">Pix (${perc(m.pix)})</p><p class="text-lg font-black">${fBR(m.pix)}</p></div><div class="card-bi p-4 rounded-2xl"><p class="text-[8px] text-slate-500 font-black uppercase">Dinheiro (${perc(m.din)})</p><p class="text-lg font-black">${fBR(m.din)}</p></div><div class="card-bi p-4 rounded-2xl"><p class="text-[8px] text-slate-500 font-black uppercase">Crédito (${perc(m.cre)})</p><p class="text-lg font-black text-white">${fBR(m.cre)}</p></div><div class="card-bi p-4 rounded-2xl"><p class="text-[8px] text-slate-500 font-black uppercase text-white">Débito (${perc(m.deb)})</p><p class="text-lg font-black text-white">${fBR(m.deb)}</p></div><div class="card-bi p-4 rounded-2xl text-white"><p class="text-[8px] text-slate-500 font-black uppercase text-white">Boleto (${perc(m.bol)})</p><p class="text-lg font-black text-white text-white">${fBR(m.bol)}</p></div>`;
            document.getElementById('saldo-card').innerHTML = `<p class="text-[10px] font-black uppercase text-slate-500 mb-4 italic text-white text-white">Consolidado</p><div class="space-y-2 text-white"><div class="flex justify-between text-sm"><span>Bruto</span><span class="font-black text-white">${fBR(m.tot)}</span></div><div class="flex justify-between text-blue-300 text-sm"><span>Comissão</span><span class="font-black text-white">${fBR(m.com)}</span></div><div class="flex justify-between text-rose-400 text-sm"><span>Vales</span><span class="font-black text-white">- ${fBR(m.vales)}</span></div><div class="border-t border-white/10 mt-6 pt-6 text-center text-white"><p class="text-[8px] font-black text-emerald-400 uppercase">Saldo a Receber</p><p class="text-5xl font-black text-white italic text-white">${fBR(m.com - m.vales)}</p></div></div>`;
            document.getElementById('extrato-tabela').innerHTML = rows || '<tr><td colspan="4" class="p-10 text-center text-slate-500">Sem dados</td></tr>';
            if(chartWeekly) chartWeekly.destroy();
            chartWeekly = new Chart(document.getElementById('chartWeekly'), { type: 'bar', data: { labels: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'], datasets: [{ data: daily, backgroundColor: '#3b82f6', borderRadius: 8 }] }, options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { ticks: { color: '#64748b' }, grid: { display: false } } } } });
        };

        window.gerenciarItem = (p, n, e) => { window.itemPath = p; window.currentName = n; window.currentEnd = e; document.getElementById('modalGestao').style.display = 'flex'; };
        window.fluxoEditar = () => { document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<h3 class="text-white font-black mb-4 uppercase text-xs">Editar</h3><input type="text" id="edit-nome" value="${window.currentName}" class="w-full bg-slate-800 p-4 rounded-xl mb-2 text-white border border-white/10 outline-none"><textarea id="edit-end" class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-white border border-white/10 outline-none" rows="3">${window.currentEnd}</textarea><button onclick="window.salvarEdicao()" class="w-full p-5 bg-blue-600 rounded-2xl font-black text-white uppercase">Salvar</button>`; };
        window.salvarEdicao = async () => { const n = document.getElementById('edit-nome').value, e = document.getElementById('edit-end').value; await update(ref(db, window.itemPath), { nome_formando: n, endereco: e }); window.fecharModalGestao(); await window.carregarRelatorio(); };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s, valor: 0 }); window.fecharModalGestao(); await window.carregarRelatorio(); };
        window.fluxoResultado = () => { document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<input type="number" id="vTotal" placeholder="TOTAL" class="w-full bg-slate-900 p-6 rounded-3xl text-center mb-4 text-white font-black text-3xl outline-none border border-white/10"><div class="grid grid-cols-2 gap-2 mb-4"><button onclick="window.addPg('Dinheiro')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Dinheiro</button><button onclick="window.addPg('Pix')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Pix</button><button onclick="window.addPg('Cartão Débito')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Débito</button><button onclick="window.addPg('Cartão Crédito')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Crédito</button><button onclick="window.addPg('Boleto')" class="p-4 bg-blue-900/30 border border-blue-500/40 rounded-2xl text-[10px] font-black uppercase col-span-2 text-white">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-4 text-white"></div><button onclick="window.finalizarVenda()" class="w-full p-4 bg-emerald-600 rounded-xl font-black text-white shadow-xl shadow-emerald-900/20">SALVAR</button>`; window.tempPgs = []; };
        window.addPg = (tipo) => { const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',','.') || 0); if(v <= 0) return; let pg = { tipo, valor: v }; if(tipo === 'Boleto') { const ent = prompt("Entrada? 1-Sim 2-Não"); if(ent === "1") { pg.entrada = parseFloat(prompt("Valor Entrada:")?.replace(',','.') || 0); const fE = prompt("Forma: 1-Dinheiro 2-Pix"); pg.forma_entrada = fE === "1" ? "Dinheiro" : "Pix"; } } window.tempPgs.push(pg); document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]"><span>${p.tipo}</span><span class="text-emerald-400 font-bold">${fBR(p.valor)}</span></div>`).join(''); };
        window.finalizarVenda = async () => { const tot = parseFloat(document.getElementById('vTotal').value); if(!tot) return alert("Valor!"); await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, pagamentos: window.tempPgs }); window.fecharModalGestao(); await window.carregarRelatorio(); };
        window.confirmarExclusao = async () => { if(confirm("Apagar Registro?")) { await remove(ref(db, window.itemPath)); window.fecharModalGestao(); await window.carregarRelatorio(); } };

        window.carregarConfiguracoes = async () => {
            const snap = await get(ref(db, `config/projetos`));
            const lista = snap.val() || {};
            const sel = document.getElementById('config-projeto-ativo');
            if(sel) { sel.innerHTML = ''; for(let k in lista) { let o = document.createElement('option'); o.value = k; o.textContent = `${lista[k].cidade} - ${lista[k].escola}`; if(k === projetoAtualId) o.selected = true; sel.appendChild(o); } }
        };

        window.criarProjeto = async () => {
            const id = document.getElementById('new-proj-id').value, cid = document.getElementById('new-proj-cidade').value, esc = document.getElementById('new-proj-escola').value;
            if(!id || !cid || !esc) return alert("Erro!");
            await set(ref(db, `config/projetos/${id}`), { cidade: cid, escola: esc });
            alert("Sucesso!"); window.carregarConfiguracoes();
        };

        window.ativarProjeto = async () => {
            const id = document.getElementById('config-projeto-ativo').value;
            await set(ref(db, `config/projeto_ativo`), id);
            location.reload();
        };

        window.abrirAvulso = () => { document.getElementById('modalGestao').style.display = 'flex'; document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<h3 class="text-white font-black mb-4 uppercase text-xs">Novo Cadastro</h3><input type="text" id="av-nome" placeholder="NOME" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white border border-white/10 outline-none"><input type="tel" id="av-tel" placeholder="TEL" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white border border-white/10 outline-none"><input type="text" id="av-end" placeholder="ENDEREÇO" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white border border-white/10 outline-none"><input type="date" id="av-data" class="w-full bg-slate-800 p-3 rounded-xl mb-4 text-white border border-white/10 outline-none"><button onclick="window.salvarNovoAvulso()" class="w-full p-4 bg-blue-600 rounded-xl font-black text-white uppercase text-xs text-white">Salvar</button>`; document.getElementById('av-data').value = new Date().toLocaleDateString('en-CA'); };
        window.salvarNovoAvulso = async () => { const n = document.getElementById('av-nome').value, d = document.getElementById('av-data').value; if(!n || !d) return alert("Erro!"); await set(ref(db, `dados/${projetoAtualId}/avulsos/AV-${Date.now()}`), { nome_formando: n, telefone: document.getElementById('av-tel').value, endereco: document.getElementById('av-end').value, data: d, resultado: "Pendente" }); window.fluxoResultado(); };

        window.copiarRelatorio = () => {
            const f = fBR; const dF = document.getElementById('filtro-bi').value;
            const projNome = document.getElementById('status-projeto-ativo').innerText;
            let v=0, nq=0, totV=0, pix=0, din=0, cre=0, deb=0, bol=0, val=0;
            const listaBase = dF ? window.dadosCompletos.filter(i => i.data === dF) : window.dadosCompletos;
            listaBase.forEach(item => {
                if(item.resultado === "Venda") { v++; totV += Number(item.valor)||0;
                    if(Array.isArray(item.pagamentos)) {
                        item.pagamentos.forEach(p => {
                            const vp = Number(p.valor)||0; const ent = Number(p.entrada)||0; const t = p.tipo.toLowerCase();
                            if(t.includes("pix")) pix += vp; else if(t.includes("dinheiro")) din += vp; else if(t.includes("crédito") || t.includes("credito")) cre += vp; else if(t.includes("débito") || t.includes("debito")) deb += vp;
                            else if(t.includes("boleto")) { bol += (vp - ent); if(p.forma_entrada === "Pix") pix += ent; else if(p.forma_entrada === "Dinheiro") din += ent; if(p.forma_entrada === "Pix" || p.forma_entrada === "Dinheiro") val += ent; }
                            if(!t.includes("boleto") && (t.includes("pix") || t.includes("dinheiro"))) val += vp;
                        });
                    }
                } else if(item.resultado === "NQ") nq++;
            });
            const txt = `Relatório de Vendas\nProjeto: ${projNome}\nData: ${dF ? pDT(dF) : 'ACUMULADO GERAL'}\n\n✅ Vendas: ${v}\n❌ NQ: ${nq}\n\n💵 Dinheiro: ${f(din)}\n💎 Pix: ${f(pix)}\n💳 Débito: ${f(deb)}\n💳 Crédito: ${f(cre)}\n📄 Boleto: ${f(bol)}\n\n💰 Total Vendido: ${f(totV)}\n💸 Vales: ${f(val)}`;
            const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("Copiado!");
        };

        window.selecionarDia = async (btn) => {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const d = btn.getAttribute('data-date'); document.getElementById('data-selecionada').value = d;
            const elH = document.getElementById('horario'); elH.innerHTML = '<option>Buscando...</option>';
            const snap = await get(ref(db, `dados/${projetoAtualId}/agendamentos/${d}`));
            const counts = {}; const ag = snap.val() || {};
            Object.keys(ag).forEach(id => { if(id.includes('-')){ let hL = id.split('-').slice(0,2).join(':'); counts[hL] = (counts[hL]||0)+1; } });
            elH.innerHTML = '<option value="">Escolha um Horário</option>';
            let cur = new Date(`${d}T09:00:00`), lim = (new Date(d + 'T00:00:00').getDay() % 6 === 0) ? "17:00" : "20:30";
            while(cur <= new Date(`${d}T${lim}:00`)){
                let hF = cur.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                if((2 - (counts[hF]||0)) > 0){ let opt=document.createElement('option'); opt.value=hF; opt.textContent=`${hF} (${2 - (counts[hF]||0)} vagas)`; elH.appendChild(opt); }
                cur.setMinutes(cur.getMinutes()+30);
            }
        };

        (async () => {
            const agora = new Date(), dHoje = agora.toLocaleDateString('en-CA');
            document.querySelectorAll('.day-btn').forEach(btn => {
                const dataBtn = btn.getAttribute("data-date");
                if (dataBtn < dHoje) return;
                if (dataBtn === dHoje) {
                    const diaS = agora.getDay();
                    const lim = (diaS === 0 || diaS === 6) ? 17 : 20;
                    if (agora.getHours() >= (lim - 3)) return; 
                }
                btn.style.display = "block";
            });

            document.getElementById("form-agendamento").addEventListener("submit", async function(e){
                e.preventDefault(); const n = document.getElementById("nome").value, t = document.getElementById("telefone").value, en = document.getElementById("endereco").value, h = document.getElementById("horario").value, d = document.getElementById("data-selecionada").value;
                await set(ref(db, `dados/${projetoAtualId}/agendamentos/${d}/${h.replace(":","-")}-${Date.now()}`), { nome_formando: n, telefone: t, endereco: en, horario: h, data: d, resultado: "Pendente" });
                
                // --- MENSAGEM FINAL BLINDADA (UNICODE) ---
                const msg = `NOVO AGENDAMENTO\n\n\uD83D\uDC64 Formando: ${n}\n\uD83D\uDCC5 Data: ${pDT(d)}\n\u23F0 Horário: ${h}\n\uD83D\uDCCD Endereço:\n${en}`;
                window.open(`https://wa.me/5516993291674?text=${encodeURIComponent(msg)}`, "_blank");
                location.reload();
            });
        })();
    </script>
</body>
</html>
