<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Intelligence - BI v14.20</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        
        /* CORREÇÃO DE ROLAGEM DO MODAL (v14.20) */
        #modalGestao { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 100; 
            background: rgba(2, 6, 23, 0.98); 
            overflow-y: auto; /* Permite rolar a tela inteira se necessário */
            padding: 20px 10px;
            align-items: flex-start; /* Alinha no topo para facilitar a rolagem */
            justify-content: center;
        }
        .modal-container {
            width: 100%;
            max-width: 32rem;
            margin-bottom: 50px; /* Garante espaço para ver o botão salvar no fim */
        }

        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="modal-container glass rounded-[2.5rem] p-8 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-xl font-black uppercase text-blue-400">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-8 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 transition">1. Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 border border-rose-500/30 p-4 rounded-2xl text-rose-500 font-black uppercase text-xs">2. Marcar NQ</button>
                <button onclick="window.fluxoEditar()" class="bg-blue-600/10 border border-blue-500/30 p-4 rounded-2xl text-blue-400 font-black uppercase text-xs">3. Editar Cadastro / Data</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[10px] uppercase font-bold mt-4 text-center hover:text-rose-500 transition">Excluir Registro permanentemente</button>
            </div>
            <div id="gestao-form" class="hidden space-y-4 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-6 flex justify-between items-center w-full">
            <span class="text-xl font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase">ADM</button>
        </header>
        <main class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl text-center border border-white/5">
                <h2 id="escola-titulo" class="text-2xl font-extrabold uppercase text-blue-400 italic">CARREGANDO...</h2>
                <h3 id="sub-escola" class="text-xs font-bold text-slate-400 uppercase tracking-widest italic mb-8">BUSCANDO PROJETO</h3>
                <form id="form-agendamento" class="space-y-4">
                    <div class="grid grid-cols-2 gap-2 mb-4" id="day-selector"></div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white"><option value="">Horário</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-5 rounded-2xl font-black uppercase shadow-lg text-white">Finalizar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-logistica" class="view-section p-6 text-white">
        <div class="max-w-4xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-6">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Visitas</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400">BI Dashboard</button>
                </div>
            </nav>
            <div class="mb-6">
                <div class="flex justify-between items-center mb-4 text-white">
                    <h1 class="text-2xl font-black italic uppercase">Minha <span class="text-blue-500">Rota</span></h1>
                    <div id="controles-adm" class="hidden flex flex-wrap gap-1">
                        <button onclick="window.criarNovoProjeto()" class="glass px-3 py-2 rounded-xl text-[8px] font-black uppercase text-emerald-400">Novo</button>
                        <button onclick="window.trocarProjetoAtivo()" class="glass px-3 py-2 rounded-xl text-[8px] font-black uppercase text-rose-400">Trocar</button>
                        <button onclick="window.gerenciarDatas()" class="glass px-3 py-2 rounded-xl text-[8px] font-black uppercase text-blue-400">Dados Projeto</button>
                        <button onclick="window.editarCustosProjeto()" class="glass px-3 py-2 rounded-xl text-[8px] font-black uppercase text-amber-400">⚙️ Custos</button>
                    </div>
                </div>
                <div class="flex flex-col md:flex-row gap-2">
                    <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold outline-none text-white">
                    <button onclick="window.abrirAvulso()" class="bg-white text-black px-6 py-3 rounded-xl text-[10px] font-black uppercase transition">+ Avulso</button>
                </div>
            </div>
            <div id="lista-visitas" class="space-y-3"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section p-6 text-white">
        <div class="max-w-7xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-10 text-white">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white">← Voltar</button>
                <div class="flex gap-4">
                    <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none text-white">
                    <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Copiar Zap</button>
                </div>
            </nav>
            <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8 text-white"></div>
            <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8 text-[10px] text-white"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10 text-white">
                <div class="lg:col-span-2 glass rounded-[3rem] p-8 border border-white/5 text-white"><canvas id="chartWeekly" style="max-height: 250px;"></canvas></div>
                <div id="saldo-card" class="glass rounded-[3rem] p-8 border-l-8 border-emerald-500 flex flex-col justify-center space-y-4 text-white"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 text-white">
                <div class="glass rounded-[3rem] p-8 overflow-x-auto border border-white/5 text-white"><h4 class="text-emerald-400 font-black uppercase text-xs mb-4 italic">Vendas</h4><table class="w-full text-left min-w-[400px] text-white"><tbody id="extrato-tabela" class="text-xs text-white"></tbody></table></div>
                <div class="glass rounded-[3rem] p-8 overflow-x-auto border border-white/5 text-white"><h4 class="text-rose-500 font-black uppercase text-xs mb-4 italic">NQs</h4><table class="w-full text-left min-w-[400px] text-white"><tbody id="nq-tabela" class="text-[10px] text-white"></tbody></table></div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        let projetoAtualId = ""; window.labelsAtivas = { cidade: "...", escola: "..." };
        let configProjetoAtual = {}; let custosOperacao = {}; window.dadosCompletos = []; window.valesAvulsos = [];

        window.atualizarTitulosDOM = () => {
            const h2 = document.getElementById('escola-titulo');
            const h3 = document.getElementById('sub-escola');
            if(h2 && h3) {
                h2.innerText = window.labelsAtivas.cidade || "Elite Sales";
                h3.innerText = window.labelsAtivas.escola || "Intelligence";
            }
        };

        // --- LÓGICA BI (COMISSÃO 12%/8% PRESERVADA) ---
        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let lista = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, vales:0, com:0 };
            let valeE = (projetoAtualId === "guaratingueta-guilherme") ? 1950.0 : 0;
            let valeW = (projetoAtualId === "guaratingueta-guilherme") ? 2755.0 : 0;
            
            lista.forEach(i => {
                const ds = new Date(i.data + "T00:00:00").getDay();
                if(i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor)||0;
                    let comVenda = 0;
                    if(i.pagamentos && i.pagamentos.length > 0) {
                        i.pagamentos.forEach(p => {
                            const vP = Number(p.valor) || 0;
                            const t = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                            if (t.includes("entrada")) { comVenda += vP * 0.12; } else { comVenda += vP * 0.08; }
                            if((t.includes("pix") || t.includes("dinheiro") || t.includes("entrada")) && !t.includes("debito") && !t.includes("credito")) {
                                m.vales += vP; if(i.vendedor === "Evanio") valeE += vP; else if(i.vendedor === "Willian") valeW += vP;
                            }
                            if(t.includes("pix")) m.pix += vP; else if(t.includes("dinheiro")) m.din += vP;
                            else if(t.includes("debito")) m.deb += vP; else if(t.includes("credito")) m.cre += vP;
                            else if(t.includes("boleto")) m.bol += vP;
                        });
                    } else { comVenda = (Number(i.valor) || 0) * 0.08; }
                    m.com += comVenda;
                } else if(i.resultado === "NQ") { m.nq++; }
            });
            // Restante da renderização do BI...
            window.dadosAtuaisRelatorio = { m, fD };
            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-6 rounded-[2rem] border-emerald-500 bg-emerald-950/10"><p class="text-[9px] uppercase text-emerald-500 font-black">Faturamento</p><p class="text-3xl font-black">${fBR(m.tot)}</p></div><div class="card-bi p-6 rounded-[2rem] border-blue-500 bg-blue-950/10 text-white"><p class="text-[9px] uppercase text-blue-500 font-black text-white">Vendas / NQ</p><p class="text-3xl font-black text-white">${m.v} / ${m.nq}</p></div><div class="card-bi p-6 rounded-[2rem] border-blue-500 bg-blue-950/10 text-white"><p class="text-[9px] uppercase text-blue-500 font-black text-white text-white text-white">Eficiência</p><p class="text-3xl font-black text-white">${((m.v / (m.v+m.nq || 1))*100).toFixed(0)}%</p></div><div class="card-bi p-6 rounded-[2rem] border-cyan-500 bg-cyan-950/10 text-white"><p class="text-[9px] uppercase text-cyan-500 font-black text-white text-white">Ticket Médio</p><p class="text-3xl font-black text-white">${fBR(m.v ? m.tot/m.v : 0)}</p></div><div class="card-bi p-6 rounded-[2rem] border-emerald-400 bg-emerald-950/10 text-white text-white text-white text-white text-white"><p class="text-[9px] uppercase text-emerald-400 font-black text-white text-white text-white">Comissão Bruta</p><p class="text-3xl font-black text-white">${fBR(m.com)}</p></div>`;
            // ... (Gráfico e Saldo Card preservados)
        };

        // --- FIREBASE E CARGA DE DADOS ---
        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projetoAtualId = snap.val() || "guaratingueta-guilherme";
            const [pS, cS] = await Promise.all([get(ref(db, `projetos/${projetoAtualId}`)), get(ref(db, `custos/${projetoAtualId}`))]);
            if(pS.exists()){
                configProjetoAtual = pS.val(); custosOperacao = cS.exists() ? cS.val() : {};
                window.labelsAtivas = { cidade: configProjetoAtual.cidade, escola: configProjetoAtual.escola || configProjetoAtual.school };
                window.atualizarTitulosDOM();
                if(configProjetoAtual.data_inicio) window.gerarBotoesDatas(configProjetoAtual.data_inicio, configProjetoAtual.data_fim);
                window.carregarRelatorio();
            }
        });

        window.carregarRelatorio = async () => {
            const id = projetoAtualId;
            const [sA_ant, sV_ant, sV_nov, sVale] = await Promise.all([get(ref(db, `dados/${id}/agendamentos`)), get(ref(db, `dados/${id}/avulsos`)), get(ref(db, `vendas/${id}`)), get(ref(db, `dados/${id}/vales`))]);
            window.dadosCompletos = [];
            const proc = (snap, path) => {
                const val = snap.val() || {};
                if(path.includes('agendamentos')){
                    Object.keys(val).forEach(d => { if(val[d]) Object.keys(val[d]).forEach(k => window.dadosCompletos.push({...val[d][k], id:k, data:d, path:`${path}/${d}/${k}`})); });
                } else {
                    Object.keys(val).forEach(k => window.dadosCompletos.push({...val[k], id:k, data:val[k].data, path:`${path}/${k}`}));
                }
            };
            proc(sA_ant, `dados/${id}/agendamentos`); proc(sV_ant, `dados/${id}/avulsos`);
            const vN = sV_nov.val() || {}; 
            if(vN.agendamentos) proc(get(ref(db,`vendas/${id}/agendamentos`)), `vendas/${id}/agendamentos`);
            if(vN.avulsos) proc(get(ref(db,`vendas/${id}/avulsos`)), `vendas/${id}/avulsos`);
            window.valesAvulsos = []; const vls = sVale.val() || {}; Object.keys(vls).forEach(id => window.valesAvulsos.push(vls[id]));
            window.filtrarLogistica(); window.filtrarBI();
        };

        // --- FILTRAGEM ROTA (LOGÍSTICA COM STATUS GIGANTE v14.20) ---
        window.filtrarLogistica = () => {
            const container = document.getElementById('lista-visitas'); if(!container) return;
            container.innerHTML = '';
            window.dadosCompletos.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            window.dadosCompletos.forEach(i => {
                let statusTxt = "PENDENTE", colorStatus = "text-slate-400";
                if(i.resultado === "Venda") { statusTxt = "VENDIDO"; colorStatus = "text-emerald-500"; }
                else if(i.resultado === "NQ") { statusTxt = "NQ"; colorStatus = "text-rose-500"; }
                
                container.innerHTML += `
                <div class="glass p-5 rounded-[2.5rem] border border-white/5 flex justify-between items-center text-white">
                    <div class="flex-grow">
                        <div class="flex items-center gap-4 mb-1">
                            <span class="text-[10px] font-bold text-slate-500">${i.horario || 'DIR'}</span>
                            <span class="text-xl font-black italic uppercase ${colorStatus}">${statusTxt}</span>
                        </div>
                        <h3 class="text-base font-black uppercase text-white">${i.nome_formando}</h3>
                    </div>
                    <button onclick="window.gerenciarItem('${i.path.replace(/'/g,"\\'")}', '${(i.nome_formando||'').replace(/'/g,"\\'")}', '${(i.endereco||'').replace(/'/g,"\\'")}')" class="btn-primary px-6 py-3 rounded-2xl font-black uppercase text-[10px] ml-4 text-white">Gerenciar</button>
                </div>`;
            });
        };

        // --- GESTÃO E EDIÇÃO (RESET E LIMPEZA) ---
        window.fluxoResultado = () => {
            document.getElementById('gestao-menu').classList.add('hidden'); 
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const item = window.dadosCompletos.find(i => i.path === window.itemPath) || {};
            window.tempPgs = item.pagamentos ? [...item.pagamentos] : []; 

            f.innerHTML = `
                <select id="vendedor-venda" class="w-full bg-slate-900 p-4 rounded-xl mb-3 text-white outline-none">
                    <option value="">Vendedor</option>
                    <option value="Evanio" ${item.vendedor === 'Evanio' ? 'selected' : ''}>Evanio</option>
                    <option value="Willian" ${item.vendedor === 'Willian' ? 'selected' : ''}>Willian</option>
                </select>
                <input type="text" id="vAlbum" placeholder="Nº ÁLBUM" value="${item.num_album || ''}" class="w-full bg-slate-900 p-4 rounded-xl mb-4 text-white text-center font-bold border border-white/10 outline-none">
                <input type="number" id="vTotal" placeholder="VALOR TOTAL" value="${item.valor || ''}" class="w-full bg-slate-900 p-6 rounded-3xl text-center mb-4 text-white font-black text-3xl border border-white/10 outline-none">
                
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="window.addPg('Dinheiro')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Dinheiro</button>
                    <button onclick="window.addPg('Pix')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Pix</button>
                    <button onclick="window.addPg('Cartão Débito')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Débito</button>
                    <button onclick="window.addPg('Cartão Crédito')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Crédito</button>
                    <button onclick="window.addPg('Boleto')" class="p-4 bg-blue-900/30 border border-blue-500/40 rounded-2xl text-[10px] font-black uppercase col-span-2 text-white">+ Boleto</button>
                </div>
                <div id="lista-p" class="space-y-1 mb-4 text-white"></div>
                <button onclick="window.limparPagamentos()" class="w-full p-4 mb-4 bg-rose-600/20 border border-rose-500/40 rounded-xl text-rose-500 font-black uppercase text-[10px]">LIMPAR PAGAMENTOS</button>
                <button onclick="window.finalizarVenda()" class="w-full p-6 bg-emerald-600 rounded-2xl font-black text-white shadow-xl uppercase">Salvar Venda</button>`;
            window.atualizarListaInterface();
        };

        window.limparPagamentos = () => { if(confirm("Deseja apagar os pagamentos?")) { window.tempPgs = []; window.atualizarListaInterface(); } };
        window.atualizarListaInterface = () => { document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]"><span>${p.tipo}</span><span class="text-emerald-400 font-bold">${fBR(p.valor)}</span></div>`).join(''); };

        window.addPg = (tipo) => {
            const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',', '.') || 0); if (v <= 0) return;
            if (tipo === "Boleto") {
                const r = prompt("Entrada? 1-Sim 2-Não");
                if (r === "1") {
                    const vE = parseFloat(prompt("Valor Entrada:")?.replace(',', '.') || 0);
                    const fE = prompt("Forma: 1-Pix 2-Dinheiro");
                    window.tempPgs.push({ tipo: `${fE === "1" ? "Pix" : "Dinheiro"} (Entrada)`, valor: vE });
                    if(v-vE > 0) window.tempPgs.push({ tipo: "Boleto (Restante)", valor: v-vE });
                } else window.tempPgs.push({ tipo: "Boleto", valor: v });
            } else window.tempPgs.push({ tipo, valor: v });
            window.atualizarListaInterface();
        };

        window.finalizarVenda = async () => {
            const tot = parseFloat(document.getElementById('vTotal').value); 
            const vend = document.getElementById('vendedor-venda').value;
            const item = window.dadosCompletos.find(i => i.path === window.itemPath) || {};
            if(!tot) return alert("Preencha o Valor!");
            await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, num_album: document.getElementById('vAlbum').value, vendedor: vend || item.vendedor || "", pagamentos: window.tempPgs }); 
            window.carregarRelatorio(); window.fecharModalGestao();
        };

        // --- OUTRAS FUNÇÕES ADM ---
        window.switchView = (id) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active')); document.getElementById(id).classList.add('view-active'); };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; };
        window.gerenciarItem = (p, n, e) => { window.itemPath = p; window.currentName = n; window.currentEnd = e; document.getElementById('modalGestao').style.display = 'flex'; };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s }); window.carregarRelatorio(); window.fecharModalGestao(); };
        window.confirmarExclusao = async () => { if(confirm("Excluir?")) { await remove(ref(db, window.itemPath)); window.carregarRelatorio(); window.fecharModalGestao(); } };
    </script>
</body>
</html>
