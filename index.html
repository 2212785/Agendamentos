<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Intelligence - BI v15.30</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: flex-start; justify-content: center; overflow-y: auto; padding: 20px; }
        .modal-container { width: 100%; max-width: 32rem; margin-top: 10px; }
        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 3px solid #3b82f6; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        .status-txt-compact { font-size: 14px; font-weight: 900; text-transform: uppercase; }
        .input-compact { padding: 0.75rem !important; border-radius: 1rem !important; font-size: 0.875rem !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="modal-container glass rounded-[2.5rem] p-8 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-6">
                <h2 id="gestao-titulo" class="text-lg font-black uppercase text-blue-400">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 transition text-sm">1. Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">2. Marcar NQ</button>
                <button onclick="window.fluxoEditar()" class="bg-blue-600/10 border border-blue-500/30 p-3 rounded-2xl text-blue-400 font-black uppercase text-[10px]">3. Editar Cadastro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir permanentemente</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 text-white pb-4"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center w-full">
            <span class="text-lg font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase text-white">ADM</button>
        </header>
        <main class="flex-grow flex items-start justify-center p-2">
            <div class="glass p-6 rounded-[2.5rem] w-full max-w-sm shadow-2xl text-center border border-white/5">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 italic leading-none">...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest italic mb-4 mt-1">PROJETO</h3>
                <form id="form-agendamento" class="space-y-3">
                    <div class="grid grid-cols-2 gap-1.5 mb-3" id="day-selector"></div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 input-compact outline-none text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/5 input-compact outline-none text-white">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 input-compact outline-none text-white"><option value="">Horário</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="w-full bg-slate-900 border border-white/5 input-compact outline-none text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black uppercase shadow-lg text-sm">Finalizar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-logistica" class="view-section p-4 text-white">
        <div class="max-w-4xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-4">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Visitas</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase text-slate-400">BI Dashboard</button>
                </div>
            </nav>
            <div id="controles-adm" class="hidden flex flex-wrap gap-1 mb-4 justify-center">
                <button onclick="window.criarNovoProjeto()" class="glass px-2 py-1.5 rounded-lg text-[7px] font-black uppercase text-emerald-400">Novo</button>
                <button onclick="window.trocarProjetoAtivo()" class="glass px-2 py-1.5 rounded-lg text-[7px] font-black uppercase text-rose-400">Trocar</button>
                <button onclick="window.gerenciarDatas()" class="glass px-2 py-1.5 rounded-lg text-[7px] font-black uppercase text-blue-400">Dados</button>
                <button onclick="window.editarCustosProjeto()" class="glass px-2 py-1.5 rounded-lg text-[7px] font-black uppercase text-amber-400">Custos</button>
            </div>
            <div class="flex gap-2 mb-4 text-white">
                <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold outline-none text-white">
                <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ Avulso</button>
            </div>
            <div id="lista-visitas" class="space-y-2 text-white"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <div class="max-w-7xl mx-auto w-full text-white">
            <nav class="flex justify-between items-center mb-6">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white">← Voltar</button>
                <div class="flex gap-2">
                    <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none text-white">
                    <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Copiar Zap</button>
                </div>
            </nav>
            <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 mb-6"></div>
            <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6 text-[10px]"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                <div class="lg:col-span-2 glass rounded-[2.5rem] p-6 border border-white/5 text-white text-white"><canvas id="chartWeekly" style="max-height: 220px;"></canvas></div>
                <div id="saldo-card" class="glass rounded-[2.5rem] p-6 border-l-8 border-emerald-500 flex flex-col justify-center space-y-4"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass rounded-[2.5rem] p-6 overflow-x-auto border border-white/5 text-white"><h4 class="text-emerald-400 font-black uppercase text-[10px] mb-3 italic">Vendas</h4><table class="w-full text-left min-w-[300px] text-xs text-white"><tbody id="extrato-tabela"></tbody></table></div>
                <div class="glass rounded-[2.5rem] p-6 overflow-x-auto border border-white/5 text-white"><h4 class="text-rose-500 font-black uppercase text-[10px] mb-3 italic text-white text-white">NQs</h4><table class="w-full text-left min-w-[300px] text-xs text-white"><tbody id="nq-tabela"></tbody></table></div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);

        let projetoAtualId = ""; window.labelsAtivas = { cidade: "...", escola: "..." }; window.dadosCompletos = [];

        window.atualizarTitulosDOM = () => {
            document.getElementById('escola-titulo').innerText = window.labelsAtivas.cidade;
            document.getElementById('sub-escola').innerText = window.labelsAtivas.escola;
        };

        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let lista = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, vales:0, com:0 };
            let valeE = (projetoAtualId === "guaratingueta-guilherme") ? 1950.0 : 0;
            let valeW = (projetoAtualId === "guaratingueta-guilherme") ? 2755.0 : 0;
            let rowsV = '', rowsNQ = [];

            lista.forEach(i => {
                if(i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor)||0;
                    let cV = 0;
                    if(i.pagamentos) {
                        i.pagamentos.forEach(p => {
                            const vP = Number(p.valor)||0; const t = p.tipo.toLowerCase();
                            if(t.includes("entrada")) cV += vP*0.12; else cV += vP*0.08;
                            if((t.includes("pix")||t.includes("dinheiro")) && !t.includes("debito")) {
                                m.vales += vP; if(i.vendedor === "Evanio") valeE += vP; else if(i.vendedor === "Willian") valeW += vP;
                            }
                            if(t.includes("pix")) m.pix += vP; else if(t.includes("dinheiro")) m.din += vP; else if(t.includes("debito")||t.includes("debito")) m.deb += vP; else if(t.includes("credito")) m.cre += vP; else if(t.includes("boleto")) m.bol += vP;
                        });
                    } else cV = (Number(i.valor)||0)*0.08;
                    m.com += cV;
                    rowsV += `<tr class="border-b border-white/5"><td>#${i.num_album || '---'} ${i.nome_formando}</td><td>${fBR(i.valor)}</td><td class="text-emerald-400 font-bold">${fBR(cV)}</td></tr>`;
                } else if(i.resultado === "NQ") { m.nq++; rowsNQ.push(i.nome_formando); }
            });

            const tk = m.v ? m.tot / m.v : 0; const ef = (m.v + m.nq) ? (m.v / (m.v+m.nq))*100 : 0;
            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-3 rounded-2xl border-emerald-500 bg-emerald-950/10"><p class="text-[7px] uppercase text-emerald-500 font-black text-white">Faturamento</p><p class="text-sm font-black text-white">${fBR(m.tot)}</p></div><div class="card-bi p-3 rounded-2xl border-blue-500 bg-blue-950/10"><p class="text-[7px] uppercase text-blue-500 font-black text-white">Ticket Médio</p><p class="text-sm font-black text-white">${fBR(tk)}</p></div><div class="card-bi p-3 rounded-2xl border-blue-500 bg-blue-950/10"><p class="text-[7px] uppercase text-blue-500 font-black text-white">Eficiência</p><p class="text-sm font-black text-white">${ef.toFixed(0)}%</p></div><div class="card-bi p-3 rounded-2xl border-blue-500 bg-blue-950/10"><p class="text-[7px] uppercase text-blue-500 font-black text-white">Vendas/NQ</p><p class="text-sm font-black text-white">${m.v}/${m.nq}</p></div><div class="card-bi p-3 rounded-2xl border-emerald-400 bg-emerald-950/10"><p class="text-[7px] uppercase text-emerald-400 font-black text-white">Comissão</p><p class="text-sm font-black text-white">${fBR(m.com)}</p></div>`;
            document.getElementById('finance-grid').innerHTML = `<div class="card-bi p-2 rounded-xl text-center"><p class="text-[7px] uppercase text-white">Pix</p><p class="text-xs font-black text-white">${fBR(m.pix)}</p></div><div class="card-bi p-2 rounded-xl text-center"><p class="text-[7px] uppercase text-white">Dinheiro</p><p class="text-xs font-black text-white">${fBR(m.din)}</p></div><div class="card-bi p-2 rounded-xl text-center"><p class="text-[7px] uppercase text-white">Débito</p><p class="text-xs font-black text-white">${fBR(m.deb)}</p></div><div class="card-bi p-2 rounded-xl text-center"><p class="text-[7px] uppercase text-white">Crédito</p><p class="text-xs font-black text-white">${fBR(m.cre)}</p></div><div class="card-bi p-2 rounded-xl text-center"><p class="text-[7px] uppercase text-white">Boleto</p><p class="text-xs font-black text-white">${fBR(m.bol)}</p></div><div class="card-bi p-2 rounded-xl text-center border-rose-500/30 bg-rose-950/10 text-white"><p class="text-[7px] uppercase text-rose-500">Vales</p><p class="text-xs font-black text-rose-500 text-white">${fBR(m.vales)}</p></div>`;
            document.getElementById('saldo-card').innerHTML = `<div class="text-center border-b border-white/5 pb-2 text-white text-white"><p class="text-[9px] uppercase font-black text-blue-400">Total Operação</p><p class="text-xl font-black text-white">${fBR(m.com)}</p></div><div class="p-3 bg-white/5 rounded-2xl space-y-1 text-white"><p class="text-[9px] font-black text-emerald-400">EVANIO</p><div class="flex justify-between text-[9px] text-slate-400"><span>A Receber</span><span>${fBR(m.com/2 - valeE)}</span></div></div><div class="p-3 bg-white/5 rounded-2xl space-y-1 text-white text-white"><p class="text-[9px] font-black text-cyan-400">WILLIAN</p><div class="flex justify-between text-[9px] text-slate-400"><span>A Receber</span><span>${fBR(m.com/2 - valeW)}</span></div></div>`;
            document.getElementById('extrato-tabela').innerHTML = rowsV || '<tr><td colspan="3" class="p-4 text-center">Sem dados</td></tr>';
            document.getElementById('nq-tabela').innerHTML = rowsNQ.map(n => `<tr class="border-b border-white/5"><td>${n}</td><td class="text-rose-500 font-bold uppercase text-[9px]">NQ</td></tr>`).join('') || '<tr><td colspan="2" class="p-4 text-center">Sem NQs</td></tr>';
        };

        window.carregarRelatorio = async () => {
            const id = projetoAtualId;
            const [sA, sV] = await Promise.all([get(ref(db, `dados/${id}/agendamentos`)), get(ref(db, `vendas/${id}`))]);
            window.dadosCompletos = [];
            const proc = (snap, path) => {
                if(!snap.exists()) return; const val = snap.val();
                Object.keys(val).forEach(k => {
                    if (path.includes('agendamentos') && typeof val[k] === 'object' && !val[k].nome_formando) {
                        Object.keys(val[k]).forEach(id => window.dadosCompletos.push({...val[k][id], id, data:k, path:`${path}/${k}/${id}`}));
                    } else window.dadosCompletos.push({...val[k], id:k, data:val[k].data||k, path:`${path}/${k}`});
                });
            };
            proc(sA, `dados/${id}/agendamentos`);
            if(sV.exists()){ proc(get(ref(db,`vendas/${id}/avulsos`)), `vendas/${id}/avulsos`); proc(get(ref(db,`vendas/${id}/agendamentos`)), `vendas/${id}/agendamentos`); }
            window.filtrarLogistica(); window.filtrarBI();
        };

        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projetoAtualId = snap.val() || "guaratingueta-guilherme";
            const pS = await get(ref(db, `projetos/${projetoAtualId}`));
            if(pS.exists()){
                window.labelsAtivas = { cidade: pS.val().cidade, escola: pS.val().escola || pS.val().school };
                window.atualizarTitulosDOM();
                if(pS.val().data_inicio) window.gerarBotoesDatas(pS.val().data_inicio, pS.val().data_fim);
                window.carregarRelatorio();
            }
        });

        window.filtrarLogistica = () => {
            const container = document.getElementById('lista-visitas'); if(!container) return;
            container.innerHTML = '';
            window.dadosCompletos.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            window.dadosCompletos.forEach(i => {
                let sT = "PENDENTE", cS = "text-slate-600";
                if(i.resultado === "Venda") { sT = "VENDIDO"; cS = "text-emerald-500"; }
                else if(i.resultado === "NQ") { sT = "NQ"; cS = "text-rose-500"; }
                container.innerHTML += `
                <div class="glass p-3 rounded-2xl border border-white/5 flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] font-black text-blue-400 uppercase">${i.horario || 'DIR'}</span>
                            <span class="status-txt-compact ${cS}">${sT}</span>
                            <h3 class="text-sm font-black uppercase text-white truncate max-w-[140px]">${i.nome_formando}</h3>
                        </div>
                        <button onclick="window.gerenciarItem('${i.path.replace(/'/g,"\\'")}')" class="btn-primary px-3 py-1.5 rounded-lg text-[8px] font-black uppercase text-white">Gerenciar</button>
                    </div>
                    <div class="flex items-center justify-between gap-2 border-t border-white/5 pt-2">
                        <p class="text-[9px] text-slate-400 truncate flex-grow uppercase font-bold">${i.endereco || 'S/ ENDEREÇO'}</p>
                        <div class="flex gap-1">
                            <a href="https://wa.me/55${(i.telefone||'').replace(/\D/g,'')}" target="_blank" class="bg-emerald-500/10 p-1.5 rounded-lg text-emerald-400 text-[8px] font-black uppercase">Zap</a>
                            <a href="https://www.waze.com/ul?q=${encodeURIComponent(i.endereco||'')}&navigate=yes" target="_blank" class="bg-blue-500/10 p-1.5 rounded-lg text-blue-400 text-[8px] font-black uppercase">Waze</a>
                        </div>
                    </div>
                </div>`;
            });
        };

        window.fluxoResultado = () => {
            document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const item = window.dadosCompletos.find(i => i.path === window.itemPath) || {};
            window.tempPgs = item.pagamentos ? [...item.pagamentos] : []; 
            f.innerHTML = `<select id="vV" class="input-compact mb-2"><option value="Evanio" ${item.vendedor==='Evanio'?'selected':''}>Evanio</option><option value="Willian" ${item.vendedor==='Willian'?'selected':''}>Willian</option></select>
            <input type="text" id="vA" placeholder="Nº ÁLBUM" value="${item.num_album||''}" class="input-compact mb-2 text-white text-white text-white">
            <input type="number" id="vT" placeholder="TOTAL" value="${item.valor||''}" class="input-compact text-xl font-black mb-3">
            <div class="grid grid-cols-2 gap-2 mb-3">
                <button onclick="window.addPg('Dinheiro')" class="p-3 bg-slate-800 rounded-xl text-[9px] font-black uppercase text-white">+ Dinheiro</button>
                <button onclick="window.addPg('Pix')" class="p-3 bg-slate-800 rounded-xl text-[9px] font-black uppercase text-white">+ Pix</button>
                <button onclick="window.addPg('Débito')" class="p-3 bg-slate-800 rounded-xl text-[9px] font-black uppercase text-white">+ Débito</button>
                <button onclick="window.addPg('Crédito')" class="p-3 bg-slate-800 rounded-xl text-[9px] font-black uppercase text-white">+ Crédito</button>
                <button onclick="window.addPg('Boleto')" class="p-3 bg-blue-900/40 rounded-xl text-[9px] font-black uppercase col-span-2 text-white">+ Boleto</button>
            </div>
            <div id="lista-p" class="space-y-1 mb-3 text-white"></div>
            <button onclick="window.limparPagamentos()" class="w-full p-3 mb-3 bg-rose-600/20 border border-rose-500/40 rounded-xl text-rose-500 font-black uppercase text-[8px]">LIMPAR</button>
            <button onclick="window.finalizarVenda()" class="btn-primary w-full p-4 rounded-xl font-black text-xs text-white text-white">SALVAR</button>`;
            window.atualizarListaInterface();
        };

        window.limparPagamentos = () => { if(confirm("Limpar?")) { window.tempPgs = []; window.atualizarListaInterface(); } };
        window.atualizarListaInterface = () => { document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between text-[9px] bg-white/5 p-1 text-white"><span>${p.tipo}</span><b>${fBR(p.valor)}</b></div>`).join(''); };
        window.addPg = (tipo) => {
            const v = parseFloat(prompt(`Valor ${tipo}:`) || 0); if(v<=0) return;
            if(tipo==="Boleto" && confirm("Tem entrada?")) { const vE = parseFloat(prompt("Valor Entrada:")||0); window.tempPgs.push({tipo:"Pix (Entrada)", valor:vE}); if(v-vE>0) window.tempPgs.push({tipo:"Boleto", valor:v-vE}); }
            else window.tempPgs.push({tipo, valor:v}); window.atualizarListaInterface();
        };
        window.finalizarVenda = async () => {
            await update(ref(db, window.itemPath), { resultado:"Venda", valor:document.getElementById('vT').value, num_album:document.getElementById('vA').value, vendedor:document.getElementById('vV').value, pagamentos:window.tempPgs });
            window.carregarRelatorio(); window.fecharModalGestao();
        };

        window.switchView = (id) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active')); document.getElementById(id).classList.add('view-active'); };
        window.acessoAdmin = () => { if(prompt("Senha:")==="2025") document.getElementById('controles-adm').classList.remove('hidden'); window.switchView('view-logistica'); };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display='none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };
        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display='flex'; };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado:s }); window.carregarRelatorio(); window.fecharModalGestao(); };
        window.confirmarExclusao = async () => { if(confirm("Excluir?")) { await remove(ref(db, window.itemPath)); window.carregarRelatorio(); window.fecharModalGestao(); } };
        window.gerarBotoesDatas = (i, f) => { const c = document.getElementById('day-selector'); c.innerHTML = ""; let cur = new Date(i+"T00:00:00"); while(cur <= new Date(f+"T00:00:00")) { const iso = cur.toISOString().split('T')[0]; c.innerHTML += `<button type="button" onclick="window.selecionarDia(this)" data-date="${iso}" class="day-btn glass rounded-lg py-2 text-[8px] font-black text-white">${cur.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</button>`; cur.setDate(cur.getDate()+1); } };
        window.selecionarDia = (b) => { document.querySelectorAll('.day-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); document.getElementById('data-selecionada').value = b.dataset.date; };
        window.abrirAvulso = () => { document.getElementById('modalGestao').style.display='flex'; document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<input type="text" id="avN" placeholder="Nome" class="input-compact mb-2 text-white"><input type="date" id="avD" class="input-compact mb-3 text-white"><button onclick="window.salvarAvulso()" class="btn-primary w-full p-3 rounded-xl text-[10px] font-black text-white">AVANÇAR PARA VENDA</button>`; document.getElementById('avD').value = new Date().toISOString().split('T')[0]; };
        window.salvarAvulso = async () => { const p = `vendas/${projetoAtualId}/avulsos/AV-${Date.now()}`; await set(ref(db,p), { nome_formando:document.getElementById('avN').value, data:document.getElementById('avD').value, resultado:"Pendente" }); window.itemPath = p; window.carregarRelatorio(); window.fluxoResultado(); };
    </script>
</body>
</html>
