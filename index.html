<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Intelligence - BI v12.33</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: center; justify-content: center; padding: 20px; }
        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 3px solid #3b82f6; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: none; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-xl font-black uppercase text-blue-400">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-8 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 transition">1. Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 border border-rose-500/30 p-4 rounded-2xl text-rose-500 font-black uppercase text-xs">2. Marcar NQ</button>
                <button onclick="window.fluxoEditar()" class="bg-blue-600/10 border border-blue-500/30 p-4 rounded-2xl text-blue-400 font-black uppercase text-xs">3. Editar Cadastro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[10px] uppercase font-bold mt-4 text-center hover:text-rose-500 transition">Excluir Registro permanentemente</button>
            </div>
            <div id="gestao-form" class="hidden space-y-4 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-6 flex justify-between items-center w-full">
            <span class="text-xl font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <div class="flex gap-2">
                <button id="btn-trocar-projeto" onclick="window.trocarProjetoAtivo()" class="hidden glass px-4 py-2 rounded-xl text-[9px] font-black uppercase border-rose-500/30 text-rose-400">⚙️ Trocar Projeto</button>
                <button onclick="window.acessoAdmin()" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase">ADM</button>
            </div>
        </header>
        <main class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl text-center border border-white/5">
                <h2 id="escola-titulo" class="text-2xl font-extrabold uppercase text-blue-400 italic">...</h2>
                <h3 id="sub-escola" class="text-xs font-bold text-slate-400 uppercase tracking-widest italic mb-8">...</h3>
                <form id="form-agendamento" class="space-y-4">
                    <div class="grid grid-cols-2 gap-2 mb-4" id="day-selector">
                        <button type="button" data-date="2026-03-07" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase">Sáb 07/03</button>
                        <button type="button" data-date="2026-03-08" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase">Dom 08/03</button>
                    </div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500 text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-5 rounded-2xl font-black uppercase shadow-lg text-white">Finalizar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-logistica" class="view-section p-6 text-white text-white">
        <div class="max-w-4xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-6">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Visitas</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400">BI Dashboard</button>
                </div>
            </nav>
            <div class="mb-6">
                <h1 class="text-2xl font-black italic uppercase mb-4 text-white">Minha <span class="text-blue-500">Rota</span></h1>
                <div class="flex flex-col md:flex-row gap-2">
                    <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold outline-none text-white">
                    <button onclick="window.abrirAvulso()" class="bg-white text-black px-6 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-blue-50 transition">+ Avulso</button>
                </div>
            </div>
            <div id="lista-visitas" class="space-y-3"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section p-6 text-white text-white">
        <div class="max-w-7xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-10 text-white">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white text-white">← Voltar</button>
                <div class="flex gap-4">
                    <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none text-white">
                    <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg text-white italic">Copiar Zap</button>
                </div>
            </nav>
            <div id="kpi-grid" class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8"></div>
            <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8 text-[10px]"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
                <div class="lg:col-span-2 glass rounded-[3rem] p-8 border border-white/5 text-white">
                    <canvas id="chartWeekly" style="max-height: 250px;"></canvas>
                </div>
                <div id="saldo-card" class="glass rounded-[3rem] p-8 border-l-8 border-emerald-500 flex flex-col justify-center text-white text-white"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 text-white">
                <div class="glass rounded-[3rem] p-8 overflow-x-auto border border-white/5 text-white">
                    <h4 class="text-emerald-400 font-black uppercase text-xs mb-4 italic">Relação de Vendas</h4>
                    <table class="w-full text-left min-w-[400px] text-white">
                        <thead><tr class="border-b border-white/5 text-[10px] text-slate-500 font-black uppercase text-white"><th class="p-4 text-white">Cliente</th><th class="p-4 text-white">Venda</th><th class="p-4 text-emerald-400">Comissão</th></tr></thead>
                        <tbody id="extrato-tabela" class="text-white"></tbody>
                    </table>
                </div>
                <div class="glass rounded-[3rem] p-8 overflow-x-auto border border-white/5 text-white">
                    <h4 class="text-rose-500 font-black uppercase text-xs mb-4 italic">Relação de NQ (Ordem Alfabética)</h4>
                    <table class="w-full text-left min-w-[400px] text-white">
                        <thead><tr class="border-b border-white/5 text-[10px] text-slate-500 font-black uppercase text-white"><th class="p-4 text-white">Cliente</th><th class="p-4 text-white">Status</th></tr></thead>
                        <tbody id="nq-tabela" class="text-white"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        let projetoAtualId = "", chartWeekly = null;
        let labelsGlobais = { cidade: "Franca", escola: "Escola" };

        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projetoAtualId = snap.val() || "guaratingueta-guilherme";
            const projSnap = await get(ref(db, `config/projetos/${projetoAtualId}`));
            if(projSnap.exists()){
                const d = projSnap.val();
                labelsGlobais.cidade = d.cidade || "Franca";
                labelsGlobais.escola = d.escola || "Escola";
                document.getElementById('escola-titulo').innerText = labelsGlobais.cidade;
                document.getElementById('sub-escola').innerText = labelsGlobais.escola;
                window.carregarRelatorio();
            }
        });

        window.trocarProjetoAtivo = async () => {
            const novoID = prompt("Cole o ID do Novo Projeto:");
            if(novoID) {
                await set(ref(db, "config/projeto_ativo"), novoID);
                location.reload();
            }
        };

        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            window.carregarRelatorio();
        };

        window.carregarRelatorio = async () => {
            document.getElementById('escola-titulo').innerText = labelsGlobais.cidade;
            document.getElementById('sub-escola').innerText = labelsGlobais.escola;
            if(!projetoAtualId) return;
            const [sA, sV] = await Promise.all([get(ref(db, `dados/${projetoAtualId}/agendamentos`)), get(ref(db, `dados/${projetoAtualId}/avulsos`))]);
            window.dadosCompletos = [];
            const ags = sA.val() || {};
            Object.keys(ags).forEach(d => { if(ags[d]) Object.keys(ags[d]).forEach(id => window.dadosCompletos.push({...ags[d][id], id, data: d, path: `dados/${projetoAtualId}/agendamentos/${d}/${id}`})); });
            const avs = sV.val() || {};
            Object.keys(avs).forEach(id => window.dadosCompletos.push({...avs[id], id, path: `dados/${projetoAtualId}/avulsos/${id}`, data: avs[id].data}));
            window.filtrarLogistica(); window.filtrarBI();
        };

        window.filtrarLogistica = () => {
            const container = document.getElementById('lista-visitas'); if(!container) return;
            const fD = document.getElementById('filtro-data-logistica').value;
            let lista = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            lista.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            container.innerHTML = '';
            lista.forEach(i => {
                let cor = "border-slate-500/20 bg-slate-500/5", statusTxt = "PENDENTE", corTxt = "text-slate-500";
                if(i.resultado === "Venda") { cor = "border-emerald-500/20 bg-emerald-500/5"; statusTxt = "VENDA"; corTxt = "text-emerald-500"; }
                else if(i.resultado === "NQ") { cor = "border-rose-500/20 bg-rose-500/5"; statusTxt = "NQ"; corTxt = "text-rose-500"; }
                const p = i.path.replace(/'/g,"\\'"), n = (i.nome_formando||"").replace(/'/g,"\\'"), e = (i.endereco||"").replace(/'/g,"\\'");
                container.innerHTML += `<div class="glass p-4 rounded-3xl border-l-4 ${cor} flex justify-between items-center text-white"><div class="flex-grow"><div class="flex items-center gap-2 mb-1"><span class="text-xs font-black text-blue-400 uppercase">${i.horario || 'DIR'}</span><span class="text-[10px] font-bold text-slate-500 italic">${pDT(i.data)}</span><span class="text-[10px] font-black uppercase ${corTxt}">${statusTxt}</span></div><h3 class="text-base font-black uppercase leading-tight mb-2 text-white">${i.nome_formando}</h3><div class="flex gap-4"><a href="https://wa.me/55${(i.telefone||'').replace(/\D/g,'')}" target="_blank" class="text-emerald-400 text-[10px] font-bold uppercase tracking-wider text-white">📱 Zap</a><a href="https://www.waze.com/ul?q=${encodeURIComponent(i.endereco||'')}&navigate=yes" target="_blank" class="text-slate-400 text-[10px] font-bold uppercase tracking-wider text-white">📍 Waze</a></div></div><button onclick="window.gerenciarItem('${p}', '${n}', '${e}')" class="btn-primary px-5 py-3 rounded-2xl font-black uppercase text-[9px] shadow-lg ml-4 text-white">Gerenciar</button></div>`;
            });
        };

        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let lista = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, vales:0, com:0 };
            let daily = [0,0,0,0,0,0,0], rowsVenda = '', listaNQ = [];
            lista.forEach(i => {
                if(i.resultado === "Venda") {
                    m.v++; const valVenda = Number(i.valor)||0; m.tot += valVenda;
                    daily[new Date(i.data + "T00:00:00").getDay()]++;
                    let comVenda = 0;
                    (i.pagamentos || []).forEach(p => {
                        const vP = Number(p.valor) || 0;
                        const t = p.tipo.toLowerCase();
                        if(t.includes("pix")) { m.pix += vP; m.vales += vP; }
                        else if(t.includes("dinheiro")) { m.din += vP; m.vales += vP; }
                        else if(t.includes("boleto")) { m.bol += vP; }
                        else if(t.includes("credito") || t.includes("crédito")) { m.cre += vP; }
                        else if(t.includes("debito") || t.includes("débito")) { m.deb += vP; }
                        if(t.includes("entrada")) comVenda += vP * 0.12; else comVenda += vP * 0.08;
                    });
                    m.com += comVenda;
                    rowsVenda += `<tr class="border-b border-white/5 text-white"><td>${i.nome_formando}</td><td>${fBR(valVenda)}</td><td class="font-black text-emerald-400">${fBR(comVenda)}</td></tr>`;
                } else if(i.resultado === "NQ") { m.nq++; listaNQ.push(i.nome_formando); }
            });
            window.dadosAtuaisRelatorio = { m, lista, fD };
            const tx = (m.v + m.nq) > 0 ? ((m.v / (m.v + m.nq)) * 100).toFixed(0) : 0;
            const perc = (v) => m.tot > 0 ? ((v / m.tot) * 100).toFixed(0) + '%' : '0%';
            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-6 rounded-[2rem] border-emerald-500 bg-emerald-950/10"><p class="text-[9px] text-emerald-500 font-black mb-1 uppercase text-white">Faturamento</p><p class="text-3xl font-black text-white">${fBR(m.tot)}</p></div><div class="card-bi p-6 rounded-[2rem] border-blue-500 bg-blue-950/10"><p class="text-[9px] text-blue-500 font-black mb-1 uppercase text-white">Vendas / NQ</p><p class="text-3xl font-black text-white">${m.v} / ${m.nq}</p></div><div class="card-bi p-6 rounded-[2rem] border-blue-500 bg-blue-950/10"><p class="text-[9px] text-blue-500 font-black mb-1 uppercase text-white">Eficiência</p><p class="text-3xl font-black text-white">${tx}%</p></div><div class="card-bi p-6 rounded-[2rem] border-cyan-500 bg-cyan-950/10"><p class="text-[9px] text-cyan-500 font-black mb-1 uppercase text-white">Ticket Médio</p><p class="text-3xl font-black text-white">${fBR(m.v ? m.tot/m.v : 0)}</p></div><div class="card-bi p-6 rounded-[2rem] border-emerald-400 bg-emerald-950/10"><p class="text-[9px] text-emerald-400 font-black mb-1 uppercase text-white">Comissão Total</p><p class="text-3xl font-black text-white">${fBR(m.com)}</p></div>`;
            document.getElementById('finance-grid').innerHTML = `<div class="card-bi p-4 rounded-2xl text-white"><p class="text-[8px] uppercase">Pix (${perc(m.pix)})</p><p class="text-lg font-black">${fBR(m.pix)}</p></div><div class="card-bi p-4 rounded-2xl text-white"><p class="text-[8px] uppercase">Dinheiro (${perc(m.din)})</p><p class="text-lg font-black">${fBR(m.din)}</p></div><div class="card-bi p-4 rounded-2xl text-white"><p class="text-[8px] uppercase">Crédito (${perc(m.cre)})</p><p class="text-lg font-black">${fBR(m.cre)}</p></div><div class="card-bi p-4 rounded-2xl text-white"><p class="text-[8px] uppercase">Débito (${perc(m.deb)})</p><p class="text-lg font-black">${fBR(m.deb)}</p></div><div class="card-bi p-4 rounded-2xl text-white"><p class="text-[8px] uppercase">Boleto (${perc(m.bol)})</p><p class="text-lg font-black">${fBR(m.bol)}</p></div><div class="card-bi p-4 rounded-2xl text-rose-500 bg-rose-950/10 border-rose-500/30"><p class="text-[8px] uppercase">Vales</p><p class="text-lg font-black">${fBR(m.vales)}</p></div>`;
            document.getElementById('saldo-card').innerHTML = `<p class="text-[10px] uppercase mb-4 text-white font-black italic text-slate-500">Consolidado</p><div class="flex justify-between text-sm text-white"><span>Bruta</span><span class="font-black">${fBR(m.com)}</span></div><div class="flex justify-between text-rose-400 text-sm"><span>Vales (Pix/Din)</span><span class="font-black">- ${fBR(m.vales)}</span></div><div class="border-t border-white/10 mt-6 pt-6 text-center text-emerald-400"><p class="text-[8px] uppercase font-black">Saldo Líquido</p><p class="text-5xl font-black italic text-white">${fBR(m.com - m.vales)}</p></div>`;
            document.getElementById('extrato-tabela').innerHTML = rowsVenda || '<tr><td colspan="3" class="p-10 text-center text-white">Sem vendas</td></tr>';
            listaNQ.sort((a, b) => a.localeCompare(b));
            document.getElementById('nq-tabela').innerHTML = listaNQ.map(n => `<tr class="border-b border-white/5 text-white"><td class="p-4 text-white">${n}</td><td class="p-4 text-rose-500 font-bold uppercase text-xs">NQ</td></tr>`).join('') || '<tr><td colspan="2" class="p-10 text-center text-white">Sem NQs</td></tr>';
            if(chartWeekly) chartWeekly.destroy();
            chartWeekly = new Chart(document.getElementById('chartWeekly'), { type: 'bar', data: { labels: ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'], datasets: [{ data: daily, backgroundColor: '#3b82f6', borderRadius: 8 }] }, options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } } });
        };

        window.abrirAvulso = () => { 
            document.getElementById('modalGestao').style.display = 'flex'; document.getElementById('gestao-menu').classList.add('hidden'); 
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); 
            f.innerHTML = `<h3 class="text-white font-black mb-4 uppercase text-xs">Novo Cadastro Avulso</h3><input type="text" id="av-nome" placeholder="NOME DO CLIENTE" class="w-full bg-slate-900 p-4 rounded-xl mb-2 text-white border border-white/10 outline-none"><input type="tel" id="av-tel" placeholder="WHATSAPP" class="w-full bg-slate-900 p-4 rounded-xl mb-2 text-white border border-white/10 outline-none"><input type="text" id="av-end" placeholder="ENDEREÇO" class="w-full bg-slate-900 p-4 rounded-xl mb-2 text-white border border-white/10 outline-none"><input type="date" id="av-data" class="w-full bg-slate-900 p-4 rounded-xl mb-4 text-white border border-white/10 outline-none"><button onclick="window.salvarNovoAvulso()" class="w-full p-5 bg-blue-600 rounded-2xl font-black text-white uppercase">Salvar e Continuar</button>`;
            document.getElementById('av-data').value = new Date().toISOString().split('T')[0];
        };

        window.salvarNovoAvulso = async () => { 
            const n = document.getElementById('av-nome').value, d = document.getElementById('av-data').value, t = document.getElementById('av-tel').value, e = document.getElementById('av-end').value;
            if(!n || !d) return alert("Erro!");
            const path = `dados/${projetoAtualId}/avulsos/AV-${Date.now()}`;
            await set(ref(db, path), { nome_formando: n, telefone: t, endereco: e, data: d, resultado: "Pendente" });
            window.itemPath = path; window.currentName = n; window.currentEnd = e; window.fluxoResultadoAvulso();
        };

        window.fluxoResultadoAvulso = () => {
            const f = document.getElementById('gestao-form'); f.innerHTML = `<h3 class="text-white font-black mb-4 uppercase text-xs text-white">Resultado do Atendimento</h3><button onclick="window.fluxoResultado()" class="w-full p-6 mb-3 bg-emerald-600 rounded-2xl font-black uppercase text-white">Registrar Venda</button><button onclick="window.salvarStatusSimples('NQ')" class="w-full p-6 bg-rose-600 rounded-2xl font-black uppercase text-white">Marcar NQ</button>`;
        };

        window.copiarRelatorio = () => {
            const { m, lista, fD } = window.dadosAtuaisRelatorio;
            let txt = `🚀 *RELATÓRIO ELITE* - ${pDT(fD || 'Acumulado')}\n\n💰 *Faturamento:* ${fBR(m.tot)}\n🎟️ *Vales:* ${fBR(m.vales)}\n📊 *Vendas/NQ:* ${m.v}/${m.nq}\n\n✅ *VENDAS:* \n`;
            lista.filter(i => i.resultado === 'Venda').forEach(v => txt += `- ${v.nome_formando}: ${fBR(v.valor)}\n`);
            txt += `\n❌ *NQs:* \n`;
            lista.filter(i => i.resultado === 'NQ').sort((a,b)=>a.nome_formando.localeCompare(b.nome_formando)).forEach(n => txt += `- ${n.nome_formando}\n`);
            navigator.clipboard.writeText(txt).then(() => alert("Relatório copiado!"));
        };

        window.addPg = (tipo) => {
            const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',', '.') || 0); if (v <= 0) return;
            if (tipo === "Boleto") {
                const r = prompt("Houve entrada? 1-Sim 2-Não");
                if (r === "1") {
                    const vE = parseFloat(prompt("Valor Entrada:")?.replace(',', '.') || 0);
                    const fE = prompt("Forma: 1-Pix 2-Dinheiro");
                    const txtFE = fE === "1" ? "Pix" : "Dinheiro";
                    window.tempPgs.push({ tipo: `${txtFE} (Entrada)`, valor: vE });
                    if(v-vE > 0) window.tempPgs.push({ tipo: "Boleto (Restante)", valor: v-vE });
                } else window.tempPgs.push({ tipo: "Boleto", valor: v });
            } else window.tempPgs.push({ tipo, valor: v });
            document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]"><span>${p.tipo}</span><span class="text-emerald-400 font-bold">${fBR(p.valor)}</span></div>`).join('');
        };

        window.selecionarDia = async (btn) => {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const d = btn.getAttribute('data-date'); document.getElementById('data-selecionada').value = d;
            const snap = await get(ref(db, `dados/${projetoAtualId}/agendamentos/${d}`));
            const counts = {};
            Object.entries(snap.val() || {}).forEach(([key, item]) => {
                let h = item.horario ? item.horario.trim().substring(0,5) : (key.includes("-") ? `${key.split("-")[0]}:${key.split("-")[1]}` : "");
                if(h) counts[h] = (counts[h] || 0) + 1;
            });
            const elH = document.getElementById('horario'); elH.innerHTML = '<option value="">Horário</option>';
            let cur = new Date(`${d}T09:00:00`), lim = (d === new Date().toLocaleDateString('en-CA')) ? "19:30" : "20:30";
            while(cur <= new Date(`${d}T${lim}:00`)){
                const hF = cur.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                const ocup = counts[hF] || 0;
                if(ocup < 2) { let opt=document.createElement('option'); opt.value=hF; opt.textContent=`${hF} (${2-ocup} vagas)`; elH.appendChild(opt); }
                cur.setMinutes(cur.getMinutes()+30);
            }
        };

        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); window.carregarRelatorio(); };
        window.acessoAdmin = () => { if(prompt("Senha:") === "2025") { window.switchView('view-logistica'); document.getElementById('btn-trocar-projeto').classList.remove('hidden'); } };
        window.gerenciarItem = (p, n, e) => { window.itemPath = p; window.currentName = n; window.currentEnd = e; document.getElementById('modalGestao').style.display = 'flex'; };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s, valor: 0 }); window.fecharModalGestao(); };
        window.confirmarExclusao = async () => { if(confirm("EXCLUIR?")) { await remove(ref(db, window.itemPath)); window.fecharModalGestao(); } };
        window.fluxoResultado = () => { document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<input type="number" id="vTotal" placeholder="VALOR TOTAL" class="w-full bg-slate-900 p-6 rounded-3xl text-center mb-4 text-white font-black text-3xl border border-white/10 outline-none"><div class="grid grid-cols-2 gap-2 mb-4 text-white"><button onclick="window.addPg('Dinheiro')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Dinheiro</button><button onclick="window.addPg('Pix')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Pix</button><button onclick="window.addPg('Cartão Débito')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Débito</button><button onclick="window.addPg('Cartão Crédito')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Crédito</button><button onclick="window.addPg('Boleto')" class="p-4 bg-blue-900/30 border border-blue-500/40 rounded-2xl text-[10px] font-black uppercase col-span-2 text-white">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-4 text-white"></div><button onclick="window.finalizarVenda()" class="w-full p-4 bg-emerald-600 rounded-xl font-black text-white shadow-xl shadow-emerald-900/20">SALVAR</button>`; window.tempPgs = []; };
        window.finalizarVenda = async () => { const tot = parseFloat(document.getElementById('vTotal').value); if(!tot) return alert("Valor!"); await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, pagamentos: window.tempPgs }); window.fecharModalGestao(); };
        window.fluxoEditar = () => { document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<h3 class="text-white font-black mb-4 uppercase text-xs text-white">Editar</h3><input type="text" id="edit-nome" value="${window.currentName}" class="w-full bg-slate-800 p-4 rounded-xl mb-2 text-white border border-white/10 outline-none"><textarea id="edit-end" class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-white border border-white/10 outline-none" rows="3">${window.currentEnd}</textarea><button onclick="window.salvarEdicao()" class="w-full p-5 bg-blue-600 rounded-2xl font-black text-white uppercase">Salvar</button>`; };
        window.salvarEdicao = async () => { const n = document.getElementById('edit-nome').value, e = document.getElementById('edit-end').value; await update(ref(db, window.itemPath), { nome_formando: n, endereco: e }); window.fecharModalGestao(); };
    </script>
</body>
</html>
