<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Dashboard PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; padding: 20px; overflow-y: auto; background: rgba(2, 6, 23, 0.95); align-items: center; justify-content: center; }
        .view-section { display: none; }
        .view-active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .day-btn { transition: all 0.2s; border-color: rgba(255,255,255,0.1); color: #94a3b8; background: rgba(255,255,255,0.03); cursor: pointer; display: none; }
        .day-btn.active { background: #3b82f6 !important; color: white !important; border-color: #60a5fa !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .card-metric { background: rgba(255,255,255,0.03); border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="modalGestao">
        <div class="glass w-full max-w-xl rounded-[2.5rem] p-8 border border-white/20 shadow-2xl mx-auto mt-20 text-left">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-2xl font-black uppercase italic text-blue-400">Gerenciar</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-2 gap-4 text-center">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/50 p-6 rounded-2xl hover:bg-emerald-600 transition group"><span class="block text-emerald-400 group-hover:text-white font-black text-xs uppercase">1. Resultado</span></button>
                <button onclick="window.confirmarExclusao()" class="bg-rose-600/20 border border-rose-500/50 p-6 rounded-2xl hover:bg-rose-600 transition group"><span class="block text-rose-400 group-hover:text-white font-black text-xs uppercase">2. Excluir</span></button>
            </div>
            <div id="gestao-form" class="mt-8 hidden space-y-4"></div>
        </div>
    </div>

    <section id="page-agendamento" class="view-section view-active flex-grow flex flex-col">
        <header class="p-6 flex justify-between items-center text-white">
            <span class="text-2xl font-black italic uppercase">Elite <span class="text-blue-500">Sales</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase">ADM</button>
        </header>
        <main class="container mx-auto p-4 flex-grow flex items-center justify-center text-center">
            <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl border-white/5">
                <h2 id="escola-titulo" class="text-xl font-bold mb-2 uppercase text-blue-400 italic text-white">Guaratinguetá</h2>
                <h3 id="sub-escola" class="text-xs font-bold text-slate-400 mb-6 uppercase italic text-white">Dr. Guilherme Filippo</h3>
                <h2 class="text-3xl font-black mb-10 uppercase italic text-white">Agendar Visita</h2>
                <form id="form-agendamento" class="space-y-6 text-left">
                    <div class="grid grid-cols-2 gap-2" id="day-selector">
                        <button type="button" data-date="2026-03-07" onclick="window.selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase text-white">Sábado 07/03</button>
                        <button type="button" data-date="2026-03-08" onclick="window.selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase text-white">Domingo 08/03</button>
                    </div>
                    <input type="hidden" id="data-selecionada">
                    <div class="space-y-4">
                        <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none">
                        <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none">
                        <select id="horario" required class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white outline-none"><option value="">Selecione o Dia</option></select>
                        <textarea id="endereco" required placeholder="Endereço de Visita" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn-primary w-full text-white font-black py-5 rounded-2xl uppercase">Finalizar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="page-logistica" class="view-section min-h-screen p-6">
        <div class="max-w-5xl mx-auto">
            <nav class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-black uppercase italic text-white">Roteiro de <span class="text-blue-500">Visitas</span></h1>
                <div class="flex gap-2">
                    <button onclick="window.switchPage('page-resultados')" class="glass px-4 py-2 rounded-xl text-[10px] font-bold uppercase text-white">Ver BI</button>
                    <button onclick="window.switchPage('page-agendamento')" class="bg-rose-600/20 text-rose-500 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Sair</button>
                </div>
            </nav>
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <select id="log-projeto-ativo" onchange="window.carregarRelatorio()" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-blue-400 font-bold outline-none"></select>
                <input type="date" id="filtro-data-logistica" onchange="window.filtrarLista()" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none">
                <button onclick="window.abrirAvulso()" class="bg-blue-600 px-6 rounded-xl font-bold text-xs uppercase shadow-lg text-white">+ Avulso</button>
            </div>
            <div id="lista-logistica" class="space-y-4"></div>
        </div>
    </section>

    <section id="page-resultados" class="view-section min-h-screen p-6">
        <div class="max-w-7xl mx-auto">
            <nav class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-black uppercase italic text-white">Super <span class="text-emerald-500 text-white">BI PRO</span></h1>
                <div class="flex gap-2">
                    <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase text-white">Copiar Relatório Zap</button>
                    <button onclick="window.switchPage('page-logistica')" class="glass px-4 py-2 rounded-xl text-[10px] font-bold uppercase text-white">Voltar</button>
                </div>
            </nav>
            <div id="bi-metrics-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 text-white text-[11px]"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 glass rounded-[2rem] p-6 text-white"><canvas id="chartPayments" style="max-height: 300px;"></canvas></div>
                <div class="glass rounded-[2rem] p-6 text-white">
                    <h3 class="text-sm font-black uppercase mb-4 text-slate-400">Extrato</h3>
                    <div id="extrato-bi-content" class="space-y-2 max-h-[350px] overflow-y-auto pr-2 text-[10px] text-white"></div>
                    <div id="fechamento-bi-final" class="mt-4 pt-4 border-t border-white/10 text-white"></div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- FUNÇÕES GLOBAIS (window. para garantir funcionamento imediato) ---
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        window.switchPage = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            if(id !== 'page-agendamento') window.carregarRelatorio();
        };

        window.acessoAdmin = () => { if(prompt("Chave ADM:") === "2025") window.switchPage('page-logistica'); };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };

        window.selecionarDia = async (btn) => {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const d = btn.getAttribute('data-date'); document.getElementById('data-selecionada').value = d;
            const elH = document.getElementById('horario'); elH.innerHTML = '<option>Buscando...</option>';
            const sAt = await get(ref(db, "config/projeto_ativo")); const p = sAt.val();
            const snap = await get(ref(db, `dados/${p}/agendamentos/${d}`));
            const counts = {}; const ag = snap.val() || {};
            Object.keys(ag).forEach(id => { if(id.includes('-')){ let hL = id.split('-').slice(0,2).join(':'); counts[hL] = (counts[hL]||0)+1; } });
            elH.innerHTML = '<option value="">Selecione o Horário</option>';
            let cur = new Date(`${d}T09:00:00`);
            const eFinal = (new Date(d + 'T00:00:00').getDay() % 6 === 0);
            let limStr = eFinal ? "17:00" : "20:30";
            while(cur <= new Date(`${d}T${limStr}:00`)){
                let hF = cur.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                let prm = true; if(d === new Date().toLocaleDateString('en-CA') && (cur - new Date()) / 3600000 < 3) prm = false;
                if(prm && (2 - (counts[hF]||0)) > 0){ let opt=document.createElement('option'); opt.value=hF; opt.textContent=`${hF} (${2 - (counts[hF]||0)} vagas)`; elH.appendChild(opt); }
                cur.setMinutes(cur.getMinutes()+30);
            }
        };

        window.carregarRelatorio = async () => {
            const seletor = document.getElementById('log-projeto-ativo');
            const projeto = seletor.value || "guaratingueta-guilherme";
            const [sA, sV] = await Promise.all([get(ref(db, `dados/${projeto}/agendamentos`)), get(ref(db, `dados/${projeto}/avulsos`))]);
            window.dadosCompletos = [];
            const ags = sA.val() || {};
            Object.keys(ags).forEach(d => { if(ags[d]) Object.keys(ags[d]).forEach(id => window.dadosCompletos.push({...ags[d][id], id, data: d, path: `dados/${projeto}/agendamentos/${d}/${id}`})); });
            const avs = sV.val() || {};
            Object.keys(avs).forEach(id => window.dadosCompletos.push({...avs[id], id, path: `dados/${projeto}/avulsos/${id}`}));
            window.filtrarLista();
        };

        window.filtrarLista = () => {
            const fData = document.getElementById('filtro-data-logistica').value;
            let lista = fData ? window.dadosCompletos.filter(i => i.data === fData) : window.dadosCompletos;
            lista.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            renderizarLogistica(lista);
            renderizarBI(lista, fData);
        };

        function renderizarLogistica(lista) {
            const container = document.getElementById('lista-logistica');
            container.innerHTML = '';
            lista.forEach(item => {
                const corStatus = item.resultado === "Venda" ? "border-emerald-500/50" : (item.resultado === "NQ" ? "border-rose-500/50" : "border-white/10");
                const wz = `https://www.waze.com/ul?q=${encodeURIComponent(item.endereco || '')}&navigate=yes`;
                const zap = `https://wa.me/55${(item.telefone||'').replace(/\D/g,'')}`;
                container.innerHTML += `<div class="glass p-6 rounded-[2.5rem] border-l-8 ${corStatus} flex flex-col md:flex-row justify-between items-center gap-6"><div class="flex-grow text-center md:text-left"><div class="flex items-center gap-3 justify-center md:justify-start mb-2"><span class="bg-blue-600 px-3 py-1 rounded-lg font-black text-xs">${item.horario||'DIR'}</span><span class="text-slate-400 font-bold text-xs uppercase">${pDT(item.data)}</span></div><h3 class="text-xl font-black uppercase text-white mb-1">${item.nome_formando}</h3><a href="${zap}" target="_blank" class="text-emerald-400 font-bold text-sm block mb-2 underline">📱 WhatsApp: ${item.telefone}</a><a href="${wz}" target="_blank" class="text-slate-400 text-sm leading-relaxed block hover:text-blue-400 transition">📍 ${item.endereco || 'Abrir Waze'}</a></div><button onclick="window.gerenciarItem('${item.path}')" class="btn-primary px-12 py-5 rounded-2xl font-black uppercase text-xs shadow-xl text-white">Gerenciar</button></div>`;
            });
        }

        let chartPayments = null;
        function renderizarBI(lista, dataFiltro) {
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, val:0, com:0 };
            let hC = '';
            lista.forEach(item => {
                if(item.resultado === "Venda") {
                    m.v++; const vV = Number(item.valor) || 0; m.tot += vV;
                    let comI = 0;
                    if(Array.isArray(item.pagamentos)) {
                        item.pagamentos.forEach(p => {
                            const valP = Number(p.valor) || 0, ent = Number(p.entrada || 0);
                            if(p.tipo === "Pix") m.pix += valP; else if(p.tipo === "Dinheiro") m.din += valP; else if(p.tipo.includes("Débito")) m.deb += valP; else if(p.tipo.includes("Crédito")) m.cre += valP;
                            else if(p.tipo === "Boleto") { m.bol += (valP - ent); comI += (ent * 0.12) + ((valP - ent) * 0.08); if(p.forma_entrada === "Pix") m.pix += ent; else if(p.forma_entrada === "Dinheiro") m.din += ent; if(ent > 0) m.val += ent; }
                            if(p.tipo !== "Boleto") { if(p.tipo === "Pix" || p.tipo === "Dinheiro") m.val += valP; comI += valP * 0.12; }
                        });
                    } else { comI = vV * 0.12; }
                    m.com += comI; hC += `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5"><span class="uppercase font-bold">${item.nome_formando}</span><span class="text-emerald-400 font-black">${fBR(comI)}</span></div>`;
                } else if(item.resultado === "NQ") m.nq++;
            });
            const txConv = (m.v + m.nq) > 0 ? ((m.v / (m.v + m.nq)) * 100).toFixed(0) : 0;
            const perc = (v) => m.tot > 0 ? ((v / m.tot) * 100).toFixed(0) + '%' : '0%';
            document.getElementById('bi-metrics-grid').innerHTML = `<div class="card-metric p-4 rounded-2xl"><p class="text-slate-400 font-bold mb-1 uppercase">Vendas</p><p class="text-3xl font-black text-emerald-400">${m.v} (${txConv}%)</p></div><div class="card-metric p-4 rounded-2xl border-rose-500"><p class="text-slate-400 font-bold mb-1 uppercase">NQs</p><p class="text-3xl font-black text-rose-500">${m.nq}</p></div><div class="card-metric p-4 rounded-2xl border-blue-400"><p class="text-slate-400 font-bold mb-1 uppercase italic">Total Pix (${perc(m.pix)})</p><p class="text-2xl font-black">${fBR(m.pix)}</p></div><div class="card-metric p-4 rounded-2xl border-green-400"><p class="text-slate-400 font-bold mb-1 uppercase italic">Dinheiro (${perc(m.din)})</p><p class="text-2xl font-black text-emerald-400">${fBR(m.din)}</p></div><div class="card-metric p-4 rounded-2xl border-blue-600 bg-blue-600/10"><p class="text-blue-300 font-bold mb-1 uppercase italic">Total Vendido</p><p class="text-3xl font-black text-white">${fBR(m.tot)}</p></div><div class="card-metric p-4 rounded-2xl border-white/20"><p class="text-slate-400 font-bold mb-1 uppercase">Ticket Médio</p><p class="text-3xl font-black text-white">${fBR(m.v ? m.tot/m.v : 0)}</p></div>`;
            document.getElementById('extrato-bi-content').innerHTML = hC || '<p class="text-center text-slate-500">Aguardando dados...</p>';
            document.getElementById('fechamento-bi-final').innerHTML = `<div class="text-right text-white"><p class="text-xs uppercase text-slate-400">Bruta: ${fBR(m.com)}</p><p class="text-xs uppercase text-rose-400">Vales: - ${fBR(m.val)}</p><div class="mt-2"><p class="text-[10px] font-black uppercase text-blue-400">Líquido a Receber</p><p class="text-3xl font-black text-emerald-400 italic">${fBR(m.com - m.val)}</p></div></div>`;
            if(chartPayments) chartPayments.destroy();
            chartPayments = new Chart(document.getElementById('chartPayments'), { type: 'bar', data: { labels: ['Pix', 'Dinheiro', 'Boleto', 'Outros'], datasets: [{ data: [m.pix, m.din, m.bol, (m.deb+m.cre)], backgroundColor: ['#22d3ee', '#10b981', '#8b5cf6', '#3b82f6'] }] }, options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { ticks: { color: '#94a3b8' } } } } });
        }

        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display = 'flex'; };
        window.confirmarExclusao = async () => { if(confirm("Apagar?")) { await remove(ref(db, window.itemPath)); window.fecharModalGestao(); await window.carregarRelatorio(); } };
        window.fluxoResultado = () => { document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<input type="number" id="vTotal" placeholder="VALOR TOTAL" class="w-full bg-slate-800 p-4 rounded-xl text-center mb-4 text-white outline-none border border-white/10"><div class="grid grid-cols-2 gap-2 mb-4 text-white"><button onclick="window.addPg('Dinheiro')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Dinheiro</button><button onclick="window.addPg('Pix')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Pix</button><button onclick="window.addPg('Cartão Débito')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Débito</button><button onclick="window.addPg('Cartão Crédito')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Crédito</button><button onclick="window.addPg('Boleto')" class="p-2 bg-blue-900 rounded-lg text-[9px] col-span-2">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-4"></div><button onclick="window.finalizarVenda()" class="w-full p-4 bg-emerald-600 rounded-xl font-black text-white">CONFIRMAR VENDA</button><button onclick="window.salvarStatusSimples('NQ')" class="w-full p-2 bg-rose-600 rounded-xl mt-4 text-[10px]">SALVAR NQ</button>`; window.tempPgs = []; };
        window.addPg = (tipo) => { const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',','.') || 0); if(v <= 0) return; let pg = { tipo, valor: v }; if(tipo === 'Boleto') { const ent = prompt("Entrada? 1-Sim 2-Não"); if(ent === "1") { pg.entrada = parseFloat(prompt("Valor Entrada:")?.replace(',','.') || 0); const fE = prompt("Forma: 1-Dinheiro 2-Pix"); pg.forma_entrada = fE === "1" ? "Dinheiro" : "Pix"; } } window.tempPgs.push(pg); document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px] text-white"><span>${p.tipo}</span><span class="text-emerald-400 font-bold">${fBR(p.valor)}</span></div>`).join(''); };
        window.finalizarVenda = async () => { const tot = parseFloat(document.getElementById('vTotal').value); if(!tot) return alert("Valor!"); await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, pagamentos: window.tempPgs }); window.fecharModalGestao(); await window.carregarRelatorio(); };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s, valor: 0 }); window.fecharModalGestao(); await window.carregarRelatorio(); };
        window.abrirAvulso = () => { document.getElementById('modalGestao').style.display = 'flex'; document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<h3 class="text-white font-bold mb-4 uppercase text-xs text-white">Novo Avulso</h3><input type="text" id="av-nome" placeholder="NOME" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white outline-none"><input type="tel" id="av-tel" placeholder="TEL" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white outline-none"><input type="text" id="av-end" placeholder="ENDEREÇO" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white outline-none"><input type="date" id="av-data" class="w-full bg-slate-800 p-3 rounded-xl mb-4 text-white outline-none"><button onclick="window.salvarNovoAvulso()" class="w-full p-4 bg-blue-600 rounded-xl font-black text-white uppercase text-xs text-white">Salvar</button>`; document.getElementById('av-data').value = new Date().toLocaleDateString('en-CA'); };
        window.salvarNovoAvulso = async () => { const n = document.getElementById('av-nome').value, d = document.getElementById('av-data').value; if(!n || !d) return alert("Nome/Data!"); const sP = await get(ref(db, "config/projeto_ativo")); const p = sP.val(); window.itemPath = `dados/${p}/avulsos/AV-${Date.now()}`; await set(ref(db, window.itemPath), { nome_formando: n, telefone: document.getElementById('av-tel').value, endereco: document.getElementById('av-end').value, data: d, resultado: "Pendente" }); window.fluxoResultado(); };

        window.copiarRelatorio = () => {
            const f = fBR; const dF = document.getElementById('filtro-data-logistica').value;
            const seletor = document.getElementById('log-projeto-ativo');
            const pNome = (seletor && seletor.selectedIndex !== -1) ? seletor.options[seletor.selectedIndex].text : "Relatório";
            let v=0, nq=0, totV=0, pix=0, din=0, cre=0, deb=0, bol=0, val=0;
            const lista = dF ? window.dadosCompletos.filter(i => i.data === dF) : window.dadosCompletos;
            lista.forEach(item => {
                if(item.resultado === "Venda") { v++; totV += Number(item.valor) || 0; if(Array.isArray(item.pagamentos)) { item.pagamentos.forEach(p => { const valP = Number(p.valor)||0, ent = Number(p.entrada)||0; if(p.tipo === "Boleto") { bol += (valP-ent); if(ent>0) { val+=ent; if(p.forma_entrada === "Pix") pix+=ent; else din+=ent; } } else { if(p.tipo==="Pix") pix+=valP; else if(p.tipo==="Dinheiro") din+=valP; else if(p.tipo.includes("Débito")) deb+=valP; else cre+=valP; if(p.tipo==="Dinheiro"||p.tipo==="Pix") val+=valP; } }); } }
                else if(item.resultado === "NQ") nq++;
            });
            const txt = `*Relatório de Vendas*\n*Projeto:* ${pNome}\n*Data:* ${dF ? pDT(dF) : 'ACUMULADO'}\n\n✅ Vendas: ${v}\n❌ NQ: ${nq}\n\n💵 Dinheiro: ${f(din)}\n💎 Pix: ${f(pix)}\n💳 Débito: ${f(deb)}\n💳 Crédito: ${f(cre)}\n📄 Boleto: ${f(bol)}\n\n💰 *Total Vendido: ${f(totV)}*\n💸 *Vales: ${f(val)}*`;
            const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("COPIADO!");
        };

        (async () => {
            const agora = new Date();
            const dataHojeStr = agora.toLocaleDateString('en-CA');
            document.querySelectorAll('.day-btn').forEach(btn => {
                const dataBtn = btn.getAttribute("data-date");
                if (dataBtn < dataHojeStr) { btn.style.display = "none"; return; }
                // REGRA DAS 3 HORAS: Verifica se o dia de hoje ainda tem vaga disponível no futuro
                if (dataBtn === dataHojeStr) {
                    const limiteAtendimento = (agora.getDay() % 6 === 0) ? 17 : 20;
                    if (agora.getHours() >= (limiteAtendimento - 3)) { btn.style.display = "none"; return; }
                }
                btn.style.display = "block";
            });
            document.getElementById("form-agendamento").addEventListener("submit", async function(e){
                e.preventDefault(); const n = document.getElementById("nome").value, t = document.getElementById("telefone").value, en = document.getElementById("endereco").value, h = document.getElementById("horario").value, d = document.getElementById("data-selecionada").value;
                if(!d || !h) return alert("Selecione data e hora!");
                const sP = await get(ref(db, "config/projeto_ativo")); const p = sP.val();
                await set(ref(db, `dados/${p}/agendamentos/${d}/${h.replace(":","-")}-${Date.now()}`), { nome_formando: n, telefone: t, endereco: en, horario: h, data: d, resultado: "Pendente", criado_em: new Date().toISOString() });
                window.open(`https://wa.me/5516993291674?text=${encodeURIComponent("*NOVO AGENDAMENTO*\n👤: "+n+"\n📅: "+d.split("-").reverse().join("/")+"\n⏰: "+h+"\n📍: "+en)}`, "_blank");
                location.reload();
            });
            await window.carregarProjetos();
            try {
                const sAt = await get(ref(db, "config/projeto_ativo")); const sl = sAt.val();
                const sIn = await get(ref(db, `config/projetos/${sl}`));
                if(sIn.exists()){ document.getElementById('escola-titulo').innerText = sIn.val().cidade; document.getElementById('sub-escola').innerText = sIn.val().escola; }
            } catch(e) {}
        })();
    </script>
</body>
