<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Master - v26.70 PLATINUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .view-section { display: none; min-height: 100vh; width: 100%; flex-direction: column; }
        .view-active { display: flex !important; }
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
        .input-compact { padding: 0.8rem !important; border-radius: 1rem !important; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; width: 100%; outline: none; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; padding: 12px; border-radius: 15px; font-size: 10px; font-weight: 800; color: white; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 shadow-2xl text-white mx-auto mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="gestao-titulo" class="text-lg font-black uppercase text-blue-400">Gestão</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase text-sm">Registrar Venda</button>
                <button onclick="window.fluxoNQ()" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">Marcar NQ</button>
                <button onclick="window.limparRegistroVisita()" class="bg-slate-700/50 border border-white/10 p-3 rounded-2xl text-white font-black uppercase text-[10px]">Limpar Registro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir Registro</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 pb-6 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center">
            <span class="text-lg font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase">ADM</button>
        </header>
        <div class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-6 rounded-[2.5rem] w-full max-w-sm text-center">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 leading-none italic">CONECTANDO...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-500 mb-4 uppercase italic">AGUARDE</h3>
                <div class="grid grid-cols-2 gap-1 mb-3" id="day-selector"></div>
                <form id="form-agendamento" class="space-y-2">
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="input-compact">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="input-compact">
                    <select id="horario" required class="input-compact"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="input-compact" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-sm">Agendar Visita</button>
                </form>
            </div>
        </div>
    </section>

    <section id="view-logistica" class="view-section p-4">
        <nav class="flex justify-between items-center mb-6">
            <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase">← Sair</button>
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button class="bg-blue-600 px-4 py-1.5 rounded-lg text-[10px] font-black">Visitas</button>
                <button onclick="window.switchView('view-financeiro')" class="px-4 py-1.5 text-slate-400 text-[10px] font-black uppercase">Dashboard BI</button>
            </div>
        </nav>
        <div id="controles-admin" class="hidden flex flex-wrap gap-2 mb-4 justify-center">
            <button onclick="window.abrirNovoProjeto()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-emerald-400 uppercase">Novo Projeto</button>
            <button onclick="window.abrirGestaoCentralizada()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-blue-400 uppercase">Config. Campanha</button>
            <button onclick="window.abrirGestaoVales()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-rose-400 uppercase">Lançar Vales</button>
            <button onclick="window.switchView('view-automacao')" class="bg-amber-500/20 border border-amber-500/30 px-4 py-2 rounded-xl text-[8px] font-black text-amber-500 uppercase italic">Automação PC 🚀</button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none">
            <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ AVULSO</button>
        </div>
        <div id="lista-visitas" class="space-y-2 pb-10"></div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-4">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase">← Voltar</button>
            <div class="flex gap-2">
                 <button onclick="window.menuRelatorio()" class="bg-emerald-600 px-3 py-2 rounded-xl text-[9px] font-black uppercase italic">Copiar Relatório 📋</button>
                 <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white outline-none">
            </div>
        </nav>
        <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>
        <div id="individual-performance" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"></div>
        <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-6"></div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div id="comissao-card" class="lg:col-span-1 glass rounded-[2rem] p-5 border-l-4 border-blue-500"></div>
            <div class="lg:col-span-2 glass rounded-[2rem] p-4 min-h-[250px]"><canvas id="weeklyChart"></canvas></div>
        </div>
        <div id="saldo-card" class="glass rounded-[2rem] p-6 border-l-8 border-emerald-500 mb-6"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-10">
            <div class="glass p-4 rounded-2xl border border-white/5"><div class="flex justify-between items-center mb-3"><h4 class="text-emerald-400 font-black text-[10px] uppercase">Extrato Vendas</h4></div><div id="extrato-tabela" class="text-xs"></div></div>
            <div class="glass p-4 rounded-2xl border border-white/5"><h4 class="text-rose-500 font-black text-[10px] mb-3 uppercase">NQ</h4><div id="nq-tabela" class="text-xs"></div></div>
        </div>
    </section>

    <section id="view-automacao" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-6">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase">← Voltar</button>
            <span class="text-amber-500 font-black text-[10px] uppercase italic">Motor Elite Auto-Zap</span>
        </nav>
        <div class="glass p-8 rounded-[3rem] text-center mb-6">
            <div id="status-automacao" class="text-[9px] font-black text-slate-500 uppercase mb-2">Pronto para iniciar</div>
            <div id="timer-display" class="text-5xl font-black text-white mb-6">00:00</div>
            <div class="flex gap-3 justify-center">
                <button id="btn-start-auto" onclick="window.iniciarCampanha()" class="bg-emerald-600 px-8 py-4 rounded-2xl font-black uppercase text-xs">Iniciar Campanha</button>
                <button id="btn-stop-auto" onclick="window.pararCampanha()" class="bg-rose-600 hidden px-8 py-4 rounded-2xl font-black uppercase text-xs">Pausar</button>
            </div>
        </div>
        <div class="glass p-5 rounded-[2rem]">
            <div class="flex justify-between items-center mb-4">
                <h4 class="text-[10px] font-black uppercase text-blue-400">Fila de Envios</h4>
                <button onclick="window.resetIndex()" class="text-[8px] text-slate-600 font-bold uppercase">Reiniciar Fila</button>
            </div>
            <div id="lista-fila" class="space-y-2 max-h-64 overflow-y-auto text-[10px]"></div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); 
        const db = getDatabase(app);
        
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        let projId = ""; window.dadosCompletos = []; let custosDB = {}; let valesDB = {}; let projetoDB = {}; let weeklyChart = null;

        // --- CONEXÃO COM PROJETO ATIVO ---
        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projId = snap.val() || "guaratingueta-guilherme";
            const pS = await get(ref(db, `projetos/${projId}`));
            if(pS.exists()){
                projetoDB = pS.val();
                document.getElementById('escola-titulo').innerText = projetoDB.cidade;
                document.getElementById('sub-escola').innerText = projetoDB.escola || projetoDB.school;
                if(projetoDB.data_inicio) window.gerarBotoesDatas(projetoDB.data_inicio, projetoDB.data_fim);
                window.carregarRelatorio();
            }
        });

        // --- MOTOR DE AUTOMAÇÃO v26.70 (REGRAS DE OURO) ---
        let autoAtivo = false;
        
        window.iniciarCampanha = () => {
            if(!projetoDB.automacao?.lista) return alert("Configure a lista primeiro!");
            autoAtivo = true;
            document.getElementById('btn-start-auto').classList.add('hidden');
            document.getElementById('btn-stop-auto').classList.remove('hidden');
            window.dispararProximo();
        };

        window.pararCampanha = () => {
            autoAtivo = false;
            document.getElementById('btn-start-auto').classList.remove('hidden');
            document.getElementById('btn-stop-auto').classList.add('hidden');
            document.getElementById('status-automacao').innerText = "Campanha Pausada";
        };

        window.dispararProximo = async () => {
            if(!autoAtivo) return;
            
            const lista = projetoDB.automacao.lista.split('\n').filter(l => l.trim() !== "");
            const idx = projetoDB.automacao.index_atual || 0;
            
            if(idx >= lista.length) { 
                alert("Fila finalizada com sucesso!"); 
                return window.pararCampanha(); 
            }

            const dados = lista[idx].split(',');
            const nome = dados[0].trim();
            const fone = dados[1].trim().replace(/\D/g,'');
            
            const msgN = (idx % 4) + 1;
            let msgB = projetoDB.automacao[`msg${msgN}`] || projetoDB.automacao.msg1;
            const msgFinal = msgB.replace(/{crianca}/g, nome);

            // LEI 1: Atualizar Firebase ANTES de abrir a aba (Garante que o index mude)
            await update(ref(db, `projetos/${projId}/automacao`), { index_atual: idx + 1 });

            document.getElementById('status-automacao').innerText = `Enviando para: ${nome}`;
            
            // LEI 2: Abrir WhatsApp (Extensão Elite Auto Zap cuidará do clique)
            const url = `https://web.whatsapp.com/send?phone=55${fone}&text=${encodeURIComponent(msgFinal)}`;
            window.open(url, '_blank');

            // LEI 3: Tempo Aleatório de Segurança (180 a 660 segundos)
            const randSeg = Math.floor(Math.random() * (660 - 180 + 1)) + 180;
            window.iniciarContagem(randSeg);
        };

        window.iniciarContagem = (seg) => {
            let rest = seg; const d = document.getElementById('timer-display');
            const itv = setInterval(() => {
                if(!autoAtivo) { clearInterval(itv); return; }
                const m = Math.floor(rest/60); const s = rest%60;
                d.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(rest <= 0) { clearInterval(itv); window.dispararProximo(); }
                rest--;
            }, 1000);
        };

        window.renderFila = () => {
            const cont = document.getElementById('lista-fila'); if(!cont) return;
            const lista = projetoDB.automacao?.lista?.split('\n').filter(l => l.trim() !== "") || [];
            const atual = projetoDB.automacao?.index_atual || 0;
            cont.innerHTML = lista.map((l, i) => `
                <div class="flex justify-between p-2 rounded-lg ${i < atual ? 'bg-emerald-500/10 text-emerald-500' : 'bg-white/5'}">
                    <span>${i+1}. ${l.split(',')[0]}</span>
                    <b>${i < atual ? 'OK' : 'PENDENTE'}</b>
                </div>`).join('');
        };

        window.resetIndex = () => { if(confirm("Reiniciar fila do começo?")) update(ref(db, `projetos/${projId}/automacao`), { index_atual: 0 }); };

        // --- SISTEMA DE LOGÍSTICA E RELATÓRIO ---
        window.carregarRelatorio = async () => {
            if(!projId) return;
            try {
                const [sA, sV, sC, sVales] = await Promise.all([
                    get(ref(db, `dados/${projId}/agendamentos`)), get(ref(db, `vendas/${projId}`)), 
                    get(ref(db, `custos/${projId}`)), get(ref(db, `vales/${projId}`))
                ]);
                window.dadosCompletos = []; custosDB = sC.exists() ? sC.val() : {};
                valesDB = sVales.exists() ? sVales.val() : { evanio: 0, willian: 0 };
                const proc = (pasta, base) => {
                    if (!pasta) return;
                    Object.keys(pasta).forEach(k => {
                        const item = pasta[k];
                        if (typeof item === 'object' && !item.nome_formando) {
                            Object.keys(item).forEach(subK => window.dadosCompletos.push({...item[subK], id:subK, data:k, path:`${base}/${k}/${subK}`}));
                        } else window.dadosCompletos.push({...item, id:k, data:item.data||k, path:`${base}/${k}`});
                    });
                };
                if(sA.exists()) proc(sA.val(), `dados/${projId}/agendamentos`);
                if(sV.exists()) {
                    const v = sV.val();
                    if(v.avulsos) proc(v.avulsos, `vendas/${projId}/avulsos`);
                    if(v.agendamentos) proc(v.agendamentos, `vendas/${projId}/agendamentos`);
                }
                window.filtrarLogistica(); window.filtrarBI(); window.renderFila();
            } catch(e) { console.error(e); }
        };

        window.filtrarLogistica = () => {
            const cont = document.getElementById('lista-visitas'); if(!cont) return;
            cont.innerHTML = '';
            const fD = document.getElementById('filtro-data-logistica').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            list.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            list.forEach(i => {
                let s = i.resultado || "PENDENTE";
                let c = s==="Venda"?"text-emerald-500":s==="NQ"?"text-rose-500":"text-slate-600";
                cont.innerHTML += `
                <div class="glass p-3 rounded-2xl flex flex-col gap-2">
                    <div class="flex justify-between items-center text-white">
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] font-black text-blue-400 uppercase">${i.horario||'DIR'}</span>
                            <span class="text-[12px] font-black ${c}">${s==="Venda"?"VENDIDO":s}</span>
                            <h3 class="text-sm font-black uppercase truncate max-w-[120px]">#${i.num_album||''} ${i.nome_formando}</h3>
                        </div>
                        <button onclick="window.gerenciarItem('${i.path}')" class="btn-primary px-3 py-1.5 rounded-lg text-[8px] font-black uppercase">Gere.</button>
                    </div>
                    <div class="flex gap-1 border-t border-white/5 pt-2">
                        <a href="https://wa.me/55${(i.telefone||'').replace(/\D/g,'')}" target="_blank" class="bg-emerald-500/10 p-1 rounded-lg text-emerald-400 text-[8px] font-black">Zap</a>
                        <a href="https://www.waze.com/ul?q=${encodeURIComponent(i.endereco||'')}&navigate=yes" target="_blank" class="bg-blue-500/10 p-1 rounded-lg text-blue-400 text-[8px] font-black">Waze</a>
                    </div>
                </div>`;
            });
        };

        // --- DASHBOARD BI ---
        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, com:0 };
            let vend = { Evanio: {v:0, nq:0, tot:0, com:0, ent:0}, Willian: {v:0, nq:0, tot:0, com:0, ent:0} };
            let chartData = {};
            
            list.forEach(i => {
                const vn = i.vendedor || "Willian"; const d = i.data; 
                if(!chartData[d]) chartData[d] = {v:0, nq:0};
                if(i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor)||0; vend[vn].v++; vend[vn].tot += Number(i.valor)||0; chartData[d].v++;
                    let cV = 0; if(i.pagamentos) i.pagamentos.forEach(p => {
                        const vP = Number(p.valor)||0; const t = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        if (t.includes("pix")) m.pix += vP; else if(t.includes("dinheiro")) m.din += vP; else if(t.includes("debito")) m.deb += vP; else if(t.includes("credito")) m.cre += vP; else if(t.includes("boleto")) m.bol += vP;
                        if (t.includes("entrada")) { cV += vP*0.12; if(t.includes("pix") || t.includes("dinheiro")) vend[vn].ent += vP; } else cV += vP*0.08;
                    });
                    m.com += cV; vend[vn].com += cV;
                } else if(i.resultado === "NQ") { m.nq++; vend[vn].nq++; chartData[d].nq++; }
            });

            const rInd = (parseFloat(custosDB.km_valor)||0.7)*(parseFloat(custosDB.km_total)||0) + (parseFloat(custosDB.pedagio_total)||0) + ((parseFloat(custosDB.hosp_valor)||0)*parseInt(custosDB.hosp_qtd||0)) + ((parseFloat(custosDB.alim_valor)||0)*parseInt(custosDB.alim_qtd||0));
            
            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black text-emerald-400 uppercase">Faturamento</p><p class="text-xl font-black">${fBR(m.tot)}</p></div><div class="card-bi p-4 rounded-3xl text-center border-blue-500"><p class="text-[8px] font-black text-blue-400 uppercase">Eficiência</p><p class="text-xl font-black">${(m.v+m.nq)?(m.v/(m.v+m.nq)*100).toFixed(0):0}%</p></div><div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black uppercase">Vendas/NQ</p><p class="text-xl font-black">${m.v}/${m.nq}</p></div><div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black uppercase">Ticket Médio</p><p class="text-xl font-black">${fBR(m.v?m.tot/m.v:0)}</p></div>`;
            document.getElementById('individual-performance').innerHTML = Object.keys(vend).map(v => `<div class="glass p-4 rounded-3xl border-t-2 ${v==='Evanio'?'border-blue-400':'border-cyan-400'}"><p class="font-black text-xs uppercase mb-2">${v}</p><div class="grid grid-cols-3 gap-2 text-center"><div><p class="text-[7px] text-slate-400">VENDIDO</p><p class="text-xs font-bold">${fBR(vend[v].tot)}</p></div><div><p class="text-[7px] text-slate-400">EFIC.</p><p class="text-xs font-bold">${(vend[v].v+vend[v].nq)?(vend[v].v/(vend[v].v+vend[v].nq)*100).toFixed(0):0}%</p></div><div><p class="text-[7px] text-slate-400">NQ</p><p class="text-xs font-bold">${vend[v].nq}</p></div></div></div>`).join('');
            document.getElementById('finance-grid').innerHTML = `<div class="glass p-2 rounded-xl text-center"><p class="text-[7px]">PIX</p><b>${fBR(m.pix)}</b></div><div class="glass p-2 rounded-xl text-center text-emerald-400"><p class="text-[7px]">CRÉDITO</p><b>${fBR(m.cre)}</b></div><div class="glass p-2 rounded-xl text-center border-rose-500/30 text-rose-500"><p class="text-[7px]">VALES TOTAL</p><b>${fBR(parseFloat(valesDB.evanio||0) + parseFloat(valesDB.willian||0) + vend.Evanio.ent + vend.Willian.ent)}</b></div><div class="glass p-2 rounded-xl text-center border-blue-500/30 text-blue-400"><p class="text-[7px]">REEMBOLSO PROJETO</p><b>${fBR(rInd * 2)}</b></div>`;
            document.getElementById('comissao-card').innerHTML = `<h5 class="text-[10px] font-black text-blue-400 mb-3 uppercase text-center">Ganhos</h5><div class="flex flex-col items-center justify-center h-full"><p class="text-[8px] text-slate-500 uppercase">Total Comissões</p><p class="text-2xl font-black">${fBR(m.com)}</p></div>`;
            document.getElementById('saldo-card').innerHTML = `<div class="text-center mb-4 border-b border-white/10 pb-2 font-black text-[10px] uppercase">Acerto Final</div><div class="grid grid-cols-2 gap-4"><div class="bg-white/5 p-4 rounded-2xl"><p class="text-[10px] font-black text-blue-400 uppercase mb-2">EVANIO</p><div class="text-[9px] space-y-1"><div>Comis: <b>+ ${fBR(vend.Evanio.com)}</b></div><div>Reemb: <b>+ ${fBR(rInd)}</b></div><div class="text-rose-400">Vales: <b>- ${fBR(parseFloat(valesDB.evanio||0))}</b></div><div class="text-orange-400">Entr: <b>- ${fBR(vend.Evanio.ent)}</b></div><div class="text-xs font-black pt-1 border-t border-white/5">Saldo: <span class="text-emerald-400">${fBR(vend.Evanio.com + rInd - (parseFloat(valesDB.evanio)||0) - vend.Evanio.ent)}</span></div></div></div><div class="bg-white/5 p-4 rounded-2xl"><p class="text-[10px] font-black text-cyan-400 uppercase mb-2">WILLIAN</p><div class="text-[9px] space-y-1"><div>Comis: <b>+ ${fBR(vend.Willian.com)}</b></div><div>Reemb: <b>+ ${fBR(rInd)}</b></div><div class="text-rose-400">Vales: <b>- ${fBR(parseFloat(valesDB.willian||0))}</b></div><div class="text-orange-400">Entr: <b>- ${fBR(vend.Willian.ent)}</b></div><div class="text-xs font-black pt-1 border-t border-white/5">Saldo: <span class="text-emerald-400">${fBR(vend.Willian.com + rInd - (parseFloat(valesDB.willian)||0) - vend.Willian.ent)}</span></div></div></div></div>`;
            document.getElementById('extrato-tabela').innerHTML = list.filter(i=>i.resultado==="Venda").map(i => `<div class="flex justify-between py-1.5 border-b border-white/5"><span class="truncate max-w-[120px] font-bold">#${i.vendedor?.charAt(0)||'W'} ${i.nome_formando}</span><b class="text-emerald-400">${fBR(i.valor)}</b></div>`).join('');
            document.getElementById('nq-tabela').innerHTML = list.filter(i=>i.resultado==="NQ").map(i=>`<div class="py-1 border-b border-white/5 text-slate-500">${i.nome_formando}</div>`).join('');
            window.updateChart(chartData);
        };

        window.updateChart = (data) => {
            const ctx = document.getElementById('weeklyChart').getContext('2d'); 
            const labels = Object.keys(data).sort().map(d => d.split('-').reverse().slice(0,2).join('/'));
            const vendas = Object.keys(data).sort().map(d => data[d].v);
            const nqs = Object.keys(data).sort().map(d => data[d].nq);
            if(weeklyChart) weeklyChart.destroy();
            weeklyChart = new Chart(ctx, { type: 'bar', data: { labels: labels, datasets: [ { label: 'V', data: vendas, backgroundColor: '#10b981', borderRadius: 5 }, { label: 'N', data: nqs, backgroundColor: '#f43f5e', borderRadius: 5 } ] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 8 } } } } } });
        };

        // --- FUNÇÕES DE INTERFACE ---
        window.switchView = (id) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active')); document.getElementById(id).classList.add('view-active'); window.scrollTo(0,0); };
        window.acessoAdmin = () => { if(prompt("Senha:")==="2025") { document.getElementById('controles-admin').classList.remove('hidden'); window.switchView('view-logistica'); } };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display='none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };
        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display='flex'; };

        // --- SISTEMA DE DATAS E AGENDAMENTO ---
        window.obterHorariosArray = (dataISO, isAvulso = false) => {
            const dataObj = new Date(dataISO + "T00:00:00"); const isFDS = (dataObj.getDay() === 0 || dataObj.getDay() === 6); let hL = []; const fim = isFDS ? 17 : 20.5;
            for (let h = 9; h <= fim; h += 0.5) { const hh = Math.floor(h).toString().padStart(2, '0'); const mm = (h % 1 === 0) ? '00' : '30'; hL.push(`${hh}:${mm}`); }
            if (!isAvulso) { const agora = new Date(); const hojeISO = agora.toLocaleDateString('en-CA'); if (dataISO === hojeISO) { const minL = (agora.getHours() * 60) + agora.getMinutes() + 180; hL = hL.filter(h => { const p = h.split(':').map(Number); return (p[0]*60 + p[1]) >= minL; }); } } return hL;
        };
        window.gerarBotoesDatas = (i, f) => {
            const c = document.getElementById('day-selector'); c.innerHTML = ""; let cur = new Date(i + "T00:00:00"); const hojeISO = new Date().toLocaleDateString('en-CA');
            while(cur <= new Date(f + "T00:00:00")) { const iso = cur.toISOString().split('T')[0]; if (iso >= hojeISO) { if (!(iso === hojeISO && window.obterHorariosArray(iso, false).length === 0)) { c.innerHTML += `<button type="button" onclick="window.selecionarDia(this, '${iso}')" class="day-btn">${cur.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</button>`; } } cur.setDate(cur.getDate() + 1); }
        };
        window.selecionarDia = (b, iso) => { document.querySelectorAll('.day-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); document.getElementById('data-selecionada').value = iso; const select = document.getElementById('horario'); select.innerHTML = '<option value="">Horário</option>'; window.obterHorariosArray(iso, false).forEach(h => { select.innerHTML += `<option value="${h}">${h}</option>`; }); };

        // --- CONFIGURAÇÃO CENTRALIZADA ---
        window.abrirGestaoCentralizada = () => {
            const c = custosDB; const p = projetoDB; document.getElementById('modalGestao').style.display='flex'; document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const auto = p.automacao || { lista: "", msg1: "", msg2: "", msg3: "", msg4: "" };
            f.innerHTML = `
                <h3 class="text-blue-400 font-black text-[10px] uppercase mb-4">Configuração Campanha</h3>
                <div class="space-y-3">
                    <div><p class="text-[8px] text-slate-500 uppercase">Período Ativo</p><div class="flex gap-2 mb-2"><input type="date" id="pDi" value="${p.data_inicio||''}" class="input-compact flex-grow text-white"><input type="date" id="pDf" value="${p.data_fim||''}" class="input-compact flex-grow text-white"></div></div>
                    <div><p class="text-[8px] text-amber-500 uppercase font-bold">Lista de Disparo (Nome, Telefone)</p><textarea id="pLista" class="input-compact h-24 text-[10px] text-white">${auto.lista || ''}</textarea></div>
                    <div><p class="text-[8px] text-blue-400 uppercase font-bold">Mensagens ({crianca} = nome)</p><textarea id="m1" class="input-compact h-12 text-[10px] text-white mb-1">${auto.msg1 || ''}</textarea><textarea id="m2" class="input-compact h-12 text-[10px] text-white mb-1">${auto.msg2 || ''}</textarea><textarea id="m3" class="input-compact h-12 text-[10px] text-white mb-1">${auto.msg3 || ''}</textarea><textarea id="m4" class="input-compact h-12 text-[10px] text-white mb-1">${auto.msg4 || ''}</textarea></div>
                    <hr class="opacity-10">
                    <div><p class="text-[8px] text-slate-500 uppercase">Custos Reembolso</p>
                        <div class="flex gap-2 mb-2"><input type="number" id="cKv" value="${c.km_valor||0.7}" class="input-compact flex-grow text-white"><input type="number" id="cKt" value="${c.km_total||0}" class="input-compact flex-grow text-white"></div>
                        <input type="number" id="cPt" value="${c.pedagio_total||0}" class="input-compact mb-2 text-white">
                        <div class="flex gap-2"><input type="number" id="cHv" value="${c.hosp_valor||0}" class="input-compact flex-grow text-white"><input type="number" id="cHq" value="${c.hosp_qtd||0}" class="input-compact flex-grow text-white"></div>
                    </div>
                </div>
                <button onclick="window.salvarTudoProjeto()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs mt-6">Salvar Tudo</button>`;
        };

        window.salvarTudoProjeto = async () => {
            const uP = { 
                data_inicio: document.getElementById('pDi').value, 
                data_fim: document.getElementById('pDf').value, 
                automacao: { 
                    lista: document.getElementById('pLista').value, 
                    msg1: document.getElementById('m1').value, 
                    msg2: document.getElementById('m2').value, 
                    msg3: document.getElementById('m3').value, 
                    msg4: document.getElementById('m4').value,
                    index_atual: projetoDB.automacao?.index_atual || 0
                } 
            };
            const uC = { km_valor: document.getElementById('cKv').value, km_total: document.getElementById('cKt').value, pedagio_total: document.getElementById('cPt').value, hosp_valor: document.getElementById('cHv').value, hosp_qtd: document.getElementById('cHq').value, alim_valor: 0, alim_qtd: 0 };
            await update(ref(db, `projetos/${projId}`), uP);
            await update(ref(db, `custos/${projId}`), uC);
            location.reload();
        };

        // --- FLUXO DE RESULTADO (VENDA / NQ) ---
        window.fluxoResultado = () => {
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const item = window.dadosCompletos.find(i => i.path === window.itemPath) || {};
            window.tempPgs = item.pagamentos ? [...item.pagamentos] : [];
            f.innerHTML = `
                <h3 class="text-emerald-400 font-black text-[10px] uppercase mb-2">Venda</h3>
                <select id="vV" class="input-compact mb-2 text-white"><option value="Evanio" ${item.vendedor==='Evanio'?'selected':''}>Evanio</option><option value="Willian" ${item.vendedor==='Willian'?'selected':''}>Willian</option></select>
                <div class="flex gap-2 mb-2"><input type="date" id="vD" value="${item.data || ''}" class="input-compact flex-grow text-white"><input type="text" id="vA" placeholder="Nº Álbum" value="${item.num_album||''}" class="input-compact w-24 text-white"></div>
                <input type="number" id="vT" placeholder="TOTAL" value="${item.valor||''}" class="input-compact text-xl font-black mb-3 text-white">
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <button onclick="window.addPg('Pix')" class="bg-slate-800 p-2 rounded text-[9px]">Pix</button>
                    <button onclick="window.addPg('Dinheiro')" class="bg-slate-800 p-2 rounded text-[9px]">Dinheiro</button>
                    <button onclick="window.addPg('Débito')" class="bg-slate-800 p-2 rounded text-[9px]">Débito</button>
                    <button onclick="window.addPg('Crédito')" class="bg-slate-800 p-2 rounded text-[9px]">Crédito</button>
                    <button onclick="window.addPg('Boleto')" class="bg-blue-900/40 p-2 rounded text-[9px] col-span-2">Boleto</button>
                </div>
                <div id="lista-p" class="space-y-1 mb-2"></div>
                <button onclick="window.finalizarVenda()" class="btn-primary w-full p-4 rounded-xl font-black text-xs uppercase">Salvar</button>`;
            window.atualizarListaInterface();
        };

        window.finalizarVenda = async () => {
            const d = { resultado:"Venda", valor:document.getElementById('vT').value, num_album:document.getElementById('vA').value, vendedor:document.getElementById('vV').value, pagamentos:window.tempPgs, data: document.getElementById('vD').value };
            await update(ref(db, window.itemPath), d);
            window.carregarRelatorio();
            window.fecharModalGestao();
        };

        window.addPg = (t) => {
            const v = parseFloat(prompt(`Valor ${t}:`) || 0); if(v<=0) return;
            if(t === "Boleto") {
                const r = prompt("Tem entrada? 1-Sim, 2-Não");
                if(r==="1"){
                    const ve = parseFloat(prompt("Valor Entrada:")||0);
                    const te = prompt("1-Pix, 2-Din, 3-Deb");
                    let txt = te==="1"?"Pix (Entr)":te==="2"?"Din (Entr)":"Deb (Entr)";
                    window.tempPgs.push({tipo:txt, valor:ve});
                    if(v-ve>0) window.tempPgs.push({tipo:"Boleto", valor:v-ve});
                } else window.tempPgs.push({tipo:"Boleto", valor:v});
            } else window.tempPgs.push({ tipo: t, valor: v });
            window.atualizarListaInterface();
        };

        window.atualizarListaInterface = () => { document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between text-[10px] bg-white/5 p-1"><span>${p.tipo}</span><b>${fBR(p.valor)}</b></div>`).join(''); };

        window.fluxoNQ = () => {
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const item = window.dadosCompletos.find(i => i.path === window.itemPath) || {};
            const dtAt = item.data || new Date().toLocaleDateString('en-CA');
            f.innerHTML = `<h3 class="text-rose-500 font-black text-[10px] uppercase mb-4 text-center">Registrar NQ</h3><input type="date" id="nqData" value="${dtAt}" class="input-compact mb-6 text-white"><button onclick="window.salvarNQFinal()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs">Confirmar NQ</button>`;
        };

        window.salvarNQFinal = async () => {
            const dt = document.getElementById('nqData').value;
            await update(ref(db, window.itemPath), { resultado: "NQ", data: dt });
            window.carregarRelatorio();
            window.fecharModalGestao();
        };

        // --- SUBMIT AGENDAMENTO ---
        document.getElementById('form-agendamento').onsubmit = async (e) => {
            e.preventDefault();
            const dt = document.getElementById('data-selecionada').value;
            if(!dt) return alert("Selecione uma data!");
            const d = {
                nome_formando: document.getElementById('nome').value,
                telefone: document.getElementById('telefone').value,
                endereco: document.getElementById('endereco').value,
                horario: document.getElementById('horario').value,
                resultado: "Pendente"
            };
            await set(ref(db, `dados/${projId}/agendamentos/${dt}/AG-${Date.now()}`), d);
            alert("Agendado com Sucesso!");
            location.reload();
        };

    </script>
</body>
</html>
