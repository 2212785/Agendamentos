<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Dashboard PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #admin-modal { display: none; position: fixed; inset: 0; z-index: 50; padding: 20px; overflow-y: auto; background: rgba(2, 6, 23, 0.98); }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; padding: 20px; overflow-y: auto; background: rgba(2, 6, 23, 0.95); align-items: center; justify-content: center; }
        .day-btn { transition: all 0.2s; border-color: rgba(255,255,255,0.1); color: #94a3b8; background: rgba(255,255,255,0.03); cursor: pointer; }
        .day-btn.active { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col text-white">

    <div id="modalGestao">
        <div class="glass w-full max-w-xl rounded-[2.5rem] p-8 border border-white/20 shadow-2xl mx-auto mt-20">
            <div class="flex justify-between items-center mb-8 text-left">
                <h2 id="gestao-titulo" class="text-2xl font-black uppercase italic text-blue-400 text-white">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-2 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/50 p-6 rounded-2xl hover:bg-emerald-600 transition group text-center"><span class="block text-emerald-400 group-hover:text-white font-black text-xs uppercase">1. Resultado</span></button>
                <button onclick="window.fluxoAlterarData()" class="bg-blue-600/20 border border-blue-500/50 p-6 rounded-2xl hover:bg-blue-600 transition group text-center"><span class="block text-blue-400 group-hover:text-white font-black text-xs uppercase">2. Mudar Data</span></button>
                <button onclick="window.confirmarExclusao()" class="bg-rose-600/20 border border-rose-500/50 p-6 rounded-2xl hover:bg-rose-600 transition group text-center"><span class="block text-rose-400 group-hover:text-white font-black text-xs uppercase">3. Excluir</span></button>
            </div>
            <div id="gestao-form" class="mt-8 hidden space-y-4"></div>
        </div>
    </div>

    <main id="admin-modal">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-3xl font-extrabold italic uppercase text-white">Master <span class="text-blue-500 font-black">Dashboard PRO</span></h1>
                    <div class="mt-2">
                        <select id="projeto-ativo" onchange="window.carregarRelatorio()" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1 text-xs text-blue-400 font-bold outline-none">
                            <option value="guaratingueta-guilherme">Guaratinguetá - Dr. Guilherme Eugênio</option>
                        </select>
                    </div>
                </div>
                <div class="flex flex-wrap gap-3 items-center">
                    <input type="date" id="filtro-data-admin" onchange="window.filtrarLista()" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white outline-none">
                    <button onclick="window.lancarVendaDireta()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase shadow">Venda Direta</button>
                    <button onclick="window.copiarRelatorio()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase shadow">Copiar Relatório</button>
                    <button onclick="window.fecharAdmin()" class="bg-rose-600/20 text-rose-500 border border-rose-500/50 px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase font-black transition hover:bg-rose-600 hover:text-white">Sair</button>
                </div>
            </div>
            <div id="resumo-financeiro" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-11 gap-2 mb-6 text-center"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass p-6 rounded-[2rem] border-white/5"><canvas id="graficoVendas"></canvas></div>
                    <div id="admin-content" class="glass rounded-[2rem] overflow-x-auto p-4 border-white/5"></div>
                </div>
                <div class="space-y-6">
                    <div class="glass rounded-[2rem] p-6 border-white/5 text-center">
                        <h3 class="text-lg font-bold text-white uppercase italic mb-4 text-white">Comissões</h3>
                        <div id="comissao-content" class="space-y-2 max-h-[400px] overflow-y-auto pr-2 text-left"></div>
                        <div id="fechamento-final" class="mt-6 border-t border-white/10 pt-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <header class="p-6 flex justify-between items-center">
        <span class="text-2xl font-black italic uppercase text-white">Portal <span class="text-blue-500">do formando</span></span>
        <button onclick="window.acessoAdmin()" class="glass px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase border-white/20 text-white text-white">Login ADM</button>
    </header>

    <main class="container mx-auto p-4 flex-grow flex items-center justify-center">
        <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl text-center border-white/5">
            <h2 class="text-xl font-bold mb-2 uppercase text-blue-400 italic text-white">Guaratinguetá</h2>
            <h3 class="text-xs font-bold text-slate-400 mb-6 uppercase text-white">Dr. Guilherme Eugênio Filippo Fernandes</h3>
            <h2 class="text-3xl font-black mb-10 uppercase italic text-white text-white text-white">Agendar Visita</h2>
            <form id="form-agendamento" class="space-y-6 text-left">
                <div class="grid grid-cols-3 gap-2" id="day-selector">
                    <button type="button" data-date="2026-03-04" onclick="window.selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase">04/03<br>Qua</button>
                    <button type="button" data-date="2026-03-05" onclick="window.selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase">05/03<br>Qui</button>
                    <button type="button" data-date="2026-03-06" onclick="window.selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase">06/03<br>Sex</button>
                    <button type="button" data-date="2026-03-07" onclick="window.selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase">07/03<br>Sab</button>
                    <button type="button" data-date="2026-03-08" onclick="window.selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase bg-blue-900/20 border-blue-500/30 text-blue-400">08/03<br>Dom</button>
                </div>
                <input type="hidden" id="data-selecionada" required>
                <div class="space-y-4">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none">
                    <select id="horario" required class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white outline-none"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço de Visita" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none" rows="2"></textarea>
                </div>
                <button type="submit" class="btn-primary w-full text-white font-black py-5 rounded-2xl shadow-2xl uppercase">Finalizar Agendamento</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const PATH = 'agendamentos', AVULSO = 'avulsos', MEU_WHATSAPP = "5516993291674";

        let chartInstance = null;
        window.formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const paraDataBR = (str) => { if(!str || !str.includes('-')) return "---"; const [y,m,d] = str.split("-"); return `${d}/${m}/${y}`; };

        window.acessoAdmin = () => { if(prompt("Chave ADM:") === "2025") { document.getElementById('admin-modal').style.display = 'block'; window.carregarRelatorio(); } };
        window.fecharAdmin = () => document.getElementById('admin-modal').style.display = 'none';
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };
        
        window.selecionarDia = async (btn) => {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('data-selecionada').value = btn.getAttribute('data-date');
            await window.gerarHorariosDisponiveis(btn.getAttribute('data-date'), document.getElementById('horario'));
        };

        window.gerarHorariosDisponiveis = async (d, el) => {
            const snap = await get(ref(db, `${PATH}/${d}`));
            const raw = snap.val() || {}; const counts = {};
            for(let id in raw){ let hL = id.split('-').slice(0,2).join(':'); counts[hL] = (counts[hL]||0)+1; }
            el.innerHTML = '<option value="">Escolha um Horário</option>';
            let diaSemana = new Date(d + 'T00:00:00').getDay();
            let cur = new Date(`${d}T09:00:00`), lim = (diaSemana === 0 || diaSemana === 6) ? "15:00" : "20:30";
            while(cur <= new Date(`${d}T${lim}:00`)){
                let hF = cur.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                if((counts[hF]||0)<2){ let opt=document.createElement('option'); opt.value=hF; opt.textContent=`${hF} (${2-(counts[hF]||0)} vagas)`; el.appendChild(opt); }
                cur.setMinutes(cur.getMinutes()+30);
            }
        };

        window.carregarRelatorio = async () => {
            const [sAg, sAv] = await Promise.all([get(ref(db, PATH)), get(ref(db, AVULSO))]);
            const ag = sAg.val() || {}, av = sAv.val() || {}; window.dadosCompletos = [];
            for(let d in ag) for(let h in ag[d]) window.dadosCompletos.push({...ag[d][h], id: h, data: d, tipo: 'agenda'});
            for(let id in av) window.dadosCompletos.push({...av[id], id, tipo: 'avulso'});
            window.filtrarLista();
        };

        window.filtrarLista = () => {
            const busca = (document.getElementById('busca-admin')?.value || "").toLowerCase();
            const filtroData = document.getElementById('filtro-data-admin').value;
            let filtrados = window.dadosCompletos.filter(i => ((i.nome_formando || "").toLowerCase().includes(busca)) && (filtroData ? i.data === filtroData : true));
            renderizarLista(filtrados, filtroData);
        };

        function renderizarLista(lista, dataFiltrada) {
            let t = { vendidos:0, totalVendas:0, pix:0, dinheiro:0, debito:0, credito:0, boleto:0, vale:0, nq:0, comissao:0, comissaoDia:0 };
            const hoje = new Date().toLocaleDateString('en-CA'), compData = dataFiltrada || hoje;
            lista.sort((a,b) => (a.data||"").localeCompare(b.data||"") || (a.horario||"").localeCompare(b.horario||""));
            let hT = '<table class="w-full text-left text-[11px]"><thead class="bg-slate-700/50 text-slate-300 uppercase"><tr><th class="p-4 text-white text-white">DATA</th><th class="p-4 text-white text-white">CLIENTE</th><th class="p-4 text-center text-white text-white text-white">STATUS</th><th class="p-4 text-center text-white text-white text-white text-white">AÇÃO</th></tr></thead><tbody class="divide-y divide-slate-700/50">';
            let hC = '';
            lista.forEach(item => {
                let comItem = 0;
                if(item.resultado === "Venda") {
                    t.vendidos++; t.totalVendas += Number(item.valor);
                    if(Array.isArray(item.pagamentos)) {
                        item.pagamentos.forEach(p => {
                            const v = Number(p.valor) || 0;
                            if(p.tipo === "Dinheiro" || p.tipo === "Pix") { t[p.tipo.toLowerCase()] += v; t.vale += v; comItem += v * 0.12; }
                            else if(p.tipo.includes("Cartão")) { t[p.tipo.includes("Débito") ? "debito" : "credito"] += v; comItem += v * 0.12; }
                            else if(p.tipo === "Boleto") {
                                const ent = Number(p.entrada || 0); t.boleto += (v - ent); comItem += (ent * 0.12) + ((v - ent) * 0.08);
                                if(p.forma_entrada === "Dinheiro" || p.forma_entrada === "Pix") { t[p.forma_entrada.toLowerCase()] += ent; t.vale += ent; }
                            }
                        });
                    }
                    t.comissao += comItem; if(item.data === compData) t.comissaoDia += comItem;
                    hC += `<tr><td class="py-2 uppercase font-bold text-slate-300">${item.nome_formando}</td><td class="py-2 text-right text-emerald-400 font-black">${window.formatBRL(comItem)}</td></tr>`;
                } else if(item.resultado === "NQ") t.nq++;
                const wLink = item.telefone ? `https://wa.me/55${item.telefone.replace(/\D/g,'')}` : '#';
                hT += `<tr class="hover:bg-slate-800/40 text-white"><td class="p-4 font-bold text-[10px] text-white text-white">${paraDataBR(item.data)}<br><span class="text-slate-500 font-normal">${item.horario||'DIRETO'}</span></td><td class="p-4"><span class="uppercase font-black text-white text-[10px] text-white text-white text-white">${item.nome_formando}</span><br><span class="text-blue-400 text-[9px] block">${item.endereco||''}</span><a href="${wLink}" target="_blank" class="text-emerald-400 text-[8px] underline italic text-white text-white text-white">WhatsApp: ${item.telefone||''}</a></td><td class="p-4 text-center font-black text-[9px] text-white text-white text-white">${item.resultado||'Pendente'}</td><td class="p-4 text-center"><button onclick="window.gerenciarItem('${item.tipo}','${item.data}','${item.id}')" class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-lg text-[9px] uppercase border border-blue-400/30 text-white text-white text-white">Gerenciar</button></td></tr>`;
            });
            const taxa = lista.length ? ((t.vendidos/lista.length)*100).toFixed(1) : 0;
            const qtdeDias = Object.keys(lista.filter(i=>i.resultado==="Venda").reduce((a,b)=>{a[b.data]=1;return a},{})).length || 1;
            
            document.getElementById('resumo-financeiro').innerHTML = `
                <div class="glass p-2 rounded-xl border-t-2 border-blue-500"><p class="text-[7px] font-bold uppercase text-white">EFICIÊNCIA</p><p class="text-sm font-black text-white">${taxa}%</p></div>
                <div class="glass p-2 rounded-xl border-t-2 border-emerald-500 text-white"><p class="text-[7px] font-bold uppercase text-white">VENDAS DIA</p><p class="text-[9px] font-black text-white text-white text-white text-white">${lista.filter(i=>i.resultado==='Venda'&&i.data===compData).length}</p></div>
                <div class="glass p-2 rounded-xl border-t-2 border-emerald-300 text-white"><p class="text-[7px] font-bold uppercase text-white text-white text-white text-white">VENDAS TOTAL</p><p class="text-[9px] font-black text-white text-white text-white text-white">${t.vendidos}</p></div>
                <div class="glass p-2 rounded-xl border-t-2 border-rose-500 text-white"><p class="text-[7px] font-bold uppercase text-rose-300 text-white text-white text-white text-white text-white text-white">NQ TOTAL</p><p class="text-[9px] font-black text-white text-white text-white text-white text-white text-white">${t.nq}</p></div>
                <div class="glass p-2 rounded-xl border-t-2 border-blue-300 text-white"><p class="text-[7px] font-bold text-blue-300 uppercase text-white text-white text-white text-white text-white text-white text-white">TICKET MÉDIO</p><p class="text-[9px] font-black text-white text-white text-white text-white text-white text-white text-white text-white">${window.formatBRL(t.vendidos?t.totalVendas/t.vendidos:0)}</p></div>
                <div class="glass p-2 rounded-xl border-t-2 border-cyan-500 text-white"><p class="text-[7px] font-bold uppercase text-white text-white text-white text-white text-white text-white text-white text-white text-white">${window.formatBRL(t.pix)}</p></div>
                <div class="glass p-2 rounded-xl border-t-2 border-green-500 text-white"><p class="text-[7px] font-bold uppercase text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white">${window.formatBRL(t.dinheiro)}</p></div>
                <div class="bg-purple-600 p-2 rounded-xl shadow-xl text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white"><p class="text-[7px] font-bold uppercase text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white">COMISSÃO DIA</p><p class="text-[10px] font-black text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white">${window.formatBRL(t.comissaoDia)}</p></div>
                <div class="bg-blue-600 p-2 rounded-xl shadow-xl text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white"><p class="text-[7px] font-bold uppercase text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white">TOTAL VENDIDO</p><p class="text-[10px] font-black text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white">${window.formatBRL(t.totalVendas)}</p></div>
                <div class="glass p-2 rounded-xl border-t-2 border-purple-500 text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white"><p class="text-[7px] font-bold uppercase text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white">PREVISÃO SEMANA</p><p class="text-[10px] font-black text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white">${window.formatBRL((t.comissao/qtdeDias)*7)}</p></div>
                <div class="bg-amber-500 p-2 rounded-xl shadow-xl text-amber-950 text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white"><p class="text-[7px] font-bold uppercase text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white">VALES (D+P)</p><p class="text-[10px] font-black text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white text-white">${window.formatBRL(t.vale)}</p></div>`;
            
            document.getElementById('admin-content').innerHTML = hT + '</tbody></table>';
            document.getElementById('comissao-content').innerHTML = `<table class="w-full"><tbody>${hC}</tbody></table>`;
            const saldo = t.comissao - t.vale;
            document.getElementById('fechamento-final').innerHTML = `<div class="p-4 rounded-2xl border-2 text-right bg-emerald-500/10 border-emerald-500/30 text-white text-white text-white text-white text-white"><p class="text-[8px] font-black uppercase text-slate-400 text-white text-white text-white text-white">Saldo Disponível</p><p class="text-3xl font-black italic text-white text-white text-white text-white text-white text-white">${window.formatBRL(saldo)}</p></div>`;
            window.resumoAtual = t; 
            window.dadosFiltradosNoMomento = lista; // ARMAZENA O FILTRO PARA O RELATÓRIO
            window.dataFiltradaNoMomento = dataFiltrada; // ARMAZENA A DATA
            window.gerarGrafico(window.dadosCompletos);
        }

        window.gerarGrafico = (lista) => {
            const vD = {}; lista.forEach(i => { if(i.resultado === "Venda") vD[i.data] = (vD[i.data] || 0) + 1; });
            const labels = Object.keys(vD).sort();
            const ctx = document.getElementById('graficoVendas'); if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type: 'bar', data: { labels: labels.map(l => paraDataBR(l)), datasets: [{ data: labels.map(d => vD[d]), backgroundColor: '#3b82f6', borderRadius: 6 }] }, options: { responsive: true, plugins: { legend: { display: false } } } });
        };

        // --- FUNÇÃO COPIAR RELATÓRIO (CORRIGIDA PARA O DIA SELECIONADO) ---
        window.copiarRelatorio = async () => {
            if(!window.resumoAtual || !window.dadosFiltradosNoMomento) return;
            
            const listaDia = window.dadosFiltradosNoMomento.filter(i => i.resultado === "Venda");
            const f = window.formatBRL;
            const proj = document.getElementById('projeto-ativo').options[document.getElementById('projeto-ativo').selectedIndex].text;
            const dataRel = window.dataFiltradaNoMomento ? paraDataBR(window.dataFiltradaNoMomento) : new Date().toLocaleDateString('pt-BR');

            // Recalcula totais específicos do filtro para o relatório copiar os valores certos
            let r = { v:0, d:0, p:0, deb:0, cre:0, bol:0, com:0, val:0 };
            listaDia.forEach(item => {
                r.v += Number(item.valor) || 0;
                if(Array.isArray(item.pagamentos)) {
                    item.pagamentos.forEach(pg => {
                        const val = Number(pg.valor) || 0;
                        if(pg.tipo === "Dinheiro") { r.d += val; r.val += val; r.com += val * 0.12; }
                        else if(pg.tipo === "Pix") { r.p += val; r.val += val; r.com += val * 0.12; }
                        else if(pg.tipo === "Cartão Débito") { r.deb += val; r.com += val * 0.12; }
                        else if(pg.tipo === "Cartão Crédito") { r.cre += val; r.com += val * 0.12; }
                        else if(pg.tipo === "Boleto") {
                            const ent = Number(pg.entrada) || 0;
                            r.bol += (val - ent);
                            r.com += (ent * 0.12) + ((val - ent) * 0.08);
                            if(pg.forma_entrada === "Dinheiro") { r.d += ent; r.val += ent; }
                            if(pg.forma_entrada === "Pix") { r.p += ent; r.val += ent; }
                        }
                    });
                }
            });

            const msg = `*RELATÓRIO: ${proj}*\n*Filtro:* ${dataRel}\n\n` +
                        `Vendas no Dia: ${listaDia.length}\n\n` +
                        `Dinheiro: ${f(r.d)}\n` +
                        `Pix: ${f(r.p)}\n` +
                        `Débito: ${f(r.deb)}\n` +
                        `Crédito: ${f(r.cre)}\n` +
                        `Boleto: ${f(r.bol)}\n\n` +
                        `*Comissão do Filtro: ${f(r.com)}*\n` +
                        `Total Vendido: ${f(r.v)}\n` +
                        `Vales (D+P): ${f(r.val)}`;

            await navigator.clipboard.writeText(msg);
            alert("RELATÓRIO DO DIA " + dataRel + " COPIADO!");
        };

        // --- FUNÇÕES DE VENDAS ---
        document.getElementById('form-agendamento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const d = document.getElementById('data-selecionada').value, h = document.getElementById('horario').value;
            const uniqueID = `${h.replace(':','-')}-${Date.now()}`;
            const dados = { data: d, horario: h, nome_formando: document.getElementById('nome').value, telefone: document.getElementById('telefone').value, endereco: document.getElementById('endereco').value, resultado: "Pendente" };
            await set(ref(db, `${PATH}/${d}/${uniqueID}`), dados);
            window.open(`https://wa.me/${MEU_WHATSAPP}?text=${encodeURIComponent("*NOVA VISITA*\n"+dados.nome_formando+"\n"+paraDataBR(d))}`);
            location.reload();
        });

        window.lancarVendaDireta = async () => { const n = prompt("Nome Cliente:"); if(!n) return; await push(ref(db, AVULSO), { nome_formando: n, data: new Date().toLocaleDateString('en-CA'), horario: "08:00", resultado: "Pendente" }); window.carregarRelatorio(); };
        window.gerenciarItem = (tipo, data, id) => { window.itemSendoGerenciado = { tipo, data, id }; const item = window.dadosCompletos.find(i => i.id === id); document.getElementById('gestao-titulo').textContent = item ? item.nome_formando : 'Gerenciar'; document.getElementById('modalGestao').style.display = 'block'; };
        window.fluxoResultado = () => { document.getElementById('gestao-menu').classList.add('hidden'); document.getElementById('gestao-form').classList.remove('hidden'); document.getElementById('gestao-form').innerHTML = `<div class="grid grid-cols-2 gap-2"><button onclick="window.prepararVenda()" class="p-4 bg-emerald-600 rounded-xl font-black uppercase text-[10px] text-white">Venda</button><button onclick="window.salvarStatusRapido('NQ')" class="p-4 bg-rose-600 rounded-xl font-black uppercase text-[10px] text-white text-white">NQ</button><button onclick="window.salvarStatusRapido('Não Atendeu')" class="p-4 bg-amber-600 rounded-xl font-black uppercase text-[10px] text-white text-white text-white">Não Atendeu</button><button onclick="window.salvarStatusRapido('Reagendar')" class="p-4 bg-blue-600 rounded-xl font-black uppercase text-[10px] text-white text-white text-white text-white">Reagendar</button></div>`; };
        window.prepararVenda = () => { window.tempPagamentos = []; document.getElementById('gestao-form').innerHTML = `<input type="number" id="vTotal" placeholder="VALOR TOTAL" class="w-full bg-slate-800 p-4 rounded-xl text-white font-black text-center mb-4 border-white/10"><div class="grid grid-cols-2 gap-2 mb-4"><button onclick="window.addPg('Dinheiro')" class="p-2 bg-slate-700 rounded-lg text-[9px] text-white">+ Dinheiro</button><button onclick="window.addPg('Pix')" class="p-2 bg-slate-700 rounded-lg text-[9px] text-white">+ Pix</button><button onclick="window.addPg('Cartão Débito')" class="p-2 bg-slate-700 rounded-lg text-[9px] text-white">+ Débito</button><button onclick="window.addPg('Cartão Crédito')" class="p-2 bg-slate-700 rounded-lg text-[9px] text-white">+ Crédito</button><button onclick="window.addPg('Boleto')" class="p-2 bg-blue-900 rounded-lg text-[9px] col-span-2 text-white text-white text-white">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-4"></div><button onclick="window.finalizarVendaReal()" class="w-full p-4 bg-emerald-600 rounded-xl font-black uppercase text-xs text-white text-white">Confirmar</button>`; };
        window.addPg = (tipo) => { const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',','.') || 0); if(v <= 0) return; let pg = { tipo, valor: v }; if(tipo === 'Boleto') { const ent = prompt("TEVE ENTRADA?\n1 - Sim\n2 - Não"); if(ent === "1") { pg.entrada = parseFloat(prompt("Valor Entrada:")?.replace(',','.') || 0); const fE = prompt("Forma: 1-Dinheiro 2-Pix 3-Débito"); pg.forma_entrada = fE === "1" ? "Dinheiro" : fE === "2" ? "Pix" : "Cartão Débito"; } } window.tempPagamentos.push(pg); window.renderTemp(); };
        window.renderTemp = () => { document.getElementById('lista-p').innerHTML = window.tempPagamentos.map((p, i) => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px] text-white text-white"><span>${p.tipo}</span><span class="font-black text-emerald-400">${window.formatBRL(p.valor)} <button onclick="window.tempPagamentos.splice(${i},1);window.renderTemp();" class="text-rose-500 ml-2">✕</button></span></div>`).join(''); };
        window.finalizarVendaReal = async () => { const total = parseFloat(document.getElementById('vTotal').value), soma = window.tempPagamentos.reduce((acc, c) => acc + c.valor, 0); if(!total || Math.abs(total - soma) > 0.1) return alert("Total não confere!"); const { tipo, data, id } = window.itemSendoGerenciado; const dbRef = (tipo === 'agenda') ? `${PATH}/${data}/${id}` : `${AVULSO}/${id}`; await update(ref(db, dbRef), { resultado: "Venda", valor: total, pagamentos: window.tempPagamentos }); window.fecharModalGestao(); window.carregarRelatorio(); };
        window.salvarStatusRapido = async (s) => { const { tipo, data, id } = window.itemSendoGerenciado; await update(ref(db, (tipo === 'agenda') ? `${PATH}/${data}/${id}` : `${AVULSO}/${id}`), { resultado: s, valor: 0 }); window.fecharModalGestao(); window.carregarRelatorio(); };
        window.fluxoAlterarData = () => { document.getElementById('gestao-menu').classList.add('hidden'); const form = document.getElementById('gestao-form'); form.classList.remove('hidden'); form.innerHTML = `<input type="date" id="nD" class="w-full bg-slate-800 p-4 rounded-xl text-white mb-4 border-white/10"><button onclick="window.salvarDataNova()" class="w-full p-4 bg-blue-600 font-bold uppercase text-xs text-white text-white">Confirmar</button>`; };
        window.salvarDataNova = async () => { const dn = document.getElementById('nD').value; if(!dn) return; const { tipo, data, id } = window.itemSendoGerenciado; const dbRef = (tipo === 'agenda') ? `${PATH}/${data}/${id}` : `${AVULSO}/${id}`; const snap = await get(ref(db, dbRef)); if(snap.exists()) { let o = snap.val(); o.data = dn; if(tipo === 'agenda') { await remove(ref(db, dbRef)); await set(ref(db, `${PATH}/${dn}/${id}`), o); } else await update(ref(db, dbRef), { data: dn }); window.fecharModalGestao(); window.carregarRelatorio(); } };
        window.confirmarExclusao = async () => { if(confirm("Apagar?")) { const { tipo, data, id } = window.itemSendoGerenciado; await remove(ref(db, (tipo === 'agenda') ? `${PATH}/${data}/${id}` : `${AVULSO}/${id}`)); window.fecharModalGestao(); window.carregarRelatorio(); } };

        // Auto Check de datas expiradas
        const agora = new Date();
        document.querySelectorAll('.day-btn').forEach(btn => {
            const [y, m, d] = btn.getAttribute("data-date").split("-");
            let limH = (d == "08" || d == "07") ? 15 : 20;
            if (agora > new Date(y, m-1, d, limH, 30)) btn.style.display = "none";
        });
    </script>
</body>
</html>
