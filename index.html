<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales PRO - Final de Semana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: center; justify-content: center; padding: 20px; }
        .view-section { display: none; animation: fadeIn 0.4s ease-out; }
        .view-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: none; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .card-stat { background: linear-gradient(145deg, #111827 0%, #030712 100%); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black uppercase text-blue-400">Atualizar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-8 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 hover:text-white transition">Registrar Resultado</button>
                <button onclick="window.confirmarExclusao()" class="bg-rose-600/10 text-rose-500 p-4 rounded-2xl font-bold uppercase text-[10px]">Excluir Agendamento</button>
            </div>
            <div id="gestao-form" class="hidden space-y-4"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active min-h-screen flex flex-col">
        <header class="p-6 flex justify-between items-center">
            <span class="text-xl font-black uppercase italic tracking-tighter text-white">Elite <span class="text-blue-500">Sales</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white">Painel ADM</button>
        </header>
        <main class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl">
                <div class="text-center mb-8">
                    <h2 id="escola-titulo" class="text-2xl font-extrabold uppercase text-blue-400 italic">Carregando...</h2>
                    <h3 id="sub-escola" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Aguarde</h3>
                </div>
                <form id="form-agendamento" class="space-y-4 text-white">
                    <div class="grid grid-cols-2 gap-2 mb-4" id="day-selector">
                        <button type="button" data-date="2026-03-07" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase text-white">Sábado 07/03</button>
                        <button type="button" data-date="2026-03-08" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase text-white">Domingo 08/03</button>
                    </div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500 transition">
                    <input type="tel" id="telefone" required placeholder="WhatsApp (DDD + Número)" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500 transition">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none transition" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-5 rounded-2xl font-black uppercase tracking-tighter shadow-lg shadow-blue-900/40">Finalizar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-operacional" class="view-section min-h-screen p-6">
        <div class="max-w-4xl mx-auto">
            <nav class="flex justify-between items-center mb-10 text-white">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg">Roteiro</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400 hover:text-white transition">Resultados</button>
                </div>
            </nav>
            <div id="lista-visitas" class="space-y-4"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section min-h-screen p-6">
        <div class="max-w-6xl mx-auto">
            <nav class="flex justify-between items-center mb-10 text-white">
                <button onclick="window.switchView('view-operacional')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Voltar</button>
                <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-8 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-emerald-900/20">Copiar Relatório</button>
            </nav>
            
            <div id="resumo-financeiro" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 text-white"></div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 glass rounded-[3rem] p-8 flex flex-col items-center">
                    <h3 class="font-black uppercase text-[10px] mb-6 text-slate-400 tracking-widest text-center">Eficiência</h3>
                    <div class="relative w-full aspect-square max-w-[180px]">
                        <canvas id="chartEficiencia"></canvas>
                        <div id="eficiencia-percent" class="absolute inset-0 flex items-center justify-center flex-col text-white">
                            <span class="text-3xl font-black">0%</span>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2 glass rounded-[3rem] p-8">
                    <h3 class="font-black uppercase text-[10px] mb-6 text-slate-400 tracking-widest">Vendas por Dia</h3>
                    <canvas id="chartEvolucao" style="max-height: 200px;"></canvas>
                </div>
                <div class="lg:col-span-3 glass rounded-[3rem] p-8">
                    <div id="fechamento-final" class="mb-6 text-right text-white"></div>
                    <div id="comissao-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            if(id === 'view-financeiro') window.carregarRelatorio();
        };

        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        // --- REGRAS DE AGENDAMENTO (SÁBADO/DOMINGO ATÉ AS 17H) ---
        window.selecionarDia = async (btn) => {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const dataSel = btn.getAttribute('data-date');
            document.getElementById('data-selecionada').value = dataSel;
            
            const elH = document.getElementById('horario');
            elH.innerHTML = '<option>Buscando horários...</option>';

            const sP = await get(ref(db, "config/projeto_ativo"));
            const p = sP.val() || "guaratingueta-guilherme";
            const snap = await get(ref(db, `dados/${p}/agendamentos/${dataSel}`));
            const counts = {};
            const ag = snap.val() || {};
            Object.keys(ag).forEach(id => { let hL = id.split('-').slice(0,2).join(':'); counts[hL] = (counts[hL]||0)+1; });

            elH.innerHTML = '<option value="">Selecione o Horário</option>';
            let agora = new Date();
            let dataHojeStr = agora.toLocaleDateString('en-CA');
            
            let cur = new Date(`${dataSel}T09:00:00`);
            // Limite extendido para 17:00h no final de semana
            let limite = new Date(`${dataSel}T17:00:00`);

            let encontrouHorario = false;
            while(cur <= limite){
                let hF = cur.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                let permitir = true;
                if(dataSel === dataHojeStr) {
                    let diffH = (cur - agora) / (1000 * 60 * 60);
                    if(diffH < 3) permitir = false;
                }
                if(permitir && (2 - (counts[hF]||0)) > 0){
                    let opt = document.createElement('option');
                    opt.value = hF;
                    opt.textContent = `${hF} (${2 - (counts[hF]||0)} vagas)`;
                    elH.appendChild(opt);
                    encontrouHorario = true;
                }
                cur.setMinutes(cur.getMinutes()+30);
            }
            if(!encontrouHorario) elH.innerHTML = '<option value="">Sem vagas para hoje</option>';
        };

        (async () => {
            const agora = new Date();
            const dataHojeStr = agora.toLocaleDateString('en-CA');
            document.querySelectorAll('.day-btn').forEach(btn => {
                const dataBtn = btn.getAttribute("data-date");
                if (dataBtn >= dataHojeStr && dataBtn <= "2026-03-08") {
                    btn.style.display = "block";
                }
            });
            try {
                const sAt = await get(ref(db, "config/projeto_ativo"));
                const sl = sAt.val() || "guaratingueta-guilherme";
                const sIn = await get(ref(db, `config/projetos/${sl}`));
                if(sIn.exists()){
                    document.getElementById('escola-titulo').innerText = sIn.val().cidade;
                    document.getElementById('sub-escola').innerText = sIn.val().escola;
                }
            } catch(e) {}
        })();

        // --- DASHBOARD E OPERACIONAL ---
        window.acessoAdmin = async () => { if(prompt("Senha:") === "2025") { window.switchView('view-operacional'); await window.carregarRelatorio(); } };

        window.carregarRelatorio = async () => {
            const snapP = await get(ref(db,"config/projeto_ativo"));
            const p = snapP.val() || "guaratingueta-guilherme";
            const sA = await get(ref(db, `dados/${p}/agendamentos`));
            window.dadosCompletos = [];
            const ags = sA.val() || {};
            Object.keys(ags).forEach(d => Object.keys(ags[d]).forEach(id => window.dadosCompletos.push({...ags[d][id], id, data: d, path: `dados/${p}/agendamentos/${d}/${id}`})));
            window.filtrarLista();
        };

        window.filtrarLista = () => {
            let lista = window.dadosCompletos;
            lista.sort((a,b) => new Date(`${a.data}T${a.horario}`) - new Date(`${b.data}T${b.horario}`));
            renderizarOperacional(lista);
            renderizarFinanceiro(lista);
        };

        function renderizarOperacional(lista) {
            const container = document.getElementById('lista-visitas');
            container.innerHTML = '';
            lista.forEach(item => {
                const cor = item.resultado === "Venda" ? "border-emerald-500/40 bg-emerald-500/5" : (item.resultado === "NQ" ? "border-rose-500/40 bg-rose-500/5" : "border-white/10");
                container.innerHTML += `
                    <div class="glass ${cor} p-6 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-6 text-white">
                        <div class="flex-grow text-center md:text-left">
                            <div class="flex items-center gap-3 justify-center md:justify-start mb-3">
                                <span class="bg-blue-600 px-4 py-1.5 rounded-xl font-black text-[10px]">${item.horario}</span>
                                <span class="text-slate-500 font-bold text-[10px] uppercase">${pDT(item.data)}</span>
                            </div>
                            <h3 class="text-2xl font-black uppercase mb-1">${item.nome_formando}</h3>
                            <p class="text-slate-400 text-sm leading-relaxed">📍 ${item.endereco}</p>
                        </div>
                        <button onclick="window.gerenciarItem('${item.path}')" class="btn-primary px-12 py-6 rounded-3xl font-black uppercase text-xs">Gerenciar</button>
                    </div>
                `;
            });
        }

        let chartEfi = null, chartEvu = null;
        function renderizarFinanceiro(lista) {
            let t = { v:0, nq:0, totV:0, com:0 };
            let evolucao = { "2026-03-07":0, "2026-03-08":0 };
            let hC = '';
            lista.forEach(item => {
                if(item.resultado === "Venda") {
                    t.v++; const vV = Number(item.valor) || 0; t.totV += vV;
                    if(evolucao.hasOwnProperty(item.data)) evolucao[item.data]++;
                    let comI = vV * 0.12; t.com += comI;
                    hC += `<div class="bg-white/5 border border-white/5 p-4 rounded-2xl flex justify-between items-center text-white"><span class="text-[10px] font-black uppercase text-slate-400">${item.nome_formando}</span><span class="text-emerald-400 font-black">${fBR(comI)}</span></div>`;
                } else if(item.resultado === "NQ") t.nq++;
            });

            const percent = (t.v + t.nq) > 0 ? ((t.v / (t.v + t.nq)) * 100).toFixed(0) : 0;
            document.getElementById('eficiencia-percent').children[0].innerText = percent + "%";
            document.getElementById('resumo-financeiro').innerHTML = `
                <div class="card-stat p-6 rounded-[2rem]"><p class="text-[9px] font-black text-slate-500 uppercase">Vendas</p><p class="text-4xl font-black">${t.v}</p></div>
                <div class="card-stat p-6 rounded-[2rem]"><p class="text-[9px] font-black text-slate-500 uppercase">Faturamento</p><p class="text-4xl font-black text-emerald-400">${fBR(t.totV)}</p></div>
                <div class="card-stat p-6 rounded-[2rem]"><p class="text-[9px] font-black text-slate-500 uppercase">Não Qualificado</p><p class="text-4xl font-black text-rose-500">${t.nq}</p></div>
                <div class="card-stat p-6 rounded-[2rem]"><p class="text-[9px] font-black text-slate-500 uppercase">Ticket Médio</p><p class="text-4xl font-black">${fBR(t.v ? t.totV/t.v : 0)}</p></div>
            `;
            document.getElementById('comissao-content').innerHTML = hC || '<p class="col-span-3 text-center text-slate-600 font-bold text-[10px]">SEM VENDAS</p>';
            document.getElementById('fechamento-final').innerHTML = `<p class="text-[10px] font-bold text-slate-500 uppercase">Comissão Estimada</p><p class="text-3xl font-black text-emerald-400 italic">${fBR(t.com)}</p>`;

            if(chartEfi) chartEfi.destroy();
            chartEfi = new Chart(document.getElementById('chartEficiencia'), { type: 'doughnut', data: { datasets: [{ data: [t.v, t.nq || 0.1], backgroundColor: ['#3b82f6', '#1e293b'], borderWidth: 0 }] }, options: { cutout: '85%', plugins: { legend: { display: false } } } });
            if(chartEvu) chartEvu.destroy();
            chartEvu = new Chart(document.getElementById('chartEvolucao'), { type: 'bar', data: { labels: ['Sábado', 'Domingo'], datasets: [{ label: 'Vendas', data: Object.values(evolucao), backgroundColor: '#3b82f6', borderRadius: 8 }] }, options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false }, ticks: { color: '#475569' } }, x: { grid: { display: false }, ticks: { color: '#475569' } } } } });
        }

        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; };
        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display = 'flex'; };

        document.getElementById("form-agendamento").addEventListener("submit", async function(e){
            e.preventDefault();
            const n = document.getElementById("nome").value, t = document.getElementById("telefone").value, en = document.getElementById("endereco").value, h = document.getElementById("horario").value, d = document.getElementById("data-selecionada").value;
            if(!d || !h) return alert("Selecione data e horário!");
            const snapP = await get(ref(db, "config/projeto_ativo"));
            const p = snapP.val() || "guaratingueta-guilherme";
            await set(ref(db, `dados/${p}/agendamentos/${d}/${h.replace(":","-")}-${Date.now()}`), { nome_formando: n, telefone: t, endereco: en, horario: h, data: d, resultado: "Pendente", criado_em: new Date().toISOString() });
            window.open(`https://wa.me/5516993291674?text=${encodeURIComponent("*NOVO AGENDAMENTO*\n👤: "+n+"\n📅: "+pDT(d)+"\n⏰: "+h+"\n📍: "+en)}`, "_blank");
            location.reload();
        });
    </script>
</body>
</html>
