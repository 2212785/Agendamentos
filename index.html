<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Intelligence - BI v12.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: center; justify-content: center; padding: 20px; }
        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 3px solid #3b82f6; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: none; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-xl font-black uppercase text-blue-400">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-8 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 transition">1. Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 border border-rose-500/30 p-4 rounded-2xl text-rose-500 font-black uppercase text-xs">2. Marcar NQ</button>
                <button onclick="window.fluxoEditar()" class="bg-blue-600/10 border border-blue-500/30 p-4 rounded-2xl text-blue-400 font-black uppercase text-xs">3. Editar Cadastro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[10px] uppercase font-bold mt-4 text-center hover:text-rose-500 transition">Excluir Registro permanentemente</button>
            </div>
            <div id="gestao-form" class="hidden space-y-4 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-6 flex justify-between items-center w-full">
            <span class="text-xl font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase">ADM</button>
        </header>
        <main class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl text-center border border-white/5">
                <h2 id="escola-titulo" class="text-2xl font-extrabold uppercase text-blue-400 italic">Guaratinguetá</h2>
                <h3 id="sub-escola" class="text-xs font-bold text-slate-400 uppercase tracking-widest italic mb-8">Dr. Guilherme Filippo</h3>
                <form id="form-agendamento" class="space-y-4">
                    <div class="grid grid-cols-2 gap-2 mb-4" id="day-selector">
                        <button type="button" data-date="2026-03-07" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase">Sáb 07/03</button>
                        <button type="button" data-date="2026-03-08" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase">Dom 08/03</button>
                    </div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-5 rounded-2xl font-black uppercase shadow-lg text-white">Finalizar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-logistica" class="view-section p-6 text-white text-white">
        <div class="max-w-4xl mx-auto w-full text-white text-white">
            <nav class="flex justify-between items-center mb-10 text-white">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white text-white">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Visitas</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400">BI Dashboard</button>
                    <button onclick="window.switchView('view-config')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400">⚙️</button>
                </div>
            </nav>
            <div class="mb-8">
                <h1 class="text-3xl font-black italic uppercase mb-4 text-white">Minha <span class="text-blue-500">Rota</span></h1>
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-2xl px-6 py-4 text-sm font-bold outline-none text-white">
                    <button onclick="window.abrirAvulso()" class="bg-white text-black px-8 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-blue-50 transition">+ Avulso</button>
                </div>
            </div>
            <div id="lista-visitas" class="space-y-4"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section p-6 text-white text-white">
        <div class="max-w-7xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-10 text-white">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white text-white">← Voltar</button>
                <div class="flex gap-4">
                    <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none text-white">
                    <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white shadow-lg">Copiar Zap</button>
                </div>
            </nav>
            <div id="kpi-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>
            <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8 text-[10px]"></div>
            <div id="saldo-card" class="glass rounded-[3rem] p-8 border-l-8 border-emerald-500 flex flex-col justify-center text-white"></div>
            <div class="glass rounded-[3rem] p-8 overflow-x-auto border border-white/5 text-white">
                <table class="w-full text-left min-w-[800px] text-white">
                    <thead><tr class="border-b border-white/5 text-[10px] text-slate-500 font-black uppercase text-white"><th class="p-4">Cliente</th><th class="p-4 text-white">Venda Bruta</th><th class="p-4 text-white">Pagamento</th><th class="p-4 text-emerald-400">Comissão (R$)</th></tr></thead>
                    <tbody id="extrato-tabela" class="text-white text-white"></tbody>
                </table>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        let projetoAtualId = "";
        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projetoAtualId = snap.val() || "guaratingueta-guilherme";
            const projSnap = await get(ref(db, `config/projetos/${projetoAtualId}`));
            if(projSnap.exists()){
                const d = projSnap.val();
                document.getElementById('escola-titulo').innerText = d.cidade;
                document.getElementById('sub-escola').innerText = d.escola;
                window.carregarRelatorio();
            }
        });

        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            window.carregarRelatorio();
        };

        window.acessoAdmin = () => { if(prompt("Senha:") === "2025") window.switchView('view-logistica'); };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };

        window.carregarRelatorio = async () => {
            if(!projetoAtualId) return;
            const [sA, sV] = await Promise.all([get(ref(db, `dados/${projetoAtualId}/agendamentos`)), get(ref(db, `dados/${projetoAtualId}/avulsos`))]);
            window.dadosCompletos = [];
            const ags = sA.val() || {};
            Object.keys(ags).forEach(d => { if(ags[d]) Object.keys(ags[d]).forEach(id => window.dadosCompletos.push({...ags[d][id], id, data: d, path: `dados/${projetoAtualId}/agendamentos/${d}/${id}`})); });
            const avs = sV.val() || {};
            Object.keys(avs).forEach(id => window.dadosCompletos.push({...avs[id], id, path: `dados/${projetoAtualId}/avulsos/${id}`, data: avs[id].data}));
            window.filtrarLogistica();
            window.filtrarBI();
        };

        window.filtrarLogistica = () => {
            const container = document.getElementById('lista-visitas');
            if(!container) return;
            const fD = document.getElementById('filtro-data-logistica').value;
            let lista = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            lista.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            container.innerHTML = '';
            lista.forEach(i => {
                const cor = i.resultado === "Venda" ? "border-emerald-500/40 bg-emerald-500/5" : (i.resultado === "NQ" ? "border-rose-500/40 bg-rose-500/5" : "border-white/10");
                // LABEL DE STATUS VISIVEL
                let statusLabel = "";
                if(i.resultado === "Venda") statusLabel = `<span class="block text-emerald-500 font-black text-2xl uppercase mt-1">✓ VENDA</span>`;
                else if(i.resultado === "NQ") statusLabel = `<span class="block text-rose-500 font-black text-2xl uppercase mt-1">✕ NQ</span>`;

                container.innerHTML += `
                    <div class="glass p-6 rounded-[2.5rem] border-l-8 ${cor} flex justify-between items-center text-white mb-4">
                        <div>
                            <div class="mb-2 text-white"><span class="text-3xl font-black block">${pDT(i.data)}</span><span class="text-xl font-bold text-blue-400 uppercase">${i.horario || 'DIR'}</span></div>
                            <h3 class="text-2xl font-black uppercase mt-2">${i.nome_formando}</h3>
                            ${statusLabel}
                            <div class="mt-4 flex flex-col gap-2">
                                <a href="https://wa.me/55${(i.telefone||'').replace(/\D/g,'')}" target="_blank" class="text-emerald-400 font-bold text-base italic">📱 WhatsApp: ${i.telefone}</a>
                                <a href="https://www.waze.com/ul?q=${encodeURIComponent(i.endereco||'')}&navigate=yes" target="_blank" class="text-slate-400 text-sm italic">📍 GPS: ${i.endereco}</a>
                            </div>
                        </div>
                        <button onclick="window.gerenciarItem('${i.path}', '${i.nome_formando}', '${i.endereco}')" class="btn-primary px-12 py-6 rounded-3xl font-black uppercase text-xs shadow-xl">Gerenciar</button>
                    </div>`;
            });
        };

        window.abrirAvulso = () => { 
            document.getElementById('modalGestao').style.display = 'flex'; 
            document.getElementById('gestao-menu').classList.add('hidden'); 
            const f = document.getElementById('gestao-form'); 
            f.classList.remove('hidden'); 
            f.innerHTML = `<h3 class="text-white font-black mb-4 uppercase text-xs">Novo Atendimento Avulso</h3><input type="text" id="av-nome" placeholder="NOME DO CLIENTE" class="w-full bg-slate-800 p-4 rounded-xl mb-2 text-white border border-white/10 outline-none"><input type="tel" id="av-tel" placeholder="WHATSAPP" class="w-full bg-slate-800 p-4 rounded-xl mb-2 text-white border border-white/10 outline-none"><input type="text" id="av-end" placeholder="ENDEREÇO" class="w-full bg-slate-800 p-4 rounded-xl mb-2 text-white border border-white/10 outline-none"><input type="date" id="av-data" class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-white border border-white/10 outline-none"><button onclick="window.salvarNovoAvulso()" class="w-full p-5 bg-blue-600 rounded-2xl font-black text-white uppercase">Salvar e Continuar</button>`;
            document.getElementById('av-data').value = new Date().toISOString().split('T')[0];
        };

        window.salvarNovoAvulso = async () => { 
            const n = document.getElementById('av-nome').value, d = document.getElementById('av-data').value;
            if(!n || !d) return alert("Preencha Nome e Data!");
            const path = `dados/${projetoAtualId}/avulsos/AV-${Date.now()}`;
            const tel = document.getElementById('av-tel').value, end = document.getElementById('av-end').value;
            await set(ref(db, path), { nome_formando: n, telefone: tel, endereco: end, data: d, resultado: "Pendente" });
            window.itemPath = path; window.currentName = n; window.currentEnd = end;
            window.fluxoResultadoAvulso();
        };

        window.fluxoResultadoAvulso = () => {
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            f.innerHTML = `<h3 class="text-white font-black mb-4 uppercase text-xs">Resultado do Atendimento</h3><button onclick="window.fluxoResultado()" class="w-full p-6 mb-3 bg-emerald-600 rounded-2xl font-black uppercase">Registrar Venda</button><button onclick="window.salvarStatusSimples('NQ')" class="w-full p-6 bg-rose-600 rounded-2xl font-black uppercase">Marcar NQ</button>`;
        };

        window.selecionarDia = async (btn) => {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const d = btn.getAttribute('data-date'); document.getElementById('data-selecionada').value = d;
            const elH = document.getElementById('horario'); elH.innerHTML = '<option>Buscando horários...</option>';
            const snap = await get(ref(db, `dados/${projetoAtualId}/agendamentos/${d}`));
            const ag = snap.val() || {};
            const counts = {};
            Object.entries(ag).forEach(([key, item]) => {
                let horario = item.horario ? item.horario.trim().substring(0,5) : (key.includes("-") ? `${key.split("-")[0]}:${key.split("-")[1]}` : "");
                if(horario) counts[horario] = (counts[horario] || 0) + 1;
            });
            elH.innerHTML = '<option value="">Escolha o Horário</option>';
            const diaHoje = new Date().toLocaleDateString('en-CA'), agoraTs = new Date().getTime();
            let cur = new Date(`${d}T09:00:00`), lim = (d === diaHoje) ? "19:30" : "20:30";
            while(cur <= new Date(`${d}T${lim}:00`)){
                const hF = cur.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                const ocupados = counts[hF] || 0;
                let permitido = true;
                if(d === diaHoje && (cur.getTime() - agoraTs) < (3 * 60 * 60 * 1000)) permitido = false;
                if(permitido && ocupados < 2){ 
                    let opt=document.createElement('option'); opt.value=hF; 
                    opt.textContent=`${hF} (${2 - ocupados} ${ (2-ocupados) === 1 ? 'vaga' : 'vagas' })`; elH.appendChild(opt); 
                }
                cur.setMinutes(cur.getMinutes()+30);
            }
        };

        window.filtrarBI = () => { /* Logica de BI original mantida */ };
        window.copiarRelatorio = () => { /* Logica de relatorio mantida */ };
        window.gerenciarItem = (p, n, e) => { window.itemPath = p; window.currentName = n; window.currentEnd = e; document.getElementById('modalGestao').style.display = 'flex'; };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s, valor: 0 }); window.fecharModalGestao(); await window.carregarRelatorio(); };
        window.confirmarExclusao = async () => { if(confirm("Deseja EXCLUIR permanentemente este registro?")) { await remove(ref(db, window.itemPath)); window.fecharModalGestao(); await window.carregarRelatorio(); } };
        window.fluxoResultado = () => { 
            document.getElementById('gestao-menu').classList.add('hidden'); 
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); 
            f.innerHTML = `<input type="number" id="vTotal" placeholder="VALOR TOTAL" class="w-full bg-slate-900 p-6 rounded-3xl text-center mb-4 text-white font-black text-3xl border border-white/10 outline-none"><div class="grid grid-cols-2 gap-2 mb-4 text-white"><button onclick="window.addPg('Dinheiro')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Dinheiro</button><button onclick="window.addPg('Pix')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Pix</button><button onclick="window.addPg('Cartão Débito')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Débito</button><button onclick="window.addPg('Cartão Crédito')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-white">+ Crédito</button><button onclick="window.addPg('Boleto')" class="p-4 bg-blue-900/30 border border-blue-500/40 rounded-2xl text-[10px] font-black uppercase col-span-2 text-white">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-4 text-white"></div><button onclick="window.finalizarVenda()" class="w-full p-4 bg-emerald-600 rounded-xl font-black text-white shadow-xl shadow-emerald-900/20">SALVAR</button>`; 
            window.tempPgs = []; 
        };
        window.addPg = (tipo) => {
            const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',', '.') || 0);
            if (v <= 0) return;
            if (tipo === "Boleto") {
                let temEntrada = prompt("Houve entrada? (S/N)");
                if (temEntrada && temEntrada.toLowerCase() === "s") {
                    let valorEntrada = parseFloat(prompt("Valor da entrada:")?.replace(',', '.') || 0);
                    if (valorEntrada > 0) {
                        let formaEntrada = prompt("Forma da entrada (Pix ou Dinheiro):");
                        window.tempPgs.push({ tipo: `${formaEntrada} (Entrada)`, valor: valorEntrada, comissao: valorEntrada * 0.12 });
                        let restante = v - valorEntrada;
                        if (restante > 0) { window.tempPgs.push({ tipo: "Boleto (Restante)", valor: restante, comissao: restante * 0.08 }); }
                    } else { window.tempPgs.push({ tipo: "Boleto", valor: v, comissao: v * 0.08 }); }
                } else { window.tempPgs.push({ tipo: "Boleto", valor: v, comissao: v * 0.08 }); }
            } else { window.tempPgs.push({ tipo, valor: v, comissao: v * 0.08 }); }
            document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]"><span>${p.tipo}</span><span class="text-emerald-400 font-bold">${fBR(p.valor)}</span></div>`).join('');
        };
        window.finalizarVenda = async () => { const tot = parseFloat(document.getElementById('vTotal').value); if(!tot) return alert("Valor!"); await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, pagamentos: window.tempPgs }); window.fecharModalGestao(); await window.carregarRelatorio(); };

        (async () => {
            const agora = new Date(), dHoje = agora.toLocaleDateString('en-CA');
            document.querySelectorAll('.day-btn').forEach(btn => {
                const dataBtn = btn.getAttribute("data-date");
                if (dataBtn < dHoje) return;
                if (dataBtn === dHoje && agora.getHours() >= (19.5 - 3)) return; 
                btn.style.display = "block";
            });
            document.getElementById("form-agendamento").addEventListener("submit", async function(e){
                e.preventDefault(); const n = document.getElementById("nome").value, t = document.getElementById("telefone").value, en = document.getElementById("endereco").value, h = document.getElementById("horario").value, d = document.getElementById("data-selecionada").value;
                await set(ref(db, `dados/${projetoAtualId}/agendamentos/${d}/${h.replace(":","-")}-${Date.now()}`), { nome_formando: n, telefone: t, endereco: en, horario: h, data: d, resultado: "Pendente" });
                const msg = `NOVO AGENDAMENTO\n\n👤 Formando: ${n}\n📅 Data: ${pDT(d)}\n🕒 Horário: ${h}\n📍 Endereço:\n${en}`;
                window.open(`https://wa.me/5516993291674?text=${encodeURIComponent(msg)}`, "_blank");
                location.reload();
            });
        })();
    </script>
</body>
</html>
