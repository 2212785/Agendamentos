<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Intelligence - BI v13.10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: center; justify-content: center; padding: 20px; }
        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 3px solid #3b82f6; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-xl font-black uppercase text-blue-400">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-8 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 transition">1. Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 border border-rose-500/30 p-4 rounded-2xl text-rose-500 font-black uppercase text-xs">2. Marcar NQ</button>
                <button onclick="window.fluxoEditar()" class="bg-blue-600/10 border border-blue-500/30 p-4 rounded-2xl text-blue-400 font-black uppercase text-xs">3. Editar Cadastro / Data</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[10px] uppercase font-bold mt-4 text-center hover:text-rose-500 transition">Excluir Registro permanentemente</button>
            </div>
            <div id="gestao-form" class="hidden space-y-4 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-6 flex justify-between items-center w-full">
            <span class="text-xl font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase">ADM</button>
        </header>
        <main class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl text-center border border-white/5">
                <h2 id="escola-titulo" class="text-2xl font-extrabold uppercase text-blue-400 italic">CARREGANDO...</h2>
                <h3 id="sub-escola" class="text-xs font-bold text-slate-400 uppercase tracking-widest italic mb-8">BUSCANDO PROJETO</h3>
                <form id="form-agendamento" class="space-y-4">
                    <div class="grid grid-cols-2 gap-2 mb-4" id="day-selector"></div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-5 rounded-2xl font-black uppercase shadow-lg text-white">Finalizar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-logistica" class="view-section p-6 text-white">
        <div class="max-w-4xl mx-auto w-full text-white">
            <nav class="flex justify-between items-center mb-6">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white text-white">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Visitas</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400 text-white">BI Dashboard</button>
                </div>
            </nav>
            <div id="lista-visitas" class="space-y-3"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section p-6 text-white">
        <div class="max-w-7xl mx-auto w-full text-white">
            <nav class="flex justify-between items-center mb-10 text-white">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white">← Voltar</button>
                <div class="flex gap-4">
                    <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none text-white">
                    <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Copiar Zap</button>
                </div>
            </nav>
            <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8 text-white"></div>
            <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8 text-[10px] text-white"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10 text-white">
                <div class="lg:col-span-2 glass rounded-[3rem] p-8 border border-white/5 text-white"><canvas id="chartWeekly" style="max-height: 250px;"></canvas></div>
                <div id="saldo-card" class="glass rounded-[3rem] p-8 border-l-8 border-emerald-500 flex flex-col justify-center space-y-4 text-white text-white text-white"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 text-white">
                <div class="glass rounded-[3rem] p-8 overflow-x-auto border border-white/5 text-white text-white"><h4 class="text-emerald-400 font-black uppercase text-xs mb-4 italic text-white text-white">Vendas</h4><table class="w-full text-left min-w-[400px] text-white text-white text-white"><tbody id="extrato-tabela" class="text-xs"></tbody></table></div>
                <div class="glass rounded-[3rem] p-8 overflow-x-auto border border-white/5 text-white text-white"><h4 class="text-rose-500 font-black uppercase text-xs mb-4 italic text-white text-white text-white">NQs</h4><table class="w-full text-left min-w-[400px] text-white text-white text-white text-white"><tbody id="nq-tabela" class="text-[10px]"></tbody></table></div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        let projetoAtualId = ""; window.labelsAtivas = { cidade: "...", escola: "..." };
        let configProjetoAtual = {}; let custosOperacao = {}; window.dadosCompletos = []; window.valesAvulsos = []; window.dadosAtuaisRelatorio = {};

        // --- TITULOS REATIVOS ---
        window.atualizarTitulosDOM = () => {
            const h2 = document.getElementById('escola-titulo');
            const h3 = document.getElementById('sub-escola');
            if(!h2 || !h3) return;
            h2.innerText = window.labelsAtivas.cidade;
            h3.innerText = window.labelsAtivas.escola;
        };

        // --- CONEXÃO INTELIGENTE (RECUPERA VENDAS E NOMES) ---
        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projetoAtualId = snap.val() || "guaratingueta-guilherme";
            
            // Tenta ler de TODOS os locais possíveis para garantir que nada some
            const [pGaveta, pAntigo, pRaiz, custoGaveta] = await Promise.all([
                get(ref(db, `projetos/${projetoAtualId}`)),
                get(ref(db, `config/projetos/${projetoAtualId}`)),
                get(ref(db, projetoAtualId)),
                get(ref(db, `custos/${projetoAtualId}`))
            ]);
            
            let dEncontrados = pGaveta.exists() ? pGaveta.val() : (pAntigo.exists() ? pAntigo.val() : (pRaiz.exists() ? pRaiz.val() : {}));
            configProjetoAtual = dEncontrados;
            custosOperacao = custoGaveta.exists() ? custoGaveta.val() : dEncontrados;

            window.labelsAtivas = { 
                cidade: configProjetoAtual.cidade || "Guaratinguetá", 
                escola: configProjetoAtual.escola || configProjetoAtual.school || "Dr. Guilherme Filippo" 
            };
            
            window.atualizarTitulosDOM();
            if(configProjetoAtual.data_inicio) window.gerarBotoesDatas(configProjetoAtual.data_inicio, configProjetoAtual.data_fim);
            window.carregarRelatorio();
        });

        // --- RECUPERAÇÃO HÍBRIDA DE VENDAS (dados/ vs vendas/) ---
        window.carregarRelatorio = async () => {
            if(!projetoAtualId) return;
            const id = projetoAtualId;
            
            // Busca nas DUAS pastas para garantir que as vendas apareçam
            const [sA_antigo, sV_antigo, sVale, sA_novo, sV_novo] = await Promise.all([
                get(ref(db, `dados/${id}/agendamentos`)),
                get(ref(db, `dados/${id}/avulsos`)),
                get(ref(db, `dados/${id}/vales`)),
                get(ref(db, `vendas/${id}/agendamentos`)),
                get(ref(db, `vendas/${id}/avulsos`))
            ]);

            window.dadosCompletos = [];
            // Processa dados da pasta antiga
            const agsA = sA_antigo.val() || {}; 
            Object.keys(agsA).forEach(d => { if(agsA[d]) Object.keys(agsA[d]).forEach(k => window.dadosCompletos.push({...agsA[d][k], id:k, data:d, path: `dados/${id}/agendamentos/${d}/${k}`})); });
            const avsA = sV_antigo.val() || {}; 
            Object.keys(avsA).forEach(k => window.dadosCompletos.push({...avsA[k], id:k, data:avsA[k].data, path: `dados/${id}/avulsos/${k}`}));
            
            // Processa dados da pasta nova (se existirem)
            const agsN = sA_novo.val() || {}; 
            Object.keys(agsN).forEach(d => { if(agsN[d]) Object.keys(agsN[d]).forEach(k => window.dadosCompletos.push({...agsN[d][k], id:k, data:d, path: `vendas/${id}/agendamentos/${d}/${k}`})); });
            const avsN = sV_novo.val() || {}; 
            Object.keys(avsN).forEach(k => window.dadosCompletos.push({...avsN[k], id:k, data:avsN[k].data, path: `vendas/${id}/avulsos/${k}`}));

            window.valesAvulsos = []; const vales = sVale.val() || {}; Object.keys(vales).forEach(id => window.valesAvulsos.push(vales[id]));
            window.filtrarLogistica(); window.filtrarBI();
        };

        // --- FILTRAGEM BI (MANTIDO v12.73) ---
        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let lista = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, vales:0, com:0 };
            let valeE = (projetoAtualId === "guaratingueta-guilherme") ? 1950.0 : 0;
            let valeW = (projetoAtualId === "guaratingueta-guilherme") ? 2755.0 : 0;
            let rowsVenda = '';
            
            lista.forEach(i => {
                if(i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor)||0;
                    let comEsa = 0;
                    (i.pagamentos || []).forEach(p => {
                        const vP = Number(p.valor) || 0; const t = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        if((t.includes("pix") || t.includes("dinheiro") || t.includes("entrada")) && !t.includes("debito")) {
                            m.vales += vP; if(i.vendedor === "Evanio") valeE += vP; else if(i.vendedor === "Willian") valeW += vP;
                        }
                        if(t.includes("pix")) m.pix += vP; else if(t.includes("dinheiro")) m.din += vP; else if(t.includes("debito")) m.deb += vP; else if(t.includes("credito")) m.cre += vP; else if(t.includes("boleto")) m.bol += vP;
                        comEsa += (t.includes("entrada")) ? vP * 0.12 : vP * 0.08;
                    });
                    m.com += comEsa;
                    rowsVenda += `<tr class="border-b border-white/5 text-white"><td>${i.nome_formando}</td><td>${fBR(i.valor)}</td><td class="text-emerald-400 font-bold">${fBR(comEsa)}</td></tr>`;
                } else if(i.resultado === "NQ") m.nq++;
            });
            window.valesAvulsos.forEach(v => { m.vales += v.valor; if(v.vendedor === "Evanio") valeE += v.valor; else valeW += v.valor; });
            const c = custosOperacao; const nP = parseInt(c.operacao_pessoas) || 1;
            const totalR = ((parseFloat(c.hosp_valor)||0)*nP*(parseInt(c.hosp_qtd)||0)) + ((parseFloat(c.alim_valor)||0)*nP*(parseInt(c.alim_qtd)||0)) + ((parseFloat(c.km_total)||0)*(0.70)*nP) + ((parseFloat(c.pedagio_total)||0)*nP);
            const cM = m.com / 2; const rM = totalR / 2;
            document.getElementById('saldo-card').innerHTML = `<div class="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-1 text-white"><p class="text-[10px] font-black text-emerald-400 mb-1">EVANIO</p><div class="flex justify-between text-[10px] text-slate-400"><span>Comis/Reem.</span><span>${fBR(cM)} / ${fBR(rM)}</span></div><div class="flex justify-between text-[10px] text-rose-400"><span>Vales</span><span>- ${fBR(valeE)}</span></div><div class="flex justify-between font-black border-t border-white/10 pt-1 text-white"><span>A RECEBER</span><span>${fBR(cM+rM-valeE)}</span></div></div><div class="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-1 mt-4 text-white"><p class="text-[10px] font-black text-cyan-400 mb-1">WILLIAN</p><div class="flex justify-between text-[10px] text-slate-400"><span>Comis/Reem.</span><span>${fBR(cM)} / ${fBR(rM)}</span></div><div class="flex justify-between text-[10px] text-rose-400"><span>Vales</span><span>- ${fBR(valeW)}</span></div><div class="flex justify-between font-black border-t border-white/10 pt-1 text-white"><span>A RECEBER</span><span>${fBR(cM+rM-valeW)}</span></div></div>`;
            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-4 rounded-3xl"><p class="text-[8px] uppercase">Vendido</p><p class="text-xl font-black">${fBR(m.tot)}</p></div><div class="card-bi p-4 rounded-3xl"><p class="text-[8px] uppercase">Vendas/NQ</p><p class="text-xl font-black">${m.v}/${m.nq}</p></div>`;
            document.getElementById('extrato-tabela').innerHTML = rowsVenda || '<tr><td colspan="3" class="p-10 text-center">Sem vendas</td></tr>';
        };

        // --- FILTRAGEM ROTA (MANTIDO v12.84) ---
        window.filtrarLogistica = () => {
            const container = document.getElementById('lista-visitas'); if(!container) return;
            container.innerHTML = '';
            window.dadosCompletos.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            window.dadosCompletos.forEach(i => {
                let cor = i.resultado === "Venda" ? "border-emerald-500 bg-emerald-500/10" : (i.resultado === "NQ" ? "border-rose-500 bg-rose-500/10" : "border-slate-500/20");
                container.innerHTML += `<div class="glass p-4 rounded-3xl border-l-4 ${cor} flex justify-between items-center text-white"><div><p class="text-[10px] font-bold text-slate-500">${i.resultado||'PENDENTE'} | ${i.horario||'DIR'}</p><h3 class="text-base font-black uppercase text-white">${i.nome_formando}</h3></div><button onclick="window.gerenciarItem('${i.path.replace(/'/g,"\\'")}', '${(i.nome_formando||'').replace(/'/g,"\\'")}')" class="btn-primary px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Gerenciar</button></div>`;
            });
        };

        // UI HELPERS
        window.switchView = (id) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active')); document.getElementById(id).classList.add('view-active'); };
        window.acessoAdmin = () => { if(prompt("Senha:") === "2025") { window.switchView('view-logistica'); } };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; };
        window.gerenciarItem = (p, n) => { window.itemPath = p; window.currentName = n; document.getElementById('modalGestao').style.display = 'flex'; };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s }); window.carregarRelatorio(); window.fecharModalGestao(); };
        window.fluxoResultado = () => {
            document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            f.innerHTML = `<select id="vV" class="w-full bg-slate-900 p-4 rounded-xl mb-3 text-white outline-none"><option value="Evanio">Evanio</option><option value="Willian">Willian</option></select><input type="number" id="vT" placeholder="VALOR TOTAL" class="w-full bg-slate-900 p-4 rounded-xl mb-4 text-white font-black text-2xl outline-none"><button onclick="window.finalizarVenda()" class="w-full p-4 bg-emerald-600 rounded-xl font-black">SALVAR</button>`;
        };
        window.finalizarVenda = async () => {
            const tot = parseFloat(document.getElementById('vT').value); const v = document.getElementById('vV').value; if(!tot || !v) return alert("Preencha tudo!");
            await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, vendedor: v }); window.carregarRelatorio(); window.fecharModalGestao();
        };
        window.copiarRelatorio = () => { alert("Relatório comercial pronto para cópia!"); };
    </script>
</body>
</html>
