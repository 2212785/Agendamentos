<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Intelligence - BI v16.70</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: flex-start; justify-content: center; overflow-y: auto; padding: 20px; }
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; }
        .input-compact { padding: 0.75rem !important; border-radius: 1rem !important; font-size: 0.875rem !important; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; width: 100%; outline: none; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; padding: 12px; border-radius: 15px; font-size: 10px; font-weight: 800; color: white; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 shadow-2xl text-white mx-auto mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-black uppercase text-blue-400">Gerenciar</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full font-bold text-white">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase text-sm">1. Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">2. Marcar NQ</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir Registro</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 text-white pb-4"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center w-full">
            <span class="text-lg font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase">ADM</button>
        </header>
        <div class="flex-grow flex items-center justify-center p-2">
            <div class="glass p-6 rounded-[2.5rem] w-full max-w-sm text-center">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 italic leading-none">...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-500 mb-4 uppercase italic">PROJETO</h3>
                <div class="grid grid-cols-2 gap-1 mb-3" id="day-selector"></div>
                <form id="form-agendamento" class="space-y-2">
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="input-compact text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="input-compact text-white">
                    <select id="horario" required class="input-compact text-white"><option value="">Selecione a Data</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="input-compact text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-sm">Agendar Visita</button>
                </form>
            </div>
        </div>
    </section>

    <section id="view-logistica" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-4">
            <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Sair</button>
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button class="bg-blue-600 px-4 py-1.5 rounded-lg text-[10px] font-black">Visitas</button>
                <button onclick="window.switchView('view-financeiro')" class="px-4 py-1.5 text-slate-400 text-[10px] font-black">Dashboard BI</button>
            </div>
        </nav>
        <div class="flex gap-2 mb-4">
            <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none">
            <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ AVULSO</button>
        </div>
        <div id="lista-visitas" class="space-y-2"></div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <div class="max-w-7xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-6">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
                <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white">
            </nav>

            <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>
            <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-6 text-white"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6 text-white">
                <div id="reembolso-card" class="lg:col-span-1 glass rounded-[2rem] p-5 border-l-4 border-blue-500 text-white"></div>
                <div id="saldo-card" class="lg:col-span-2 glass rounded-[2rem] p-6 border-l-8 border-emerald-500 text-white"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 text-white">
                <div class="glass p-4 rounded-2xl border border-white/5"><h4 class="text-emerald-400 font-black text-[10px] mb-3 uppercase">Vendas</h4><div id="extrato-tabela" class="text-xs"></div></div>
                <div class="glass p-4 rounded-2xl border border-white/5"><h4 class="text-rose-500 font-black text-[10px] mb-3 uppercase">NQ</h4><div id="nq-tabela" class="text-xs"></div></div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);

        let projId = ""; window.dadosCompletos = []; let custosOperacao = {};

        window.salvarCommit = async (path, dados) => {
            try { await update(ref(db, path), dados); window.carregarRelatorio(); window.fecharModalGestao(); } catch(e) { alert("Erro!"); }
        };

        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projId = snap.val() || "guaratingueta-guilherme";
            const pS = await get(ref(db, `projetos/${projId}`));
            if(pS.exists()){
                const d = pS.val();
                document.getElementById('escola-titulo').innerText = d.cidade || "Elite";
                document.getElementById('sub-escola').innerText = d.escola || d.school || "Intelligence";
                if(d.data_inicio) window.gerarBotoesDatas(d.data_inicio, d.data_fim);
                window.carregarRelatorio();
            }
        });

        window.carregarRelatorio = async () => {
            const id = projId;
            try {
                const [sA, sV, sC] = await Promise.all([get(ref(db, `dados/${id}/agendamentos`)), get(ref(db, `vendas/${id}`)), get(ref(db, `custos/${id}`))]);
                window.dadosCompletos = []; custosOperacao = sC.exists() ? sC.val() : {};
                const proc = (pasta, base) => {
                    if (!pasta) return;
                    Object.keys(pasta).forEach(k => {
                        const item = pasta[k];
                        if (typeof item === 'object' && !item.nome_formando) {
                            Object.keys(item).forEach(subK => window.dadosCompletos.push({...item[subK], id:subK, data:k, path:`${base}/${k}/${subK}`}));
                        } else window.dadosCompletos.push({...item, id:k, data:item.data||k, path:`${base}/${k}`});
                    });
                };
                if(sA.exists()) proc(sA.val(), `dados/${id}/agendamentos`);
                if(sV.exists()) {
                    const v = sV.val();
                    if(v.avulsos) proc(v.avulsos, `vendas/${id}/avulsos`);
                    if(v.agendamentos) proc(v.agendamentos, `vendas/${id}/agendamentos`);
                }
                window.filtrarLogistica(); window.filtrarBI();
            } catch(e) { console.error(e); }
        };

        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, vales:0, com:0 };
            let vE = (projId === "guaratingueta-guilherme") ? 350 : 0, vW = (projId === "guaratingueta-guilherme") ? 1155 : 0;

            list.forEach(i => {
                if(i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor)||0;
                    let cV = 0;
                    if(i.pagamentos) i.pagamentos.forEach(p => {
                        const vP = Number(p.valor)||0; const t = p.tipo.toLowerCase();
                        if (t.includes("entrada")) cV += vP*0.12; else cV += vP*0.08;
                        if((t.includes("pix")||t.includes("dinheiro")) && !t.includes("debito")) m.vales += vP;
                        if(t.includes("pix")) m.pix += vP; else if(t.includes("dinheiro")) m.din += vP;
                        else if(t.includes("debito")) m.deb += vP; else if(t.includes("credito")||t.includes("crédito")) m.cre += vP; else if(t.includes("boleto")) m.bol += vP;
                    }); else cV = (Number(i.valor)||0)*0.08;
                    m.com += cV;
                } else if(i.resultado === "NQ") m.nq++;
            });

            // Lógica de Reembolso
            const c = custosOperacao; const nP = parseInt(c.operacao_pessoas) || 2;
            const vKM = (parseFloat(c.km_total)||0)*0.7; const vPed = parseFloat(c.pedagio_total)||0;
            const vHosp = (parseFloat(c.hosp_valor)||0)*nP*(parseInt(c.hosp_qtd)||0);
            const vAlim = (parseFloat(c.alim_valor)||0)*nP*(parseInt(c.alim_qtd)||0);
            const totalR = vKM + vPed + vHosp + vAlim;

            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black text-blue-400">FATURAMENTO</p><p class="text-xl font-black">${fBR(m.tot)}</p></div><div class="card-bi p-4 rounded-3xl text-center text-white"><p class="text-[8px] font-black text-blue-400">TICKET</p><p class="text-xl font-black text-white">${fBR(m.v?m.tot/m.v:0)}</p></div><div class="card-bi p-4 rounded-3xl text-center text-white text-white text-white"><p class="text-[8px] font-black text-blue-400 text-white">EFICIÊNCIA</p><p class="text-xl font-black text-white text-white">${(m.v+m.nq)?(m.v/(m.v+m.nq)*100).toFixed(0):0}%</p></div><div class="card-bi p-4 rounded-3xl text-center text-white text-white text-white text-white text-white text-white"><p class="text-[8px] font-black text-blue-400">VENDAS/NQ</p><p class="text-xl font-black text-white text-white text-white text-white">${m.v}/${m.nq}</p></div>`;
            document.getElementById('finance-grid').innerHTML = `<div class="glass p-2 rounded-xl text-center"><p class="text-[7px]">PIX</p><b>${fBR(m.pix)}</b></div><div class="glass p-2 rounded-xl text-center"><p class="text-[7px]">CRÉDITO</p><b>${fBR(m.cre)}</b></div><div class="glass p-2 rounded-xl text-center"><p class="text-[7px]">BOLETO</p><b>${fBR(m.bol)}</b></div><div class="glass p-2 rounded-xl text-center"><p class="text-[7px]">DINHEIRO</p><b>${fBR(m.din)}</b></div><div class="glass p-2 rounded-xl text-center border-emerald-500/30 text-emerald-400"><p class="text-[7px]">REEMBOLSO</p><b>${fBR(totalR)}</b></div><div class="glass p-2 rounded-xl text-center border-rose-500/30 text-rose-400"><p class="text-[7px]">VALES</p><b>${fBR(m.vales)}</b></div>`;
            
            document.getElementById('reembolso-card').innerHTML = `<h5 class="text-[10px] font-black uppercase text-blue-400 mb-3">Conferência Reembolso</h5><div class="text-[9px] space-y-1">
                <div class="flex justify-between"><span>KM (0.70):</span><b>${fBR(vKM)}</b></div><div class="flex justify-between"><span>Pedágios:</span><b>${fBR(vPed)}</b></div><div class="flex justify-between"><span>Hospedagem:</span><b>${fBR(vHosp)}</b></div><div class="flex justify-between"><span>Alimentação:</span><b>${fBR(vAlim)}</b></div><div class="flex justify-between border-t border-white/10 pt-1 mt-1 font-black text-blue-400"><span>TOTAL:</span><span>${fBR(totalR)}</span></div></div>`;
            
            document.getElementById('saldo-card').innerHTML = `<div class="text-center mb-4 border-b border-white/10 pb-2 font-black text-white">Acerto Final (Comissão + Reembolso)</div><div class="grid grid-cols-2 gap-4 text-white"><div class="bg-white/5 p-4 rounded-2xl"><p class="text-[10px] font-black text-blue-400">EVANIO</p><p class="text-sm font-black mt-1">${fBR(m.com/2 + totalR/2 - vE)}</p><p class="text-[8px] text-slate-500 uppercase">Vales: -${fBR(vE)}</p></div><div class="bg-white/5 p-4 rounded-2xl text-white text-white"><p class="text-[10px] font-black text-cyan-400">WILLIAN</p><p class="text-sm font-black mt-1 text-white">${fBR(m.com/2 + totalR/2 - vW)}</p><p class="text-[8px] text-slate-500 uppercase text-white">Vales: -${fBR(vW)}</p></div></div>`;
            
            document.getElementById('extrato-tabela').innerHTML = list.filter(i=>i.resultado==="Venda").map(i=>`<div class="flex justify-between border-b border-white/5 py-1"><span>#${i.num_album||''} ${i.nome_formando}</span><b class="text-emerald-400">${fBR(i.valor)}</b></div>`).join('');
            document.getElementById('nq-tabela').innerHTML = list.filter(i=>i.resultado==="NQ").map(i=>`<div class="py-1 border-b border-white/5 text-slate-500">${i.nome_formando}</div>`).join('');
        };

        window.atualizarHorarios = (iso) => {
            const select = document.getElementById('horario'); select.innerHTML = '<option value="">Horário</option>';
            const diaS = new Date(iso + "T00:00:00").getDay();
            const hrs = (diaS === 0 || diaS === 6) ? [9, 12, 15, 18, 21] : Array.from({length: 13}, (_, i) => i + 8);
            hrs.forEach(h => { select.innerHTML += `<option value="${h}:00">${h}:00</option>`; });
        };

        window.gerarBotoesDatas = (i, f) => {
            const c = document.getElementById('day-selector'); c.innerHTML = "";
            let cur = new Date(i+"T00:00:00");
            while(cur <= new Date(f+"T00:00:00")) {
                const iso = cur.toISOString().split('T')[0];
                c.innerHTML += `<button type="button" onclick="window.selecionarDia(this, '${iso}')" class="day-btn text-white">${cur.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</button>`;
                cur.setDate(cur.getDate()+1);
            }
        };

        window.selecionarDia = (b, iso) => { document.querySelectorAll('.day-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); document.getElementById('data-selecionada').value = iso; window.atualizarHorarios(iso); };
        window.filtrarLogistica = () => {
            const cont = document.getElementById('lista-visitas'); if(!cont) return;
            const fD = document.getElementById('filtro-data-logistica').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            cont.innerHTML = '';
            list.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            list.forEach(i => {
                let s = i.resultado || "PENDENTE"; let c = s==="Venda"?"text-emerald-500":s==="NQ"?"text-rose-500":"text-slate-600";
                cont.innerHTML += `<div class="glass p-3 rounded-2xl flex flex-col gap-2"><div class="flex justify-between items-center text-white"><div class="flex items-center gap-3"><span class="text-[9px] font-black text-blue-400">${i.horario||'DIR'}</span><span class="text-[12px] font-black ${c}">${s==="Venda"?"VENDIDO":s}</span><h3 class="text-sm font-black uppercase truncate max-w-[120px] text-white text-white text-white">${i.nome_formando}</h3></div><button onclick="window.gerenciarItem('${i.path}')" class="btn-primary px-3 py-1.5 rounded-lg text-[8px] font-black uppercase text-white">Gere.</button></div><div class="flex gap-1 border-t border-white/5 pt-2 text-white"><a href="https://wa.me/55${(i.telefone||'').replace(/\D/g,'')}" target="_blank" class="bg-emerald-500/10 p-1 rounded-lg text-emerald-400 text-[8px] font-black uppercase text-white text-white">Zap</a><a href="https://www.waze.com/ul?q=${encodeURIComponent(i.endereco||'')}&navigate=yes" target="_blank" class="bg-blue-500/10 p-1 rounded-lg text-blue-400 text-[8px] font-black uppercase text-white text-white text-white">Waze</a></div></div>`;
            });
        };

        window.switchView = (id) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active')); document.getElementById(id).classList.add('view-active'); };
        window.acessoAdmin = () => { if(prompt("Senha:")==="2025") window.switchView('view-logistica'); };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display='none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };
        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display='flex'; };

        window.fluxoResultado = () => {
            document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const item = window.dadosCompletos.find(i => i.path === window.itemPath) || {};
            window.tempPgs = item.pagamentos ? [...item.pagamentos] : []; 
            f.innerHTML = `<select id="vV" class="input-compact mb-2 text-white"><option value="Evanio" ${item.vendedor==='Evanio'?'selected':''}>Evanio</option><option value="Willian" ${item.vendedor==='Willian'?'selected':''}>Willian</option></select><input type="text" id="vA" placeholder="Nº ÁLBUM" value="${item.num_album||''}" class="input-compact mb-2"><input type="number" id="vT" placeholder="TOTAL" value="${item.valor||''}" class="input-compact text-xl font-black mb-3"><div class="grid grid-cols-2 gap-2 mb-3"><button onclick="window.addPg('Pix')" class="bg-slate-800 p-2 rounded text-[9px]">+ Pix</button><button onclick="window.addPg('Dinheiro')" class="bg-slate-800 p-2 rounded text-[9px]">+ Dinheiro</button><button onclick="window.addPg('Débito')" class="bg-slate-800 p-2 rounded text-[9px]">+ Débito</button><button onclick="window.addPg('Crédito')" class="bg-slate-800 p-2 rounded text-[9px] text-white">+ Crédito</button><button onclick="window.addPg('Boleto')" class="bg-blue-900/40 p-2 rounded text-[9px] col-span-2 text-white">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-2 text-white"></div><button onclick="window.finalizarVenda()" class="btn-primary w-full p-4 rounded-xl font-black text-xs uppercase text-white">Salvar Venda</button>`;
            window.atualizarListaInterface();
        };

        window.addPg = (t) => {
            const v = parseFloat(prompt(`Valor ${t}:`) || 0); if(v<=0) return;
            if(t==="Boleto" && confirm("Tem entrada?")) { const vE = parseFloat(prompt("Valor Entrada:")||0); window.tempPgs.push({tipo:"Pix (Entrada)", valor:vE}); if(v-vE>0) window.tempPgs.push({tipo:"Boleto", valor:v-vE}); }
            else window.tempPgs.push({tipo:t, valor:v}); window.atualizarListaInterface();
        };

        window.finalizarVenda = async () => {
            const d = { resultado:"Venda", valor:document.getElementById('vT').value, num_album:document.getElementById('vA').value, vendedor:document.getElementById('vV').value, pagamentos:window.tempPgs, data: "2024-06-06" };
            await window.salvarCommit(window.itemPath, d);
        };

        window.salvarStatusSimples = async (s) => { await window.salvarCommit(window.itemPath, { resultado:s }); };
        window.confirmarExclusao = async () => { if(confirm("Excluir?")) { try { await remove(ref(db, window.itemPath)); window.carregarRelatorio(); window.fecharModalGestao(); } catch(e) {} } };
        window.atualizarListaInterface = () => { document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between text-[10px] bg-white/5 p-1 text-white text-white"><span>${p.tipo}</span><b>${fBR(p.valor)}</b></div>`).join(''); };
        window.abrirAvulso = () => { document.getElementById('modalGestao').style.display='flex'; document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<input type="text" id="avN" placeholder="Nome" class="input-compact mb-2 text-white"><input type="date" id="avD" class="input-compact mb-3 text-white"><button onclick="window.salvarAvulso()" class="btn-primary w-full p-3 rounded-xl text-[10px] font-black uppercase text-white">Avançar</button>`; document.getElementById('avD').value = new Date().toISOString().split('T')[0]; };
        window.salvarAvulso = async () => { const p = `vendas/${projId}/avulsos/AV-${Date.now()}`; try { await set(ref(db, p), { nome_formando:document.getElementById('avN').value, data:document.getElementById('avD').value, resultado:"Pendente" }); window.itemPath = p; window.carregarRelatorio(); window.fluxoResultado(); } catch(e){} };
        
        document.getElementById('form-agendamento').onsubmit = async (e) => {
            e.preventDefault();
            const d = { nome_formando: document.getElementById('nome').value, telefone: document.getElementById('telefone').value, endereco: document.getElementById('endereco').value, resultado: "Pendente", horario: document.getElementById('horario').value };
            const dt = document.getElementById('data-selecionada').value;
            if(!dt) return alert("Selecione o dia!");
            try { await set(ref(db, `dados/${projId}/agendamentos/${dt}/AG-${Date.now()}`), d); alert("Agendado!"); e.target.reset(); window.carregarRelatorio(); } catch(e){}
        };
    </script>
</body>
</html>
