<!DOCTYPE html>              
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Master - v28.01 PLATINUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }

        .view-section {
            display: none;
            min-height: 100vh;
            width: 100%;
            flex-direction: column;
        }

        .view-active {
            display: flex !important;
        }

        .card-bi {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
        }

        #modalGestao {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.98);
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .input-compact {
            padding: 0.8rem !important;
            border-radius: 1rem !important;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 100%;
            outline: none;
        }

        .day-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            padding: 12px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: 800;
            color: white;
        }

        .day-btn.active {
            background: #3b82f6 !important;
            border-color: #60a5fa !important;
        }

        .label-custo {
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 4px;
            margin-left: 4px;
            display: block;
        }

        .led-bot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .led-offline {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }

        .led-online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .footer-links {
            padding: 20px;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            color: #475569;
            letter-spacing: 1px;
        }

        .footer-links a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
            margin: 0 5px;
        }

        .footer-links a:hover {
            color: #3b82f6;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>

<body>

    <div id="modalGestao">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 shadow-2xl text-white mx-auto mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="gestao-titulo" class="text-lg font-black uppercase text-blue-400">Gestão</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase text-sm">Registrar Venda</button>
                <button onclick="window.fluxoNQ()" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">Marcar NQ</button>
                <button onclick="window.limparRegistroVisita()" class="bg-slate-700/50 border border-white/10 p-3 rounded-2xl text-white font-black uppercase text-[10px]">Limpar Registro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir Registro</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 pb-6 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center text-white">
            <div class="flex flex-col">
                <span class="text-lg font-black uppercase italic tracking-tighter text-white">Portal <span class="text-blue-500">Elite</span></span>
                <div class="flex items-center mt-[-4px]">
                    <span id="bot-led" class="led-bot led-offline"></span>
                    <span id="bot-status-text" class="text-[7px] font-bold uppercase text-slate-500">Bot Offline</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="user-display" class="text-[8px] font-black uppercase text-slate-500"></span>
                <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase text-white">Login / ADM</button>
            </div>
        </header>
        <div class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-6 rounded-[2.5rem] w-full max-w-sm text-center">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 leading-none italic">AGUARDE...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-500 mb-4 uppercase italic">CONECTANDO</h3>
                <div class="grid grid-cols-2 gap-1 mb-3" id="day-selector"></div>
                <form id="form-agendamento" class="space-y-2">
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="input-compact text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="input-compact text-white">
                    <select id="horario" required class="input-compact text-white">
                        <option value="">Selecione o Dia</option>
                    </select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="input-compact text-white" rows="2"></textarea>
                    <button type="submit" id="btn-agendar-visita" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-sm">Agendar Visita</button>
                </form>
            </div>
        </div>

        <footer class="footer-links">
            <a href="politica.html">Política</a> | 
            <a href="termos.html">Termos</a> | 
            <a href="exclusao.html">Excluir meus dados</a>
        </footer>
    </section>

    <section id="view-logistica" class="view-section p-4">
        <nav class="flex justify-between items-center mb-6 text-white">
            <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Sair</button>
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button class="bg-blue-600 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase">Visitas</button>
                <button onclick="window.switchView('view-financeiro')" class="px-4 py-1.5 text-slate-400 text-[10px] font-black uppercase">Dashboard BI</button>
            </div>
        </nav>
        <div id="controles-admin" class="hidden flex flex-wrap gap-2 mb-4 justify-center">
            <button onclick="window.abrirNovoProjeto()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-emerald-400 uppercase">Novo Projeto</button>
            <button onclick="window.abrirGestaoCentralizada()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-blue-400 uppercase">Dados Projeto</button>
            <button onclick="window.abrirGestaoVales()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-rose-400 uppercase">Lançar Vales</button>
            <button onclick="window.switchView('view-automacao')" class="bg-amber-500/20 border border-amber-500/30 px-4 py-2 rounded-xl text-[8px] font-black text-amber-500 uppercase italic">Automação PC 🚀</button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none">
            <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ AVULSO</button>
        </div>
        <div id="lista-visitas" class="space-y-3 pb-10"></div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-4 text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <div class="flex gap-2">
                <button onclick="window.menuRelatorio()" class="bg-emerald-600 px-3 py-2 rounded-xl text-[9px] font-black uppercase italic">Copiar Relatório 📋</button>
                <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white outline-none">
            </div>
        </nav>
        <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6 text-white"></div>
        <div id="individual-performance" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-white"></div>
        <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-6 text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div id="comissao-card" class="lg:col-span-1 glass rounded-[2rem] p-5 border-l-4 border-blue-500 text-white"></div>
            <div class="lg:col-span-2 glass rounded-[2rem] p-4 min-h-[300px] text-white overflow-hidden relative">
                <canvas id="weeklyChart"></canvas>
            </div>
        </div>
        <div id="saldo-card" class="glass rounded-[2rem] p-6 border-l-8 border-emerald-500 mb-6 text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-10">
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <div class="flex justify-between items-center mb-3 text-white">
                    <h4 class="text-emerald-400 font-black text-[10px] uppercase">Extrato Vendas</h4>
                    <span class="text-[8px] text-slate-500 text-white uppercase italic">Por Data + Vendedor</span>
                </div>
                <div id="extrato-tabela" class="text-xs text-white"></div>
            </div>
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <h4 class="text-rose-500 font-black text-[10px] mb-3 uppercase text-white">NQ</h4>
                <div id="nq-tabela" class="text-xs text-white"></div>
            </div>
        </div>
    </section>

    <section id="view-automacao" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-6 text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <span class="text-amber-500 font-black text-[10px] uppercase italic text-white">Motor Elite Auto-Zap</span>
        </nav>
        <div class="glass p-8 rounded-[3rem] text-center mb-6 text-white">
            <div id="status-automacao" class="text-[9px] font-black text-slate-500 uppercase mb-2 text-white">Pronto para iniciar</div>
            <div id="timer-display" class="text-5xl font-black text-white mb-6">00:00</div>
            <div class="flex gap-3 justify-center">
                <button id="btn-start-auto" onclick="window.iniciarCampanha()" class="bg-emerald-600 px-8 py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Iniciar Campanha</button>
                <button id="btn-stop-auto" onclick="window.pararCampanha()" class="bg-rose-600 hidden px-8 py-4 rounded-2xl font-black uppercase text-xs">Pausar</button>
            </div>
        </div>
        <div class="glass p-5 rounded-[2rem]">
            <div class="flex justify-between items-center mb-4 text-white">
                <h4 class="text-[10px] font-black uppercase text-blue-400">Fila de Envios</h4>
                <button onclick="window.resetIndex()" class="text-[8px] text-slate-600 font-bold uppercase">Reiniciar Fila</button>
            </div>
            <div id="lista-fila" class="space-y-2 max-h-64 overflow-y-auto text-[10px] text-white"></div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        let projId = "";
        window.dadosCompletos = [];
        let custosDB = {
            km_valor: 0.7,
            km_total: 0,
            hosp_valor: 0,
            hosp_qtd: 0,
            alim_valor: 0,
            alim_qtd: 0,
            pedagio_total: 0
        };
        let valesDB = {};
        let projetoDB = {};
        let weeklyChart = null;

        // --- ACÃO GLOBAL DO ENTER ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (document.activeElement && document.activeElement.id === 'pLista') {
                    return; 
                }

                const btnLogin = document.getElementById('btn-confirmar-login');
                if (btnLogin && document.getElementById('modalGestao').style.display === 'flex') {
                    return btnLogin.click();
                }
                const btnAcaoForm = document.querySelector('#gestao-form button.btn-primary');
                if (btnAcaoForm && !btnAcaoForm.closest('.hidden')) {
                    return btnAcaoForm.click();
                }
                const btnAgendar = document.getElementById('btn-agendar-visita');
                if (btnAgendar && document.activeElement.closest('#form-agendamento')) {
                    return btnAgendar.click();
                }
            }
        });

        // --- MIGRACAO DE ESTRUTURA REVISADA ---
        const realizarMigracaoEstrutura = async () => {
            const snapRaiz = await get(ref(db, "guaratingueta-guilherme"));
            if (snapRaiz.exists()) {
                console.log("Migrando estrutura completa de Dr. Guilherme Filippo...");
                const d = snapRaiz.val();
                
                await set(ref(db, `custos/guaratingueta-guilherme`), {
                    alim_qtd: d.alim_qtd || 0,
                    alim_valor: d.alim_valor || 0,
                    hosp_qtd: d.hosp_qtd || 0,
                    hosp_valor: d.hosp_valor || 0,
                    km_total: d.km_total || 0,
                    km_valor: d.km_valor || 0.7,
                    pedagio_total: d.pedagio_total || 0
                });

                await set(ref(db, `projetos/guaratingueta-guilherme`), {
                    cidade: d.cidade || "Guaratinguetá",
                    escola: d.escola || "Dr. Guilherme Filippo",
                    criador: "Evanio",
                    comissao_individual: false,
                    data_inicio: d.data_inicio || "",
                    data_fim: d.data_fim || "",
                    automacao: { lista: "", msg1: "", msg2: "", msg3: "", msg4: "" },
                    bot: { status: "offline" }
                });

                await remove(ref(db, "guaratingueta-guilherme"));
                console.log("Migração de estrutura v28 concluída com sucesso!");
            }
        };

        // --- INICIALIZAÇÃO MULTIPROJETO DINÂMICA ---
        const urlParams = new URLSearchParams(window.location.search);
        const idDaUrl = urlParams.get('id');

        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            await realizarMigracaoEstrutura(); 
            
            const globalId = snap.val();
            const userLogado = localStorage.getItem('userType');
            
            if (!idDaUrl && userLogado) {
                const snapUltimo = await get(ref(db, `config/ultimo_projeto_usuario/${userLogado}`));
                if (snapUltimo.exists()) {
                    const idUltimo = snapUltimo.val();
                    window.location.href = window.location.origin + window.location.pathname + '?id=' + idUltimo;
                    return;
                }
            }

            projId = idDaUrl || localStorage.getItem('currentProject') || globalId;
            
            if (projId) {
                const pS = await get(ref(db, `projetos/${projId}`));
                if (pS.exists()) {
                    projetoDB = pS.val();
                    
                    const isAdmin = localStorage.getItem('isAdmin') === 'true';
                    if(!isAdmin && userLogado && projetoDB.criador !== userLogado && idDaUrl) {
                        alert("Acesso Negado: Este projeto pertence a outro usuário.");
                        window.location.href = window.location.origin + window.location.pathname;
                        return;
                    }

                    document.getElementById('escola-titulo').innerText = projetoDB.escola || "Projeto";
                    document.getElementById('sub-escola').innerText = projetoDB.cidade || "Cidade";
                    if (projetoDB.data_inicio) window.gerarBotoesDatas(projetoDB.data_inicio, projetoDB.data_fim);
                    window.carregarRelatorio();
                    
                    if(userLogado) {
                        document.getElementById('user-display').innerText = `| ${userLogado}`;
                        document.getElementById('controles-admin').classList.remove('hidden');
                        update(ref(db, `config/ultimo_projeto_usuario`), { [userLogado]: projId });
                    }

                    onValue(ref(db, `projetos/${projId}/bot`), (botSnap) => {
                        const led = document.getElementById('bot-led');
                        const txt = document.getElementById('bot-status-text');
                        const botData = botSnap.val();
                        if (botData && (botData.status === 'Online' || botData.status === 'online')) {
                            led.className = 'led-bot led-online';
                            txt.innerText = 'Bot Ativo';
                        } else {
                            led.className = 'led-bot led-offline';
                            txt.innerText = 'Bot Offline';
                        }
                    });
                }
            }
        });

        // --- LOGIN E PERMISSÕES ---
        window.acessoAdmin = () => {
            if (localStorage.getItem('userType')) {
                document.getElementById('modalGestao').style.display = 'flex';
                document.getElementById('gestao-menu').classList.add('hidden');
                const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
                f.innerHTML = `
                    <h3 class="text-blue-400 font-black text-xs uppercase mb-4 text-center">Menu Administrativo</h3>
                    <button onclick="window.switchView('view-logistica'); window.fecharModalGestao();" class="btn-primary w-full py-4 rounded-xl text-[10px] font-black uppercase mb-2">Painel Logística</button>
                    <button onclick="window.efetuarLogout()" class="bg-rose-600 w-full py-4 rounded-xl text-[10px] font-black uppercase">Sair / Deslogar</button>
                `;
                return;
            }
            
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            
            f.innerHTML = `
                <h3 class="text-blue-400 font-black text-xs uppercase mb-4 text-center">Acesso Restrito</h3>
                <select id="login-user" class="input-compact mb-2">
                    <option value="Evanio">Evanio</option>
                    <option value="Willian">Willian</option>
                </select>
                <input type="password" id="login-pass" placeholder="Senha" class="input-compact mb-4 text-white">
                <button id="btn-confirmar-login" onclick="window.confirmarLogin()" class="btn-primary w-full py-4 rounded-xl text-[10px] font-black uppercase">Entrar</button>
            `;
        };

        window.efetuarLogout = () => {
            localStorage.removeItem('userType');
            localStorage.removeItem('isAdmin');
            localStorage.removeItem('currentProject'); 
            location.href = window.location.origin + window.location.pathname; 
        };

        window.confirmarLogin = async () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            let loginValido = false;
            if (user === "Evanio" && pass === "elite") {
                localStorage.setItem('userType', 'Evanio');
                localStorage.setItem('isAdmin', 'true');
                loginValido = true;
            } else if (user === "Willian" && pass === "2025") {
                localStorage.setItem('userType', 'Willian');
                localStorage.setItem('isAdmin', 'false');
                loginValido = true;
            } else {
                alert("Senha Incorreta!");
                return;
            }

            if (loginValido) {
                try {
                    const snapUltimo = await get(ref(db, `config/ultimo_projeto_usuario/${user}`));
                    if (snapUltimo.exists()) {
                        const idUltimo = snapUltimo.val();
                        localStorage.setItem('currentProject', idUltimo);
                        window.location.href = window.location.origin + window.location.pathname + '?id=' + idUltimo;
                    } else {
                        window.fecharModalGestao();
                        location.reload();
                    }
                } catch (e) {
                    location.reload();
                }
            }
        };

        // --- AVULSOS E VALES ---
        window.abrirAvulso = () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const dataHoje = new Date().toISOString().split('T')[0];
            
            f.innerHTML = `
                <h3 class="text-emerald-400 font-black text-xs uppercase mb-4 text-center">Lançamento Avulso</h3>
                <div class="space-y-3">
                    <select id="av_res" class="input-compact mb-2" onchange="window.toggleAvulsoPagamentos(this.value)">
                        <option value="Venda">VENDA ✅</option>
                        <option value="NQ">NQ ❌</option>
                    </select>
                    <input type="text" id="av_nome" placeholder="Nome do Formando" class="input-compact mb-2">
                    <input type="date" id="av_data" value="${dataHoje}" class="input-compact mb-2">
                    <div id="av_venda_fields" class="space-y-3">
                        <input type="text" id="av_num" placeholder="Nº Álbum" class="input-compact mb-2">

            document.getElementById('timer-display').innerText = "00:00";

        window.dispararProximoAPI = async () => {
            if (!autoAtivo) return;
            if (typeof db === 'undefined' || !projId) {
                setTimeout(window.dispararProximoAPI, 2000);
                return;
            }

            const listaRaw = projetoDB.automacao?.lista || "";
            const lista = listaRaw.split('\n').filter(l => l.trim() !== "");
            const idx = projetoDB.automacao?.index_atual || 0;

            if (idx >= lista.length) {
                document.getElementById('status-automacao').innerText = "CAMPANHA CONCLUÍDA ✅";
                return window.pararCampanha();
            }

            let dados = lista[idx].includes(';') ? lista[idx].split(';') : lista[idx].split(',');
            
            if (dados.length < 2) {
                const prox = idx + 1;
                await update(ref(db, `projetos/${projId}/automacao`), { index_atual: prox });
                projetoDB.automacao.index_atual = prox;
                return window.dispararProximoAPI();
            }

            const nome = dados[0].trim();
            const fone = dados[1].trim().replace(/\D/g, '');

            try {
                document.getElementById('status-automacao').innerText = `Enviando para: ${nome}...`;
                const response = await fetch("https://agendamentos-4zxv.onrender.com/disparar-template", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telefone: fone,
                        nome_formando: nome,
                        escola: projetoDB.escola || "Escola",
                        projeto_id: projId,
                        usuario: localStorage.getItem('userType') || 'Evanio' 
                    })
                });

                if (response.ok) {
                    const prox = idx + 1;
                    await update(ref(db, `projetos/${projId}/automacao`), { index_atual: prox });
                    projetoDB.automacao.index_atual = prox;
                    if (typeof window.renderFila === "function") window.renderFila();
                    const randSeg = Math.floor(Math.random() * (10 - 5 + 1)) + 5;
                    window.iniciarContagem(randSeg);
                } else {
                    throw new Error("Erro no servidor Render");
                }
            } catch (err) {
                console.error("Erro no disparo:", err);
                document.getElementById('status-automacao').innerText = "ERRO NO DISPARO - TENTANDO PRÓXIMO...";
                setTimeout(async () => {
                    const prox = idx + 1;
                    await update(ref(db, `projetos/${projId}/automacao`), { index_atual: prox });
                    projetoDB.automacao.index_atual = prox;
                    window.dispararProximoAPI();
                }, 3000);

                const m = Math.floor(rest / 60); const s = rest % 60;
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

        window.copyRel = (tipo) => {
            const fD = document.getElementById('filtro-bi').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            if (tipo !== 'Geral') list = list.filter(i => i.vendedor === tipo);
            let r = { v: 0, nq: 0, tot: 0, pix: 0, din: 0, deb: 0, cre: 0, bol: 0, vales_calc: 0 };

            list.forEach(i => {
                if (i.resultado === "Venda") {
                    r.v++; r.tot += Number(i.valor) || 0;
                    if (i.pagamentos) i.pagamentos.forEach(p => {
                        const vP = Number(p.valor) || 0;
                        const t = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        if (t.includes("pix")) r.pix += vP;
                        else if (t.includes("dinheiro")) r.din += vP;
                        else if (t.includes("debito")) r.deb += vP;
                        else if (t.includes("credito")) r.cre += vP;
                        else if (t.includes("boleto")) r.bol += vP;
                    });

            const ticketM = r.v > 0 ? (r.tot / r.v) : 0;

            navigator.clipboard.writeText(texto).then(() => { alert("Copiado!"); window.fecharModalGestao(); });
        };

        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v: 0, nq: 0, tot: 0, pix: 0, din: 0, deb: 0, cre: 0, bol: 0, com: 0 };
            let vend = { Evanio: { v: 0, nq: 0, tot: 0, com: 0, ent: 0 }, Willian: { v: 0, nq: 0, tot: 0, com: 0, ent: 0 } };
            let chartData = {};
            
            const isIndividual = projetoDB.comissao_individual === true;

            list.forEach(i => {
                const vn = i.vendedor || "Willian";
                const dKey = i.data || "Sem Data";
                if (!chartData[dKey]) chartData[dKey] = { v: 0, nq: 0 };

                if (!vend[vn]) vend[vn] = { v: 0, nq: 0, tot: 0, com: 0, ent: 0 };

                if (i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor) || 0;
                    vend[vn].v++; vend[vn].tot += Number(i.valor) || 0;
                    chartData[dKey].v++;
                    
                    let cV = 0;
                    let totalPixIncorporadoVale = 0;
                    let valorTotalVenda = Number(i.valor) || 0;
                    let somaPagamentos = 0;

                    if (i.pagamentos) {
                        i.pagamentos.forEach(p => {
                            const vP = Number(p.valor) || 0;
                            somaPagamentos += vP;
                            const tipo = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

                            if (tipo.includes("boleto")) {
                                cV += vP * 0.08;
                                m.bol += vP;
                            } else {
                                cV += vP * 0.12;
                                if (tipo.includes("pix")) {
                                    m.pix += vP;
                                    totalPixIncorporadoVale += vP;
                                }
                                if (tipo.includes("debito")) m.deb += vP;
                                if (tipo.includes("credito")) m.cre += vP;
                            }
                        });
                    }

                    const restante = valorTotalVenda - somaPagamentos;
                    if (restante > 0) {
                        cV += restante * 0.08;
                        m.bol += restante;
                    }
                    
                    i.venda_comissao = cV;
                    
                    if (isIndividual) {
                        vend[vn].com += cV;
                        vend[vn].ent += totalPixIncorporadoVale;
                    } else {
                        vend.Evanio.ent += totalPixIncorporadoVale / 2;
                        vend.Willian.ent += totalPixIncorporadoVale / 2;
                        vend.Evanio.com += cV / 2;
                        vend.Willian.com += cV / 2;
                    }
                    
                    m.com += cV;
                    i.total_pix_din = totalPixIncorporadoVale;

                } else if (i.resultado === "NQ") { 
                    m.nq++; vend[vn].nq++; chartData[dKey].nq++; 
                }
            });

            m.com = Number(m.com) || 0;
            const ticketMedio = m.v > 0 ? (m.tot / m.v) : 0;
            
            const c = custosDB;

            let diffDias = 1;
            let dataInicioRaw = projetoDB.data_inicio;
            if (dataInicioRaw) {

                let hoje = new Date(); hoje.setHours(0,0,0,0);
                diffDias = Math.floor((hoje - inicio) / 86400000) + 1;
                if (diffDias <= 0) diffDias = 1;
            }

            let totalValesEvanio = 0;
            let totalValesWillian = 0;
            Object.values(valesDB || {}).forEach(v => {
                const val = Number(v.valor) || 0;
                if (isIndividual) {
                    if (v.vendedor === "Evanio") totalValesEvanio += val;
                    if (v.vendedor === "Willian") totalValesWillian += val;
                } else {
                    totalValesEvanio += val / 2;
                    totalValesWillian += val / 2;
                }
            });

            document.getElementById('kpi-grid').innerHTML = `

                <div class="card-bi p-3 rounded-3xl text-center"><p class="text-[11px] font-black uppercase text-slate-400">Vendas/NQ</p><p class="text-lg font-black text-white">${m.v}/${m.nq}</p></div>
                <div class="card-bi p-3 rounded-3xl text-center"><p class="text-[11px] font-black uppercase text-white">Ticket Médio</p><p class="text-lg font-black text-white">${fBR(ticketMedio)}</p></div>
                <div class="card-bi p-3 rounded-3xl text-center border-amber-500"><p class="text-[11px] font-black text-amber-500 uppercase">Média Dia</p><p class="text-lg font-black text-white">${((m.v+m.nq)/diffDias).toFixed(2)}</p></div>`;
            
            document.getElementById('comissao-card').innerHTML = `
                <p class="text-[10px] font-black text-slate-500 uppercase mb-1">Comissão Acumulada</p>
                <p class="text-4xl font-black text-white">${fBR(m.com)}</p>
                <p class="text-[9px] text-blue-400 font-bold mt-2 uppercase tracking-tighter">Total bruto do projeto</p>
            `;

            document.getElementById('finance-grid').innerHTML = `

                <div class="glass p-2 rounded-xl text-center text-emerald-400 text-[10px] font-black border-blue-500/50">COMISSÃO TOTAL<br><b class="text-xs text-blue-400">${fBR(m.com)}</b></div>

                        <div>
                            <span class="text-xs text-slate-400">📅 ${i.data?.split('-').reverse().join('/')}</span><br>
                            <b class="text-blue-400">⏰ ${i.horario || '--:--'}</b>
                        </div>
                        <div class="text-right">
                            <span class="text-[12px] uppercase font-black ${statusColor}">${status}</span><br>
                            <span class="text-[10px] text-white uppercase font-black">${i.nome_formando}</span>
                        </div>
                    </div>
                    
                    <div class="mt-2">
                        <a href="${linkZap}" target="_blank" class="text-emerald-400 text-[11px] font-black uppercase flex items-center gap-1 italic">
                            📱 WHATSAPP: ${i.telefone || 'S/N'} 🚀
                        </a>
                    </div>

                    <div class="text-[13px] mt-2 text-slate-300 font-semibold italic">${i.endereco||'S/E'}</div>
                    
                    <div class="grid grid-cols-2 gap-2 mt-3">
                        <a href="${linkGoogle}" target="_blank" class="bg-blue-600/20 border border-blue-500/30 text-center py-2 rounded-xl text-[9px] font-black text-blue-400 uppercase">Google Maps</a>
                        <a href="${linkWaze}" target="_blank" class="bg-amber-600/20 border border-amber-500/30 text-center py-2 rounded-xl text-[9px] font-black text-amber-500 uppercase">Waze</a>
                    </div>

                    <button onclick="window.gerenciarItemAdmin('${i.path}')" class="btn-primary w-full py-3 rounded-xl mt-3 text-[10px] font-black uppercase">Gerenciar / Editar</button>
                </div>`;
            });
        };

        // --- FUNÇÕES DE GESTÃO EXCLUSIVAS PARA ADMIN (COM AUTONOMIA TOTAL) ---

        window.gerenciarItemAdmin = (p) => {
            window.itemPath = p;
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.remove('hidden');
            const f = document.getElementById('gestao-form');
            f.classList.add('hidden');
            
            // Adiciona a opção de alteração direta no menu de gestão
            const menu = document.getElementById('gestao-menu');
            if(!document.getElementById('btn-admin-reagendar')) {
                const btnReagendar = document.createElement('button');
                btnReagendar.id = 'btn-admin-reagendar';
                btnReagendar.className = 'bg-blue-600/20 border border-blue-500/30 p-3 rounded-2xl text-blue-400 font-black uppercase text-[10px]';
                btnReagendar.innerText = 'Alterar Visita (DATA/HORA/ENDEREÇO)';
                btnReagendar.onclick = () => window.fluxoAlterarAdmin();
                menu.appendChild(btnReagendar);
            }
        };

        window.fluxoAlterarAdmin = () => {
            const f = document.getElementById('gestao-form');
            document.getElementById('gestao-menu').classList.add('hidden');
            f.classList.remove('hidden');
            
            const itemOriginal = window.dadosCompletos.find(i => i.path === window.itemPath);

            f.innerHTML = `
                <div class="space-y-3">
                    <h3 class="text-blue-400 font-black text-xs uppercase text-center mb-2">Editar Dados Visita</h3>
                    
                    <p class="text-[8px] text-slate-500 uppercase font-bold ml-1">Data</p>
                    <input type="date" id="nova_data_admin" value="${itemOriginal.data}" class="input-compact text-white" onchange="window.carregarHorariosAdmin()">
                    
                    <p class="text-[8px] text-slate-500 uppercase font-bold ml-1">Horário</p>
                    <select id="novo_horario_admin" class="input-compact text-white">
                        <option value="${itemOriginal.horario}">${itemOriginal.horario}</option>
                    </select>
                    
                    <p class="text-[8px] text-slate-500 uppercase font-bold ml-1">Endereço</p>
                    <textarea id="novo_endereco_admin" class="input-compact text-white" rows="2">${itemOriginal.endereco}</textarea>

                    <button onclick="window.confirmarReagendamentoAdmin()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs">Salvar Alterações no Firebase</button>
                    <button onclick="window.fecharModalGestao()" class="bg-slate-700 w-full py-3 rounded-xl font-black uppercase text-[10px]">Cancelar</button>
                </div>
            `;
            window.carregarHorariosAdmin();
        };

        window.carregarHorariosAdmin = () => {
            const selectH = document.getElementById('novo_horario_admin');
            const valorAtual = selectH.value;
            selectH.innerHTML = '<option value="">Selecione o Horário</option>';
            
            for (let h = 8; h <= 23.5; h += 0.5) {
                const hh = Math.floor(h).toString().padStart(2, '0'); 
                const mm = (h % 1 === 0) ? '00' : '30';
                const format = `${hh}:${mm}`;
                const selected = format === valorAtual ? 'selected' : '';
                selectH.innerHTML += `<option value="${format}" ${selected}>${format}</option>`;
            }
        };

        window.confirmarReagendamentoAdmin = async () => {
            const novaData = document.getElementById('nova_data_admin').value;
            const novoHorario = document.getElementById('novo_horario_admin').value;
            const novoEndereco = document.getElementById('novo_endereco_admin').value;
            
            if(!novaData || !novoHorario || !novoEndereco) return alert("Preencha todos os campos!");

            try {
                const itemOriginal = window.dadosCompletos.find(i => i.path === window.itemPath);
                if (!itemOriginal) return alert("Erro ao localizar registro.");

                const basePasta = window.itemPath.split('/').slice(0, -2).join('/');
                const idOriginal = itemOriginal.id;

                // Se mudou a data, precisamos mover o nó no Firebase
                if (itemOriginal.data !== novaData) {
                    const novoPath = `${basePasta}/${novaData}/${idOriginal}`;
                    
                    await set(ref(db, novoPath), { 
                        ...itemOriginal, 
                        data: novaData, 
                        horario: novoHorario,
                        endereco: novoEndereco,
                        editado_em: new Date().toLocaleString()
                    });

                    // Remove da posição antiga (comentado por segurança em testes, mas habilitado aqui conforme pedido)
                    await remove(ref(db, window.itemPath));
                } else {
                    // Se apenas mudou hora ou endereço, faz update normal
                    await update(ref(db, window.itemPath), { 
                        horario: novoHorario,
                        endereco: novoEndereco,
                        editado_em: new Date().toLocaleString()
                    });
                }

                alert("✅ Dados atualizados com sucesso no Firebase!");
                window.fecharModalGestao();
                window.carregarRelatorio();
            } catch (e) {
                console.error(e);
                alert("Erro ao salvar alterações.");
            }
        };

        window.gerarBotoesDatas = (inicio, fim) => {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            let atual = new Date(inicio + "T00:00:00");
            const dataLimite = new Date(fim + "T00:00:00");
            const hoje = new Date();
            hoje.setSeconds(0, 0);

            while (atual <= dataLimite) {
                const iso = atual.toISOString().split('T')[0];
                let mostrarDia = true;
                const hojeIso = hoje.toISOString().split('T')[0];
                if (iso < hojeIso) {
                    mostrarDia = false;
                }

                if (mostrarDia) {
                    const btn = document.createElement('button'); btn.className = "day-btn text-white";
                    btn.innerText = atual.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
                    btn.onclick = () => { 
                        document.querySelectorAll('.day-btn').forEach(x => x.classList.remove('active')); btn.classList.add('active'); 
                        document.getElementById('data-selecionada').value = iso; window.carregarHorarios(iso); 
                    };
                    container.appendChild(btn);
                }
                atual.setDate(atual.getDate() + 1);
            }
        };

        window.carregarHorarios = async (iso) => {
            const selectH = document.getElementById('horario'); selectH.innerHTML = '<option>...</option>';
            const snap = await get(ref(db, `dados/${projId}/agendamentos/${iso}`));
            const ag = snap.exists() ? snap.val() : {};
            selectH.innerHTML = '<option value="">Selecione o Horário</option>';
            
            const hoje = new Date();
            
            for (let h = 9; h <= 21; h += 0.5) { // Horário comercial padrão portal
                const hh = Math.floor(h).toString().padStart(2, '0'); 
                const mm = (h % 1 === 0) ? '00' : '30';
                const format = `${hh}:${mm}`;

                if (iso === hoje.toISOString().split('T')[0]) {
                    const agoraDecimal = hoje.getHours() + (hoje.getMinutes() / 60);
                    if (h < agoraDecimal + 3) continue; 
                }

                const limiteAgendamentos = (projetoDB.comissao_individual === true) ? 1 : 2;
                if (Object.values(ag).filter(a => a.horario === format).length < limiteAgendamentos) {
                    selectH.innerHTML += `<option value="${format}">${format}</option>`;
                }
            }
        };

        document.getElementById('form-agendamento').onsubmit = async (e) => {
            e.preventDefault(); const dt = document.getElementById('data-selecionada').value; if (!dt) return alert("Selecione o Dia!");
            const n = document.getElementById('nome').value; const t = document.getElementById('telefone').value; const h = document.getElementById('horario').value; const ed = document.getElementById('endereco').value;
            const zapAviso = (projetoDB.criador === "Willian") ? "16988722130" : "16992590916";
            await set(ref(db, `dados/${projId}/agendamentos/${dt}/AG-${Date.now()}`), { nome_formando: n, telefone: t, endereco: ed, horario: h, resultado: "Pendente" });
            const msg = `✅ *NOVA VISITA* \n\n🏫 *Escola:* ${projetoDB.escola || 'Não informada'}\n🎓 *Formando:* ${n}\n📅 *Data:* ${dt.split('-').reverse().join('/')}\n⏰ *Horário:* ${h}\n📍 *Endereço:* ${ed}\n📱 *WhatsApp:* ${t}`;
            alert("✅ AGENDADO!"); window.location.href = `https://wa.me/55${zapAviso.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
        };

        window.renderFila = () => { 
            const cont = document.getElementById('lista-fila'); 
            if (!cont) return; 
            const lista = projetoDB.automacao?.lista?.split('\n').filter(l => l.trim() !== "") || []; 
            const atual = projetoDB.automacao?.index_atual || 0; 
            cont.innerHTML = lista.map((l, i) => `<div class="flex justify-between p-2 rounded-lg ${i < atual ? 'bg-emerald-500/10 text-emerald-500' : 'bg-white/5'}"><span>${i+1}. ${l.split(',')[0].split(';')[0]}</span><b>${i < atual ? 'OK' : 'PENDENTE'}</b></div>`).join(''); 
        };

        window.resetIndex = async () => {
            const user = localStorage.getItem('userType');
            const isAdmin = localStorage.getItem('isAdmin') === 'true';
            if(!isAdmin && projetoDB.criador !== user) return alert("Apenas o criador pode reiniciar a fila.");
            if(confirm("Reiniciar a fila?")) {
                await update(ref(db, `projetos/${projId}/automacao`), { index_atual: 0 });
                projetoDB.automacao.index_atual = 0;
                window.renderFila();
            }
        };
        
        // window.fecharModalGestao original mantido para compatibilidade global
        window.fecharModalGestao = () => { 
            document.getElementById('modalGestao').style.display='none'; 
            document.getElementById('gestao-menu').classList.remove('hidden'); 
            document.getElementById('gestao-form').classList.add('hidden'); 
            
            // Limpeza do botão dinâmico para não duplicar ao reabrir
            const btn = document.getElementById('btn-admin-reagendar');
            if(btn) btn.remove();
        };

    </script>
</body>
</html>
