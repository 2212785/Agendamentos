<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite BI Intelligence v12.85</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: center; justify-content: center; padding: 20px; }
        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 3px solid #3b82f6; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-xl font-black uppercase text-blue-400">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-8 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 transition">1. Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 border border-rose-500/30 p-4 rounded-2xl text-rose-500 font-black uppercase text-xs">2. Marcar NQ</button>
                <button onclick="window.fluxoEditar()" class="bg-blue-600/10 border border-blue-500/30 p-4 rounded-2xl text-blue-400 font-black uppercase text-xs">3. Editar Cadastro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[10px] uppercase font-bold mt-4 text-center hover:text-rose-500 transition">Excluir permanente</button>
            </div>
            <div id="gestao-form" class="hidden space-y-4"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-6 flex justify-between items-center w-full">
            <span class="text-xl font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase">ADM</button>
        </header>
        <main class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl text-center border border-white/5">
                <h2 id="escola-titulo" class="text-2xl font-extrabold uppercase text-blue-400 italic">CARREGANDO...</h2>
                <h3 id="sub-escola" class="text-xs font-bold text-slate-400 uppercase tracking-widest italic mb-8">BUSCANDO PROJETO</h3>
                <form id="form-agendamento" class="space-y-4">
                    <div class="grid grid-cols-2 gap-2 mb-4" id="day-selector"></div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white"><option value="">Horário</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-5 rounded-2xl font-black uppercase shadow-lg text-white">Finalizar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-logistica" class="view-section p-6">
        <div class="max-w-4xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-6">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Visitas</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400 text-white">BI Dashboard</button>
                </div>
            </nav>
            <div id="lista-visitas" class="space-y-3"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section p-6">
        <div class="max-w-7xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-10 text-white">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white">← Voltar</button>
                <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Copiar Zap</button>
            </nav>
            <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8"></div>
            <div id="saldo-card" class="glass rounded-[3rem] p-8 border-l-8 border-emerald-500 mb-8 space-y-4 text-white"></div>
            <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-6 gap-4 mb-8 text-[10px] text-white"></div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        window.projetoAtualId = ""; window.labelsAtivas = { cidade: "...", escola: "..." };
        let configProjetoAtual = {}; window.dadosCompletos = []; window.valesAvulsos = []; window.dadosAtuaisRelatorio = {};

        // --- FUNÇÃO ChatGPT (ATUALIZAR DOM) ---
        window.atualizarTitulosDOM = () => {
            const h2 = document.getElementById('escola-titulo');
            const h3 = document.getElementById('sub-escola');
            if(!h2 || !h3) return;

            let cidade = window.labelsAtivas?.cidade;
            let escola = window.labelsAtivas?.escola;

            if(!cidade || cidade === "...") cidade = localStorage.getItem("last_city");
            if(!escola || escola === "...") escola = localStorage.getItem("last_school");

            if(cidade) h2.textContent = cidade;
            if(escola) h3.textContent = escola;
        };

        document.addEventListener("DOMContentLoaded", () => {
            window.atualizarTitulosDOM();
        });

        // --- BI E LOGISTICA ---
        window.filtrarBI = () => {
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, vales:0, com:0 };
            let vE = (projetoAtualId === "guaratingueta-guilherme") ? 1950.0 : 0, vW = (projetoAtualId === "guaratingueta-guilherme") ? 2755.0 : 0;

            window.dadosCompletos.forEach(i => {
                if(i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor)||0;
                    let cV = 0;
                    (i.pagamentos || []).forEach(p => {
                        const vP = Number(p.valor) || 0; const t = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        const isV = (t.includes("pix") || t.includes("dinheiro") || t.includes("entrada")) && !t.includes("debito") && !t.includes("credito");
                        if(isV) { m.vales += vP; if(i.vendedor === "Evanio") vE += vP; else if(i.vendedor === "Willian") vW += vP; }
                        if(t.includes("pix")) m.pix += vP; else if(t.includes("dinheiro")) m.din += vP; else if(t.includes("debito")) m.deb += vP; else if(t.includes("credito")) m.cre += vP; else if(t.includes("boleto")) m.bol += vP;
                        cV += (t.includes("entrada")) ? vP * 0.12 : vP * 0.08;
                    });
                    m.com += cV;
                } else if(i.resultado === "NQ") m.nq++;
            });

            window.valesAvulsos.forEach(v => { m.vales += v.valor; if(v.vendedor === "Evanio") vE += v.valor; else vW += v.valor; });
            const p = configProjetoAtual; const nP = parseInt(p.operacao_pessoas) || 2;
            const rT = ((((parseFloat(p.km_total)||0)*0.7) + (parseFloat(p.pedagio_total)||0)) + ((parseFloat(p.hosp_valor)||0)*(parseInt(p.hosp_qtd)||0) + (parseFloat(p.alim_valor)||0)*(parseInt(p.alim_qtd)||0))) * nP;
            const cM = m.com / 2, rM = rT / 2; window.dadosAtuaisRelatorio = m;

            document.getElementById('saldo-card').innerHTML = `
                <div class="text-center border-b border-white/5 pb-2 mb-4"><p class="text-[10px] uppercase font-black text-blue-400">Total Operação</p><p class="text-2xl font-black text-white">${fBR(m.com + rT)}</p></div>
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-1"><p class="text-[10px] font-black text-emerald-400">EVANIO</p>
                    <div class="flex justify-between text-[10px]"><span>Crédito (Comis+Reem)</span><span>${fBR(cM + rM)}</span></div>
                    <div class="flex justify-between text-[10px] text-rose-400"><span>Vales Individuais</span><span>- ${fBR(vE)}</span></div>
                    <div class="flex justify-between font-black border-t border-white/10 pt-1 text-white"><span>A RECEBER</span><span>${fBR(cM+rM-vE)}</span></div>
                </div>
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-1 mt-4"><p class="text-[10px] font-black text-cyan-400">WILLIAN</p>
                    <div class="flex justify-between text-[10px]"><span>Crédito (Comis+Reem)</span><span>${fBR(cM + rM)}</span></div>
                    <div class="flex justify-between text-[10px] text-rose-400"><span>Vales Individuais</span><span>- ${fBR(vW)}</span></div>
                    <div class="flex justify-between font-black border-t border-white/10 pt-1 text-white"><span>A RECEBER</span><span>${fBR(cM+rM-vW)}</span></div>
                </div>`;

            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-4 rounded-3xl"><p class="text-[8px] uppercase">Vendas</p><p class="text-lg font-black text-white">${fBR(m.tot)}</p></div><div class="card-bi p-4 rounded-3xl"><p class="text-[8px] uppercase">Vendas/NQ</p><p class="text-lg font-black text-white">${m.v}/${m.nq}</p></div><div class="card-bi p-4 rounded-3xl"><p class="text-[8px] uppercase">Comissão</p><p class="text-lg font-black text-white">${fBR(m.com)}</p></div><div class="card-bi p-4 rounded-3xl"><p class="text-[8px] uppercase">Reembolso</p><p class="text-lg font-black text-white">${fBR(rT)}</p></div><div class="card-bi p-4 rounded-3xl"><p class="text-[8px] uppercase">Vales</p><p class="text-lg font-black text-white">${fBR(m.vales)}</p></div>`;
            document.getElementById('finance-grid').innerHTML = `<div class="glass p-2 text-center text-white">Pix: ${fBR(m.pix)}</div><div class="glass p-2 text-center text-white">Din: ${fBR(m.din)}</div><div class="glass p-2 text-center text-white">Deb: ${fBR(m.deb)}</div><div class="glass p-2 text-center text-white">Cre: ${fBR(m.cre)}</div><div class="glass p-2 text-center text-white">Bol: ${fBR(m.bol)}</div>`;
        };

        window.filtrarLogistica = () => {
            const container = document.getElementById('lista-visitas'); if(!container) return;
            container.innerHTML = '';
            window.dadosCompletos.forEach(i => {
                let cor = i.resultado === "Venda" ? "border-emerald-500 bg-emerald-500/10" : (i.resultado === "NQ" ? "border-rose-500 bg-rose-500/10" : "border-slate-500/20");
                container.innerHTML += `<div class="glass p-4 rounded-3xl border-l-4 ${cor} flex justify-between items-center text-white"><div><p class="text-[10px] font-bold text-slate-500">${i.resultado||'PENDENTE'} | ${i.horario||'DIR'}</p><h3 class="text-base font-black uppercase text-white">${i.nome_formando}</h3></div><button onclick="window.gerenciarItem('${i.path.replace(/'/g,"\\'")}', '${i.nome_formando}')" class="btn-primary px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Gerenciar</button></div>`;
            });
        };

        window.carregarRelatorio = async () => {
            const id = projetoAtualId;
            const [sA, sV, sVale] = await Promise.all([get(ref(db, `dados/${id}/agendamentos`)), get(ref(db, `dados/${id}/avulsos`)), get(ref(db, `dados/${id}/vales`))]);
            window.dadosCompletos = [];
            const ags = sA.val() || {}; Object.keys(ags).forEach(d => { if(ags[d]) Object.keys(ags[d]).forEach(k => window.dadosCompletos.push({...ags[d][k], id:k, data:d, path: `dados/${id}/agendamentos/${d}/${k}`})); });
            const avs = sV.val() || {}; Object.keys(avs).forEach(k => window.dadosCompletos.push({...avs[k], id:k, path: `dados/${id}/avulsos/${k}`, data: avs[k].data}));
            window.valesAvulsos = []; const v = sVale.val() || {}; Object.keys(v).forEach(k => window.valesAvulsos.push(v[k]));
            window.filtrarLogistica(); window.filtrarBI();
        };

        // --- CONEXÃO MESTRE (VÍNCULO REATIVO) ---
        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projetoAtualId = snap.val() || "guaratingueta-guilherme";
            const projSnap = await get(ref(db, `config/projetos/${projetoAtualId}`));
            if(projSnap.exists()){
                configProjetoAtual = projSnap.val();
                console.log("Projeto carregado:", configProjetoAtual);
                window.labelsAtivas = { cidade: configProjetoAtual.cidade, escola: configProjetoAtual.escola };
                localStorage.setItem('last_city', configProjetoAtual.cidade);
                localStorage.setItem('last_school', configProjetoAtual.escola);
                
                // ESCREVE NA TELA NO MOMENTO QUE O DADO CHEGA
                window.atualizarTitulosDOM();
                
                if(configProjetoAtual.data_inicio) window.gerarBotoesDatas(configProjetoAtual.data_inicio, configProjetoAtual.data_fim);
                window.carregarRelatorio();
            }
        });

        // --- INTERFACE PADRAO ---
        window.switchView = (id) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active')); document.getElementById(id).classList.add('view-active'); window.carregarRelatorio(); };
        window.acessoAdmin = () => { if(prompt("Senha:") === "2025") { window.switchView('view-logistica'); } };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); window.carregarRelatorio(); };
        window.gerenciarItem = (p, n) => { window.itemPath = p; window.currentName = n; document.getElementById('modalGestao').style.display = 'flex'; };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s }); window.fecharModalGestao(); };
        window.fluxoResultado = () => {
            document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            f.innerHTML = `<select id="vV" class="w-full bg-slate-900 p-4 rounded-xl mb-3 text-white outline-none"><option value="Evanio">Evanio</option><option value="Willian">Willian</option></select><input type="number" id="vT" placeholder="VALOR TOTAL" class="w-full bg-slate-900 p-4 rounded-xl mb-4 text-white font-black text-2xl outline-none"><button onclick="window.finalizarVenda()" class="w-full p-4 bg-emerald-600 rounded-xl font-black">SALVAR</button>`;
        };
        window.finalizarVenda = async () => {
            const tot = parseFloat(document.getElementById('vT').value); const v = document.getElementById('vV').value; if(!tot || !v) return alert("Erro!");
            await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, vendedor: v }); window.fecharModalGestao();
        };
        window.copiarRelatorio = () => {
            const m = window.dadosAtuaisRelatorio; const tk = m.v ? (m.tot / m.v) : 0;
            const cid = localStorage.getItem('last_city') || "Projeto";
            const esc = localStorage.getItem('last_school') || "";
            let t = `Relatório de Vendas\nProjeto: ${cid} - ${esc}\n\n✅ Vendas: ${m.v}\n❌ NQ: ${m.nq}\n\n💵 Dinheiro: ${fBR(m.din)}\n💎 Pix: ${fBR(m.pix)}\n💳 Débito: ${fBR(m.deb)}\n💳 Crédito: ${fBR(m.cre)}\n📄 Boleto: ${fBR(m.bol)}\n💸 Vales: ${fBR(m.vales)}\n\n💰 Total Vendido: ${fBR(m.tot)}\n🎯 Ticket Médio: ${fBR(tk)}`;
            navigator.clipboard.writeText(t).then(() => alert("Copiado!"));
        };
        window.gerarBotoesDatas = (inicio, fim) => { const container = document.getElementById('day-selector'); if(!container) return; container.innerHTML = ""; let cur = new Date(inicio + "T00:00:00"); const end = new Date(fim + "T00:00:00"); while(cur <= end) { const iso = cur.toISOString().split('T')[0]; const lab = cur.toLocaleDateString('pt-BR', {weekday: 'short', day: '2-digit', month: '2-digit'}); container.innerHTML += `<button type="button" data-date="${iso}" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase text-white">${lab}</button>`; cur.setDate(cur.getDate() + 1); } };
    </script>
</body>
</html>
