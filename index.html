<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales PRO - v5.5 Ultra BI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .card-bi { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.05); border-top: 3px solid #3b82f6; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: center; justify-content: center; padding: 20px; }
        .table-header { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8"><h2 class="text-xl font-black uppercase text-blue-400">Gerenciar</h2><button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button></div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-8 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 hover:text-white transition">Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 text-rose-500 p-4 rounded-2xl font-bold uppercase text-xs">NQ</button>
            </div>
            <div id="gestao-form" class="hidden space-y-4"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active">
        <header class="p-6 flex justify-between items-center w-full">
            <span class="text-xl font-black uppercase italic text-white">Elite <span class="text-blue-500">Sales</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white">Painel ADM</button>
        </header>
        <main class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-12 rounded-[3rem] w-full max-w-md shadow-2xl text-center">
                <h2 id="escola-titulo" class="text-2xl font-extrabold uppercase text-blue-400 italic">Carregando...</h2>
                <form id="form-agendamento" class="mt-8 space-y-4 text-white">
                    <div class="grid grid-cols-2 gap-2 mb-4" id="day-selector">
                        <button type="button" data-date="2026-03-07" onclick="window.selecionarDia(this)" class="day-btn hidden rounded-2xl py-4 text-[10px] font-black uppercase border border-white/10">Sab 07/03</button>
                        <button type="button" data-date="2026-03-08" onclick="window.selecionarDia(this)" class="day-btn hidden rounded-2xl py-4 text-[10px] font-black uppercase border border-white/10">Dom 08/03</button>
                    </div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-5 rounded-2xl font-black uppercase text-white">Agendar Visita</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-logistica" class="view-section p-6">
        <div class="max-w-4xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-10">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-white">Visitas</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400">Resultados BI</button>
                </div>
            </nav>
            <div id="lista-visitas" class="space-y-4"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section p-6 text-white">
        <div class="max-w-7xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-10">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Voltar</button>
                <div class="flex gap-4 items-center">
                    <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs text-white outline-none">
                    <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">Relatório Zap</button>
                </div>
            </nav>

            <div id="bi-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                </div>

            <div class="glass rounded-[2.5rem] p-8 mb-8 overflow-hidden">
                <h3 class="font-black uppercase text-[10px] mb-6 text-slate-400 tracking-widest italic">Detalhamento por Cliente</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-white/5">
                                <th class="p-4 table-header">Formando</th>
                                <th class="p-4 table-header">Venda Total</th>
                                <th class="p-4 table-header">Pagamento</th>
                                <th class="p-4 table-header">Sua Comissão</th>
                            </tr>
                        </thead>
                        <tbody id="extrato-tabela"></tbody>
                    </table>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass rounded-[3rem] p-8">
                    <h3 class="font-black uppercase text-[10px] mb-8 text-slate-400 tracking-widest">Desempenho por Meio</h3>
                    <canvas id="chartBI" style="max-height: 250px;"></canvas>
                </div>
                <div class="glass rounded-[3rem] p-8 flex flex-col items-center">
                    <h3 class="font-black uppercase text-[10px] mb-8 text-slate-400 tracking-widest text-center">Taxa de Conversão</h3>
                    <div class="relative w-[200px] aspect-square">
                        <canvas id="chartDonut"></canvas>
                        <div id="perc-center" class="absolute inset-0 flex items-center justify-center flex-col">
                            <span class="text-4xl font-black">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        let chart1 = null, chart2 = null;

        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            if(id !== 'view-agendamento') window.carregarDados();
        };

        window.acessoAdmin = () => { if(prompt("Senha:") === "2025") window.switchView('view-logistica'); };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; };

        window.carregarDados = async () => {
            const sAt = await get(ref(db, "config/projeto_ativo"));
            const p = sAt.val();
            const [sA, sV] = await Promise.all([get(ref(db, `dados/${p}/agendamentos`)), get(ref(db, `dados/${p}/avulsos`))]);
            window.dadosCompletos = [];
            const ags = sA.val() || {};
            Object.keys(ags).forEach(d => { if(ags[d]) Object.keys(ags[d]).forEach(id => window.dadosCompletos.push({...ags[d][id], id, data: d, path: `dados/${p}/agendamentos/${d}/${id}`})); });
            const avs = sV.val() || {};
            Object.keys(avs).forEach(id => window.dadosCompletos.push({...avs[id], id, path: `dados/${p}/avulsos/${id}`}));
            window.filtrarLogistica();
            window.filtrarBI();
        };

        window.filtrarLogistica = () => {
            const list = window.dadosCompletos;
            const container = document.getElementById('lista-visitas');
            container.innerHTML = '';
            list.forEach(item => {
                const cor = item.resultado === "Venda" ? "border-emerald-500/40" : (item.resultado === "NQ" ? "border-rose-500/40" : "border-white/10");
                const label = item.resultado === "Venda" ? `<span class="text-emerald-400 font-black text-xs block mb-1">✓ VENDA</span>` : (item.resultado === "NQ" ? `<span class="text-rose-500 font-black text-xs block mb-1">✗ NQ</span>` : "");
                container.innerHTML += `<div class="glass p-6 rounded-3xl border-l-8 ${cor} flex justify-between items-center text-white"><div>${label}<h3 class="text-xl font-bold uppercase">${item.nome_formando}</h3><p class="text-xs text-slate-400">${item.horario || 'Direto'} - ${item.data}</p></div><button onclick="window.gerenciarItem('${item.path}')" class="btn-primary px-8 py-4 rounded-2xl text-[10px] font-black uppercase">Gerenciar</button></div>`;
            });
        };

        window.filtrarBI = () => {
            const fData = document.getElementById('filtro-bi').value;
            let lista = fData ? window.dadosCompletos.filter(i => i.data === fData) : window.dadosCompletos;
            
            let m = { v:0, nq:0, totVenda:0, pix:0, din:0, deb:0, cre:0, bol:0, vales:0, comBruta:0 };
            let rows = '';

            lista.forEach(i => {
                if(i.resultado === "Venda") {
                    m.v++; const vV = Number(i.valor) || 0; m.totVenda += vV;
                    let comI = 0; let pgsI = [];
                    if(Array.isArray(i.pagamentos)) {
                        i.pagamentos.forEach(p => {
                            const vp = Number(p.valor)||0, ent = Number(p.entrada)||0;
                            pgsI.push(p.tipo);
                            if(p.tipo === "Pix") m.pix += vp; else if(p.tipo === "Dinheiro") m.din += vp; else if(p.tipo.includes("Débito")) m.deb += vp; else if(p.tipo.includes("Crédito")) m.cre += vp;
                            else if(p.tipo === "Boleto") { m.bol += (vp-ent); comI += (ent*0.12)+((vp-ent)*0.08); if(p.forma_entrada === "Pix") m.pix += ent; else if(p.forma_entrada === "Dinheiro") m.din += ent; if(ent > 0) m.vales += ent; }
                            if(p.tipo !== "Boleto") { if(p.tipo === "Pix" || p.tipo === "Dinheiro") m.vales += vp; comI += vp * 0.12; }
                        });
                    }
                    m.comBruta += comI;
                    rows += `<tr class="border-b border-white/5 hover:bg-white/5 transition"><td class="p-4 text-sm font-bold uppercase">${i.nome_formando}</td><td class="p-4 text-sm text-emerald-400 font-bold">${fBR(vV)}</td><td class="p-4 text-[10px] text-slate-400 uppercase">${pgsI.join(' / ')}</td><td class="p-4 text-sm font-black">${fBR(comI)}</td></tr>`;
                } else if(i.resultado === "NQ") m.nq++;
            });

            const tx = (m.v + m.nq) > 0 ? ((m.v / (m.v + m.nq)) * 100).toFixed(0) : 0;
            document.getElementById('bi-grid').innerHTML = `
                <div class="card-bi p-6 rounded-3xl border-emerald-500 bg-emerald-950/10"><p class="text-[9px] font-bold text-emerald-500 uppercase">Faturamento Total</p><p class="text-4xl font-black text-emerald-400">${fBR(m.totVenda)}</p></div>
                <div class="card-bi p-6 rounded-3xl border-cyan-400"><p class="text-[9px] font-bold text-cyan-400 uppercase">Comissão Bruta</p><p class="text-4xl font-black">${fBR(m.comBruta)}</p></div>
                <div class="card-bi p-6 rounded-3xl border-amber-500 bg-amber-950/10"><p class="text-[9px] font-bold text-amber-500 uppercase">Total de Vales (Em mãos)</p><p class="text-4xl font-black text-amber-500">${fBR(m.vales)}</p></div>
                <div class="card-bi p-6 rounded-3xl border-white"><p class="text-[9px] font-bold text-slate-400 uppercase">Líquido a Receber</p><p class="text-4xl font-black text-white">${fBR(m.comBruta - m.vales)}</p></div>
            `;
            document.getElementById('extrato-tabela').innerHTML = rows || '<tr><td colspan="4" class="p-8 text-center text-slate-500 uppercase text-xs">Nenhuma venda encontrada</td></tr>';
            document.getElementById('perc-center').children[0].innerText = tx + "%";
            
            // Gráficos (Simples)
            if(chart1) chart1.destroy();
            chart1 = new Chart(document.getElementById('chartBI'), { type: 'bar', data: { labels: ['Pix', 'Din', 'Déb', 'Créd', 'Bol'], datasets: [{ data: [m.pix, m.din, m.deb, m.cre, m.bol], backgroundColor: ['#22d3ee', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6'] }] } });
            if(chart2) chart2.destroy();
            chart2 = new Chart(document.getElementById('chartDonut'), { type: 'doughnut', data: { datasets: [{ data: [m.v, m.nq || 0.1], backgroundColor: ['#10b981', '#1e293b'], borderWidth: 0 }] } });
        };

        // GESTÃO (Funções de salvar venda mantidas da versão anterior)
        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display = 'flex'; };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s, valor: 0 }); window.fecharModalGestao(); await window.carregarDados(); };
        window.fluxoResultado = () => { document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<input type="number" id="vTotal" placeholder="VALOR TOTAL" class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-white outline-none"><div class="grid grid-cols-2 gap-2 mb-4 text-white"><button onclick="window.addPg('Dinheiro')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Dinheiro</button><button onclick="window.addPg('Pix')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Pix</button><button onclick="window.addPg('Cartão Débito')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Débito</button><button onclick="window.addPg('Cartão Crédito')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Crédito</button><button onclick="window.addPg('Boleto')" class="p-2 bg-blue-900 rounded-lg text-[9px] col-span-2">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-4"></div><button onclick="window.finalizarVenda()" class="w-full p-4 bg-emerald-600 rounded-xl font-black text-white">SALVAR</button>`; window.tempPgs = []; };
        window.addPg = (tipo) => { const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',','.') || 0); if(v <= 0) return; let pg = { tipo, valor: v }; if(tipo === 'Boleto') { const ent = prompt("Entrada? 1-Sim 2-Não"); if(ent === "1") { pg.entrada = parseFloat(prompt("Valor Entrada:")?.replace(',','.') || 0); const fE = prompt("Forma: 1-Dinheiro 2-Pix"); pg.forma_entrada = fE === "1" ? "Dinheiro" : "Pix"; } } window.tempPgs.push(pg); document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]"><span>${p.tipo}</span><span class="text-emerald-400">${fBR(p.valor)}</span></div>`).join(''); };
        window.finalizarVenda = async () => { const tot = parseFloat(document.getElementById('vTotal').value); if(!tot) return alert("Valor!"); await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, pagamentos: window.tempPgs }); window.fecharModalGestao(); await window.carregarDados(); };

        // RELATÓRIO ZAP
        window.copiarRelatorio = () => {
            const dF = document.getElementById('filtro-bi').value;
            let v=0, nq=0, totV=0, com=0, val=0;
            const listaBase = dF ? window.dadosCompletos.filter(i => i.data === dF) : window.dadosCompletos;
            listaBase.forEach(item => {
                if(item.resultado === "Venda") { v++; totV += Number(item.valor)||0; 
                    if(Array.isArray(item.pagamentos)) { item.pagamentos.forEach(p => { 
                        const vp = Number(p.valor)||0, ent = Number(p.entrada)||0;
                        if(p.tipo === 'Boleto') { com += (ent*0.12)+((vp-ent)*0.08); val += ent; } else { com += vp*0.12; if(p.tipo==='Pix'||p.tipo==='Dinheiro') val+=vp; }
                    }); }
                } else if(item.resultado === "NQ") nq++;
            });
            const txt = `*RELATÓRIO DE VENDAS*\n📅 Data: ${dF || 'Acumulado'}\n\n✅ Vendas: ${v}\n❌ NQ: ${nq}\n\n💰 Faturamento: ${fBR(totV)}\n💎 Comiss. Bruta: ${fBR(com)}\n💸 Vales: ${fBR(val)}\n💵 Líquido: ${fBR(com-val)}`;
            const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("COPIADO!");
        };

        // INICIALIZAÇÃO (Simplificada)
        (async () => {
            const agora = new Date();
            const dHoje = agora.toLocaleDateString('en-CA');
            document.querySelectorAll('.day-btn').forEach(btn => { if(btn.getAttribute("data-date") >= dHoje) btn.classList.remove('hidden'); });
            const sAt = await get(ref(db, "config/projeto_ativo"));
            const p = sAt.val();
            const sIn = await get(ref(db, `config/projetos/${p}`));
            if(sIn.exists()){ document.getElementById('escola-titulo').innerText = sIn.val().cidade; }
            document.getElementById("form-agendamento").addEventListener("submit", async function(e){
                e.preventDefault(); const n = document.getElementById("nome").value, t = document.getElementById("telefone").value, en = document.getElementById("endereco").value, h = document.getElementById("horario").value, d = document.getElementById("data-selecionada").value;
                await set(ref(db, `dados/${p}/agendamentos/${d}/${h.replace(":","-")}-${Date.now()}`), { nome_formando: n, telefone: t, endereco: en, horario: h, data: d, resultado: "Pendente" });
                location.reload();
            });
        })();

        window.selecionarDia = (btn) => { document.querySelectorAll('.day-btn').forEach(b => b.classList.add('border-white/10')); btn.classList.remove('border-white/10'); btn.classList.add('border-blue-500'); document.getElementById('data-selecionada').value = btn.getAttribute('data-date'); document.getElementById('horario').innerHTML = '<option value="09:00">09:00</option><option value="10:00">10:00</option><option value="11:00">11:00</option>'; };
    </script>
</body>
</html>
