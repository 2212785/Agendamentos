<!DOCTYPE html>              
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Master - v28.01 PLATINUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }

        .view-section {
            display: none;
            min-height: 100vh;
            width: 100%;
            flex-direction: column;
        }

        .view-active {
            display: flex !important;
        }

        .card-bi {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
        }

        #modalGestao {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.98);
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .input-compact {
            padding: 0.8rem !important;
            border-radius: 1rem !important;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 100%;
            outline: none;
        }

        .day-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            padding: 12px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: 800;
            color: white;
        }

        .day-btn.active {
            background: #3b82f6 !important;
            border-color: #60a5fa !important;
        }

        .label-custo {
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 4px;
            margin-left: 4px;
            display: block;
        }

        .led-bot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .led-offline {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }

        .led-online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .footer-links {
            padding: 20px;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            color: #475569;
            letter-spacing: 1px;
        }

        .footer-links a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
            margin: 0 5px;
        }

        .footer-links a:hover {
            color: #3b82f6;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>

<body>

    <div id="modalGestao">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 shadow-2xl text-white mx-auto mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="gestao-titulo" class="text-lg font-black uppercase text-blue-400">Gestão</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase text-sm">Registrar Venda</button>
                <button onclick="window.fluxoNQ()" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">Marcar NQ</button>
                <button onclick="window.limparRegistroVisita()" class="bg-slate-700/50 border border-white/10 p-3 rounded-2xl text-white font-black uppercase text-[10px]">Limpar Registro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir Registro</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 pb-6 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center text-white">
            <div class="flex flex-col">
                <span class="text-lg font-black uppercase italic tracking-tighter text-white">Portal <span class="text-blue-500">Elite</span></span>
                <div class="flex items-center mt-[-4px]">
                    <span id="bot-led" class="led-bot led-offline"></span>
                    <span id="bot-status-text" class="text-[7px] font-bold uppercase text-slate-500">Bot Offline</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="user-display" class="text-[8px] font-black uppercase text-slate-500"></span>
                <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase text-white">Login / ADM</button>
            </div>
        </header>
        <div class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-6 rounded-[2.5rem] w-full max-w-sm text-center">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 leading-none italic">AGUARDE...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-500 mb-4 uppercase italic">CONECTANDO</h3>
                <div class="grid grid-cols-2 gap-1 mb-3" id="day-selector"></div>
                <form id="form-agendamento" class="space-y-2">
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="input-compact text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="input-compact text-white">
                    <select id="horario" required class="input-compact text-white">
                        <option value="">Selecione o Dia</option>
                    </select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="input-compact text-white" rows="2"></textarea>
                    <button type="submit" id="btn-agendar-visita" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-sm">Agendar Visita</button>
                </form>
            </div>
        </div>

        <footer class="footer-links">
            <a href="politica.html">Política</a> | 
            <a href="termos.html">Termos</a> | 
            <a href="exclusao.html">Excluir meus dados</a>
        </footer>
    </section>

    <section id="view-logistica" class="view-section p-4">
        <nav class="flex justify-between items-center mb-6 text-white">
            <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Sair</button>
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button class="bg-blue-600 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase">Visitas</button>
                <button onclick="window.switchView('view-financeiro')" class="px-4 py-1.5 text-slate-400 text-[10px] font-black uppercase">Dashboard BI</button>
            </div>
        </nav>
        <div id="controles-admin" class="hidden flex flex-wrap gap-2 mb-4 justify-center">
            <button onclick="window.abrirNovoProjeto()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-emerald-400 uppercase">Novo Projeto</button>
            <button onclick="window.abrirGestaoCentralizada()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-blue-400 uppercase">Dados Projeto</button>
            <button onclick="window.abrirGestaoVales()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-rose-400 uppercase">Lançar Vales</button>
            <button onclick="window.switchView('view-automacao')" class="bg-amber-500/20 border border-amber-500/30 px-4 py-2 rounded-xl text-[8px] font-black text-amber-500 uppercase italic">Automação PC 🚀</button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none">
            <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ AVULSO</button>
        </div>
        <div id="lista-visitas" class="space-y-3 pb-10"></div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-4 text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <div class="flex gap-2">
                <button onclick="window.menuRelatorio()" class="bg-emerald-600 px-3 py-2 rounded-xl text-[9px] font-black uppercase italic">Copiar Relatório 📋</button>
                <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white outline-none">
            </div>
        </nav>
        <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6 text-white"></div>
        <div id="individual-performance" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-white"></div>
        <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-6 text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div id="comissao-card" class="lg:col-span-1 glass rounded-[2rem] p-5 border-l-4 border-blue-500 text-white"></div>
            <div class="lg:col-span-2 glass rounded-[2rem] p-4 min-h-[300px] text-white overflow-hidden relative">
                <canvas id="weeklyChart"></canvas>
            </div>
        </div>
        <div id="saldo-card" class="glass rounded-[2rem] p-6 border-l-8 border-emerald-500 mb-6 text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-10">
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <div class="flex justify-between items-center mb-3 text-white">
                    <h4 class="text-emerald-400 font-black text-[10px] uppercase">Extrato Vendas</h4>
                    <span class="text-[8px] text-slate-500 text-white uppercase italic">Por Data + Vendedor</span>
                </div>
                <div id="extrato-tabela" class="text-xs text-white"></div>
            </div>
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <h4 class="text-rose-500 font-black text-[10px] mb-3 uppercase text-white">NQ</h4>
                <div id="nq-tabela" class="text-xs text-white"></div>
            </div>
        </div>
    </section>

    <section id="view-automacao" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-6 text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <span class="text-amber-500 font-black text-[10px] uppercase italic text-white">Motor Elite Auto-Zap</span>
        </nav>
        <div class="glass p-8 rounded-[3rem] text-center mb-6 text-white">
            <div id="status-automacao" class="text-[9px] font-black text-slate-500 uppercase mb-2 text-white">Pronto para iniciar</div>
            <div id="timer-display" class="text-5xl font-black text-white mb-6">00:00</div>
            <div class="flex gap-3 justify-center">
                <button id="btn-start-auto" onclick="window.iniciarCampanha()" class="bg-emerald-600 px-8 py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Iniciar Campanha</button>
                <button id="btn-stop-auto" onclick="window.pararCampanha()" class="bg-rose-600 hidden px-8 py-4 rounded-2xl font-black uppercase text-xs">Pausar</button>
            </div>
        </div>
        <div class="glass p-5 rounded-[2rem]">
            <div class="flex justify-between items-center mb-4 text-white">
                <h4 class="text-[10px] font-black uppercase text-blue-400">Fila de Envios</h4>
                <button onclick="window.resetIndex()" class="text-[8px] text-slate-600 font-bold uppercase">Reiniciar Fila</button>
            </div>
            <div id="lista-fila" class="space-y-2 max-h-64 overflow-y-auto text-[10px] text-white"></div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        let projId = "";
        window.dadosCompletos = [];
        let custosDB = {
            km_valor: 0.7,
            km_total: 0,
            hosp_valor: 0,
            hosp_qtd: 0,
            alim_valor: 0,
            alim_qtd: 0,
            pedagio_total: 0
        };
        let valesDB = {};
        let projetoDB = {};
        let weeklyChart = null;

        // --- ACÃO GLOBAL DO ENTER ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (document.activeElement && document.activeElement.id === 'pLista') {
                    return; 
                }

                const btnLogin = document.getElementById('btn-confirmar-login');
                if (btnLogin && document.getElementById('modalGestao').style.display === 'flex') {
                    return btnLogin.click();
                }
                const btnAcaoForm = document.querySelector('#gestao-form button.btn-primary');
                if (btnAcaoForm && !btnAcaoForm.closest('.hidden')) {
                    return btnAcaoForm.click();
                }
                const btnAgendar = document.getElementById('btn-agendar-visita');
                if (btnAgendar && document.activeElement.closest('#form-agendamento')) {
                    return btnAgendar.click();
                }
            }
        });

        // --- MIGRACAO DE ESTRUTURA REVISADA ---
        const realizarMigracaoEstrutura = async () => {
            const snapRaiz = await get(ref(db, "guaratingueta-guilherme"));
            if (snapRaiz.exists()) {
                console.log("Migrando estrutura completa de Dr. Guilherme Filippo...");
                const d = snapRaiz.val();
                
                await set(ref(db, `custos/guaratingueta-guilherme`), {
                    alim_qtd: d.alim_qtd || 0,
                    alim_valor: d.alim_valor || 0,
                    hosp_qtd: d.hosp_qtd || 0,
                    hosp_valor: d.hosp_valor || 0,
                    km_total: d.km_total || 0,
                    km_valor: d.km_valor || 0.7,
                    pedagio_total: d.pedagio_total || 0
                });

                await set(ref(db, `projetos/guaratingueta-guilherme`), {
                    cidade: d.cidade || "Guaratinguetá",
                    escola: d.escola || "Dr. Guilherme Filippo",
                    criador: "Evanio",
                    comissao_individual: false,
                    data_inicio: d.data_inicio || "",
                    data_fim: d.data_fim || "",
                    automacao: { lista: "", msg1: "", msg2: "", msg3: "", msg4: "" },
                    bot: { status: "offline" }
                });

                await remove(ref(db, "guaratingueta-guilherme"));
                console.log("Migração de estrutura v28 concluída com sucesso!");
            }
        };

        // --- INICIALIZAÇÃO MULTIPROJETO DINÂMICA ---
        const urlParams = new URLSearchParams(window.location.search);
        const idDaUrl = urlParams.get('id');

        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            await realizarMigracaoEstrutura(); 
            
            const globalId = snap.val();
            const userLogado = localStorage.getItem('userType');
            
            // BUSCA PROJETO ATIVO SE NÃO HOUVER ID NA URL E ESTIVER LOGADO
            if (!idDaUrl && userLogado) {
                const snapUltimo = await get(ref(db, `config/ultimo_projeto_usuario/${userLogado}`));
                if (snapUltimo.exists()) {
                    const idUltimo = snapUltimo.val();
                    window.location.href = window.location.origin + window.location.pathname + '?id=' + idUltimo;
                    return;
                }
            }

            projId = idDaUrl || localStorage.getItem('currentProject') || globalId;
            
            if (projId) {
                const pS = await get(ref(db, `projetos/${projId}`));
                if (pS.exists()) {
                    projetoDB = pS.val();
                    
                    const isAdmin = localStorage.getItem('isAdmin') === 'true';
                    if(!isAdmin && userLogado && projetoDB.criador !== userLogado && idDaUrl) {
                        alert("Acesso Negado: Este projeto pertence a outro usuário.");
                        window.location.href = window.location.origin + window.location.pathname;
                        return;
                    }

                    document.getElementById('escola-titulo').innerText = projetoDB.escola || "Projeto";
                    document.getElementById('sub-escola').innerText = projetoDB.cidade || "Cidade";
                    if (projetoDB.data_inicio) window.gerarBotoesDatas(projetoDB.data_inicio, projetoDB.data_fim);
                    window.carregarRelatorio();
                    
                    if(userLogado) {
                        document.getElementById('user-display').innerText = `| ${userLogado}`;
                        document.getElementById('controles-admin').classList.remove('hidden');
                        // Salva como último projeto operado
                        update(ref(db, `config/ultimo_projeto_usuario`), { [userLogado]: projId });
                    }

                    onValue(ref(db, `projetos/${projId}/bot`), (botSnap) => {
                        const led = document.getElementById('bot-led');
                        const txt = document.getElementById('bot-status-text');
                        const botData = botSnap.val();
                        if (botData && (botData.status === 'Online' || botData.status === 'online')) {
                            led.className = 'led-bot led-online';
                            txt.innerText = 'Bot Ativo';
                        } else {
                            led.className = 'led-bot led-offline';
                            txt.innerText = 'Bot Offline';
                        }
                    });
                }
            }
        });

        // --- LOGIN E PERMISSÕES ---
        window.acessoAdmin = () => {
            if (localStorage.getItem('userType')) {
                document.getElementById('modalGestao').style.display = 'flex';
                document.getElementById('gestao-menu').classList.remove('hidden');
                document.getElementById('gestao-form').classList.add('hidden');
                
                // NOVO: Integração total dos botões para Admin conforme Regras de Ouro
                const menu = document.getElementById('gestao-menu');
                menu.innerHTML = `
                    <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase text-sm">Registrar Venda</button>
                    <button onclick="window.fluxoNQ()" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">Marcar NQ</button>
                    <button onclick="window.limparRegistroVisita()" class="bg-slate-700/50 border border-white/10 p-3 rounded-2xl text-white font-black uppercase text-[10px]">Limpar Registro</button>
                    <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir Registro</button>
                    <button onclick="window.switchView('view-logistica'); window.fecharModalGestao();" class="btn-primary w-full py-4 rounded-xl text-[10px] font-black uppercase">Painel Logística</button>
                    <button onclick="window.efetuarLogout()" class="bg-rose-600 w-full py-4 rounded-xl text-[10px] font-black uppercase">Sair</button>
                `;
                return;
            }
            
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            
            f.innerHTML = `
                <h3 class="text-blue-400 font-black text-xs uppercase mb-4 text-center">Acesso Restrito</h3>
                <select id="login-user" class="input-compact mb-2">
                    <option value="Evanio">Evanio</option>
                    <option value="Willian">Willian</option>
                </select>
                <input type="password" id="login-pass" placeholder="Senha" class="input-compact mb-4 text-white">
                <button id="btn-confirmar-login" onclick="window.confirmarLogin()" class="btn-primary w-full py-4 rounded-xl text-[10px] font-black uppercase">Entrar</button>
            `;
        };

        window.efetuarLogout = () => {
            localStorage.removeItem('userType');
            localStorage.removeItem('isAdmin');
            localStorage.removeItem('currentProject'); 
            location.href = window.location.origin + window.location.pathname; 
        };

        window.confirmarLogin = async () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            let loginValido = false;
            if (user === "Evanio" && pass === "elite") {
                localStorage.setItem('userType', 'Evanio');
                localStorage.setItem('isAdmin', 'true');
                loginValido = true;
            } else if (user === "Willian" && pass === "2025") {
                localStorage.setItem('userType', 'Willian');
                localStorage.setItem('isAdmin', 'false');
                loginValido = true;
            } else {
                alert("Senha Incorreta!");
                return;
            }

            if (loginValido) {
                try {
                    const snapUltimo = await get(ref(db, `config/ultimo_projeto_usuario/${user}`));
                    if (snapUltimo.exists()) {
                        const idUltimo = snapUltimo.val();
                        localStorage.setItem('currentProject', idUltimo);
                        window.location.href = window.location.origin + window.location.pathname + '?id=' + idUltimo;
                    } else {
                        window.fecharModalGestao();
                        location.reload();
                    }
                } catch (e) {
                    location.reload();
                }
            }
        };

        // --- AVULSOS E VALES ---
        window.abrirAvulso = () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const dataHoje = new Date().toISOString().split('T')[0];

            if (!autoAtivo) return;

                return;
            }

            const listaRaw = projetoDB.automacao?.lista || "";

                return window.pararCampanha();
            }

            let dados = lista[idx].includes(';') ? lista[idx].split(';') : lista[idx].split(',');

                const prox = idx + 1;
                await update(ref(db, `projetos/${projId}/automacao`), { index_atual: prox });

                    throw new Error("Erro no servidor Render");

            const isIndividual = projetoDB.comissao_individual === true;
            list.forEach(i => {
                const vn = i.vendedor || "Willian"; const dKey = i.data || "Sem Data";
                if (!chartData[dKey]) chartData[dKey] = { v: 0, nq: 0 };
                if (!vend[vn]) vend[vn] = { v: 0, nq: 0, tot: 0, com: 0, ent: 0 };
                if (i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor) || 0; vend[vn].v++; vend[vn].tot += Number(i.valor) || 0; chartData[dKey].v++;
                    let cV = 0; let totalPix = 0; let somaP = 0;
                    if (i.pagamentos) {
                        i.pagamentos.forEach(p => {
                            const vP = Number(p.valor) || 0; somaP += vP;
                            const tipo = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                            if (tipo.includes("boleto")) { cV += vP * 0.08; m.bol += vP; }
                            else { cV += vP * 0.12; if (tipo.includes("pix")) { m.pix += vP; totalPix += vP; } if (tipo.includes("debito")) m.deb += vP; if (tipo.includes("credito")) m.cre += vP; }
                        });
                    }
                    const rest = (Number(i.valor) || 0) - somaP; if (rest > 0) { cV += rest * 0.08; m.bol += rest; }
                    i.venda_comissao = cV;
                    if (isIndividual) { vend[vn].com += cV; vend[vn].ent += totalPix; }
                    else { vend.Evanio.ent += totalPix/2; vend.Willian.ent += totalPix/2; vend.Evanio.com += cV/2; vend.Willian.com += cV/2; }
                    m.com += cV;
                } else if (i.resultado === "NQ") { m.nq++; vend[vn].nq++; chartData[dKey].nq++; }
            });
            const c = custosDB; const rI = (Number(c.km_valor)||0.7)*(Number(c.km_total)||0)+(Number(c.pedagio_total)||0)+((Number(c.hosp_valor)||0)*Number(c.hosp_qtd||0))+((Number(c.alim_valor)||0)*Number(c.alim_qtd||0));
            let totalValesEvanio = 0; let totalValesWillian = 0;
            Object.values(valesDB || {}).forEach(v => {
                const val = Number(v.valor) || 0;
                if (isIndividual) { if (v.vendedor === "Evanio") totalValesEvanio += val; if (v.vendedor === "Willian") totalValesWillian += val; }
                else { totalValesEvanio += val / 2; totalValesWillian += val / 2; }
            });
            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-3 rounded-3xl text-center"><p class="text-[11px] font-black text-emerald-400 uppercase">Faturamento</p><p class="text-lg font-black text-white">${fBR(m.tot)}</p></div><div class="card-bi p-3 rounded-3xl text-center border-blue-500"><p class="text-[11px] font-black text-blue-400 uppercase">Eficiência</p><p class="text-lg font-black text-white">${(m.v+m.nq)?(m.v/(m.v+m.nq)*100).toFixed(0):0}%</p></div><div class="card-bi p-3 rounded-3xl text-center"><p class="text-[11px] font-black uppercase text-slate-400">Vendas/NQ</p><p class="text-lg font-black text-white">${m.v}/${m.nq}</p></div><div class="card-bi p-3 rounded-3xl text-center"><p class="text-[11px] font-black uppercase text-white">Ticket Médio</p><p class="text-lg font-black text-white">${fBR(m.v?(m.tot/m.v):0)}</p></div>`;
            document.getElementById('comissao-card').innerHTML = `<p class="text-[10px] font-black text-slate-500 uppercase mb-1">Comissão Acumulada</p><p class="text-4xl font-black text-white">${fBR(m.com)}</p>`;
            document.getElementById('finance-grid').innerHTML = `<div class="glass p-2 rounded-xl text-center text-[10px]">PIX<br><b>${fBR(m.pix)}</b></div><div class="glass p-2 rounded-xl text-center">CARTÃO<br><b>${fBR(m.cre + m.deb)}</b></div><div class="glass p-2 rounded-xl text-center">VALES TOTAL<br><b>${fBR(totalValesEvanio + totalValesWillian + (vend.Evanio?.ent||0) + (vend.Willian?.ent||0))}</b></div><div class="glass p-2 rounded-xl text-center">BOLETO<br><b>${fBR(m.bol)}</b></div>`;
            const uL = localStorage.getItem('userType');
            document.getElementById('saldo-card').innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="bg-blue-600/10 p-8 rounded-[2.5rem]"><p class="text-2xl font-black text-blue-400 mb-4">EVANIO MARTINS</p><div class="flex justify-between">Comissão: <b>${fBR(vend.Evanio?.com||0)}</b></div><div class="flex justify-between">Reembolso: <b>${fBR(isIndividual?(uL==='Evanio'?rI:0):rI)}</b></div><div class="flex justify-between text-rose-400">Vales: <b>- ${fBR(totalValesEvanio+(vend.Evanio?.ent||0))}</b></div><div class="text-xl font-black mt-4 pt-4 border-t border-white/10">Saldo: ${fBR((vend.Evanio?.com||0)+(isIndividual?(uL==='Evanio'?rI:0):rI)-totalValesEvanio-(vend.Evanio?.ent||0))}</div></div><div class="bg-cyan-600/10 p-8 rounded-[2.5rem]"><p class="text-2xl font-black text-cyan-400 mb-4">WILLIAN SEGURA</p><div class="flex justify-between">Comissão: <b>${fBR(vend.Willian?.com||0)}</b></div><div class="flex justify-between">Reembolso: <b>${fBR(isIndividual?(uL==='Willian'?rI:0):rI)}</b></div><div class="flex justify-between text-rose-400">Vales: <b>- ${fBR(totalValesWillian+(vend.Willian?.ent||0))}</b></div><div class="text-xl font-black mt-4 pt-4 border-t border-white/10">Saldo: ${fBR((vend.Willian?.com||0)+(isIndividual?(uL==='Willian'?rI:0):rI)-totalValesWillian-(vend.Willian?.ent||0))}</div></div></div>`;
            window.updateChart(chartData); window.renderExtrato(list);
        };
    </script>
</body>
</html>
