<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Dashboard PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        #admin-modal { display: none; position: fixed; inset: 0; z-index: 50; padding: 20px; overflow-y: auto; background: rgba(2, 6, 23, 0.98); }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; padding: 20px; overflow-y: auto; background: rgba(2, 6, 23, 0.95); align-items: center; justify-content: center; }
        .day-btn { transition: all 0.2s; border-color: rgba(255,255,255,0.1); color: #94a3b8; background: rgba(255,255,255,0.03); cursor: pointer; }
        .day-btn.active { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        canvas { max-height: 200px !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col text-white">

    <div id="modalGestao" class="flex">
        <div class="glass w-full max-w-xl rounded-[2.5rem] p-8 border border-white/20 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-2xl font-black uppercase italic text-blue-400">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-2 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/50 p-6 rounded-2xl hover:bg-emerald-600 transition group text-center">
                    <span class="block text-emerald-400 group-hover:text-white font-black text-xs uppercase">1. Resultado</span>
                </button>
                <button onclick="window.fluxoAlterarData()" class="bg-blue-600/20 border border-blue-500/50 p-6 rounded-2xl hover:bg-blue-600 transition group text-center">
                    <span class="block text-blue-400 group-hover:text-white font-black text-xs uppercase">2. Mudar Data</span>
                </button>
                <button onclick="window.confirmarExclusao()" class="bg-rose-600/20 border border-rose-500/50 p-6 rounded-2xl hover:bg-rose-600 transition group text-center">
                    <span class="block text-rose-400 group-hover:text-white font-black text-xs uppercase">3. Excluir</span>
                </button>
            </div>
            <div id="gestao-form" class="mt-8 hidden space-y-4"></div>
        </div>
    </div>

    <main id="admin-modal">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4">
                <h1 class="text-3xl font-extrabold italic uppercase">Master <span class="text-blue-500 font-black">Dashboard PRO</span></h1>
                <div class="flex flex-wrap gap-3 w-full lg:w-auto">
                    <button onclick="window.lancarVendaDireta()" class="flex-1 lg:flex-none bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase shadow">Venda Direta</button>
                    <button onclick="window.enviarRelatorioWhats()" class="flex-1 lg:flex-none bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase shadow">Relatório WhatsApp</button>
                    <button onclick="window.fecharAdmin()" class="flex-1 lg:flex-none bg-rose-600/20 text-rose-500 border border-rose-500/50 px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase font-black">Sair</button>
                </div>
            </div>

            <div id="resumo-financeiro" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-6"></div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass p-6 rounded-[2rem] border-white/5">
                        <h3 class="text-sm font-bold uppercase mb-4 flex items-center gap-2">Vendas por Período</h3>
                        <canvas id="graficoVendas"></canvas>
                    </div>
                    <div class="glass rounded-[2rem] overflow-hidden border-white/5">
                        <div class="p-6 pb-0 flex justify-between items-center">
                            <h3 class="text-lg font-bold uppercase text-white">Roteiro de Atendimento</h3>
                            <input type="text" id="busca-admin" onkeyup="window.filtrarLista()" placeholder="Pesquisar..." class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm text-white outline-none w-48 sm:w-64">
                        </div>
                        <div id="admin-content" class="overflow-x-auto p-4"></div>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="glass rounded-[2rem] p-6 border-white/5">
                        <h3 class="text-lg font-bold text-white uppercase italic mb-4 text-center">Extrato Comissões</h3>
                        <div id="comissao-content" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
                        <div id="fechamento-final" class="mt-6 border-t border-white/10 pt-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <header class="p-6 flex justify-between items-center">
        <span class="text-2xl font-black italic uppercase">Portal <span class="text-blue-500">do formando</span></span>
        <button onclick="window.acessoAdmin()" class="glass px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase border-white/20">Login ADM</button>
    </header>

    <main class="container mx-auto p-4 flex-grow flex items-center justify-center">
        <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl text-center border-white/5">
            <h2 class="text-3xl font-black mb-10 uppercase italic text-white">Agendar Visita</h2>
            <form id="form-agendamento" class="space-y-6 text-left">
                <div class="grid grid-cols-2 gap-2" id="day-selector">
                    <button type="button" data-date="2026-03-04" class="day-btn border rounded-2xl py-4 text-[10px] font-black uppercase">04/03<br>Qua</button>
                    <button type="button" data-date="2026-03-05" class="day-btn border rounded-2xl py-4 text-[10px] font-black uppercase">05/03<br>Qui</button>
                    <button type="button" data-date="2026-03-06" class="day-btn border rounded-2xl py-4 text-[10px] font-black uppercase">06/03<br>Sex</button>
                    <button type="button" data-date="2026-03-07" class="day-btn border rounded-2xl py-4 text-[10px] font-black uppercase">07/03<br>Sab</button>
                </div>
                <input type="hidden" id="data-selecionada" required>
                <div class="space-y-4">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-blue-500">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-blue-500">
                    <input type="text" id="cidade" required placeholder="Cidade" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-blue-500">
                    <select id="horario" required class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white outline-none">
                        <option value="">Selecione a Data</option>
                    </select>
                    <textarea id="endereco" required placeholder="Endereço de Visita" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none" rows="2"></textarea>
                </div>
                <button type="submit" class="btn-primary w-full text-white font-black py-5 rounded-2xl shadow-2xl uppercase">Finalizar Agendamento</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const PATH = 'agendamentos';
        const AVULSO = 'avulsos';
        const MEU_WHATSAPP = "5516993291674";

        window.formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const paraDataBR = (str) => { if(!str || !str.includes('-')) return "---"; const [y,m,d] = str.split("-"); return `${d}/${m}/${y}`; };
        
        let chartInstance = null;

        /* =========================
            ADMINISTRATIVO E DASHBOARD
        ========================= */

        window.carregarRelatorio = async () => {
            try {
                const [sAg, sAv] = await Promise.all([get(ref(db, PATH)), get(ref(db, AVULSO))]);
                const ag = sAg.val() || {}; const av = sAv.val() || {}; window.dadosCompletos = [];
                for(let d in ag) for(let h in ag[d]) window.dadosCompletos.push({...ag[d][h], id: h, data: d, tipo: 'agenda'});
                for(let id in av) { window.dadosCompletos.push({...av[id], id: id, tipo: 'avulso'}); }
                renderizarLista(window.dadosCompletos);
            } catch (e) { console.error(e); }
        };

        function renderizarLista(lista) {
            // Inicialização de Variáveis
            let t = { vendidos:0, totalVendas:0, pix:0, dinheiro:0, debito:0, credito:0, boleto:0, vale:0, nq:0, comissao:0, comissaoDia:0 };
            let cidades = {};
            let vendasHoje = 0;

            // Datas Críticas
            const hoje = new Date().toLocaleDateString('en-CA'); // AAAA-MM-DD local
            const amanha = new Date();
            amanha.setDate(amanha.getDate()+1);
            const dataAmanha = amanha.toLocaleDateString('en-CA');

            lista.sort((a,b) => {
                let d = (a.data||"").localeCompare(b.data||"");
                if(d!==0) return d;
                return (a.horario||"").localeCompare(b.horario||"");
            });

            let hT = '<table class="w-full text-left text-[11px]"><thead class="bg-slate-700/50 text-slate-300 uppercase"><tr><th class="p-4">DATA</th><th class="p-4">CLIENTE</th><th class="p-4 text-center">STATUS</th><th class="p-4 text-center">AÇÃO</th></tr></thead><tbody class="divide-y divide-slate-700/50">';
            let hC = '<table class="w-full text-[10px]"><tbody>';

            lista.forEach(item => {
                let comItem = 0;

                if(item.resultado === "Venda") {
                    const valorVenda = Number(item.valor) || 0;
                    t.vendidos++;
                    t.totalVendas += valorVenda;

                    if(item.data === hoje) vendasHoje++;
                    if(item.city) cidades[item.city] = (cidades[item.city]||0)+1;

                    if(Array.isArray(item.pagamentos)) {
                        item.pagamentos.forEach(p => {
                            const v = Number(p.valor) || 0;
                            const taxa = 0.12;

                            if(p.tipo === "Dinheiro" || p.tipo === "Pix") {
                                t[p.tipo.toLowerCase()] += v;
                                t.vale += v;
                                comItem += v * taxa;
                            } else if(p.tipo === "Cartão Débito") {
                                t.debito += v;
                                comItem += v * taxa;
                            } else if(p.tipo === "Cartão Crédito") {
                                t.credito += v;
                                comItem += v * taxa;
                            } else if(p.tipo === "Boleto") {
                                const ent = Number(p.entrada) || 0;
                                const rest = v - ent;
                                t.boleto += rest;
                                comItem += (ent * 0.12) + (rest * 0.08);

                                if(p.forma_entrada === "Dinheiro" || p.forma_entrada === "Pix") {
                                    t[p.forma_entrada.toLowerCase()] += ent;
                                    t.vale += ent;
                                }
                            }
                        });
                    }

                    t.comissao += comItem;
                    if(item.data === hoje) t.comissaoDia += comItem;

                    hC += `<tr><td class="py-2 uppercase font-bold text-slate-300">${item.nome_formando}</td><td class="py-2 text-right text-emerald-400 font-black">${window.formatBRL(comItem)}</td></tr>`;
                } else if(item.resultado === "NQ") {
                    t.nq++;
                }

                const colors = { Venda:'text-emerald-500', NQ:'text-rose-500', Pendente:'text-slate-400' };
                const wLink = item.telefone ? `https://wa.me/55${item.telefone.replace(/\D/g,'')}` : '#';

                hT += `<tr class="hover:bg-slate-800/40">
                    <td class="p-4 font-bold">${paraDataBR(item.data)}<br><span class="text-[9px] text-slate-500">${item.horario||'DIRETO'}</span></td>
                    <td class="p-4"><span class="uppercase font-black text-white">${item.nome_formando}</span><br><span class="text-blue-400 text-[10px] block">${item.endereco||''}</span><a href="${wLink}" target="_blank" class="text-emerald-400 text-[9px] font-bold underline italic">WhatsApp: ${item.telefone||''}</a></td>
                    <td class="p-4 text-center font-black ${colors[item.resultado]||''}">${item.resultado||'Pendente'}</td>
                    <td class="p-4 text-center"><button onclick="window.gerenciarItem('${item.tipo}','${item.data}','${item.id}')" class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-lg text-[9px] uppercase border border-blue-400/30">Gerenciar</button></td>
                </tr>`;
            });

            // Indicadores PRO
            const taxa = lista.length ? ((t.vendidos / lista.length) * 100).toFixed(1) : 0;
            const agendaAmanha = lista.filter(i => i.data === dataAmanha).length;
            const qtdeDiasComVenda = Object.keys(lista.filter(i=>i.resultado==="Venda").reduce((a,b)=>{a[b.data]=1;return a},{})).length || 1;
            const previsaoSemana = (t.comissao / qtdeDiasComVenda) * 7;
            const ticketMedio = t.vendidos ? t.totalVendas / t.vendidos : 0;

            const ranking = Object.entries(cidades).sort((a,b)=>b[1]-a[1]).slice(0,5)
                .map(c=>`<div class="flex justify-between text-[10px]"><span>${c[0]}</span><span>${c[1]}</span></div>`).join('');

            document.getElementById('resumo-financeiro').innerHTML = `
                <div class="glass p-2 rounded-xl text-center border-t-2 border-blue-500"><p class="text-[7px] font-bold text-slate-400 uppercase">CONVERSÃO</p><p class="text-sm font-black">${taxa}%</p></div>
                <div class="glass p-2 rounded-xl text-center border-t-2 border-orange-500"><p class="text-[7px] font-bold uppercase">AGENDA AMANHÃ</p><p class="text-[9px] font-black">${agendaAmanha}</p></div>
                <div class="glass p-2 rounded-xl text-center border-t-2 border-emerald-500 text-emerald-400"><p class="text-[7px] font-bold uppercase">VENDAS HOJE</p><p class="text-[9px] font-black">${vendasHoje}</p></div>
                <div class="glass p-2 rounded-xl text-center border-t-2 border-cyan-500 text-cyan-400"><p class="text-[7px] font-bold uppercase">PIX</p><p class="text-[9px] font-black">${window.formatBRL(t.pix)}</p></div>
                <div class="glass p-2 rounded-xl text-center border-t-2 border-green-500 text-green-400"><p class="text-[7px] font-bold uppercase">DINHEIRO</p><p class="text-[9px] font-black">${window.formatBRL(t.dinheiro)}</p></div>
                <div class="bg-blue-600 p-2 rounded-xl text-center text-white shadow-xl"><p class="text-[7px] font-bold uppercase">TOTAL VENDAS</p><p class="text-[10px] font-black">${window.formatBRL(t.totalVendas)}</p></div>
                <div class="bg-purple-600 p-2 rounded-xl text-center text-white shadow-xl"><p class="text-[7px] font-bold uppercase">COMISSÃO HOJE</p><p class="text-[10px] font-black">${window.formatBRL(t.comissaoDia)}</p></div>
                <div class="bg-amber-500 p-2 rounded-xl text-center text-amber-950 shadow-xl"><p class="text-[7px] font-bold uppercase">VALES (D+P)</p><p class="text-[10px] font-black">${window.formatBRL(t.vale)}</p></div>
            `;

            document.getElementById('admin-content').innerHTML = hT + '</tbody></table>';
            document.getElementById('comissao-content').innerHTML = hC + '</tbody></table>';
            
            const saldoFinal = t.comissao - t.vale;
            document.getElementById('fechamento-final').innerHTML = `
                <div class="mt-4 p-4 rounded-2xl border-2 text-right ${saldoFinal >= 0 ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-rose-500/10 border-rose-500/30'}">
                    <p class="text-[8px] font-black uppercase text-slate-400">Comissão Hoje: ${window.formatBRL(t.comissaoDia)}</p>
                    <p class="text-[8px] font-black uppercase text-slate-400 mb-2">Comissão Acumulada: ${window.formatBRL(t.comissao)}</p>
                    <p class="text-[10px] font-bold uppercase text-white">Saldo a Receber</p>
                    <p class="text-3xl font-black italic">${window.formatBRL(Math.abs(saldoFinal))}</p>
                </div>
            `;

            window.resumoAtual = t;
            gerarGrafico(lista);
        }

        function gerarGrafico(lista) {
            const vendasPorDia = {};
            lista.forEach(item => { if(item.resultado === "Venda") { vendasPorDia[item.data] = (vendasPorDia[item.data] || 0) + 1; } });
            const labels = Object.keys(vendasPorDia).sort();
            const dados = labels.map(d => vendasPorDia[d]);
            const ctx = document.getElementById('graficoVendas');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels.map(l => paraDataBR(l)), datasets: [{ label: 'Vendas', data: dados, backgroundColor: '#3b82f6', borderRadius: 8 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
            });
        }

        // Funções Globais de Janela
        window.enviarRelatorioWhats = () => {
            const t = window.resumoAtual;
            const texto = `📊 *RELATÓRIO ELITE SALES*\n\n✅ Vendas: ${t.vendidos}\n💰 Total: ${window.formatBRL(t.totalVendas)}\n\n💵 Dinheiro: ${window.formatBRL(t.dinheiro)}\n💎 Pix: ${window.formatBRL(t.pix)}\n💳 Cartão: ${window.formatBRL(t.debito + t.credito)}\n\n⭐ *Comissão Hoje: ${window.formatBRL(t.comissaoDia)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
        };

        window.acessoAdmin = () => { if(prompt("Chave ADM:") === "2025") { document.getElementById('admin-modal').style.display = 'block'; window.carregarRelatorio(); } };
        window.fecharAdmin = () => document.getElementById('admin-modal').style.display = 'none';
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };
        
        window.gerenciarItem = (tipo, data, id) => {
            window.itemSendoGerenciado = { tipo, data, id };
            const item = window.dadosCompletos.find(i => i.id === id && i.data === data);
            document.getElementById('gestao-titulo').textContent = item ? item.nome_formando : 'Gerenciar';
            document.getElementById('modalGestao').style.display = 'flex';
        };

        window.fluxoResultado = () => {
            const form = document.getElementById('gestao-form'); document.getElementById('gestao-menu').classList.add('hidden'); form.classList.remove('hidden');
            form.innerHTML = `<div class="grid grid-cols-2 gap-2"><button onclick="window.prepararVenda()" class="p-4 bg-emerald-600 rounded-xl font-black uppercase text-[10px]">Venda</button><button onclick="window.salvarStatusRapido('NQ')" class="p-4 bg-rose-600 rounded-xl font-black uppercase text-[10px]">NQ</button><button onclick="window.salvarStatusRapido('Não Atendeu')" class="p-4 bg-amber-600 rounded-xl font-black uppercase text-[10px]">Não Atendeu</button><button onclick="window.salvarStatusRapido('Reagendar')" class="p-4 bg-blue-600 rounded-xl font-black uppercase text-[10px]">Reagendar</button></div>`;
        };

        window.prepararVenda = () => {
            window.tempPagamentos = [];
            document.getElementById('gestao-form').innerHTML = `<input type="number" id="vTotal" placeholder="VALOR TOTAL" class="w-full bg-slate-800 p-4 rounded-xl text-white font-black text-center mb-4"><div class="grid grid-cols-2 gap-2 mb-4"><button onclick="window.addPg('Dinheiro')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Dinheiro</button><button onclick="window.addPg('Pix')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Pix</button><button onclick="window.addPg('Cartão Débito')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Débito</button><button onclick="window.addPg('Cartão Crédito')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Crédito</button><button onclick="window.addPg('Boleto')" class="p-2 bg-blue-900 rounded-lg text-[9px] col-span-2">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-4"></div><button onclick="window.finalizarVendaReal()" class="w-full p-4 bg-emerald-600 rounded-xl font-black uppercase text-xs">Confirmar</button>`;
        };

        window.addPg = (tipo) => {
            const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',','.') || 0); if(v <= 0) return;
            let pg = { tipo, valor: v };
            if(tipo === 'Boleto') {
                const temEntrada = prompt("TEVE ENTRADA?\n1 - Sim\n2 - Não");
                if(temEntrada === "1") {
                    pg.entrada = parseFloat(prompt("Valor da Entrada:")?.replace(',','.') || 0);
                    const fE = prompt("Forma da Entrada:\n1-Dinheiro\n2-Pix\n3-Cartão Débito");
                    pg.forma_entrada = fE === "1" ? "Dinheiro" : fE === "2" ? "Pix" : "Cartão Débito";
                }
            }
            window.tempPagamentos.push(pg); window.renderTemp();
        };

        window.renderTemp = () => { document.getElementById('lista-p').innerHTML = window.tempPagamentos.map((p, i) => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]"><span>${p.tipo}</span><span class="font-black text-emerald-400">${window.formatBRL(p.valor)} <button onclick="window.tempPagamentos.splice(${i},1);window.renderTemp();" class="text-rose-500 ml-2">✕</button></span></div>`).join(''); };

        window.finalizarVendaReal = async () => {
            const total = parseFloat(document.getElementById('vTotal').value); const soma = window.tempPagamentos.reduce((acc, c) => acc + c.valor, 0);
            if(!total || Math.abs(total - soma) > 0.1) return alert("Total não confere!");
            const { tipo, data, id } = window.itemSendoGerenciado; const dbRef = (tipo === 'agenda') ? `${PATH}/${data}/${id}` : `${AVULSO}/${id}`;
            await update(ref(db, dbRef), { resultado: "Venda", valor: total, pagamentos: window.tempPagamentos }); window.fecharModalGestao(); window.carregarRelatorio();
        };

        window.salvarStatusRapido = async (s) => { const { tipo, data, id } = window.itemSendoGerenciado; await update(ref(db, (tipo === 'agenda') ? `${PATH}/${data}/${id}` : `${AVULSO}/${id}`), { resultado: s, valor: 0 }); window.fecharModalGestao(); window.carregarRelatorio(); };

        window.fluxoAlterarData = () => { document.getElementById('gestao-menu').classList.add('hidden'); const form = document.getElementById('gestao-form'); form.classList.remove('hidden'); form.innerHTML = `<input type="date" id="nD" class="w-full bg-slate-800 p-4 rounded-xl text-white mb-4"><button onclick="window.salvarDataNova()" class="w-full p-4 bg-blue-600 rounded-xl font-bold uppercase text-xs">Confirmar</button>`; };

        window.salvarDataNova = async () => {
            const dn = document.getElementById('nD').value; if(!dn) return;
            const { tipo, data, id } = window.itemSendoGerenciado; const dbRef = (tipo === 'agenda') ? `${PATH}/${data}/${id}` : `${AVULSO}/${id}`;
            const snap = await get(ref(db, dbRef));
            if(snap.exists()) {
                let o = snap.val(); o.data = dn;
                if(tipo === 'agenda') { await remove(ref(db, dbRef)); await set(ref(db, `${PATH}/${dn}/${id}`), o); }
                else { await update(ref(db, dbRef), { data: dn }); }
                window.fecharModalGestao(); window.carregarRelatorio();
            }
        };

        window.confirmarExclusao = async () => { if(confirm("Apagar?")) { const { tipo, data, id } = window.itemSendoGerenciado; await remove(ref(db, (tipo === 'agenda') ? `${PATH}/${data}/${id}` : `${AVULSO}/${id}`)); window.fecharModalGestao(); window.carregarRelatorio(); } };

        window.lancarVendaDireta = async () => { const n = prompt("Nome:"); if(!n) return; await push(ref(db, AVULSO), { nome_formando: n, data: new Date().toLocaleDateString('en-CA'), horario: "08:00", resultado: "Pendente" }); window.carregarRelatorio(); };

        window.carregarRelatorio();
    </script>
</body>
</html>
