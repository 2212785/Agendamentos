<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Intelligence - BI v14.60</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        
        #modalGestao { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 100; 
            background: rgba(2, 6, 23, 0.98); 
            align-items: flex-start; 
            justify-content: center; 
            overflow-y: auto; 
            padding: 20px;
        }
        .modal-container { width: 100%; max-width: 32rem; margin-top: 10px; margin-bottom: 30px; }

        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 3px solid #3b82f6; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        
        .status-txt-compact { font-size: 14px; font-weight: 900; text-transform: uppercase; }

        /* AJUSTES PÁGINA 1 COMPACTA */
        .input-compact { padding: 0.75rem !important; border-radius: 1rem !important; font-size: 0.875rem !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="modal-container glass rounded-[2.5rem] p-8 shadow-2xl text-white">
            <div class="flex justify-between items-center mb-6">
                <h2 id="gestao-titulo" class="text-lg font-black uppercase text-blue-400">Gerenciar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 transition text-sm">1. Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">2. Marcar NQ</button>
                <button onclick="window.fluxoEditar()" class="bg-blue-600/10 border border-blue-500/30 p-3 rounded-2xl text-blue-400 font-black uppercase text-[10px]">3. Editar Cadastro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir permanentemente</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 text-white pb-4"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center w-full">
            <span class="text-lg font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase">ADM</button>
        </header>
        <main class="flex-grow flex items-start justify-center p-2">
            <div class="glass p-6 md:p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl text-center border border-white/5">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 italic leading-none">...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest italic mb-4 mt-1">...</h3>
                
                <form id="form-agendamento" class="space-y-3">
                    <div class="grid grid-cols-2 gap-1.5 mb-3" id="day-selector"></div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 input-compact outline-none text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/5 input-compact outline-none text-white">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 input-compact outline-none text-white"><option value="">Horário</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="w-full bg-slate-900 border border-white/5 input-compact outline-none text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black uppercase shadow-lg text-sm">Finalizar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-logistica" class="view-section p-4 text-white">
        <div class="max-w-4xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-4">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg text-white">Visitas</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase text-slate-400">BI Dashboard</button>
                </div>
            </nav>
            <div class="mb-4">
                <div class="flex justify-between items-center mb-2">
                    <h1 class="text-xl font-black italic uppercase">Minha <span class="text-blue-500">Rota</span></h1>
                    <div id="controles-adm" class="hidden flex flex-wrap gap-1">
                        <button onclick="window.criarNovoProjeto()" class="glass px-2 py-1 rounded-lg text-[7px] font-black text-emerald-400">Novo</button>
                        <button onclick="window.trocarProjetoAtivo()" class="glass px-2 py-1 rounded-lg text-[7px] font-black text-rose-400">Trocar</button>
                        <button onclick="window.gerenciarDatas()" class="glass px-2 py-1 rounded-lg text-[7px] font-black text-blue-400">Dados</button>
                        <button onclick="window.editarCustosProjeto()" class="glass px-2 py-1 rounded-lg text-[7px] font-black text-amber-400">Custos</button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold outline-none text-white">
                    <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ Avulso</button>
                </div>
            </div>
            <div id="lista-visitas" class="space-y-2"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <div class="max-w-7xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-6">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest text-white">← Voltar</button>
                <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none text-white">
            </nav>
            <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 mb-6"></div>
            <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6 text-[10px]"></div>
            <div id="saldo-card" class="glass rounded-[2rem] p-6 border-l-8 border-emerald-500 flex flex-col justify-center space-y-4 mb-6"></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass rounded-[2rem] p-6 overflow-x-auto border border-white/5 text-white"><h4 class="text-emerald-400 font-black uppercase text-[10px] mb-3 italic">Vendas</h4><table class="w-full text-left min-w-[300px] text-xs text-white"><tbody id="extrato-tabela"></tbody></table></div>
                <div class="glass rounded-[2rem] p-6 overflow-x-auto border border-white/5 text-white"><h4 class="text-rose-500 font-black uppercase text-[10px] mb-3 italic">NQs</h4><table class="w-full text-left min-w-[300px] text-xs text-white text-white text-white"><tbody id="nq-tabela"></tbody></table></div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        let projetoAtualId = ""; window.labelsAtivas = { cidade: "...", escola: "..." };
        let configProjetoAtual = {}; let custosOperacao = {}; window.dadosCompletos = [];

        window.atualizarTitulosDOM = () => {
            document.getElementById('escola-titulo').innerText = window.labelsAtivas.cidade;
            document.getElementById('sub-escola').innerText = window.labelsAtivas.escola;
        };

        // --- LÓGICA BI (COMISSÃO 12%/8%) ---
        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let lista = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, vales:0, com:0 };
            lista.forEach(i => {
                if(i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor)||0;
                    let cV = 0;
                    if(i.pagamentos) {
                        i.pagamentos.forEach(p => {
                            const vP = Number(p.valor) || 0; const t = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                            if (t.includes("entrada")) cV += vP * 0.12; else cV += vP * 0.08;
                            if((t.includes("pix") || t.includes("dinheiro")) && !t.includes("debito")) m.vales += vP;
                            if(t.includes("pix")) m.pix += vP; else if(t.includes("dinheiro")) m.din += vP; else if(t.includes("debito")) m.deb += vP; else if(t.includes("credito")) m.cre += vP; else if(t.includes("boleto")) m.bol += vP;
                        });
                    } else cV = (Number(i.valor) || 0) * 0.08;
                    m.com += cV;
                } else if(i.resultado === "NQ") m.nq++;
            });
            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-4 rounded-3xl border-emerald-500 bg-emerald-950/10"><p class="text-[8px] uppercase text-emerald-500 font-black">Faturamento</p><p class="text-xl font-black">${fBR(m.tot)}</p></div><div class="card-bi p-4 rounded-3xl border-blue-500 bg-blue-950/10"><p class="text-[8px] uppercase text-blue-500 font-black">Vendas / NQ</p><p class="text-xl font-black text-white">${m.v} / ${m.nq}</p></div><div class="card-bi p-4 rounded-3xl border-emerald-400 bg-emerald-950/10"><p class="text-[8px] uppercase text-emerald-400 font-black">Comissão</p><p class="text-xl font-black text-white">${fBR(m.com)}</p></div>`;
            window.filtrarLogistica();
        };

        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projetoAtualId = snap.val() || "guaratingueta-guilherme";
            const [pS, cS] = await Promise.all([get(ref(db, `projetos/${projetoAtualId}`)), get(ref(db, `custos/${projetoAtualId}`))]);
            if(pS.exists()){
                configProjetoAtual = pS.val(); custosOperacao = cS.exists() ? cS.val() : {};
                window.labelsAtivas = { cidade: configProjetoAtual.cidade, escola: configProjetoAtual.escola || configProjetoAtual.school };
                window.atualizarTitulosDOM();
                if(configProjetoAtual.data_inicio) window.gerarBotoesDatas(configProjetoAtual.data_inicio, configProjetoAtual.data_fim);
                window.carregarRelatorio();
            }
        });

        window.carregarRelatorio = async () => {
            const id = projetoAtualId;
            const [sA, sV] = await Promise.all([get(ref(db, `dados/${id}/agendamentos`)), get(ref(db, `vendas/${id}`))]);
            window.dadosCompletos = [];
            const proc = (snap, path) => {
                const val = snap.val() || {};
                if(path.includes('agendamentos')){
                    Object.keys(val).forEach(d => { if(val[d]) Object.keys(val[d]).forEach(k => window.dadosCompletos.push({...val[d][k], id:k, data:d, path:`${path}/${d}/${k}`})); });
                } else Object.keys(val).forEach(k => window.dadosCompletos.push({...val[k], id:k, data:val[k].data, path:`${path}/${k}`}));
            };
            proc(sA, `dados/${id}/agendamentos`);
            if(sV.exists()) {
                const v = sV.val();
                if(v.agendamentos) proc(get(ref(db,`vendas/${id}/agendamentos`)), `vendas/${id}/agendamentos`);
                if(v.avulsos) proc(get(ref(db,`vendas/${id}/avulsos`)), `vendas/${id}/avulsos`);
            }
            window.filtrarBI();
        };

        // --- ROTA COMPACTA ---
        window.filtrarLogistica = () => {
            const container = document.getElementById('lista-visitas'); if(!container) return;
            container.innerHTML = '';
            window.dadosCompletos.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            window.dadosCompletos.forEach(i => {
                let sT = "PENDENTE", cS = "text-slate-600";
                if(i.resultado === "Venda") { sT = "VENDIDO"; cS = "text-emerald-500"; }
                else if(i.resultado === "NQ") { sT = "NQ"; cS = "text-rose-500"; }
                container.innerHTML += `
                <div class="glass p-3 rounded-2xl border border-white/5 flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] font-black text-blue-400 uppercase">${i.horario || 'DIR'}</span>
                            <span class="status-txt-compact ${cS}">${sT}</span>
                            <h3 class="text-sm font-black uppercase text-white truncate max-w-[140px]">${i.nome_formando}</h3>
                        </div>
                        <button onclick="window.gerenciarItem('${i.path.replace(/'/g,"\\'")}', '${(i.nome_formando||'').replace(/'/g,"\\'")}', '${(i.endereco||'').replace(/'/g,"\\'")}')" class="btn-primary px-3 py-1.5 rounded-lg text-[8px] font-black uppercase text-white">Gere.</button>
                    </div>
                    <div class="flex items-center justify-between gap-2 border-t border-white/5 pt-2">
                        <p class="text-[9px] text-slate-400 truncate flex-grow uppercase font-bold">${i.endereco || 'S/ ENDEREÇO'}</p>
                        <div class="flex gap-1">
                            <a href="https://wa.me/55${(i.telefone||'').replace(/\D/g,'')}" target="_blank" class="bg-emerald-500/10 p-1.5 rounded-lg text-emerald-400 text-[8px] font-black uppercase">Zap</a>
                            <a href="https://www.waze.com/ul?q=${encodeURIComponent(i.endereco||'')}&navigate=yes" target="_blank" class="bg-blue-500/10 p-1.5 rounded-lg text-blue-400 text-[8px] font-black uppercase">Waze</a>
                        </div>
                    </div>
                </div>`;
            });
        };

        // --- GESTÃO ADM ---
        window.switchView = (id) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active')); document.getElementById(id).classList.add('view-active'); };
        window.acessoAdmin = () => { if(prompt("Senha:") === "2025") { document.getElementById('controles-adm').classList.remove('hidden'); window.switchView('view-logistica'); } };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; };
        window.gerenciarItem = (p, n, e) => { window.itemPath = p; window.currentName = n; window.currentEnd = e; document.getElementById('modalGestao').style.display = 'flex'; };

        window.fluxoResultado = () => {
            document.getElementById('gestao-menu').classList.add('hidden'); 
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const item = window.dadosCompletos.find(i => i.path === window.itemPath) || {};
            window.tempPgs = item.pagamentos ? [...item.pagamentos] : []; 
            f.innerHTML = `
                <select id="vendedor-venda" class="w-full bg-slate-900 p-3 rounded-xl mb-2 text-white text-xs outline-none"><option value="Evanio" ${item.vendedor === 'Evanio' ? 'selected' : ''}>Evanio</option><option value="Willian" ${item.vendedor === 'Willian' ? 'selected' : ''}>Willian</option></select>
                <input type="text" id="vAlbum" placeholder="Nº ÁLBUM" value="${item.num_album || ''}" class="w-full bg-slate-900 p-3 rounded-xl mb-3 text-white text-center font-bold text-xs border border-white/10 outline-none">
                <input type="number" id="vTotal" placeholder="VALOR TOTAL" value="${item.valor || ''}" class="w-full bg-slate-900 p-4 rounded-2xl text-center mb-3 text-white font-black text-2xl border border-white/10 outline-none">
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <button onclick="window.addPg('Dinheiro')" class="p-3 bg-slate-800 rounded-xl text-[9px] font-black uppercase text-white">+ Dinheiro</button>
                    <button onclick="window.addPg('Pix')" class="p-3 bg-slate-800 rounded-xl text-[9px] font-black uppercase text-white">+ Pix</button>
                    <button onclick="window.addPg('Boleto')" class="p-3 bg-blue-900/30 border border-blue-500/40 rounded-xl text-[9px] font-black uppercase col-span-2 text-white">+ Boleto</button>
                </div>
                <div id="lista-p" class="space-y-1 mb-3 text-white"></div>
                <button onclick="window.limparPagamentos()" class="w-full p-3 mb-3 bg-rose-600/20 border border-rose-500/40 rounded-xl text-rose-500 font-black uppercase text-[8px]">LIMPAR PAGAMENTOS</button>
                <button onclick="window.finalizarVenda()" class="w-full p-4 bg-emerald-600 rounded-xl font-black text-white uppercase text-sm">Salvar Venda</button>`;
            window.atualizarListaInterface();
        };

        window.limparPagamentos = () => { if(confirm("Limpar?")) { window.tempPgs = []; window.atualizarListaInterface(); } };
        window.atualizarListaInterface = () => { document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]"><span>${p.tipo}</span><span class="text-emerald-400 font-bold">${fBR(p.valor)}</span></div>`).join(''); };
        window.addPg = (tipo) => {
            const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',', '.') || 0); if (v <= 0) return;
            if (tipo === "Boleto") {
                const r = prompt("Entrada? 1-Sim 2-Não");
                if (r === "1") {
                    const vE = parseFloat(prompt("Valor Entrada:")?.replace(',', '.') || 0);
                    window.tempPgs.push({ tipo: "Pix (Entrada)", valor: vE });
                    if(v-vE > 0) window.tempPgs.push({ tipo: "Boleto", valor: v-vE });
                } else window.tempPgs.push({ tipo: "Boleto", valor: v });
            } else window.tempPgs.push({ tipo, valor: v });
            window.atualizarListaInterface();
        };
        window.finalizarVenda = async () => {
            const tot = parseFloat(document.getElementById('vTotal').value); if(!tot) return alert("Valor!");
            await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, num_album: document.getElementById('vAlbum').value, vendedor: document.getElementById('vendedor-venda').value, pagamentos: window.tempPgs }); 
            window.carregarRelatorio(); window.fecharModalGestao();
        };

        // --- ADMIN ---
        window.criarNovoProjeto = async () => {
            const id = prompt("ID:"); const cid = prompt("Cidade:"); const esc = prompt("Escola:");
            if(id && cid && esc) {
                await set(ref(db, `projetos/${id}`), { cidade: cid, escola: esc, data_inicio: "", data_fim: "" });
                await set(ref(db, `custos/${id}`), { operacao_pessoas: 2, km_valor: 0.7, km_total: 0, pedagio_total: 0, hosp_valor: 110, hosp_qtd: 0, alim_valor: 50, alim_qtd: 0 });
                await set(ref(db, "config/projeto_ativo"), id); location.reload();
            }
        };
        window.trocarProjetoAtivo = async () => { const n = prompt("ID:"); if(n) { await set(ref(db, "config/projeto_ativo"), n); location.reload(); } };
        window.editarCustosProjeto = async () => {
            const c = custosOperacao; const nP = prompt("Vendedores:", c.operacao_pessoas || 2);
            if(nP) { await update(ref(db, `custos/${projetoAtualId}`), { operacao_pessoas: parseInt(nP), km_valor: 0.7, km_total: prompt("KM Total:"), pedagio_total: prompt("Pedágio:"), hosp_valor: 110, hosp_qtd: 6, alim_valor: 50, alim_qtd: 7 }); location.reload(); }
        };
        window.gerenciarDatas = async () => {
            const cid = prompt("Cidade:", window.labelsAtivas.cidade); const esc = prompt("Escola:", window.labelsAtivas.escola);
            if(cid) { await update(ref(db, `projetos/${projetoAtualId}`), { cidade: cid, escola: esc, data_inicio: prompt("Início:"), data_fim: prompt("Fim:") }); location.reload(); }
        };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s }); window.carregarRelatorio(); window.fecharModalGestao(); };
        window.confirmarExclusao = async () => { if(confirm("Excluir?")) { await remove(ref(db, window.itemPath)); window.carregarRelatorio(); window.fecharModalGestao(); } };
        window.gerarBotoesDatas = (inicio, fim) => { const container = document.getElementById('day-selector'); if(!container) return; container.innerHTML = ""; let cur = new Date(inicio + "T00:00:00"); const end = new Date(fim + "T00:00:00"); while(cur <= end) { const iso = cur.toISOString().split('T')[0]; const lab = cur.toLocaleDateString('pt-BR', {weekday: 'short', day: '2-digit', month: '2-digit'}); container.innerHTML += `<button type="button" data-date="${iso}" onclick="window.selecionarDia(this)" class="day-btn rounded-lg py-2 text-[7px] font-black uppercase text-white">${lab}</button>`; cur.setDate(cur.getDate() + 1); } };
        window.selecionarDia = async (btn) => { document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.getElementById('data-selecionada').value = btn.getAttribute('data-date'); };
        window.abrirAvulso = () => { document.getElementById('modalGestao').style.display = 'flex'; document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<h3 class="text-white font-black mb-2 uppercase text-[10px]">Novo</h3><input type="text" id="av-nome" placeholder="NOME" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white border border-white/10 text-xs outline-none"><input type="date" id="av-data" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white border border-white/10 text-xs"><button onclick="window.salvarNovoAvulso()" class="w-full p-4 bg-blue-600 rounded-xl font-black text-white uppercase text-xs">Salvar</button>`; document.getElementById('av-data').value = new Date().toISOString().split('T')[0]; };
        window.salvarNovoAvulso = async () => { const n = document.getElementById('av-nome').value, d = document.getElementById('av-data').value; if(!n || !d) return; const path = `vendas/${projetoAtualId}/avulsos/AV-${Date.now()}`; await set(ref(db, path), { nome_formando: n, data: d, resultado: "Pendente" }); window.itemPath = path; window.fluxoResultado(); };
    </script>
</body>
</html>
