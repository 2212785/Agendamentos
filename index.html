<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Dashboard PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        #admin-modal { display: none; position: fixed; inset: 0; z-index: 50; padding: 20px; overflow-y: auto; background: rgba(2, 6, 23, 0.98); }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; padding: 20px; overflow-y: auto; background: rgba(2, 6, 23, 0.95); align-items: center; justify-content: center; }
        .day-btn { transition: all 0.2s; border-color: rgba(255,255,255,0.1); color: #94a3b8; background: rgba(255,255,255,0.03); cursor: pointer; }
        .day-btn.active { background: #3b82f6 !important; color: white !important; border-color: #60a5fa !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col text-white">

    <div id="modalGestao">
        <div class="glass w-full max-w-xl rounded-[2.5rem] p-8 border border-white/20 shadow-2xl mx-auto mt-20 text-left">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-2xl font-black uppercase italic text-blue-400">Gerenciar</h2>
                <button onclick="fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-2 gap-4 text-center">
                <button onclick="fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/50 p-6 rounded-2xl hover:bg-emerald-600 transition group"><span class="block text-emerald-400 group-hover:text-white font-black text-xs uppercase">1. Resultado</span></button>
                <button onclick="confirmarExclusao()" class="bg-rose-600/20 border border-rose-500/50 p-6 rounded-2xl hover:bg-rose-600 transition group"><span class="block text-rose-400 group-hover:text-white font-black text-xs uppercase">2. Excluir</span></button>
            </div>
            <div id="gestao-form" class="mt-8 hidden space-y-4"></div>
        </div>
    </div>

    <main id="admin-modal">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-3xl font-extrabold italic uppercase">Master <span class="text-blue-500 font-black">Dashboard PRO</span></h1>
                    <select id="projeto-ativo" onchange="carregarRelatorio()" class="mt-2 bg-slate-800 border border-slate-700 rounded-lg px-3 py-1 text-xs text-blue-400 font-bold outline-none cursor-pointer"></select>
                </div>
                <div class="flex flex-wrap gap-3">
                    <input type="date" id="filtro-data-admin" onchange="filtrarLista()" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white">
                    <button onclick="lancarVendaDireta()" class="bg-blue-600 px-4 py-2 rounded-xl font-bold text-[10px] uppercase">Venda Direta</button>
                    <button onclick="copiarRelatorio()" class="bg-emerald-600 px-4 py-2 rounded-xl font-bold text-[10px] uppercase">Copiar Relatório</button>
                    <button onclick="fecharAdmin()" class="bg-rose-600/20 text-rose-500 px-4 py-2 rounded-xl font-bold text-[10px] uppercase">Sair</button>
                </div>
            </div>
            
            <div id="resumo-financeiro" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-11 gap-2 mb-6 text-center text-white text-[9px]"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div id="admin-content" class="glass rounded-[2rem] overflow-x-auto p-4 border-white/5 text-white"></div>
                </div>
                <div class="space-y-6">
                    <div class="glass rounded-[2rem] p-6 border-white/5 text-center text-white">
                        <h3 class="text-lg font-bold text-white uppercase italic mb-4">Comissões</h3>
                        <div id="comissao-content" class="space-y-2 max-h-[400px] overflow-y-auto pr-2 text-left text-[10px]"></div>
                        <div id="fechamento-final" class="mt-6 border-t border-white/10 pt-4 text-white text-right"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <header class="p-6 flex justify-between items-center text-white">
        <span class="text-2xl font-black italic uppercase">Portal <span class="text-blue-500">do formando</span></span>
        <button onclick="acessoAdmin()" class="glass px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase">Login ADM</button>
    </header>

    <main class="container mx-auto p-4 flex-grow flex items-center justify-center text-center">
        <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl border-white/5">
            <h2 id="escola-titulo" class="text-xl font-bold mb-2 uppercase text-blue-400 italic">CARREGANDO...</h2>
            <h3 id="sub-escola" class="text-xs font-bold text-slate-400 mb-6 uppercase">AGUARDE</h3>
            <h2 class="text-3xl font-black mb-10 uppercase italic text-white">Agendar Visita</h2>
            <form id="form-agendamento" class="space-y-6 text-left">
                <div class="grid grid-cols-3 gap-2" id="day-selector">
                    <button type="button" data-date="2026-03-04" onclick="selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase">04/03<br>Qua</button>
                    <button type="button" data-date="2026-03-05" onclick="selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase">05/03<br>Qui</button>
                    <button type="button" data-date="2026-03-06" onclick="selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase">06/03<br>Sex</button>
                    <button type="button" data-date="2026-03-07" onclick="selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase">07/03<br>Sab</button>
                    <button type="button" data-date="2026-03-08" onclick="selecionarDia(this)" class="day-btn border rounded-2xl py-4 text-[9px] font-black uppercase bg-blue-900/20 border-blue-500/30 text-blue-400">08/03<br>Dom</button>
                </div>
                <input type="hidden" id="data-selecionada">
                <div class="space-y-4">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none">
                    <select id="horario" required class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white outline-none"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço de Visita" class="w-full bg-slate-800/40 border border-slate-700 p-4 rounded-2xl text-white outline-none" rows="2"></textarea>
                </div>
                <button type="submit" class="btn-primary w-full text-white font-black py-5 rounded-2xl uppercase">Finalizar Agendamento</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const paraDataBR = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;
        window.formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);

        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };
        window.fecharAdmin = () => document.getElementById('admin-modal').style.display = 'none';
        window.acessoAdmin = async () => { if(prompt("Chave ADM:") === "2025") { document.getElementById('admin-modal').style.display = 'block'; await carregarProjetos(); await carregarRelatorio(); } };

        async function carregarProjetos() {
            const snap = await get(ref(db, `config/projetos`));
            const ativo = await get(ref(db, `config/projeto_ativo`));
            const lista = snap.val() || {};
            const seletor = document.getElementById('projeto-ativo');
            seletor.innerHTML = '';
            for(let k in lista) { let opt = document.createElement('option'); opt.value = k; opt.textContent = `${lista[k].cidade} - ${lista[k].escola}`; if(k === ativo.val()) opt.selected = true; seletor.appendChild(opt); }
        }

        async function carregarRelatorio() {
            const [snapDados, snapRaizAg, snapRaizAv] = await Promise.all([get(ref(db, `dados`)), get(ref(db, `agendamentos`)), get(ref(db, `avulsos`))]);
            window.dadosCompletos = [];
            const rAg = snapRaizAg.val() || {}; for(let d in rAg) for(let h in rAg[d]) window.dadosCompletos.push({...rAg[d][h], id: h, data: d, path: `agendamentos/${d}/${h}`});
            const rAv = snapRaizAv.val() || {}; for(let id in rAv) window.dadosCompletos.push({...rAv[id], id: id, path: `avulsos/${id}`});
            const todos = snapDados.val() || {};
            for(let pKey in todos) {
                const ags = todos[pKey].agendamentos || {}; for(let d in ags) for(let h in ags[d]) window.dadosCompletos.push({...ags[d][h], id: h, data: d, path: `dados/${pKey}/agendamentos/${d}/${h}`});
                const avs = todos[pKey].avulsos || {}; for(let id in avs) window.dadosCompletos.push({...avs[id], id: id, path: `dados/${pKey}/avulsos/${id}`});
            }
            const uniqueMap = new Map(); window.dadosCompletos.forEach(i => uniqueMap.set(i.path, i));
            window.dadosCompletos = Array.from(uniqueMap.values());
            filtrarLista();
        }
        window.carregarRelatorio = carregarRelatorio;

        window.filtrarLista = () => {
            const fData = document.getElementById('filtro-data-admin').value;
            // 1. FILTRAR POR DATA PRIMEIRO
            let listaFiltrada = window.dadosCompletos.filter(i => (fData ? i.data === fData : true));
            
            // 2. ORDENAR CRONOLOGICAMENTE
            listaFiltrada.sort((a, b) => {
                const dataA = a.data || '9999-12-31';
                const dataB = b.data || '9999-12-31';
                if (dataA !== dataB) return dataA.localeCompare(dataB);
                
                // Se a data for igual, ordena pela hora. 'DIR' (Venda Direta) vai para o final.
                const hA = a.horario && a.horario !== 'DIR' ? a.horario : '99:99';
                const hB = b.horario && b.horario !== 'DIR' ? b.horario : '99:99';
                return hA.localeCompare(hB);
            });

            renderizarLista(listaFiltrada, fData);
        };

        function renderizarLista(lista, dataFiltrada) {
            let t = { v:0, totV:0, pix:0, din:0, deb:0, cre:0, bol:0, vale:0, nq:0, nqDia:0, comDia:0, comTot:0 };
            const compData = dataFiltrada || new Date().toLocaleDateString('en-CA');
            let hT = '<table class="w-full text-[11px] text-left"><thead class="bg-slate-700"><tr><th class="p-3">DATA/HORA</th><th class="p-3">CLIENTE/ENDEREÇO</th><th class="p-3 text-center">STATUS</th><th class="p-3 text-center">AÇÃO</th></tr></thead><tbody class="divide-y divide-white/5">';
            let hC = '';

            lista.forEach(item => {
                let comItem = 0;
                if(item.resultado === "Venda") {
                    t.v++; t.totV += Number(item.valor) || 0;
                    if(Array.isArray(item.pagamentos)) {
                        item.pagamentos.forEach(p => {
                            const v = Number(p.valor) || 0; const ent = Number(p.entrada || 0);
                            if(p.tipo === "Dinheiro" || p.tipo === "Pix") { t[p.tipo === "Pix" ? "pix" : "din"] += v; t.vale += v; comItem += v * 0.12; }
                            else if(p.tipo.includes("Cartão")) { t[p.tipo.includes("Débito") ? "deb" : "cre"] += v; comItem += v * 0.12; }
                            else if(p.tipo === "Boleto") { t.bol += (v - ent); comItem += (ent * 0.12) + ((v - ent) * 0.08); if(p.forma_entrada === "Dinheiro" || p.forma_entrada === "Pix") { t[p.forma_entrada === "Pix"?"pix":"din"] += ent; t.vale += ent; } }
                        });
                    } else { comItem = (Number(item.valor) || 0) * 0.12; }
                    t.comTot += comItem; if(item.data === compData) t.comDia += comItem;
                    hC += `<tr><td class="py-1 uppercase font-bold text-slate-300">${item.nome_formando}</td><td class="py-1 text-right text-emerald-400 font-black">${window.formatBRL(comItem)}</td></tr>`;
                } else if(item.resultado === "NQ") {
                    t.nq++; if(item.data === compData) t.nqDia++;
                }

                const wz = item.endereco ? `https://www.waze.com/ul?q=${encodeURIComponent(item.endereco)}&navigate=yes` : '#';
                const wa = item.telefone ? `https://wa.me/55${item.telefone.replace(/\D/g,'')}` : '#';
                hT += `<tr class="hover:bg-slate-800/40"><td class="p-3"><b>${paraDataBR(item.data)}</b><br><span class="text-blue-400 font-bold">${item.horario||'DIR'}</span></td><td class="p-3"><b>${item.nome_formando}</b><br><a href="${wz}" target="_blank" class="text-blue-400 text-[9px]">📍 Waze</a> | <a href="${wa}" target="_blank" class="text-emerald-400 text-[9px]">📱 Zap</a></td><td class="p-3 text-center">${item.resultado||'Pendente'}</td><td class="p-3 text-center"><button onclick="gerenciarItem('${item.path}')" class="bg-blue-600 px-2 py-1 rounded text-[9px]">GESTÃO</button></td></tr>`;
            });

            const totalAtendidos = t.v + t.nq;
            const eficiencia = totalAtendidos > 0 ? ((t.v / totalAtendidos) * 100).toFixed(0) : 0;

            document.getElementById('resumo-financeiro').innerHTML = `
                <div class="glass p-1 rounded-xl border-t border-blue-500"><p class="text-[6px]">EFICIÊNCIA</p><p class="text-[9px] font-black">${eficiencia}%</p></div>
                <div class="glass p-1 rounded-xl border-t border-emerald-500"><p class="text-[6px]">V.DIA</p><p class="text-[9px] font-black">${lista.filter(i=>i.resultado==='Venda'&&i.data===compData).length}</p></div>
                <div class="glass p-1 rounded-xl border-t border-rose-500"><p class="text-[6px]">NQ DIA</p><p class="text-[9px] font-black text-rose-400">${t.nqDia}</p></div>
                <div class="glass p-1 rounded-xl border-t border-blue-300"><p class="text-[6px]">TICKET MÉD.</p><p class="text-[9px] font-black">${window.formatBRL(t.v ? t.totV/t.v : 0)}</p></div>
                <div class="glass p-1 rounded-xl border-t border-cyan-500"><p class="text-[6px]">PIX</p><p class="text-[9px] font-black">${window.formatBRL(t.pix)}</p></div>
                <div class="glass p-1 rounded-xl border-t border-green-500"><p class="text-[6px]">DINHEIRO</p><p class="text-[9px] font-black">${window.formatBRL(t.din)}</p></div>
                <div class="glass p-1 rounded-xl border-t border-yellow-500"><p class="text-[6px]">CRÉDITO</p><p class="text-[9px] font-black">${window.formatBRL(t.cre)}</p></div>
                <div class="glass p-1 rounded-xl border-t border-orange-500"><p class="text-[6px]">DÉBITO</p><p class="text-[9px] font-black">${window.formatBRL(t.deb)}</p></div>
                <div class="glass p-1 rounded-xl border-t border-purple-500"><p class="text-[6px]">BOLETO</p><p class="text-[9px] font-black">${window.formatBRL(t.bol)}</p></div>
                <div class="bg-purple-600 p-1 rounded-xl shadow-lg"><p class="text-[6px]">COMIS. DIA</p><p class="text-[9px] font-black">${window.formatBRL(t.comDia)}</p></div>
                <div class="bg-blue-600 p-1 rounded-xl shadow-lg"><p class="text-[6px]">TOTAL VENDIDO</p><p class="text-[9px] font-black">${window.formatBRL(t.totV)}</p></div>
            `;
            document.getElementById('admin-content').innerHTML = hT + '</tbody></table>';
            document.getElementById('comissao-content').innerHTML = `<table class="w-full text-white"><tbody>${hC}</tbody></table>`;
            document.getElementById('fechamento-final').innerHTML = `<p class="text-[8px] uppercase text-slate-400">Total Líquido</p><p class="text-2xl font-black italic text-emerald-400">${window.formatBRL(t.comTot - t.vale)}</p>`;
        }

        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display = 'flex'; };
        window.confirmarExclusao = async () => { if(confirm("Apagar?")) { await remove(ref(db, window.itemPath)); fecharModalGestao(); await carregarRelatorio(); } };
        window.fluxoResultado = () => { document.getElementById('gestao-menu').classList.add('hidden'); document.getElementById('gestao-form').classList.remove('hidden'); document.getElementById('gestao-form').innerHTML = `<input type="number" id="vTotal" placeholder="VALOR TOTAL" class="w-full bg-slate-800 p-4 rounded-xl text-center mb-4"><div class="grid grid-cols-2 gap-2 mb-4"><button onclick="addPg('Dinheiro')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Dinheiro</button><button onclick="addPg('Pix')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Pix</button><button onclick="addPg('Cartão Débito')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Débito</button><button onclick="addPg('Cartão Crédito')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Crédito</button><button onclick="addPg('Boleto')" class="p-2 bg-blue-900 rounded-lg text-[9px] col-span-2">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-4"></div><button onclick="finalizarVenda()" class="w-full p-4 bg-emerald-600 rounded-xl font-black">CONFIRMAR VENDA</button><button onclick="salvarStatusSimples('NQ')" class="w-full p-2 bg-rose-600 rounded-xl mt-4 text-[10px]">SALVAR COMO NQ</button>`; window.tempPgs = []; };
        window.addPg = (tipo) => { const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',','.') || 0); if(v <= 0) return; let pg = { tipo, valor: v }; if(tipo === 'Boleto') { const ent = prompt("Entrada? 1-Sim 2-Não"); if(ent === "1") { pg.entrada = parseFloat(prompt("Valor Entrada:")?.replace(',','.') || 0); const fE = prompt("Forma: 1-Dinheiro 2-Pix"); pg.forma_entrada = fE === "1" ? "Dinheiro" : "Pix"; } } window.tempPgs.push(pg); renderTemp(); };
        function renderTemp() { document.getElementById('lista-p').innerHTML = window.tempPgs.map((p, i) => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]"><span>${p.tipo}</span><span class="text-emerald-400">${window.formatBRL(p.valor)}</span></div>`).join(''); }
        window.finalizarVenda = async () => { const tot = parseFloat(document.getElementById('vTotal').value); if(!tot) return alert("Informe o valor!"); await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, pagamentos: window.tempPgs }); fecharModalGestao(); await carregarRelatorio(); };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s, valor: 0 }); fecharModalGestao(); await carregarRelatorio(); };

        window.selecionarDia = async (btn) => {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const d = btn.getAttribute('data-date'); document.getElementById('data-selecionada').value = d;
            const elH = document.getElementById('horario'); elH.innerHTML = '<option>Buscando...</option>';
            const snapAtivo = await get(ref(db, `config/projeto_ativo`));
            const p = snapAtivo.val() || "guaratingueta-guilherme";
            const [nova, raiz] = await Promise.all([get(ref(db, `dados/${p}/agendamentos/${d}`)), get(ref(db, `agendamentos/${d}`))]);
            const ag = {...(raiz.val()||{}), ...(nova.val()||{})};
            const counts = {}; for(let id in ag){ let hL = id.split('-').slice(0,2).join(':'); counts[hL] = (counts[hL]||0)+1; }
            elH.innerHTML = '<option value="">Escolha um Horário</option>';
            let cur = new Date(`${d}T09:00:00`), lim = (new Date(d + 'T00:00:00').getDay() % 6 === 0) ? "15:00" : "20:30";
            while(cur <= new Date(`${d}T${lim}:00`)){
                let hF = cur.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                let v = Math.max(0, 2 - (counts[hF]||0));
                if(v > 0){ let opt=document.createElement('option'); opt.value=hF; opt.textContent=`${hF} (${v} vagas)`; elH.appendChild(opt); }
                cur.setMinutes(cur.getMinutes()+30);
            }
        };

        window.copiarRelatorio = () => {
            const f = window.formatBRL;
            const seletor = document.getElementById('projeto-ativo');
            const proj = seletor?.options[seletor.selectedIndex]?.text || "Projeto";
            const dataLimite = document.getElementById('filtro-data-admin').value || new Date().toLocaleDateString('en-CA');
            const acumulado = window.dadosCompletos.filter(i => i.data <= dataLimite);
            const v = acumulado.filter(i => i.resultado === "Venda"), n = acumulado.filter(i => i.resultado === "NQ");
            let total = 0, pix=0, din=0, cre=0, deb=0, bol=0, val=0;
            v.forEach(item => {
                total += (Number(item.valor) || 0);
                if(Array.isArray(item.pagamentos)) {
                    item.pagamentos.forEach(pg => {
                        const valPg = Number(pg.valor) || 0; const ent = Number(pg.entrada || 0);
                        if(pg.tipo === "Dinheiro") { din += valPg; val += valPg; } else if(pg.tipo === "Pix") { pix += valPg; val += valPg; }
                        else if(pg.tipo.includes("Cartão")) { if(pg.tipo.includes("Débito")) deb += valPg; else cre += valPg; }
                        else if(pg.tipo === "Boleto") { bol += (valPg - ent); if(pg.forma_entrada === "Dinheiro") { din += ent; val += ent; } if(pg.forma_entrada === "Pix") { pix += ent; val += ent; } }
                    });
                }
            });
            const msg = `*RELATÓRIO: ${proj}*\n*Filtro:* ${paraDataBR(dataLimite)}\n\nVendas: ${v.length}\nNQ: ${n.length}\n\nDinheiro: ${f(din)}\nPix: ${f(pix)}\nDébito: ${f(deb)}\nCrédito: ${f(cre)}\nBoleto: ${f(bol)}\n\nTotal Vendido: ${f(total)}\nVales ${f(val)}`;
            const el = document.createElement('textarea'); el.value = msg; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("RELATÓRIO COPIADO!");
        };

        (async () => {
            const agora = new Date();
            document.querySelectorAll('.day-btn').forEach(btn => {
                const [y, m, d] = btn.getAttribute("data-date").split("-");
                if (agora > new Date(y, m-1, d, (d == "08" || d == "07") ? 15 : 20, 30)) btn.style.display = "none";
            });
            try {
                const snapAtivo = await get(ref(db, `config/projeto_ativo`));
                const slug = snapAtivo.val() || "guaratingueta-guilherme";
                const info = await get(ref(db, `config/projetos/${slug}`));
                if(info.exists()){
                    document.getElementById('escola-titulo').textContent = info.val().cidade;
                    document.getElementById('sub-escola').textContent = info.val().escola;
                }
            } catch(e) {}
        })();
    </script>
</body>
</html>
