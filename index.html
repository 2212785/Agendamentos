<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Master - v27.97 PLATINUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }

        .view-section {
            display: none;
            min-height: 100vh;
            width: 100%;
            flex-direction: column;
        }

        .view-active {
            display: flex !important;
        }

        .card-bi {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
        }

        #modalGestao {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.98);
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .input-compact {
            padding: 0.8rem !important;
            border-radius: 1rem !important;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 100%;
            outline: none;
        }

        .day-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            padding: 12px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: 800;
            color: white;
        }

        .day-btn.active {
            background: #3b82f6 !important;
            border-color: #60a5fa !important;
        }

        .label-custo {
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 4px;
            margin-left: 4px;
            display: block;
        }

        .led-bot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .led-offline {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }

        .led-online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .footer-links {
            padding: 20px;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            color: #475569;
            letter-spacing: 1px;
        }

        .footer-links a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
            margin: 0 5px;
        }

        .footer-links a:hover {
            color: #3b82f6;
        }

        /* Toggle Switch Estilizado */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>

<body>

    <div id="modalGestao">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 shadow-2xl text-white mx-auto mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="gestao-titulo" class="text-lg font-black uppercase text-blue-400">Gestão</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase text-sm">Registrar Venda</button>
                <button onclick="window.fluxoNQ()" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">Marcar NQ</button>
                <button onclick="window.limparRegistroVisita()" class="bg-slate-700/50 border border-white/10 p-3 rounded-2xl text-white font-black uppercase text-[10px]">Limpar Registro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir Registro</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 pb-6 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center text-white">
            <div class="flex flex-col">
                <span class="text-lg font-black uppercase italic tracking-tighter text-white">Portal <span class="text-blue-500">Elite</span></span>
                <div class="flex items-center mt-[-4px]">
                    <span id="bot-led" class="led-bot led-offline"></span>
                    <span id="bot-status-text" class="text-[7px] font-bold uppercase text-slate-500">Bot Offline</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="user-display" class="text-[8px] font-black uppercase text-slate-500"></span>
                <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase text-white">Login / ADM</button>
            </div>
        </header>
        <div class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-6 rounded-[2.5rem] w-full max-w-sm text-center">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 leading-none italic">AGUARDE...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-500 mb-4 uppercase italic">CONECTANDO</h3>
                <div class="grid grid-cols-2 gap-1 mb-3" id="day-selector"></div>
                <form id="form-agendamento" class="space-y-2">
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="input-compact text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="input-compact text-white">
                    <select id="horario" required class="input-compact text-white">
                        <option value="">Selecione o Dia</option>
                    </select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="input-compact text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-sm">Agendar Visita</button>
                </form>
            </div>
        </div>

        <footer class="footer-links">
            <a href="politica.html">Política</a> | 
            <a href="termos.html">Termos</a> | 
            <a href="exclusao.html">Excluir meus dados</a>
        </footer>
    </section>

    <section id="view-logistica" class="view-section p-4">
        <nav class="flex justify-between items-center mb-6 text-white">
            <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Sair</button>
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button class="bg-blue-600 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase">Visitas</button>
                <button onclick="window.switchView('view-financeiro')" class="px-4 py-1.5 text-slate-400 text-[10px] font-black uppercase">Dashboard BI</button>
            </div>
        </nav>
        <div id="controles-admin" class="hidden flex flex-wrap gap-2 mb-4 justify-center">
            <button onclick="window.abrirNovoProjeto()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-emerald-400 uppercase">Novo Projeto</button>
            <button onclick="window.abrirGestaoCentralizada()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-blue-400 uppercase">Dados Projeto</button>
            <button onclick="window.abrirGestaoVales()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-rose-400 uppercase">Lançar Vales</button>
            <button onclick="window.switchView('view-automacao')" class="bg-amber-500/20 border border-amber-500/30 px-4 py-2 rounded-xl text-[8px] font-black text-amber-500 uppercase italic">Automação PC 🚀</button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none">
            <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ AVULSO</button>
        </div>
        <div id="lista-visitas" class="space-y-3 pb-10"></div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-4 text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <div class="flex gap-2">
                <button onclick="window.menuRelatorio()" class="bg-emerald-600 px-3 py-2 rounded-xl text-[9px] font-black uppercase italic">Copiar Relatório 📋</button>
                <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white outline-none">
            </div>
        </nav>
        <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6 text-white"></div>
        <div id="individual-performance" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-white"></div>
        <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-6 text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div id="comissao-card" class="lg:col-span-1 glass rounded-[2rem] p-5 border-l-4 border-blue-500 text-white"></div>
            <div class="lg:col-span-2 glass rounded-[2rem] p-4 min-h-[300px] text-white overflow-hidden relative">
                <canvas id="weeklyChart"></canvas>
            </div>
        </div>
        <div id="saldo-card" class="glass rounded-[2rem] p-6 border-l-8 border-emerald-500 mb-6 text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-10">
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <div class="flex justify-between items-center mb-3 text-white">
                    <h4 class="text-emerald-400 font-black text-[10px] uppercase">Extrato Vendas</h4>
                    <span class="text-[8px] text-slate-500 text-white uppercase italic">Por Data + Vendedor</span>
                </div>
                <div id="extrato-tabela" class="text-xs text-white"></div>
            </div>
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <h4 class="text-rose-500 font-black text-[10px] mb-3 uppercase text-white">NQ</h4>
                <div id="nq-tabela" class="text-xs text-white"></div>
            </div>
        </div>
    </section>

    <section id="view-automacao" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-6 text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <span class="text-amber-500 font-black text-[10px] uppercase italic text-white">Motor Elite Auto-Zap</span>
        </nav>
        <div class="glass p-8 rounded-[3rem] text-center mb-6 text-white">
            <div id="status-automacao" class="text-[9px] font-black text-slate-500 uppercase mb-2 text-white">Pronto para iniciar</div>
            <div id="timer-display" class="text-5xl font-black text-white mb-6">00:00</div>
            <div class="flex gap-3 justify-center">
                <button id="btn-start-auto" onclick="window.iniciarCampanha()" class="bg-emerald-600 px-8 py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Iniciar Campanha</button>
                <button id="btn-stop-auto" onclick="window.pararCampanha()" class="bg-rose-600 hidden px-8 py-4 rounded-2xl font-black uppercase text-xs">Pausar</button>
            </div>
        </div>
        <div class="glass p-5 rounded-[2rem]">
            <div class="flex justify-between items-center mb-4 text-white">
                <h4 class="text-[10px] font-black uppercase text-blue-400">Fila de Envios</h4>
                <button onclick="window.resetIndex()" class="text-[8px] text-slate-600 font-bold uppercase">Reiniciar Fila</button>
            </div>
            <div id="lista-fila" class="space-y-2 max-h-64 overflow-y-auto text-[10px] text-white"></div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        let projId = "";
        window.dadosCompletos = [];
        let custosDB = {
            km_valor: 0.7,
            km_total: 0,
            hosp_valor: 0,
            hosp_qtd: 0,
            alim_valor: 0,
            alim_qtd: 0,
            pedagio_total: 0
        };
        let valesDB = {};
        let projetoDB = {};
        let weeklyChart = null;

        // --- INICIALIZAÇÃO MULTIPROJETO DINÂMICA ---
        const urlParams = new URLSearchParams(window.location.search);
        const idDaUrl = urlParams.get('id');

        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            const globalId = snap.val();
            projId = idDaUrl || localStorage.getItem('currentProject') || globalId;
            
            if (projId) {
                const pS = await get(ref(db, `projetos/${projId}`));
                if (pS.exists()) {
                    projetoDB = pS.val();
                    document.getElementById('escola-titulo').innerText = projetoDB.cidade || "Cidade";
                    document.getElementById('sub-escola').innerText = projetoDB.escola || "Escola";
                    if (projetoDB.data_inicio) window.gerarBotoesDatas(projetoDB.data_inicio, projetoDB.data_fim);
                    window.carregarRelatorio();
                    
                    const user = localStorage.getItem('userType');
                    if(user) {
                        document.getElementById('user-display').innerText = `| ${user}`;
                        document.getElementById('controles-admin').classList.remove('hidden');
                    }

                    onValue(ref(db, `projetos/${projId}/bot`), (botSnap) => {
                        const led = document.getElementById('bot-led');
                        const txt = document.getElementById('bot-status-text');
                        const botData = botSnap.val();
                        if (botData && (botData.status === 'Online' || botData.status === 'online')) {
                            led.className = 'led-bot led-online';
                            txt.innerText = 'Bot Ativo';
                        } else {
                            led.className = 'led-bot led-offline';
                            txt.innerText = 'Bot Offline';
                        }
                    });
                }
            }
        });

        // --- LOGIN E PERMISSÕES ---
        window.acessoAdmin = () => {
            if (localStorage.getItem('userType')) {
                document.getElementById('modalGestao').style.display = 'flex';
                document.getElementById('gestao-menu').classList.add('hidden');
                const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
                f.innerHTML = `
                    <h3 class="text-blue-400 font-black text-xs uppercase mb-4 text-center">Menu Administrativo</h3>
                    <button onclick="window.switchView('view-logistica'); window.fecharModalGestao();" class="btn-primary w-full py-4 rounded-xl text-[10px] font-black uppercase mb-2">Painel Logística</button>
                    <button onclick="window.efetuarLogout()" class="bg-rose-600 w-full py-4 rounded-xl text-[10px] font-black uppercase">Sair / Deslogar</button>
                `;
                return;
            }
            
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            
            f.innerHTML = `
                <h3 class="text-blue-400 font-black text-xs uppercase mb-4 text-center">Acesso Restrito</h3>
                <select id="login-user" class="input-compact mb-2">
                    <option value="Evanio">Evanio</option>
                    <option value="Willian">Willian</option>
                </select>
                <input type="password" id="login-pass" placeholder="Senha" class="input-compact mb-4 text-white">
                <button onclick="window.confirmarLogin()" class="btn-primary w-full py-4 rounded-xl text-[10px] font-black uppercase">Entrar</button>
            `;
        };

        window.efetuarLogout = () => {
            localStorage.removeItem('userType');
            localStorage.removeItem('isAdmin');
            location.reload();
        };

        window.confirmarLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            if (user === "Evanio" && pass === "elite") {
                localStorage.setItem('userType', 'Evanio');
                localStorage.setItem('isAdmin', 'true');
                window.fecharModalGestao();
                location.reload();
            } else if (user === "Willian" && pass === "2025") {
                localStorage.setItem('userType', 'Willian');
                localStorage.setItem('isAdmin', 'false');
                window.fecharModalGestao();
                location.reload();
            } else {
                alert("Senha Incorreta!");
            }
        };

        // --- AVULSOS E VALES ---
        window.abrirAvulso = () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const dataHoje = new Date().toISOString().split('T')[0];
            
            f.innerHTML = `
                <h3 class="text-emerald-400 font-black text-xs uppercase mb-4 text-center">Venda Avulsa (S/ Agendamento)</h3>
                <input type="text" id="av_nome" placeholder="Nome do Formando" class="input-compact mb-2">
                <input type="date" id="av_data" value="${dataHoje}" class="input-compact mb-2">
                <input type="text" id="av_num" placeholder="Nº Álbum" class="input-compact mb-2">
                <input type="number" id="av_valor" placeholder="Valor Total" class="input-compact mb-2">
                <select id="av_vend" class="input-compact mb-4">
                    <option value="Evanio">Evanio</option>
                    <option value="Willian">Willian</option>
                </select>
                <button onclick="window.salvarAvulso()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs">Registrar Avulso</button>
            `;
        };

        window.salvarAvulso = async () => {
            const n = document.getElementById('av_nome').value;
            const d = document.getElementById('av_data').value;
            const v = document.getElementById('av_valor').value;
            const alb = document.getElementById('av_num').value;
            const vend = document.getElementById('av_vend').value;

            if(!n || !d || !v) return alert("Preencha Nome, Data e Valor!");
            const id = `AV-${Date.now()}`;
            await set(ref(db, `vendas/${projId}/avulsos/${d}/${id}`), {
                nome_formando: n, data: d, valor: v, num_album: alb, vendedor: vend, resultado: "Venda"
            });
            alert("Venda Avulsa Gravada!");
            location.reload();
        };

        window.abrirGestaoVales = () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            f.innerHTML = `
                <h3 class="text-rose-500 font-black text-xs uppercase mb-4 text-center">Lançar Vale</h3>
                <input type="date" id="vale_data" value="${new Date().toISOString().split('T')[0]}" class="input-compact mb-2">
                <input type="text" id="vale_desc" placeholder="Descrição (Ex: Jantar, Combustível)" class="input-compact mb-2">
                <input type="number" id="vale_valor" placeholder="Valor" class="input-compact mb-2">
                <select id="vale_vend" class="input-compact mb-4">
                    <option value="Evanio">Evanio</option>
                    <option value="Willian">Willian</option>
                </select>
                <button onclick="window.salvarVale()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs">Gravar Vale</button>
            `;
        };

        window.salvarVale = async () => {
            const d = document.getElementById('vale_data').value;
            const v = document.getElementById('vale_valor').value;
            const desc = document.getElementById('vale_desc').value;
            const vend = document.getElementById('vale_vend').value;
            if(!v || !d) return alert("Preencha Data e Valor!");
            const id = `VALE-${Date.now()}`;
            await set(ref(db, `vales/${projId}/${id}`), { data: d, valor: v, descricao: desc, vendedor: vend });
            alert("Vale registrado!");
            location.reload();
        };

        // --- AUTOMAÇÃO ---
        let autoAtivo = false;
        let timerInterval = null;

        window.iniciarCampanha = () => {
            if (!projetoDB || !projetoDB.automacao?.lista) return alert("Configure a lista no botão 'Dados Projeto'!");
            autoAtivo = true;
            document.getElementById('btn-start-auto').classList.add('hidden');
            document.getElementById('btn-stop-auto').classList.remove('hidden');
            window.dispararProximoAPI();
        };

        window.pararCampanha = () => {
            autoAtivo = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('btn-start-auto').classList.remove('hidden');
            document.getElementById('btn-stop-auto').classList.add('hidden');
            document.getElementById('timer-display').innerText = "00:00";
        };

        window.dispararProximoAPI = async () => {
            if (!autoAtivo) return;
            if (typeof db === 'undefined' || !projId) {
                setTimeout(window.dispararProximoAPI, 2000);
                return;
            }

            const listaRaw = projetoDB.automacao?.lista || "";
            const lista = listaRaw.split('\n').filter(l => l.trim() !== "");
            const idx = projetoDB.automacao?.index_atual || 0;

            if (idx >= lista.length) {
                document.getElementById('status-automacao').innerText = "CAMPANHA CONCLUÍDA ✅";
                return window.pararCampanha();
            }

            const dados = lista[idx].split(',');
            if (dados.length < 2) {
                await update(ref(db, `projetos/${projId}/automacao`), { index_atual: idx + 1 });
                projetoDB.automacao.index_atual = idx + 1;

                    headers: { 'Content-Type': 'application/json' },

                        nome_formando: nome,

                    const prox = idx + 1;

                    if (typeof window.renderFila === "function") window.renderFila();

                const m = Math.floor(rest / 60); const s = rest % 60;
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

        window.salvarVendaFinal = async () => {
            const valorTotal = document.getElementById('valor_venda').value;
            const album = document.getElementById('num_album').value;
            const vendedor = document.getElementById('vendedor_venda').value;
            const novaData = document.getElementById('data_venda_gestao').value;
            if (!valorTotal || !album || !novaData) return alert("Informe Data, Valor e Álbum!");

            const pagamentos = [];
            document.querySelectorAll('#pags-container > div').forEach(div => {
                const tipo = div.querySelector('.p-tipo').value;
                const valor = div.querySelector('.p-valor').value;
                if (valor) pagamentos.push({ tipo, valor });
            });

            try {
                const itemOriginal = window.dadosCompletos.find(i => i.path === window.itemPath);
                if (!itemOriginal) return alert("Erro ao localizar item.");

                if (itemOriginal.data !== novaData) {
                    const novoId = itemOriginal.id || `V-${Date.now()}`;
                    const basePasta = window.itemPath.split('/').slice(0, -2).join('/');
                    const novoPath = `${basePasta}/${novaData}/${novoId}`;
                    await set(ref(db, novoPath), { ...itemOriginal, resultado: "Venda", valor: valorTotal, num_album: album, vendedor: vendedor, pagamentos: pagamentos, data: novaData });
                    await remove(ref(db, window.itemPath));
                } else {
                    await update(ref(db, window.itemPath), { resultado: "Venda", valor: valorTotal, num_album: album, vendedor: vendedor, pagamentos: pagamentos });

        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;

                if (i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor) || 0;
                    vend[vn].v++; vend[vn].tot += Number(i.valor) || 0;
                    chartData[dKey].v++;
                    
                    let cV = 0;
                    let totalPixIncorporadoVale = 0;
                    let valorTotalVenda = Number(i.valor) || 0;

                        i.pagamentos.forEach(p => {
                            const vP = Number(p.valor) || 0;
                            somaPagamentos += vP;
                            const tipo = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

                            if (tipo.includes("boleto")) {
                                cV += vP * 0.08;
                                m.bol += vP;
                            } else {
                                cV += vP * 0.12;
                                if (tipo.includes("pix")) {
                                    m.pix += vP;
                                    totalPixIncorporadoVale += vP;
                                }
                                if (tipo.includes("debito")) m.deb += vP;
                                if (tipo.includes("credito")) m.cre += vP;
                            }
                        });
                    }

                    const restante = valorTotalVenda - somaPagamentos;
                    if (restante > 0) {
                        cV += restante * 0.08;
                        m.bol += restante;
                    }
                    
                    i.venda_comissao = cV;
                    
                    if (isIndividual) {
                        vend[vn].com += cV;
                        vend[vn].ent += totalPixIncorporadoVale;
                    } else {
                        vend.Evanio.ent += totalPixIncorporadoVale / 2;
                        vend.Willian.ent += totalPixIncorporadoVale / 2;
                        vend.Evanio.com += cV / 2;
                        vend.Willian.com += cV / 2;
                    }
                    
                    m.com += cV;
                    i.total_pix_din = totalPixIncorporadoVale;

                } else if (i.resultado === "NQ") { 
                    m.nq++; vend[vn].nq++; chartData[dKey].nq++; 
                }
            });

            m.com = Number(m.com) || 0;
            const ticketMedio = m.v > 0 ? (m.tot / m.v) : 0;
            
            // CÁLCULO DE REEMBOLSO TOTAL
            const rI = (parseFloat(custosDB.km_valor) || 0.7) * (parseFloat(custosDB.km_total) || 0) + (parseFloat(custosDB.pedagio_total) || 0) + ((parseFloat(custosDB.hosp_valor) || 0) * parseInt(custosDB.hosp_qtd || 0)) + ((parseFloat(custosDB.alim_valor) || 0) * parseInt(custosDB.alim_qtd || 0));

            let totalValesEvanio = 0;

            Object.values(valesDB || {}).forEach(v => {

                    if (v.vendedor === "Willian") totalValesWillian += Number(v.valor) || 0;

                    totalValesEvanio += (Number(v.valor) || 0) / 2;

                <div class="card-bi p-3 rounded-3xl text-center border-blue-500"><p class="text-[11px] font-black text-blue-400 uppercase">Eficiência</p><p class="text-lg font-black text-white">${(m.v+m.nq)?(m.v/(m.v+m.nq)*100).toFixed(0):0}%</p></div>
                <div class="card-bi p-3 rounded-3xl text-center"><p class="text-[11px] font-black uppercase text-slate-400">Vendas/NQ</p><p class="text-lg font-black text-white">${m.v}/${m.nq}</p></div>
                <div class="card-bi p-3 rounded-3xl text-center"><p class="text-[11px] font-black uppercase text-white">Ticket Médio</p><p class="text-lg font-black text-white">${fBR(ticketMedio)}</p></div>

            document.getElementById('comissao-card').innerHTML = `

                <div class="glass p-2 rounded-xl text-center text-[10px] text-white uppercase">Boleto<br><b class="text-xs">${fBR(m.bol)}</b></div>`;
            
            const userLogado = localStorage.getItem('userType');
            document.getElementById('saldo-card').innerHTML = `
                <div class="text-center mb-6 border-b border-white/10 pb-2 font-black text-xl uppercase text-white tracking-widest italic tracking-tighter">FECHAMENTO INDIVIDUAL</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-blue-600/10 border border-blue-500/20 p-8 rounded-[2.5rem] text-white relative overflow-hidden">
                        <p class="text-3xl font-black text-blue-400 uppercase mb-8 border-b border-blue-500/20 pb-4 text-center italic tracking-tighter">EVANIO MARTINS</p>
                        <div class="text-lg space-y-6 font-semibold">
                            <div class="flex justify-between items-center">Comissão: <b class="text-2xl text-blue-200">+ ${fBR(vend.Evanio.com)}</b></div>
                            <div class="flex justify-between items-center">Reembolso: <b class="text-2xl text-blue-200">+ ${fBR(isIndividual ? (userLogado === 'Evanio' ? rI : 0) : rI)}</b></div>
                            <div class="flex justify-between items-center text-rose-400">Vales/PD: <b class="text-2xl font-black">- ${fBR(totalValesEvanio + vend.Evanio.ent)}</b></div>
                            <div class="text-2xl font-black pt-8 border-t-4 border-white/10 mt-4 flex justify-between items-center bg-emerald-900/40 p-6 rounded-3xl shadow-xl uppercase italic">
                                Saldo Final: <span class="text-5xl text-emerald-400 drop-shadow-lg font-black">${fBR(vend.Evanio.com + (isIndividual ? (userLogado === 'Evanio' ? rI : 0) : rI) - totalValesEvanio - vend.Evanio.ent)}</span>
                            </div>
                        </div>
                    </div>
                    <div class="bg-cyan-600/10 border border-cyan-500/20 p-8 rounded-[2.5rem] text-white relative overflow-hidden">
                        <p class="text-3xl font-black text-cyan-400 uppercase mb-8 border-b border-cyan-500/20 pb-4 text-center italic tracking-tighter">WILLIAN SEGURA</p>
                        <div class="text-lg space-y-6 font-semibold">
                            <div class="flex justify-between items-center">Comissão: <b class="text-2xl text-cyan-200">+ ${fBR(vend.Willian.com)}</b></div>
                            <div class="flex justify-between items-center">Reembolso: <b class="text-2xl text-cyan-200">+ ${fBR(isIndividual ? (userLogado === 'Willian' ? rI : 0) : rI)}</b></div>
                            <div class="flex justify-between items-center text-rose-400">Vales/PD: <b class="text-2xl font-black">- ${fBR(totalValesWillian + vend.Willian.ent)}</b></div>
                            <div class="text-2xl font-black pt-8 border-t-4 border-white/10 mt-4 flex justify-between items-center bg-emerald-900/40 p-6 rounded-3xl shadow-xl uppercase italic">
                                Saldo Final: <span class="text-5xl text-emerald-400 drop-shadow-lg font-black">${fBR(vend.Willian.com + (isIndividual ? (userLogado === 'Willian' ? rI : 0) : rI) - totalValesWillian - vend.Willian.ent)}</span>
                            </div>

            window.updateChart(chartData);

        window.renderExtrato = (list) => {
            const agrupadoVendas = {};
            const agrupadoNQs = [];

            list.forEach(i => {
                if (i.resultado === "Venda") {
                    const data = i.data || "Sem Data";
                    const vendedor = i.vendedor || "Sem Vendedor";
                    if (!agrupadoVendas[data]) agrupadoVendas[data] = {};

        window.updateChart = (data) => {
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            const sD = Object.keys(data).sort();
            const labels = sD.map(d => d.split('-').reverse().slice(0, 2).join('/'));
            if (weeklyChart) weeklyChart.destroy();
            Chart.register(ChartDataLabels);
            weeklyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Vendas', data: sD.map(d => data[d].v), backgroundColor: '#10b981', borderRadius: 6, datalabels: { color: '#10b981', anchor: 'end', align: 'top', font: { weight: '800', size: 10 } } }, 
                        { label: 'NQ', data: sD.map(d => data[d].nq), backgroundColor: '#f43f5e', borderRadius: 6, datalabels: { color: '#f43f5e', anchor: 'end', align: 'top', font: { weight: '800', size: 10 } } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, layout: { padding: { top: 25 } },
                    plugins: { legend: { display: false }, datalabels: { display: true, formatter: (v) => v > 0 ? v : '' } },
                    scales: { y: { display: false, beginAtZero: true }, x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 9, weight: 'bold' } } } }
                }
            });
        };

        // --- CONFIGURAÇÕES E PROJETOS ---
        window.abrirGestaoCentralizada = () => {
            const c = custosDB; const p = projetoDB;
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            f.innerHTML = `
                <h3 class="text-blue-400 font-black text-[12px] uppercase mb-4 text-white text-center">Configurações Projeto</h3>
                <button onclick="window.consultarProjetosAnteriores()" class="bg-amber-600/20 w-full py-3 rounded-xl text-[10px] mb-4 uppercase font-black">Mudar Projeto</button>
                <div class="space-y-3">
                    <input type="date" id="pDi" value="${p.data_inicio}" class="input-compact">
                    <div class="flex justify-between items-center glass p-3 rounded-xl">
                        <span class="text-[10px]">COMISSÃO INDIVIDUAL</span>
                        <label class="switch"><input type="checkbox" id="pComInd" ${p.comissao_individual ? 'checked' : ''}><span class="slider"></span></label>
                    </div>
                    <textarea id="pLista" placeholder="Lista" class="input-compact h-20">${p.automacao?.lista || ''}</textarea>
                    
                    <p class="text-[8px] font-black text-slate-500 uppercase ml-2 mt-4">Custos de Viagem</p>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1"><span class="label-custo">KM R$</span><input type="number" id="cKv" value="${c.km_valor}" class="input-compact"></div>
                        <div class="space-y-1"><span class="label-custo">KM Total</span><input type="number" id="cKt" value="${c.km_total}" class="input-compact"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1"><span class="label-custo">Hospedagem R$</span><input type="number" id="cHv" value="${c.hosp_valor}" class="input-compact"></div>
                        <div class="space-y-1"><span class="label-custo">Qtd Noites</span><input type="number" id="cHq" value="${c.hosp_qtd}" class="input-compact"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1"><span class="label-custo">Alimentação R$</span><input type="number" id="cAv" value="${c.alim_valor}" class="input-compact"></div>
                        <div class="space-y-1"><span class="label-custo">Qtd Refeições</span><input type="number" id="cAq" value="${c.alim_qtd}" class="input-compact"></div>
                    </div>
                    <div class="space-y-1"><span class="label-custo">Total Pedágios R$</span><input type="number" id="cPt" value="${c.pedagio_total}" class="input-compact"></div>
                </div>
                <button onclick="window.salvarTudoProjeto()" class="btn-primary w-full py-4 rounded-xl mt-4 font-black uppercase">Gravar Tudo</button>`;
        };

        window.salvarTudoProjeto = async () => {
            await update(ref(db, `projetos/${projId}`), { 
                data_inicio: document.getElementById('pDi').value,
                comissao_individual: document.getElementById('pComInd').checked,
                automacao: { ...projetoDB.automacao, lista: document.getElementById('pLista').value }
            });
            await update(ref(db, `custos/${projId}`), { 
                km_valor: document.getElementById('cKv').value, 
                km_total: document.getElementById('cKt').value,
                hosp_valor: document.getElementById('cHv').value,
                hosp_qtd: document.getElementById('cHq').value,
                alim_valor: document.getElementById('cAv').value,
                alim_qtd: document.getElementById('cAq').value,
                pedagio_total: document.getElementById('cPt').value
            });
            location.reload();
        };

        window.abrirNovoProjeto = () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            f.innerHTML = `
                <h3 class="text-emerald-400 font-black text-xs uppercase mb-4 text-center">Novo Projeto</h3>
                <input type="text" id="pC" placeholder="Cidade" class="input-compact mb-2">
                <input type="text" id="pS" placeholder="Escola" class="input-compact mb-2">
                <div class="flex gap-2 mb-4"><input type="date" id="pSt" class="input-compact flex-grow"><input type="date" id="pEd" class="input-compact flex-grow"></div>
                <button onclick="window.salvarNovoProjeto()" class="btn-primary w-full py-4 rounded-xl font-black">CRIAR</button>`;
        };

        window.salvarNovoProjeto = async () => {
            const sch = document.getElementById('pS').value;
            const id = sch.toLowerCase().replace(/\s+/g, '-');
            const user = localStorage.getItem('userType') || 'Evanio';
            await set(ref(db, `projetos/${id}`), {
                cidade: document.getElementById('pC').value, escola: sch, criador: user,
                data_inicio: document.getElementById('pSt').value, data_fim: document.getElementById('pEd').value,
                comissao_individual: true
            });
            localStorage.setItem('currentProject', id);
            location.reload();
        };

        /*
        window.consultarProjetosAnteriores = async () => {
            const f = document.getElementById('gestao-form');
            f.innerHTML = `<h3 class="text-amber-400 font-black text-xs uppercase mb-4 text-center">Escolher Projeto</h3><div id="lista-projs-db" class="space-y-2 max-h-80 overflow-y-auto"></div>`;
            const snap = await get(ref(db, "projetos"));
            const user = localStorage.getItem('userType');
            const isAdmin = localStorage.getItem('isAdmin') === 'true';
            if (snap.exists()) {
                Object.keys(snap.val()).forEach(key => {
                    const p = snap.val()[key];
                    if (isAdmin || p.criador === user) {
                        const btn = document.createElement('button');
                        btn.className = "w-full glass p-4 rounded-xl text-left text-[10px]";
                        btn.innerHTML = `<b class="text-blue-400">${p.escola}</b><br>${p.cidade} (Dono: ${p.criador})`;
                        btn.onclick = () => { localStorage.setItem('currentProject', key); location.reload(); };
                        document.getElementById('lista-projs-db').appendChild(btn);
                    }
                });
            }
        };
        */
        window.consultarProjetosAnteriores = async () => {
            const f = document.getElementById('gestao-form');
            // Primeiro criamos a estrutura do título e o container da lista
            f.innerHTML = `
                <h3 class="text-amber-400 font-black text-xs uppercase mb-4 text-center">Escolher Projeto</h3>
                <div id="lista-projs-db" class="space-y-2 max-h-80 overflow-y-auto">
                    <p class="text-[10px] text-center text-slate-500">Carregando...</p>
                </div>
            `;
            
            const listContainer = document.getElementById('lista-projs-db');
            const snap = await get(ref(db, "projetos"));
            const user = localStorage.getItem('userType');
            const isAdmin = localStorage.getItem('isAdmin') === 'true';
            
            if (snap.exists()) {
                listContainer.innerHTML = ""; // Limpa o "Carregando"
                const projs = snap.val();
                Object.keys(projs).forEach(key => {
                    const p = projs[key];
                    // Regra: Admin vê tudo, usuário comum vê apenas o que criou
                    if (isAdmin || p.criador === user) {
                        const btn = document.createElement('button');
                        btn.className = "w-full glass p-4 rounded-xl text-left text-[10px] border border-white/5 mb-2";
                        btn.innerHTML = `<b class="text-blue-400 uppercase">${p.escola}</b><br><span class="text-slate-400">${p.cidade}</span><br><span class="text-[8px] opacity-50">Criador: ${p.criador}</span>`;
                        btn.onclick = () => { 
                            localStorage.setItem('currentProject', key); 
                            location.reload(); 
                        };
                        listContainer.appendChild(btn);
                    }
                });
                
                if(listContainer.innerHTML === "") {
                    listContainer.innerHTML = `<p class="text-[10px] text-center text-rose-400">Nenhum projeto encontrado.</p>`;
                }
            } else {
                listContainer.innerHTML = `<p class="text-[10px] text-center text-rose-400">Erro ao carregar do banco.</p>`;
            }
        };

        // Funções de Suporte (Manutenção da integridade v27.96/97)
        window.switchView = (v) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active')); document.getElementById(v).classList.add('view-active'); };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display='none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };
        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display='flex'; };
        
        window.carregarRelatorio = async () => {
            const [sA, sV, sC, sVales] = await Promise.all([ get(ref(db, `dados/${projId}/agendamentos`)), get(ref(db, `vendas/${projId}`)), get(ref(db, `custos/${projId}`)), get(ref(db, `vales/${projId}`)) ]);
            window.dadosCompletos = [];
            custosDB = sC.exists() ? sC.val() : custosDB;
            valesDB = sVales.exists() ? sVales.val() : {};
            const proc = (p, b) => { if(!p) return; Object.keys(p).forEach(k => { if(p[k].nome_formando) window.dadosCompletos.push({...p[k], path: `${b}/${k}`, id: k}); else Object.keys(p[k]).forEach(sK => window.dadosCompletos.push({...p[k][sK], path: `${b}/${k}/${sK}`, id: sK, data: k})); }); };
            if(sA.exists()) proc(sA.val(), `dados/${projId}/agendamentos`);
            if(sV.exists()) { if(sV.val().agendamentos) proc(sV.val().agendamentos, `vendas/${projId}/agendamentos`); if(sV.val().avulsos) proc(sV.val().avulsos, `vendas/${projId}/avulsos`); }
            window.filtrarLogistica(); window.filtrarBI();
        };

        window.filtrarLogistica = () => {
            const cont = document.getElementById('lista-visitas'); cont.innerHTML = '';
            const fD = document.getElementById('filtro-data-logistica').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            list.forEach(i => {
                let status = i.resultado || "PENDENTE";
                let statusColor = status === "Venda" ? "text-emerald-400" : (status === "NQ" ? "text-rose-500" : "text-blue-500");
                
                cont.innerHTML += `
                <div class="glass p-4 rounded-3xl mb-3 border border-white/5">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-xs text-slate-400">📅 ${i.data?.split('-').reverse().join('/')}</span><br>
                            <b class="text-blue-400">⏰ ${i.horario || '--:--'}</b>
                        </div>
                        <div class="text-right">
                            <span class="text-[12px] uppercase font-black ${statusColor}">${status}</span><br>
                            <span class="text-[10px] text-white uppercase font-black">${i.nome_formando}</span>
                        </div>
                    </div>
                    <div class="text-[13px] mt-2 text-slate-300 font-semibold italic">${i.endereco||'S/E'}</div>
                    <button onclick="window.gerenciarItem('${i.path}')" class="btn-primary w-full py-3 rounded-xl mt-3 text-[10px] font-black uppercase">Gerenciar</button>
                </div>`;
            });
        };

        window.gerarBotoesDatas = (inicio, fim) => {
            const container = document.getElementById('day-selector'); container.innerHTML = "";
            let atual = new Date(inicio + "T00:00:00");
            while (atual <= new Date(fim + "T00:00:00")) {
                const iso = atual.toISOString().split('T')[0];
                const btn = document.createElement('button'); btn.className = "day-btn text-white";
                btn.innerText = atual.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
                btn.onclick = () => { 
                    document.querySelectorAll('.day-btn').forEach(x => x.classList.remove('active')); btn.classList.add('active'); 
                    document.getElementById('data-selecionada').value = iso; window.carregarHorarios(iso); 
                };
                container.appendChild(btn);
                atual.setDate(atual.getDate() + 1);
            }
        };

        window.carregarHorarios = async (iso) => {
            const selectH = document.getElementById('horario'); selectH.innerHTML = '<option>...</option>';
            const snap = await get(ref(db, `dados/${projId}/agendamentos/${iso}`));
            const ag = snap.exists() ? snap.val() : {};
            selectH.innerHTML = '<option value="">Selecione o Horário</option>';
            const fds = (new Date(iso + "T00:00:00").getDay() % 6 === 0);
            for (let h = 9; h <= (fds ? 17 : 20.5); h += 0.5) {
                const hh = Math.floor(h).toString().padStart(2, '0'); const mm = (h % 1 === 0) ? '00' : '30';
                const format = `${hh}:${mm}`;
                if (Object.values(ag).filter(a => a.horario === format).length < 2) selectH.innerHTML += `<option value="${format}">${format}</option>`;
            }
        };

        document.getElementById('form-agendamento').onsubmit = async (e) => {
            e.preventDefault(); const dt = document.getElementById('data-selecionada').value; if (!dt) return alert("Selecione o Dia!");
            const n = document.getElementById('nome').value; const t = document.getElementById('telefone').value; const h = document.getElementById('horario').value; const ed = document.getElementById('endereco').value;
            const zapAviso = (projetoDB.criador === "Willian") ? "16988722130" : "16992590916";
            await set(ref(db, `dados/${projId}/agendamentos/${dt}/AG-${Date.now()}`), { nome_formando: n, telefone: t, endereco: ed, horario: h, resultado: "Pendente" });
            const msg = `✅ *NOVA VISITA* \n\n🎓 *Formando:* ${n}\n📅 *Data:* ${dt.split('-').reverse().join('/')}\n⏰ *Horário:* ${h}\n📍 *Endereço:* ${ed}\n📱 *WhatsApp:* ${t}`;
            alert("✅ AGENDADO!"); window.location.href = `https://wa.me/55${zapAviso.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
        };

        window.renderFila = () => { const cont = document.getElementById('lista-fila'); if (!cont) return; const lista = projetoDB.automacao?.lista?.split('\n').filter(l => l.trim() !== "") || []; const atual = projetoDB.automacao?.index_atual || 0; cont.innerHTML = lista.map((l, i) => `<div class="flex justify-between p-2 rounded-lg ${i < atual ? 'bg-emerald-500/10 text-emerald-500' : 'bg-white/5'}"><span>${i+1}. ${l.split(',')[0]}</span><b>${i < atual ? 'OK' : 'PENDENTE'}</b></div>`).join(''); };
        window.obterHorariosArray = (d) => {
            const doB = new Date(d + "T00:00:00"); const fds = (doB.getDay() === 0 || doB.getDay() === 6);
            let hL = []; const f = fds ? 17 : 20.5;
            for (let h = 9; h <= f; h += 0.5) { 
                const hh = Math.floor(h).toString().padStart(2, '0'); const mm = (h % 1 === 0) ? '00' : '30'; hL.push(`${hh}:${mm}`); 
            }
            return hL;
        };
    </script>
