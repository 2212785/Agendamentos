<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Dashboard PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: center; justify-content: center; padding: 20px; }
        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        .card-bi { background: rgba(15, 23, 42, 0.8); border-left: 4px solid #3b82f6; }
        .table-header { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 id="gestao-titulo" class="text-xl font-black uppercase text-blue-400">Gerenciar</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-8 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 hover:text-white transition">Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 text-rose-500 p-4 rounded-2xl font-bold uppercase text-xs">Marcar NQ</button>
            </div>
            <div id="gestao-form" class="hidden space-y-4"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active">
        <header class="p-6 flex justify-between items-center w-full">
            <span class="text-xl font-black uppercase italic text-white">Elite <span class="text-blue-500">Sales</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white">Painel ADM</button>
        </header>
        <main class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl">
                <div class="text-center mb-8">
                    <h2 id="escola-titulo" class="text-2xl font-extrabold uppercase text-blue-400 italic">Guaratinguetá</h2>
                    <h3 id="sub-escola" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Dr. Guilherme Filippo</h3>
                </div>
                <form id="form-agendamento" class="space-y-4 text-white">
                    <div class="grid grid-cols-2 gap-2 mb-4" id="day-selector">
                        <button type="button" data-date="2026-03-07" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase">Sab 07/03</button>
                        <button type="button" data-date="2026-03-08" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase">Dom 08/03</button>
                    </div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none text-white"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-5 rounded-2xl font-black uppercase text-white shadow-lg shadow-blue-900/40">Confirmar Agendamento</button>
                </form>
            </div>
        </main>
    </section>

    <section id="view-logistica" class="view-section p-6">
        <div class="max-w-4xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-10 text-white">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Sair</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-white shadow-lg">Visitas</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400 hover:text-white">Dashboard BI</button>
                </div>
            </nav>
            <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-8 text-white">
                <h1 class="text-3xl font-black italic uppercase">Minha <span class="text-blue-500">Rota</span></h1>
                <div class="flex gap-3 w-full md:w-auto">
                    <select id="log-projeto-ativo" onchange="window.carregarRelatorio()" class="bg-slate-900 border border-white/10 rounded-2xl px-4 py-3 text-xs font-bold text-blue-400 outline-none"></select>
                    <button onclick="window.abrirAvulso()" class="bg-white text-black px-6 py-3 rounded-2xl text-[10px] font-black uppercase">+ Avulso</button>
                </div>
            </div>
            <input type="date" id="filtro-data-operacional" onchange="window.filtrarLogistica()" class="w-full mb-6 bg-slate-900 border border-white/10 rounded-2xl px-4 py-4 text-sm text-white font-bold outline-none">
            <div id="lista-visitas" class="space-y-4"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section p-6 text-white">
        <div class="max-w-7xl mx-auto w-full">
            <nav class="flex justify-between items-center mb-10">
                <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Roteiro</button>
                <div class="flex gap-4 items-center">
                    <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs text-white outline-none">
                    <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">Copiar Zap</button>
                </div>
            </nav>
            <div id="bi-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>
            <div class="glass rounded-[2.5rem] p-8 mb-8 overflow-x-auto">
                <h3 class="font-black uppercase text-[10px] mb-6 text-slate-400 tracking-widest italic">Análise de Vendas</h3>
                <table class="w-full text-left min-w-[600px]">
                    <thead><tr class="border-b border-white/5"><th class="p-4 table-header">Formando</th><th class="p-4 table-header">Venda</th><th class="p-4 table-header">Pagamento</th><th class="p-4 table-header">Comissão</th></tr></thead>
                    <tbody id="extrato-tabela"></tbody>
                </table>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- BINDING GLOBAL ---
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            if(id !== 'view-agendamento') window.carregarRelatorio();
        };

        window.acessoAdmin = () => { if(prompt("Senha ADM:") === "2025") window.switchView('view-logistica'); };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };

        window.carregarRelatorio = async () => {
            const seletor = document.getElementById('log-projeto-ativo');
            const projeto = seletor.value || "guaratingueta-guilherme";
            const [sA, sV] = await Promise.all([get(ref(db, `dados/${projeto}/agendamentos`)), get(ref(db, `dados/${projeto}/avulsos`))]);
            
            window.dadosCompletos = [];
            const ags = sA.val() || {};
            Object.keys(ags).forEach(d => { if(ags[d]) Object.keys(ags[d]).forEach(id => window.dadosCompletos.push({...ags[d][id], id, data: d, path: `dados/${projeto}/agendamentos/${d}/${id}`})); });
            const avs = sV.val() || {};
            Object.keys(avs).forEach(id => window.dadosCompletos.push({...avs[id], id, path: `dados/${projeto}/avulsos/${id}`}));
            
            window.filtrarLogistica();
            window.filtrarBI();
        };

        window.filtrarLogistica = () => {
            const fData = document.getElementById('filtro-data-operacional').value;
            let lista = fData ? window.dadosCompletos.filter(i => i.data === fData) : window.dadosCompletos;
            renderizarLogistica(lista);
        };

        function renderizarLogistica(lista) {
            const container = document.getElementById('lista-visitas');
            container.innerHTML = '';
            lista.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`));
            lista.forEach(item => {
                const cor = item.resultado === "Venda" ? "border-emerald-500/40 bg-emerald-500/5" : (item.resultado === "NQ" ? "border-rose-500/40 bg-rose-500/5" : "border-white/10");
                const label = item.resultado === "Venda" ? `<span class="text-emerald-400 font-black text-xs block mb-2 uppercase tracking-widest">✓ VENDA REALIZADA</span>` : (item.resultado === "NQ" ? `<span class="text-rose-500 font-black text-xs block mb-2 uppercase tracking-widest">✗ NQ - PERDIDO</span>` : "");
                const wz = `https://www.waze.com/ul?q=${encodeURIComponent(item.endereco || '')}&navigate=yes`;
                const zap = `https://wa.me/55${(item.telefone||'').replace(/\D/g,'')}`;
                container.innerHTML += `
                    <div class="glass p-6 rounded-[2.5rem] border-l-8 ${cor} flex flex-col md:flex-row justify-between items-center gap-4 text-white">
                        <div class="flex-grow text-center md:text-left">
                            ${label}
                            <span class="bg-blue-600 px-3 py-1 rounded-lg font-black text-[10px] mr-2">${item.horario || 'DIR'}</span>
                            <span class="text-slate-500 font-bold text-[10px] uppercase">${pDT(item.data)}</span>
                            <h3 class="text-2xl font-black uppercase mt-2">${item.nome_formando}</h3>
                            <div class="mt-4 flex flex-col gap-1">
                                <a href="${zap}" target="_blank" class="text-emerald-400 font-bold text-sm hover:underline">📱 WhatsApp: ${item.telefone}</a>
                                <a href="${wz}" target="_blank" class="text-slate-400 text-sm leading-relaxed hover:text-blue-400 transition italic">📍 ${item.endereco}</a>
                            </div>
                        </div>
                        <button onclick="window.gerenciarItem('${item.path}')" class="btn-primary px-12 py-6 rounded-3xl font-black uppercase text-xs shadow-xl shadow-blue-900/30 text-white">Gerenciar</button>
                    </div>`;
            });
        }

        window.filtrarBI = () => {
            const fData = document.getElementById('filtro-bi').value;
            let lista = fData ? window.dadosCompletos.filter(i => i.data === fData) : window.dadosCompletos;
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, val:0, com:0 };
            let rows = '';

            lista.forEach(i => {
                if(i.resultado === "Venda") {
                    m.v++; const vV = Number(i.valor) || 0; m.tot += vV;
                    let comI = 0; let pgsI = [];
                    if(Array.isArray(i.pagamentos)) {
                        i.pagamentos.forEach(p => {
                            const vp = Number(p.valor)||0, ent = Number(p.entrada)||0; pgsI.push(p.tipo);
                            if(p.tipo === "Pix") m.pix += vp; else if(p.tipo === "Dinheiro") m.din += vp; else if(p.tipo.includes("Débito")) m.deb += vp; else if(p.tipo.includes("Crédito")) m.cre += vp;
                            else if(p.tipo === "Boleto") { m.bol += (vp-ent); comI += (ent*0.12)+((vp-ent)*0.08); if(p.forma_entrada === "Pix") m.pix += ent; else if(p.forma_entrada === "Dinheiro") m.din += ent; if(ent > 0) m.val += ent; }
                            if(p.tipo !== "Boleto") { if(p.tipo === "Pix" || p.tipo === "Dinheiro") m.val += vp; comI += vp * 0.12; }
                        });
                    } else { comI = vV * 0.12; }
                    m.com += comI;
                    rows += `<tr class="border-b border-white/5 hover:bg-white/5"><td class="p-4 text-sm font-bold uppercase">${i.nome_formando}</td><td class="p-4 text-emerald-400 font-bold">${fBR(vV)}</td><td class="p-4 text-[10px] text-slate-400 uppercase">${pgsI.join(' / ')}</td><td class="p-4 font-black">${fBR(comI)}</td></tr>`;
                } else if(i.resultado === "NQ") m.nq++;
            });

            const tx = (m.v + m.nq) > 0 ? ((m.v / (m.v + m.nq)) * 100).toFixed(0) : 0;
            const p = (v) => m.tot > 0 ? ((v / m.tot) * 100).toFixed(0) + '%' : '0%';
            document.getElementById('bi-grid').innerHTML = `<div class="card-bi p-6 rounded-3xl border-emerald-500"><p class="text-[9px] font-bold text-slate-500 uppercase">Faturamento</p><p class="text-3xl font-black text-emerald-400">${fBR(m.tot)}</p></div><div class="card-bi p-6 rounded-3xl"><p class="text-[9px] font-bold text-slate-500 uppercase">Vendas / NQ</p><p class="text-3xl font-black text-white">${m.v} / <span class="text-rose-500">${m.nq}</span></p></div><div class="card-bi p-6 rounded-3xl border-cyan-400"><p class="text-[9px] font-bold text-slate-500 uppercase">Pix (${p(m.pix)})</p><p class="text-3xl font-black">${fBR(m.pix)}</p></div><div class="card-bi p-6 rounded-3xl border-green-500"><p class="text-[9px] font-bold text-slate-500 uppercase">Dinheiro (${p(m.din)})</p><p class="text-3xl font-black text-emerald-500">${fBR(m.din)}</p></div><div class="card-bi p-6 rounded-3xl border-blue-400"><p class="text-[8px] font-bold text-slate-500 uppercase">Ticket Médio</p><p class="text-2xl font-black">${fBR(m.v ? m.tot/m.v : 0)}</p></div><div class="card-bi p-6 rounded-3xl border-yellow-500 bg-emerald-950/20"><p class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest">Saldo Líquido</p><p class="text-3xl font-black text-emerald-400">${fBR(m.com - m.val)}</p></div>`;
            document.getElementById('extrato-tabela').innerHTML = rows || '<tr><td colspan="4" class="p-8 text-center text-slate-500 uppercase text-xs">Aguardando dados...</td></tr>';
        };

        // --- GESTÃO ---
        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display = 'flex'; };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s, valor: 0 }); window.fecharModalGestao(); await window.carregarRelatorio(); };
        window.fluxoResultado = () => { document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<input type="number" id="vTotal" placeholder="VALOR TOTAL" class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-white outline-none border border-white/10"><div class="grid grid-cols-2 gap-2 mb-4 text-white"><button onclick="window.addPg('Dinheiro')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Dinheiro</button><button onclick="window.addPg('Pix')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Pix</button><button onclick="window.addPg('Cartão Débito')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Débito</button><button onclick="window.addPg('Cartão Crédito')" class="p-2 bg-slate-700 rounded-lg text-[9px]">+ Crédito</button><button onclick="window.addPg('Boleto')" class="p-2 bg-blue-900 rounded-lg text-[9px] col-span-2">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-4 text-white"></div><button onclick="window.finalizarVenda()" class="w-full p-4 bg-emerald-600 rounded-xl font-black text-white">SALVAR</button>`; window.tempPgs = []; };
        window.addPg = (tipo) => { const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',','.') || 0); if(v <= 0) return; let pg = { tipo, valor: v }; if(tipo === 'Boleto') { const ent = prompt("Entrada? 1-Sim 2-Não"); if(ent === "1") { pg.entrada = parseFloat(prompt("Valor Entrada:")?.replace(',','.') || 0); const fE = prompt("Forma: 1-Dinheiro 2-Pix"); pg.forma_entrada = fE === "1" ? "Dinheiro" : "Pix"; } } window.tempPgs.push(pg); document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]"><span>${p.tipo}</span><span class="text-emerald-400 font-bold">${fBR(p.valor)}</span></div>`).join(''); };
        window.finalizarVenda = async () => { const tot = parseFloat(document.getElementById('vTotal').value); if(!tot) return alert("Valor!"); await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, pagamentos: window.tempPgs }); window.fecharModalGestao(); await window.carregarRelatorio(); };
        window.abrirAvulso = () => { document.getElementById('modalGestao').style.display = 'flex'; document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<h3 class="text-white font-black mb-4 uppercase text-xs">Novo Avulso</h3><input type="text" id="av-nome" placeholder="NOME" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white outline-none"><input type="tel" id="av-tel" placeholder="TEL" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white outline-none"><input type="text" id="av-end" placeholder="ENDEREÇO" class="w-full bg-slate-800 p-3 rounded-xl mb-2 text-white outline-none"><input type="date" id="av-data" class="w-full bg-slate-800 p-3 rounded-xl mb-4 text-white outline-none"><button onclick="window.salvarNovoAvulso()" class="w-full p-4 bg-blue-600 rounded-xl font-black text-white uppercase text-xs">Salvar</button>`; document.getElementById('av-data').value = new Date().toLocaleDateString('en-CA'); };
        window.salvarNovoAvulso = async () => { const n = document.getElementById('av-nome').value, d = document.getElementById('av-data').value; if(!n || !d) return alert("Nome/Data!"); const sP = await get(ref(db, "config/projeto_ativo")); const p = sP.val(); window.itemPath = `dados/${p}/avulsos/AV-${Date.now()}`; await set(ref(db, window.itemPath), { nome_formando: n, telefone: document.getElementById('av-tel').value, endereco: document.getElementById('av-end').value, data: d, resultado: "Pendente" }); window.fluxoResultado(); };

        window.copiarRelatorio = () => {
            const dF = document.getElementById('filtro-bi').value;
            let v=0, nq=0, totV=0, com=0, val=0;
            window.dadosCompletos.filter(i => !dF || i.data === dF).forEach(item => {
                if(item.resultado === "Venda") { v++; totV += Number(item.valor)||0; if(Array.isArray(item.pagamentos)) { item.pagamentos.forEach(p => { const vp = Number(p.valor)||0, ent = Number(p.entrada)||0; if(p.tipo === 'Boleto') { com += (ent*0.12)+((vp-ent)*0.08); val += ent; } else { com += vp*0.12; if(p.tipo==='Pix'||p.tipo==='Dinheiro') val+=vp; } }); } }
                else if(item.resultado === "NQ") nq++;
            });
            const txt = `*RELATÓRIO DE VENDAS*\n📅 Data: ${dF || 'Acumulado'}\n\n✅ Vendas: ${v}\n❌ NQ: ${nq}\n\n💰 Faturamento: ${fBR(totV)}\n💵 Líquido: ${fBR(com-val)}`;
            const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("COPIADO!");
        };

        window.selecionarDia = async (btn) => {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const d = btn.getAttribute('data-date'); document.getElementById('data-selecionada').value = d;
            const elH = document.getElementById('horario'); elH.innerHTML = '<option>Buscando...</option>';
            const sAt = await get(ref(db, "config/projeto_ativo")); const p = sAt.val();
            const snap = await get(ref(db, `dados/${p}/agendamentos/${d}`));
            const counts = {}; const ag = snap.val() || {};
            Object.keys(ag).forEach(id => { if(id.includes('-')){ let hL = id.split('-').slice(0,2).join(':'); counts[hL] = (counts[hL]||0)+1; } });
            elH.innerHTML = '<option value="">Escolha um Horário</option>';
            let cur = new Date(`${d}T09:00:00`), lim = (new Date(d + 'T00:00:00').getDay() % 6 === 0) ? "17:00" : "20:30";
            while(cur <= new Date(`${d}T${lim}:00`)){
                let hF = cur.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                let prm = true; if(d === new Date().toLocaleDateString('en-CA') && (cur - new Date()) / 3600000 < 3) prm = false;
                if(prm && (2 - (counts[hF]||0)) > 0){ let opt=document.createElement('option'); opt.value=hF; opt.textContent=`${hF} (${2 - (counts[hF]||0)} vagas)`; elH.appendChild(opt); }
                cur.setMinutes(cur.getMinutes()+30);
            }
        };

        // --- INICIALIZAÇÃO ---
        (async () => {
            const agora = new Date();
            const dHoje = agora.toLocaleDateString('en-CA');
            document.querySelectorAll('.day-btn').forEach(btn => {
                const dBtn = btn.getAttribute("data-date");
                if (dBtn < dHoje) return;
                if (dBtn === dHoje) {
                    const limAt = (agora.getDay() % 6 === 0) ? 17 : 20;
                    if (agora.getHours() >= (limAt - 3)) return;
                }
                btn.style.display = "block";
            });

            document.getElementById("form-agendamento").addEventListener("submit", async function(e){
                e.preventDefault(); const n = document.getElementById("nome").value, t = document.getElementById("telefone").value, en = document.getElementById("endereco").value, h = document.getElementById("horario").value, d = document.getElementById("data-selecionada").value;
                const sP = await get(ref(db, "config/projeto_ativo")); const p = sP.val();
                await set(ref(db, `dados/${p}/agendamentos/${d}/${h.replace(":","-")}-${Date.now()}`), { nome_formando: n, telefone: t, endereco: en, horario: h, data: d, resultado: "Pendente", criado_em: new Date().toISOString() });
                window.open(`https://wa.me/5516993291674?text=${encodeURIComponent("*AGENDAMENTO*\n👤: "+n+"\n📅: "+d.split("-").reverse().join("/")+"\n⏰: "+h+"\n📍: "+en)}`, "_blank");
                location.reload();
            });

            const snapP = await get(ref(db, `config/projetos`));
            const ativoP = await get(ref(db, `config/projeto_ativo`));
            const seletorLog = document.getElementById('log-projeto-ativo');
            const listaP = snapP.val() || {};
            for(let k in listaP) { let o = document.createElement('option'); o.value = k; o.textContent = `${listaP[k].cidade} - ${listaP[k].escola}`; if(k === ativoP.val()) o.selected = true; seletorLog.appendChild(o); }
            
            const sIn = await get(ref(db, `config/projetos/${ativoP.val()}`));
            if(sIn.exists()){ document.getElementById('escola-titulo').innerText = sIn.val().cidade; document.getElementById('sub-escola').innerText = sIn.val().escola; }
        })();
    </script>
</body>
