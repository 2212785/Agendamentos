<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales PRO - BI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .btn-primary:active { transform: scale(0.95); }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: center; justify-content: center; padding: 20px; }
        .view-section { display: none; animation: fadeIn 0.4s ease-out; }
        .view-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .card-stat { background: linear-gradient(145deg, #111827 0%, #030712 100%); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black uppercase text-blue-400">Atualizar Visita</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-10 h-10 rounded-full font-bold">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-4">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-8 rounded-3xl text-emerald-400 font-black uppercase hover:bg-emerald-600 hover:text-white transition">Registrar Resultado</button>
                <button onclick="window.confirmarExclusao()" class="bg-rose-600/10 text-rose-500 p-4 rounded-2xl font-bold uppercase text-[10px]">Excluir Agendamento</button>
            </div>
            <div id="gestao-form" class="hidden space-y-4"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active min-h-screen flex flex-col">
        <header class="p-6 flex justify-between items-center">
            <span class="text-xl font-black uppercase italic tracking-tighter text-white">Elite <span class="text-blue-500">Sales</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase">Painel ADM</button>
        </header>
        <main class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl">
                <div class="text-center mb-8">
                    <h2 id="escola-titulo" class="text-2xl font-extrabold uppercase text-blue-400 italic">Guaratinguetá</h2>
                    <h3 id="sub-escola" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Dr. Guilherme Filippo</h3>
                </div>
                <form id="form-agendamento" class="space-y-4 text-white">
                    <div class="grid grid-cols-3 gap-2 mb-4" id="day-selector">
                        <button type="button" data-date="2026-03-04" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase text-white">04/03</button>
                        <button type="button" data-date="2026-03-05" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase text-white">05/03</button>
                        <button type="button" data-date="2026-03-06" onclick="window.selecionarDia(this)" class="day-btn rounded-2xl py-4 text-[10px] font-black uppercase text-white">06/03</button>
                    </div>
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500 transition">
                    <input type="tel" id="telefone" required placeholder="WhatsApp (DDD + Número)" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none focus:border-blue-500 transition">
                    <select id="horario" required class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="w-full bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none transition" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-5 rounded-2xl font-black uppercase tracking-tighter shadow-lg shadow-blue-900/40">Finalizar Agendamento</button>
                </form>
            </div>
        </main>Section>

    <section id="view-operacional" class="view-section min-h-screen p-6">
        <div class="max-w-4xl mx-auto">
            <nav class="flex justify-between items-center mb-10">
                <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Sair do Sistema</button>
                <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-white/5">
                    <button class="bg-blue-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-white shadow-lg">Roteiro</button>
                    <button onclick="window.switchView('view-financeiro')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-400 hover:text-white transition">Resultados</button>
                </div>
            </nav>
            <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-8">
                <div>
                    <h1 class="text-4xl font-black italic uppercase tracking-tighter">Minha <span class="text-blue-500 text-white">Rota</span></h1>
                    <p class="text-slate-500 text-xs font-bold uppercase mt-1">Gerencie suas visitas e contatos</p>
                </div>
                <div class="flex gap-3 w-full md:w-auto">
                    <input type="date" id="filtro-data-admin" onchange="window.filtrarLista()" class="flex-grow bg-slate-900 border border-white/10 rounded-2xl px-4 py-3 text-xs font-bold outline-none text-white text-white">
                    <button onclick="window.abrirAvulso()" class="bg-white text-black px-6 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-blue-50 transition">+ Avulso</button>
                </div>
            </div>
            <div id="lista-visitas" class="space-y-4"></div>
        </div>
    </section>

    <section id="view-financeiro" class="view-section min-h-screen p-6">
        <div class="max-w-6xl mx-auto">
            <nav class="flex justify-between items-center mb-10">
                <button onclick="window.switchView('view-operacional')" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Voltar Roteiro</button>
                <button onclick="window.copiarRelatorio()" class="bg-emerald-600 px-8 py-3 rounded-2xl text-[10px] font-black uppercase text-white shadow-lg shadow-emerald-900/20">Gerar Relatório WhatsApp</button>
            </nav>
            
            <div class="mb-10">
                <h1 class="text-4xl font-black italic uppercase tracking-tighter">Dashboard <span class="text-emerald-500">PRO</span></h1>
                <p class="text-slate-500 text-xs font-bold uppercase mt-1">Visão geral de faturamento e conversão</p>
            </div>

            <div id="resumo-financeiro" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 text-white"></div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 glass rounded-[3rem] p-8 flex flex-col items-center">
                    <h3 class="font-black uppercase text-[10px] mb-6 text-slate-400 tracking-widest text-center">Eficiência de Conversão</h3>
                    <div class="relative w-full aspect-square max-w-[220px]">
                        <canvas id="chartEficiencia"></canvas>
                        <div id="eficiencia-percent" class="absolute inset-0 flex items-center justify-center flex-col">
                            <span class="text-3xl font-black text-white">0%</span>
                            <span class="text-[8px] text-slate-500 font-bold uppercase">Taxa</span>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2 glass rounded-[3rem] p-8">
                    <h3 class="font-black uppercase text-[10px] mb-6 text-slate-400 tracking-widest">Vendas Diárias (Volume)</h3>
                    <canvas id="chartEvolucao" style="max-height: 250px;"></canvas>
                </div>
                <div class="lg:col-span-3 glass rounded-[3rem] p-8">
                    <div class="flex justify-between items-end mb-6">
                        <h3 class="font-black uppercase text-[10px] text-slate-400 tracking-widest">Extrato de Comissões</h3>
                        <div id="fechamento-final" class="text-right"></div>
                    </div>
                    <div id="comissao-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", 
            authDomain: "agenda-album-de-formatura.firebaseapp.com",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
            projectId: "agenda-album-de-formatura",
            appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- WINDOW BINDINGS ---
        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
            document.getElementById(id).classList.add('view-active');
            if(id === 'view-financeiro') window.carregarRelatorio();
        };

        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        const pDT = (s) => (s && s.includes('-')) ? s.split("-").reverse().join("/") : s;

        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display = 'none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };
        
        window.acessoAdmin = async () => { 
            if(prompt("Chave ADM:") === "2025") { window.switchView('view-operacional'); await window.carregarRelatorio(); } 
        };

        window.carregarRelatorio = async () => {
            const snapP = await get(ref(db,"config/projeto_ativo"));
            const p = snapP.val() || "guaratingueta-guilherme";
            const [sA, sV] = await Promise.all([get(ref(db, `dados/${p}/agendamentos`)), get(ref(db, `dados/${p}/avulsos`))]);
            window.dadosCompletos = [];
            const ags = sA.val() || {};
            Object.keys(ags).forEach(d => Object.keys(ags[d]).forEach(id => window.dadosCompletos.push({...ags[d][id], id, data: d, path: `dados/${p}/agendamentos/${d}/${id}`})));
            const avs = sV.val() || {};
            Object.keys(avs).forEach(id => window.dadosCompletos.push({...avs[id], id, path: `dados/${p}/avulsos/${id}`}));
            window.filtrarLista();
        };

        window.filtrarLista = () => {
            const fData = document.getElementById('filtro-data-admin').value;
            let lista = fData ? window.dadosCompletos.filter(i => i.data === fData) : window.dadosCompletos;
            lista.sort((a,b) => new Date(`${a.data || '2026-01-01'}T${a.horario || "23:59"}`) - new Date(`${b.data || '2026-01-01'}T${b.horario || "23:59"}`));
            renderizarOperacional(lista);
            renderizarFinanceiro(lista, fData);
        };

        function renderizarOperacional(lista) {
            const container = document.getElementById('lista-visitas');
            container.innerHTML = '';
            lista.forEach(item => {
                const cor = item.resultado === "Venda" ? "border-emerald-500/40 bg-emerald-500/5" : (item.resultado === "NQ" ? "border-rose-500/40 bg-rose-500/5" : "border-white/10");
                const wz = `https://www.waze.com/ul?q=${encodeURIComponent(item.endereco)}&navigate=yes`;
                const wa = `https://wa.me/55${(item.telefone||'').replace(/\D/g,'')}`;
                container.innerHTML += `
                    <div class="glass ${cor} p-6 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="flex-grow text-center md:text-left">
                            <div class="flex items-center gap-3 justify-center md:justify-start mb-3">
                                <span class="bg-blue-600 px-4 py-1.5 rounded-xl font-black text-[10px] text-white">${item.horario || 'DIR'}</span>
                                <span class="text-slate-500 font-bold text-[10px] uppercase">${pDT(item.data)}</span>
                            </div>
                            <h3 class="text-2xl font-black uppercase text-white mb-2 leading-tight">${item.nome_formando}</h3>
                            <p class="text-slate-400 text-sm mb-6 leading-relaxed">📍 ${item.endereco || 'Sem endereço'}</p>
                            <div class="flex gap-3 justify-center md:justify-start">
                                <a href="${wz}" target="_blank" class="bg-blue-600/10 text-blue-400 px-8 py-4 rounded-2xl text-[10px] font-black uppercase border border-blue-500/20">Waze</a>
                                <a href="${wa}" target="_blank" class="bg-emerald-600/10 text-emerald-400 px-8 py-4 rounded-2xl text-[10px] font-black uppercase border border-emerald-500/20 text-white">WhatsApp</a>
                            </div>
                        </div>
                        <button onclick="window.gerenciarItem('${item.path}')" class="btn-primary w-full md:w-auto px-12 py-6 rounded-3xl font-black uppercase text-xs shadow-xl shadow-blue-900/30">Gerenciar</button>
                    </div>
                `;
            });
        }

        let chartEfi = null, chartEvu = null;
        function renderizarFinanceiro(lista, dataFiltro) {
            let t = { v:0, nq:0, totV:0, val:0, com:0 };
            let evolucao = { "2026-03-04":0, "2026-03-05":0, "2026-03-06":0, "2026-03-07":0 };
            let hC = '';

            lista.forEach(item => {
                if(item.resultado === "Venda") {
                    t.v++; const vV = Number(item.valor) || 0; t.totV += vV;
                    if(item.data) evolucao[item.data] = (evolucao[item.data]||0)+1;
                    let comI = 0;
                    if(Array.isArray(item.pagamentos)){
                        item.pagamentos.forEach(p => {
                            const v = Number(p.valor)||0, ent = Number(p.entrada)||0;
                            if(p.tipo === "Boleto"){ comI += (ent*0.12)+((v-ent)*0.08); if(ent>0) t.val += ent; }
                            else { if(p.tipo === "Dinheiro" || p.tipo === "Pix") t.val += v; comI += v * 0.12; }
                        });
                    } else { comI = vV * 0.12; }
                    t.com += comI;
                    hC += `<div class="bg-white/5 border border-white/5 p-4 rounded-2xl flex justify-between items-center"><span class="text-[10px] font-black uppercase text-slate-400">${item.nome_formando}</span><span class="text-emerald-400 font-black">${fBR(comI)}</span></div>`;
                } else if(item.resultado === "NQ") t.nq++;
            });

            const percent = (t.v + t.nq) > 0 ? ((t.v / (t.v + t.nq)) * 100).toFixed(0) : 0;
            document.getElementById('eficiencia-percent').children[0].innerText = percent + "%";

            const label = dataFiltro ? 'DO DIA' : 'ACUMULADO';
            document.getElementById('resumo-financeiro').innerHTML = `
                <div class="card-stat p-6 rounded-[2rem]"><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Vendas ${label}</p><p class="text-4xl font-black">${t.v}</p></div>
                <div class="card-stat p-6 rounded-[2rem]"><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Faturamento</p><p class="text-4xl font-black text-emerald-400">${fBR(t.totV)}</p></div>
                <div class="card-stat p-6 rounded-[2rem]"><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Não Qualificado</p><p class="text-4xl font-black text-rose-500">${t.nq}</p></div>
                <div class="card-stat p-6 rounded-[2rem] border-blue-500/20"><p class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Ticket Médio</p><p class="text-4xl font-black">${fBR(t.v ? t.totV/t.v : 0)}</p></div>
            `;

            document.getElementById('comissao-content').innerHTML = hC || '<p class="col-span-3 text-center py-10 text-slate-600 font-bold uppercase text-[10px]">Aguardando Vendas...</p>';
            document.getElementById('fechamento-final').innerHTML = `<p class="text-[10px] font-bold text-slate-500 uppercase">A Receber Líquido</p><p class="text-3xl font-black text-emerald-400 italic">${fBR(t.com - t.val)}</p>`;

            // GRÁFICO ROsca
            if(chartEfi) chartEfi.destroy();
            chartEfi = new Chart(document.getElementById('chartEficiencia'), { type: 'doughnut', data: { datasets: [{ data: [t.v, t.nq], backgroundColor: ['#3b82f6', '#1e293b'], borderWidth: 0 }] }, options: { cutout: '85%', plugins: { legend: { display: false } } } });

            // GRÁFICO EVOLUÇÃO
            if(chartEvu) chartEvu.destroy();
            chartEvu = new Chart(document.getElementById('chartEvolucao'), {
                type: 'bar',
                data: { labels: ['04/03', '05/03', '06/03', '07/03'], datasets: [{ label: 'Vendas', data: Object.values(evolucao), backgroundColor: '#10b981', borderRadius: 8 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false }, ticks: { color: '#475569' } }, x: { grid: { display: false }, ticks: { color: '#475569' } } } }
            });
        }

        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display = 'flex'; };
        window.confirmarExclusao = async () => { if(confirm("Apagar?")) { await remove(ref(db, window.itemPath)); window.fecharModalGestao(); await window.carregarRelatorio(); } };
        window.abrirAvulso = () => {
            const m = document.getElementById('modalGestao'); m.style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            f.innerHTML = `<h3 class="text-white font-black mb-4 uppercase text-xs">Novo Registro Avulso</h3><input type="text" id="av-nome" placeholder="NOME" class="w-full bg-slate-900 p-5 rounded-2xl mb-2 text-white outline-none border border-white/5"><input type="date" id="av-data" class="w-full bg-slate-900 p-5 rounded-2xl mb-4 text-white outline-none border border-white/5"><button onclick="window.salvarNovoAvulso()" class="w-full p-6 bg-blue-600 rounded-3xl font-black text-white uppercase text-xs">Próximo</button>`;
            document.getElementById('av-data').value = new Date().toLocaleDateString('en-CA');
        };
        window.salvarNovoAvulso = async () => {
            const n = document.getElementById('av-nome').value, d = document.getElementById('av-data').value;
            const sP = await get(ref(db, "config/projeto_ativo")); const p = sP.val() || "guaratingueta-guilherme";
            window.itemPath = `dados/${p}/avulsos/AV-${Date.now()}`;
            await set(ref(db, window.itemPath), { nome_formando: n, data: d, resultado: "Pendente" });
            window.fluxoResultado();
        };

        window.copiarRelatorio = () => {
            const f = fBR; const dF = document.getElementById('filtro-data-admin').value;
            const nomeProj = document.getElementById('escola-titulo').innerText;
            let v=0, nq=0, totV=0, pix=0, din=0, cre=0, deb=0, bol=0, val=0;
            const lista = dF ? window.dadosCompletos.filter(i => i.data === dF) : window.dadosCompletos;
            lista.forEach(item => {
                if(item.resultado === "Venda") {
                    v++; totV += Number(item.valor) || 0;
                    if(Array.isArray(item.pagamentos)) {
                        item.pagamentos.forEach(p => {
                            const valP = Number(p.valor)||0, ent = Number(p.entrada)||0;
                            if(p.tipo === "Boleto") { bol += (valP-ent); if(ent>0) { val+=ent; if(p.forma_entrada === "Pix") pix+=ent; else din+=ent; } }
                            else { if(p.tipo==="Pix") pix+=valP; else if(p.tipo==="Dinheiro") din+=valP; else if(p.tipo.includes("Débito")) deb+=valP; else cre+=valP; if(p.tipo==="Dinheiro"||p.tipo==="Pix") val+=valP; }
                        });
                    }
                } else if(item.resultado === "NQ") nq++;
            });
            const txt = `*Relatório de Vendas*\n*Projeto:* ${nomeProj}\n*Data:* ${dF ? pDT(dF) : 'ACUMULADO'}\n\n✅ Vendas: ${v}\n❌ NQ: ${nq}\n\n💵 Dinheiro: ${f(din)}\n💎 Pix: ${f(pix)}\n💳 Débito: ${f(deb)}\n💳 Crédito: ${f(cre)}\n📄 Boleto: ${f(bol)}\n\n💰 *Total Vendido: ${f(totV)}*\n💸 *Vales: ${f(val)}*`;
            navigator.clipboard.writeText(txt); alert("RELATÓRIO COPIADO!");
        };

        window.fluxoResultado = () => { 
            document.getElementById('gestao-menu').classList.add('hidden'); 
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            f.innerHTML = `<input type="number" id="vTotal" placeholder="VALOR TOTAL" class="w-full bg-slate-900 p-6 rounded-3xl text-center mb-4 text-white font-black text-3xl outline-none border border-white/10"><div class="grid grid-cols-2 gap-2 mb-4"><button onclick="window.addPg('Dinheiro')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase">+ Dinheiro</button><button onclick="window.addPg('Pix')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase">+ Pix</button><button onclick="window.addPg('Cartão Débito')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase">+ Débito</button><button onclick="window.addPg('Cartão Crédito')" class="p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase">+ Crédito</button><button onclick="window.addPg('Boleto')" class="p-4 bg-blue-900/30 border border-blue-500/40 rounded-2xl text-[10px] font-black uppercase col-span-2">+ Boleto</button></div><div id="lista-p" class="space-y-1 mb-4 text-white text-white"></div><button onclick="window.finalizarVenda()" class="w-full p-6 bg-emerald-600 rounded-3xl font-black text-white uppercase shadow-xl">Confirmar Venda</button><button onclick="window.salvarStatusSimples('NQ')" class="w-full p-3 bg-rose-600/20 text-rose-500 rounded-2xl mt-4 text-[10px] font-black uppercase">Marcar como NQ</button>`;
            window.tempPgs = [];
        };
        window.addPg = (tipo) => { const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',','.') || 0); if(v <= 0) return; let pg = { tipo, valor: v }; if(tipo === 'Boleto') { const ent = prompt("Entrada? 1-Sim 2-Não"); if(ent === "1") { pg.entrada = parseFloat(prompt("Valor Entrada:")?.replace(',','.') || 0); const fE = prompt("Forma: 1-Dinheiro 2-Pix"); pg.forma_entrada = fE === "1" ? "Dinheiro" : "Pix"; } } window.tempPgs.push(pg); document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between bg-white/5 p-3 rounded-xl text-[10px] text-white"><span>${p.tipo}</span><span class="text-emerald-400 font-bold">${fBR(p.valor)}</span></div>`).join(''); };
        window.finalizarVenda = async () => { const tot = parseFloat(document.getElementById('vTotal').value); if(!tot) return alert("Valor!"); await update(ref(db, window.itemPath), { resultado: "Venda", valor: tot, pagamentos: window.tempPgs }); window.fecharModalGestao(); await window.carregarRelatorio(); };
        window.salvarStatusSimples = async (s) => { await update(ref(db, window.itemPath), { resultado: s, valor: 0 }); window.fecharModalGestao(); await window.carregarRelatorio(); };

        window.selecionarDia = async (btn) => {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const d = btn.getAttribute('data-date'); document.getElementById('data-selecionada').value = d;
            const elH = document.getElementById('horario'); elH.innerHTML = '<option>Buscando...</option>';
            const snapP = await get(ref(db, "config/projeto_ativo")); const p = snapP.val() || "guaratingueta-guilherme";
            const snap = await get(ref(db, `dados/${p}/agendamentos/${d}`));
            const counts = {}; const ag = snap.val() || {};
            Object.keys(ag).forEach(id => { let hL = id.split('-').slice(0,2).join(':'); counts[hL] = (counts[hL]||0)+1; });
            elH.innerHTML = '<option value="">Escolha um Horário</option>';
            let cur = new Date(`${d}T09:00:00`), lim = (new Date(d + 'T00:00:00').getDay() % 6 === 0) ? "15:00" : "20:30";
            while(cur <= new Date(`${d}T${lim}:00`)){
                let hF = cur.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                if((2 - (counts[hF]||0)) > 0){ let opt=document.createElement('option'); opt.value=hF; opt.textContent=`${hF} (${2 - (counts[hF]||0)} vagas)`; elH.appendChild(opt); }
                cur.setMinutes(cur.getMinutes()+30);
            }
        };

        (async () => {
            document.getElementById("form-agendamento").addEventListener("submit", async function(e){
                e.preventDefault(); const n = document.getElementById("nome").value, t = document.getElementById("telefone").value, en = document.getElementById("endereco").value, h = document.getElementById("horario").value, d = document.getElementById("data-selecionada").value;
                const snapP = await get(ref(db, "config/projeto_ativo")); const p = snapP.val() || "guaratingueta-guilherme";
                await set(ref(db, `dados/${p}/agendamentos/${d}/${h.replace(":","-")}-${Date.now()}`), { nome_formando: n, telefone: t, endereco: en, horario: h, data: d, resultado: "Pendente", criado_em: new Date().toISOString() });
                window.open(`https://wa.me/5516993291674?text=${encodeURIComponent("*NOVO AGENDAMENTO*\n\n👤 Formando: "+n+"\n📅 Data: "+pDT(d)+"\n⏰ Horário: "+h+"\n📍 Endereço:\n"+en)}`, "_blank");
                location.reload();
            });
            try {
                const sAt = await get(ref(db, "config/projeto_ativo")); const sl = sAt.val() || "guaratingueta-guilherme";
                const sIn = await get(ref(db, `config/projetos/${sl}`));
                if(sIn.exists()){ document.getElementById('escola-titulo').innerText = sIn.val().cidade; document.getElementById('sub-escola').innerText = sIn.val().escola; }
            } catch(e) {}
        })();
    </script>
</body>
</html>
