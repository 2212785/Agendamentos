<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Master - v26.10 GOLD PLUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .view-section { display: none; min-height: 100vh; width: 100%; flex-direction: column; }
        .view-active { display: flex !important; }
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
        .input-compact { padding: 0.8rem !important; border-radius: 1rem !important; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; width: 100%; outline: none; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; padding: 12px; border-radius: 15px; font-size: 10px; font-weight: 800; color: white; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 shadow-2xl text-white mx-auto mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="gestao-titulo" class="text-lg font-black uppercase text-blue-400">Gestão</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase text-sm">Registrar Venda</button>
                <button onclick="window.fluxoNQ()" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">Marcar NQ</button>
                <button onclick="window.limparRegistroVisita()" class="bg-slate-700/50 border border-white/10 p-3 rounded-2xl text-white font-black uppercase text-[10px]">Limpar Registro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir Registro</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 pb-6 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center">
            <span class="text-lg font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase">ADM</button>
        </header>
        <div class="flex-grow flex items-center justify-center p-4 text-white">
            <div class="glass p-6 rounded-[2.5rem] w-full max-w-sm text-center">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 leading-none italic italic">AGUARDE...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-500 mb-4 uppercase italic">CONECTANDO</h3>
                <div class="grid grid-cols-2 gap-1 mb-3" id="day-selector"></div>
                <form id="form-agendamento" class="space-y-2">
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="input-compact text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="input-compact text-white">
                    <select id="horario" required class="input-compact text-white"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="input-compact text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-sm">Agendar Visita</button>
                </form>
            </div>
        </div>
    </section>

    <section id="view-logistica" class="view-section p-4">
        <nav class="flex justify-between items-center mb-6 text-white text-white">
            <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Sair</button>
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button class="bg-blue-600 px-4 py-1.5 rounded-lg text-[10px] font-black">Visitas</button>
                <button onclick="window.switchView('view-financeiro')" class="px-4 py-1.5 text-slate-400 text-[10px] font-black uppercase text-white">Dashboard BI</button>
            </div>
        </nav>
        <div id="controles-admin" class="hidden flex flex-wrap gap-2 mb-4 justify-center">
            <button onclick="window.abrirNovoProjeto()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-emerald-400 uppercase">Novo Projeto</button>
            <button onclick="window.abrirGestaoCentralizada()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-blue-400 uppercase">Dados Projeto</button>
            <button onclick="window.abrirGestaoVales()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-rose-400 uppercase">Lançar Vales</button>
            <button onclick="window.switchView('view-automacao')" class="bg-amber-500/20 border border-amber-500/30 px-4 py-2 rounded-xl text-[8px] font-black text-amber-500 uppercase italic">Automação PC 🚀</button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none">
            <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ AVULSO</button>
        </div>
        <div id="lista-visitas" class="space-y-2 pb-10"></div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-4">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <div class="flex gap-2">
                 <button onclick="window.menuRelatorio()" class="bg-emerald-600 px-3 py-2 rounded-xl text-[9px] font-black uppercase italic">Copiar Relatório 📋</button>
                 <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white outline-none">
            </div>
        </nav>
        <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 text-white text-white"></div>
        <div id="individual-performance" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"></div>
        <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-6 text-white text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div id="comissao-card" class="lg:col-span-1 glass rounded-[2rem] p-5 border-l-4 border-blue-500 text-white"></div>
            <div class="lg:col-span-2 glass rounded-[2rem] p-4 min-h-[250px] text-white"><canvas id="weeklyChart"></canvas></div>
        </div>
        <div id="saldo-card" class="glass rounded-[2rem] p-6 border-l-8 border-emerald-500 mb-6 text-white text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-10">
            <div class="glass p-4 rounded-2xl border border-white/5 text-white"><div class="flex justify-between items-center mb-3"><h4 class="text-emerald-400 font-black text-[10px] uppercase">Extrato Vendas</h4><span class="text-[8px] text-slate-500">VALOR</span></div><div id="extrato-tabela" class="text-xs"></div></div>
            <div class="glass p-4 rounded-2xl border border-white/5 text-white"><h4 class="text-rose-500 font-black text-[10px] mb-3 uppercase">NQ</h4><div id="nq-tabela" class="text-xs text-white"></div></div>
        </div>
    </section>

    <section id="view-automacao" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-6 text-white text-white text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <span class="text-amber-500 font-black text-[10px] uppercase italic">Motor Elite Auto-Zap PC</span>
        </nav>
        <div class="glass p-8 rounded-[3rem] text-center mb-6">
            <div id="status-automacao" class="text-[9px] font-black text-slate-500 uppercase mb-2">Aguardando Início</div>
            <div id="timer-display" class="text-5xl font-black text-white mb-6">00:00</div>
            <div class="flex gap-3 justify-center text-white">
                <button id="btn-start-auto" onclick="window.iniciarCampanha()" class="bg-emerald-600 px-8 py-4 rounded-2xl font-black uppercase text-xs">Iniciar Disparos</button>
                <button id="btn-stop-auto" onclick="window.pararCampanha()" class="bg-rose-600 hidden px-8 py-4 rounded-2xl font-black uppercase text-xs">Pausar</button>
            </div>
        </div>
        <div class="glass p-5 rounded-[2rem]">
            <div class="flex justify-between items-center mb-4">
                <h4 class="text-[10px] font-black uppercase text-blue-400">Fila Ativa</h4>
                <button onclick="window.resetIndex()" class="text-[8px] text-slate-600 font-bold uppercase">Zerar Index</button>
            </div>
            <div id="lista-fila" class="space-y-2 max-h-64 overflow-y-auto text-[10px]"></div>
        </div>
    </section>

    <script type="module">
        // ##########################################################################
        // ### [ FIREBASE - CONEXÃO SAGRADA v19.70 - NÃO MEXER ] ###
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);
        
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        let projId = ""; window.dadosCompletos = []; let custosDB = {}; let valesDB = {}; let projetoDB = {}; let weeklyChart = null;

        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projId = snap.val() || "guaratingueta-guilherme";
            const pS = await get(ref(db, `projetos/${projId}`));
            if(pS.exists()){
                projetoDB = pS.val();
                document.getElementById('escola-titulo').innerText = projetoDB.cidade;
                document.getElementById('sub-escola').innerText = projetoDB.escola || projetoDB.school;
                if(projetoDB.data_inicio) window.gerarBotoesDatas(projetoDB.data_inicio, projetoDB.data_fim);
                window.carregarRelatorio();
            }
        });

        window.salvarCommit = async (path, dados) => {
            try { await update(ref(db, path), dados); await window.carregarRelatorio(); window.fecharModalGestao(); } catch(e) { alert("Erro!"); }
        };

        window.carregarRelatorio = async () => {
            if(!projId) return;
            try {
                const [sA, sV, sC, sVales] = await Promise.all([
                    get(ref(db, `dados/${projId}/agendamentos`)), get(ref(db, `vendas/${projId}`)), 
                    get(ref(db, `custos/${projId}`)), get(ref(db, `vales/${projId}`))
                ]);
                window.dadosCompletos = []; custosDB = sC.exists() ? sC.val() : {};
                valesDB = sVales.exists() ? sVales.val() : { evanio: 0, willian: 0 };
                const proc = (pasta, base) => {
                    if (!pasta) return;
                    Object.keys(pasta).forEach(k => {
                        const item = pasta[k];
                        if (typeof item === 'object' && !item.nome_formando) {
                            Object.keys(item).forEach(subK => window.dadosCompletos.push({...item[subK], id:subK, data:k, path:`${base}/${k}/${subK}`}));
                        } else window.dadosCompletos.push({...item, id:k, data:item.data||k, path:`${base}/${k}`});
                    });
                };
                if(sA.exists()) proc(sA.val(), `dados/${projId}/agendamentos`);
                if(sV.exists()) {
                    const v = sV.val();
                    if(v.avulsos) proc(v.avulsos, `vendas/${projId}/avulsos`);
                    if(v.agendamentos) proc(v.agendamentos, `vendas/${projId}/agendamentos`);
                }
                window.filtrarLogistica(); window.filtrarBI(); window.renderFila();
            } catch(e) { console.error(e); }
        };

        // --- MOTOR AUTO-ZAP TURBO (CONEXÃO EXTENSÃO) ---
        let autoAtivo = false;
        window.iniciarCampanha = () => {
            if(!projetoDB.automacao?.lista) return alert("Configure a lista primeiro!");
            autoAtivo = true;
            document.getElementById('btn-start-auto').classList.add('hidden');
            document.getElementById('btn-stop-auto').classList.remove('hidden');
            window.dispararProximo();
        };
        window.pararCampanha = () => { autoAtivo = false; document.getElementById('btn-start-auto').classList.remove('hidden'); document.getElementById('btn-stop-auto').classList.add('hidden'); document.getElementById('status-automacao').innerText = "Pausado"; };
        window.dispararProximo = () => {
            if(!autoAtivo) return;
            const lista = projetoDB.automacao.lista.split('\n').filter(l => l.trim() !== "");
            const idx = projetoDB.automacao.index_atual || 0;
            if(idx >= lista.length) { alert("Fim da Fila!"); return window.pararCampanha(); }
            const dados = lista[idx].split(','); const nome = dados[0].trim(); const fone = dados[1].trim().replace(/\D/g,'');
            const msgN = (idx % 4) + 1; let msgB = projetoDB.automacao[`msg${msgN}`] || projetoDB.automacao.msg1;
            const msgF = msgB.replace(/{crianca}/g, nome);
            document.getElementById('status-automacao').innerText = `Disparando: ${nome}`;
            // O link autoplay=1 ajuda extensões a reconhecerem o envio imediato
            window.open(`https://web.whatsapp.com/send?phone=55${fone}&text=${encodeURIComponent(msgF)}&autoplay=1`, '_blank');
            const randSeg = Math.floor(Math.random() * (660 - 180 + 1)) + 180;
            update(ref(db, `projetos/${projId}/automacao`), { index_atual: idx + 1 });
            window.iniciarContagem(randSeg);
        };
        window.iniciarContagem = (seg) => {
            let rest = seg; const d = document.getElementById('timer-display');
            const itv = setInterval(() => {
                if(!autoAtivo) { clearInterval(itv); return; }
                const m = Math.floor(rest/60); const s = rest%60;
                d.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(rest <= 0) { clearInterval(itv); window.dispararProximo(); }
                rest--;
            }, 1000);
        };
        window.renderFila = () => {
            const cont = document.getElementById('lista-fila'); if(!cont) return;
            const lista = projetoDB.automacao?.lista?.split('\n').filter(l => l.trim() !== "") || [];
            const atual = projetoDB.automacao?.index_atual || 0;
            cont.innerHTML = lista.map((l, i) => `<div class="flex justify-between p-2 rounded-lg ${i < atual ? 'bg-emerald-500/10 text-emerald-500' : 'bg-white/5'}"><span>${i+1}. ${l.split(',')[0]}</span><b>${i < atual ? 'OK' : 'PRÓXIMO'}</b></div>`).join('');
        };
        window.resetIndex = () => { if(confirm("Reiniciar do zero?")) update(ref(db, `projetos/${projId}/automacao`), { index_atual: 0 }); };

        // --- DASHBOARD BI ---
        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value; let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, com:0 };
            let vend = { Evanio: {v:0, nq:0, tot:0, com:0, ent:0}, Willian: {v:0, nq:0, tot:0, com:0, ent:0} };
            let chartData = {};
            list.forEach(i => {
                const vn = i.vendedor || "Willian"; const d = i.data; if(!chartData[d]) chartData[d] = {v:0, nq:0};
                if(i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor)||0; vend[vn].v++; vend[vn].tot += Number(i.valor)||0; chartData[d].v++;
                    let cV = 0; if(i.pagamentos) i.pagamentos.forEach(p => {
                        const vP = Number(p.valor)||0; const t = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        if (t.includes("pix")) m.pix += vP; else if(t.includes("dinheiro")) m.din += vP; else if(t.includes("debito")) m.deb += vP; else if(t.includes("credito")) m.cre += vP; else if(t.includes("boleto")) m.bol += vP;
                        if (t.includes("entrada")) { cV += vP*0.12; if(t.includes("pix") || t.includes("dinheiro")) vend[vn].ent += vP; } else cV += vP*0.08;
                    }); else cV = (Number(i.valor)||0)*0.08; m.com += cV; vend[vn].com += cV;
                } else if(i.resultado === "NQ") { m.nq++; vend[vn].nq++; chartData[d].nq++; }
            });
            const rI = (parseFloat(custosDB.km_valor)||0)*(parseFloat(custosDB.km_total)||0) + parseFloat(custosDB.pedagio_total)||0 + ((parseFloat(custosDB.hosp_valor)||0)*parseInt(custosDB.hosp_qtd||0)) + ((parseFloat(custosDB.alim_valor)||0)*parseInt(custosDB.alim_qtd||0));
            document.getElementById('kpi-grid').innerHTML = `<div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black text-emerald-400 uppercase">Faturamento</p><p class="text-xl font-black text-white">${fBR(m.tot)}</p></div><div class="card-bi p-4 rounded-3xl text-center border-blue-500"><p class="text-[8px] font-black text-blue-400 uppercase text-white">Eficiência</p><p class="text-xl font-black text-white">${(m.v+m.nq)?(m.v/(m.v+m.nq)*100).toFixed(0):0}%</p></div><div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black uppercase text-white">Vendas/NQ</p><p class="text-xl font-black text-white">${m.v}/${m.nq}</p></div><div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black uppercase text-white">Ticket Médio</p><p class="text-xl font-black text-white">${fBR(m.v?m.tot/m.v:0)}</p></div>`;
            document.getElementById('individual-performance').innerHTML = Object.keys(vend).map(v => `<div class="glass p-4 rounded-3xl border-t-2 ${v==='Evanio'?'border-blue-400':'border-cyan-400'}"><p class="font-black text-xs uppercase mb-2 text-white">${v}</p><div class="grid grid-cols-3 gap-2 text-center text-white"><div><p class="text-[7px] text-slate-400">VENDIDO</p><p class="text-xs font-bold text-white">${fBR(vend[v].tot)}</p></div><div><p class="text-[7px] text-slate-400">EFIC.</p><p class="text-xs font-bold text-white">${(vend[v].v+vend[v].nq)?(vend[v].v/(vend[v].v+vend[v].nq)*100).toFixed(0):0}%</p></div><div><p class="text-[7px] text-slate-400">NQ</p><p class="text-xs font-bold text-white">${vend[v].nq}</p></div></div></div>`).join('');
            document.getElementById('finance-grid').innerHTML = `<div class="glass p-2 rounded-xl text-center text-white"><p class="text-[7px]">PIX</p><b>${fBR(m.pix)}</b></div><div class="glass p-2 rounded-xl text-center text-emerald-400"><p class="text-[7px]">CRÉDITO</p><b>${fBR(m.cre)}</b></div><div class="glass p-2 rounded-xl text-center text-white"><p class="text-[7px]">DÉBITO</p><b>${fBR(m.deb)}</b></div><div class="glass p-2 rounded-xl text-center text-white"><p class="text-[7px]">BOLETO</p><b>${fBR(m.bol)}</b></div><div class="glass p-2 rounded-xl text-center border-rose-500/30 text-rose-500"><p class="text-[7px]">VALES</p><b>${fBR(parseFloat(valesDB.evanio||0) + parseFloat(valesDB.willian||0) + vend.Evanio.ent + vend.Willian.ent)}</b></div><div class="glass p-2 rounded-xl text-center border-blue-500/30 text-blue-400"><p class="text-[7px]">REEMB.PROJ</p><b>${fBR(rI*2)}</b></div>`;
            document.getElementById('comissao-card').innerHTML = `<h5 class="text-[10px] font-black text-blue-400 mb-3 uppercase text-center">Ganhos Totais</h5><div class="flex flex-col items-center justify-center h-full"><p class="text-[8px] text-slate-500 uppercase">Comissões</p><p class="text-2xl font-black">${fBR(m.com)}</p></div>`;
