<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set, remove, update, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "SUA_KEY", 
    authDomain: "agenda-album-de-formatura.firebaseapp.com",
    databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com", 
    projectId: "agenda-album-de-formatura",
    appId: "1:29604114447:web:bac79aba4c4aa945c8737a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const PATH = 'agendamentos';
const AVULSO = 'avulsos';
const MEU_WHATSAPP = "5516993291674";

window.formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
const paraDataBR = (str) => { if(!str || !str.includes('-')) return "---"; const [y,m,d] = str.split("-"); return `${d}/${m}/${y}`; };

window.tempPagamentos = [];

window.addPg = (tipo) => {
    const v = parseFloat(prompt(`Valor ${tipo}:`)?.replace(',','.') || 0);
    if(v <= 0) return;

    let pg = { tipo, valor: v };

    if(tipo === 'Boleto') {
        const temEntrada = prompt("TEVE ENTRADA?\n1 - Sim\n2 - Não");

        if(temEntrada === "1") {
            pg.entrada = parseFloat(prompt("Valor da Entrada:")?.replace(',','.') || 0);

            const fE = prompt("Forma da Entrada:\n1-Dinheiro\n2-Pix\n3-Cartão Débito");
            pg.forma_entrada =
                fE === "1" ? "Dinheiro" :
                fE === "2" ? "Pix" :
                "Cartão Débito";
        } else {
            pg.entrada = 0;
            pg.forma_entrada = "";
        }
    }

    window.tempPagamentos.push(pg);
    window.renderTemp();
};

window.renderTemp = () => {
    document.getElementById('lista-p').innerHTML =
        window.tempPagamentos.map((p, i) => `
        <div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]">
            <span>${p.tipo}</span>
            <span class="font-black text-emerald-400">
                ${window.formatBRL(p.valor)}
                <button onclick="window.tempPagamentos.splice(${i},1);window.renderTemp();"
                    class="text-rose-500 ml-2 font-bold">✕</button>
            </span>
        </div>`).join('');
};

async function carregarRelatorio() {
    const [sAg, sAv] = await Promise.all([get(ref(db, PATH)), get(ref(db, AVULSO))]);
    const ag = sAg.val() || {}, av = sAv.val() || {};
    window.dadosCompletos = [];

    for(let d in ag)
        for(let h in ag[d])
            window.dadosCompletos.push({...ag[d][h], id: h, data: d, tipo: 'agenda'});

    for(let id in av)
        window.dadosCompletos.push({...av[id], id: id, tipo: 'avulso'});

    renderizarLista(window.dadosCompletos);
}

function renderizarLista(lista) {

    let t = {
        vendidos: 0,
        totalVendas: 0,
        totalComissao: 0,
        pix: 0,
        dinheiro: 0,
        debito: 0,
        credito: 0,
        vale: 0,
        nq: 0
    };

    lista.sort((a,b) => (a.data || "").localeCompare(b.data || ""));

    lista.forEach(item => {

        if(item.resultado === "Venda") {

            const vT = parseFloat(item.valor || 0);
            t.vendidos++;
            t.totalVendas += vT;

            let com = 0;

            if(item.pagamentos && Array.isArray(item.pagamentos)) {

                item.pagamentos.forEach(p => {

                    if(p.tipo === "Dinheiro") {
                        t.dinheiro += p.valor;
                        t.vale += p.valor;
                        com += p.valor * 0.12;
                    }

                    else if(p.tipo === "Pix") {
                        t.pix += p.valor;
                        t.vale += p.valor;
                        com += p.valor * 0.12;
                    }

                    else if(p.tipo === "Cartão Débito") {
                        t.debito += p.valor;
                        com += p.valor * 0.12;
                    }

                    else if(p.tipo === "Cartão Crédito") {
                        t.credito += p.valor;
                        com += p.valor * 0.12;
                    }

                    else if(p.tipo === "Boleto") {
                        let ent = parseFloat(p.entrada || 0);
                        let restante = p.valor - ent;

                        com += (ent * 0.12) + (restante * 0.08);

                        if(p.forma_entrada === "Dinheiro") {
                            t.dinheiro += ent;
                            t.vale += ent;
                        }

                        if(p.forma_entrada === "Pix") {
                            t.pix += ent;
                            t.vale += ent;
                        }
                    }

                });
            }

            t.totalComissao += com;
        }

        else if(item.resultado === "NQ") {
            t.nq++;
        }
    });

    window.resumoAtual = t;

    document.getElementById('resumo-financeiro').innerHTML = `
    <div class="glass p-2 rounded-xl text-center border-t-2 border-blue-500">
        <p class="text-[7px] font-bold text-slate-400 uppercase">Eficiência</p>
        <p class="text-sm font-black">${t.vendidos}/${lista.length}</p>
    </div>

    <div class="glass p-2 rounded-xl text-center border-t-2 border-emerald-500 text-emerald-400">
        <p class="text-[7px] font-bold uppercase">CASH</p>
        <p class="text-[9px] font-black">${window.formatBRL(t.dinheiro + t.pix)}</p>
    </div>

    <div class="glass p-2 rounded-xl text-center border-t-2 border-blue-400 text-blue-300">
        <p class="text-[7px] font-bold uppercase">DÉBITO</p>
        <p class="text-[9px] font-black">${window.formatBRL(t.debito)}</p>
    </div>

    <div class="glass p-2 rounded-xl text-center border-t-2 border-indigo-400 text-indigo-300">
        <p class="text-[7px] font-bold uppercase">CRÉDITO</p>
        <p class="text-[9px] font-black">${window.formatBRL(t.credito)}</p>
    </div>

    <div class="bg-blue-600 p-2 rounded-xl text-center text-white shadow-xl">
        <p class="text-[7px] font-bold uppercase">VENDAS</p>
        <p class="text-[10px] font-black">${window.formatBRL(t.totalVendas)}</p>
    </div>

    <div class="bg-amber-500 p-2 rounded-xl text-center text-amber-950 shadow-xl">
        <p class="text-[7px] font-bold uppercase">VALES</p>
        <p class="text-[10px] font-black">${window.formatBRL(t.vale)}</p>
    </div>
    `;
}

window.copiarRelatorio = async () => {

    const cid = prompt("Cidade:");
    if(!cid) return;

    const t = window.resumoAtual;
    const f = (v) => window.formatBRL(v);

    const msg = `*${cid} ${new Date().toLocaleDateString('pt-BR')}*

Vendidos = ${t.vendidos}
NQ = ${t.nq}

Dinheiro = ${f(t.dinheiro)}
Pix = ${f(t.pix)}
Crédito = ${f(t.credito)}
Débito = ${f(t.debito)}

Total = ${f(t.totalVendas)}
Vale = ${f(t.vale)}`;

    await navigator.clipboard.writeText(msg);
    alert("RELATÓRIO COPIADO!");
};

window.carregarRelatorio = carregarRelatorio;
</script>
