<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Master - v23.00 GOLD FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .view-section { display: none; min-height: 100vh; width: 100%; flex-direction: column; }
        .view-active { display: flex !important; }
        .card-bi { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; }
        #modalGestao { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
        .input-compact { padding: 0.8rem !important; border-radius: 1rem !important; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; width: 100%; outline: none; }
        .day-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; padding: 12px; border-radius: 15px; font-size: 10px; font-weight: 800; color: white; }
        .day-btn.active { background: #3b82f6 !important; border-color: #60a5fa !important; }
    </style>
</head>
<body>

    <div id="modalGestao">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 shadow-2xl text-white mx-auto mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="gestao-titulo" class="text-lg font-black uppercase text-blue-400">Gestão</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase text-sm">Registrar Venda</button>
                <button onclick="window.salvarStatusSimples('NQ')" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">Marcar NQ</button>
                <button onclick="window.limparRegistroVisita()" class="bg-slate-700/50 border border-white/10 p-3 rounded-2xl text-white font-black uppercase text-[10px]">Limpar Registro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir Registro</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 pb-6 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center">
            <span class="text-lg font-black uppercase italic tracking-tighter">Portal <span class="text-blue-500">Elite</span></span>
            <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase">ADM</button>
        </header>
        <div class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-6 rounded-[2.5rem] w-full max-w-sm text-center">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 leading-none italic">AGUARDE...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-500 mb-4 uppercase italic">CONECTANDO</h3>
                <div class="grid grid-cols-2 gap-1 mb-3" id="day-selector"></div>
                <form id="form-agendamento" class="space-y-2">
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="input-compact text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="input-compact text-white">
                    <select id="horario" required class="input-compact text-white"><option value="">Selecione o Dia</option></select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="input-compact text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-sm">Agendar Visita</button>
                </form>
            </div>
        </div>
    </section>

    <section id="view-logistica" class="view-section p-4">
        <nav class="flex justify-between items-center mb-6 text-white">
            <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase">← Sair</button>
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button class="bg-blue-600 px-4 py-1.5 rounded-lg text-[10px] font-black">Visitas</button>
                <button onclick="window.switchView('view-financeiro')" class="px-4 py-1.5 text-slate-400 text-[10px] font-black uppercase">Dashboard BI</button>
            </div>
        </nav>
        <div id="controles-admin" class="hidden flex flex-wrap gap-2 mb-4 justify-center">
            <button onclick="window.abrirNovoProjeto()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-emerald-400 uppercase">Novo Projeto</button>
            <button onclick="window.abrirGestaoCentralizada()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-blue-400 uppercase">Dados Projeto</button>
            <button onclick="window.abrirGestaoVales()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-rose-400 uppercase">Lançar Vales</button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none">
            <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ AVULSO</button>
        </div>
        <div id="lista-visitas" class="space-y-2 pb-10"></div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-6">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white outline-none">
        </nav>
        
        <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>
        
        <div id="individual-performance" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"></div>

        <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-6"></div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div id="comissao-card" class="lg:col-span-1 glass rounded-[2rem] p-5 border-l-4 border-blue-500 text-white"></div>
            <div id="saldo-card" class="lg:col-span-2 glass rounded-[2rem] p-6 border-l-8 border-emerald-500 text-white"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-10">
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <div class="flex justify-between items-center mb-3">
                    <h4 class="text-emerald-400 font-black text-[10px] uppercase">Extrato Vendas</h4>
                    <span class="text-[8px] text-slate-500">VALOR | COMIS.</span>
                </div>
                <div id="extrato-tabela" class="text-xs"></div>
            </div>
            <div class="glass p-4 rounded-2xl border border-white/5 text-white"><h4 class="text-rose-500 font-black text-[10px] mb-3 uppercase">NQ</h4><div id="nq-tabela" class="text-xs"></div></div>
        </div>
    </section>

    <script type="module">
        // ##########################################################################
        // ### [ FIREBASE - CONEXÃO SAGRADA v19.70 - NÃO MEXER ] ###
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU", databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);
        
        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        let projId = ""; window.dadosCompletos = []; let custosDB = {}; let valesDB = {}; let projetoDB = {};

        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projId = snap.val() || "guaratingueta-guilherme";
            const pS = await get(ref(db, `projetos/${projId}`));
            if(pS.exists()){
                projetoDB = pS.val();
                document.getElementById('escola-titulo').innerText = projetoDB.cidade;
                document.getElementById('sub-escola').innerText = projetoDB.escola || projetoDB.school;
                if(projetoDB.data_inicio) window.gerarBotoesDatas(projetoDB.data_inicio, projetoDB.data_fim);
                window.carregarRelatorio();
            }
        });

        window.salvarCommit = async (path, dados) => {
            try { await update(ref(db, path), dados); await window.carregarRelatorio(); window.fecharModalGestao(); } catch(e) { alert("Erro!"); }
        };

        window.carregarRelatorio = async () => {
            if(!projId) return;
            try {
                const [sA, sV, sC, sVales] = await Promise.all([
                    get(ref(db, `dados/${projId}/agendamentos`)), get(ref(db, `vendas/${projId}`)), 
                    get(ref(db, `custos/${projId}`)), get(ref(db, `vales/${projId}`))
                ]);
                window.dadosCompletos = []; custosDB = sC.exists() ? sC.val() : {};
                valesDB = sVales.exists() ? sVales.val() : { evanio: 0, willian: 0 };
                const proc = (pasta, base) => {
                    if (!pasta) return;
                    Object.keys(pasta).forEach(k => {
                        const item = pasta[k];
                        if (typeof item === 'object' && !item.nome_formando) {
                            Object.keys(item).forEach(subK => window.dadosCompletos.push({...item[subK], id:subK, data:k, path:`${base}/${k}/${subK}`}));
                        } else window.dadosCompletos.push({...item, id:k, data:item.data||k, path:`${base}/${k}`});
                    });
                };
                if(sA.exists()) proc(sA.val(), `dados/${projId}/agendamentos`);
                if(sV.exists()) {
                    const v = sV.val();
                    if(v.avulsos) proc(v.avulsos, `vendas/${projId}/avulsos`);
                    if(v.agendamentos) proc(v.agendamentos, `vendas/${projId}/agendamentos`);
                }
                window.filtrarLogistica(); window.filtrarBI();
            } catch(e) { console.error(e); }
        };
        // ##########################################################################

        // --- DASHBOARD BI v23.00 ---
        window.filtrarBI = () => {
            const fD = document.getElementById('filtro-bi').value;
            let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos;
            
            let m = { v:0, nq:0, tot:0, pix:0, din:0, deb:0, cre:0, bol:0, com:0 };
            let vend = {
                Evanio: { v:0, nq:0, tot:0, com:0, entradas:0 },
                Willian: { v:0, nq:0, tot:0, com:0, entradas:0 }
            };

            list.forEach(i => {
                const vNome = i.vendedor || "Willian"; // Padrão
                if(i.resultado === "Venda") {
                    m.v++; m.tot += Number(i.valor)||0;
                    vend[vNome].v++; vend[vNome].tot += Number(i.valor)||0;
                    
                    let cV = 0;
                    if(i.pagamentos) i.pagamentos.forEach(p => {
                        const valP = Number(p.valor)||0;
                        const t = p.tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        const isEntrada = t.includes("entrada");
                        
                        if (isEntrada) {
                            cV += valP * 0.12;
                            if(t.includes("pix") || t.includes("dinheiro")) {
                                vend[vNome].entradas += valP; // ENTRADA É VALE PARA QUEM PEGOU
                            }
                        } else cV += valP * 0.08;

                        if(t.includes("pix")) m.pix += valP; else if(t.includes("dinheiro")) m.din += valP;
                        else if(t.includes("debito")) m.deb += valP; else if(t.includes("credito")) m.cre += valP;
                        else if(t.includes("boleto")) m.bol += valP;
                    }); else cV = (Number(i.valor)||0)*0.08;
                    
                    m.com += cV;
                    vend[vNome].com += cV;
                } else if(i.resultado === "NQ") {
                    m.nq++;
                    vend[vNome].nq++;
                }
            });

            const c = custosDB;
            const reembIndiv = (parseFloat(c.km_valor)||0)*(parseFloat(c.km_total)||0) + parseFloat(c.pedagio_total)||0 + ((parseFloat(c.hosp_valor)||0)*parseInt(c.hosp_qtd||0)) + ((parseFloat(c.alim_valor)||0)*parseInt(c.alim_qtd||0));

            // KPI GERAL
            document.getElementById('kpi-grid').innerHTML = `
                <div class="card-bi p-4 rounded-3xl text-center border-blue-500"><p class="text-[8px] font-black uppercase">Eficiência Geral</p><p class="text-2xl font-black">${(m.v+m.nq)?(m.v/(m.v+m.nq)*100).toFixed(0):0}%</p></div>
                <div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black uppercase">Faturamento</p><p class="text-xl font-black">${fBR(m.tot)}</p></div>
                <div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black uppercase">Vendas/NQ</p><p class="text-xl font-black">${m.v}/${m.nq}</p></div>
                <div class="card-bi p-4 rounded-3xl text-center"><p class="text-[8px] font-black uppercase text-white">Ticket</p><p class="text-xl font-black">${fBR(m.v?m.tot/m.v:0)}</p></div>`;

            // PERFORMANCE INDIVIDUAL
            document.getElementById('individual-performance').innerHTML = Object.keys(vend).map(v => `
                <div class="glass p-4 rounded-3xl border-t-2 ${v==='Evanio'?'border-blue-400':'border-cyan-400'}">
                    <p class="font-black text-xs uppercase mb-2">${v}</p>
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div><p class="text-[7px] text-slate-400">VENDA</p><p class="text-xs font-bold">${fBR(vend[v].tot)}</p></div>
                        <div><p class="text-[7px] text-slate-400">EFIC.</p><p class="text-xs font-bold">${(vend[v].v+vend[v].nq)?(vend[v].v/(vend[v].v+vend[v].nq)*100).toFixed(0):0}%</p></div>
                        <div><p class="text-[7px] text-slate-400">NQs</p><p class="text-xs font-bold">${vend[v].nq}</p></div>
                    </div>
                </div>`).join('');

            document.getElementById('finance-grid').innerHTML = `<div class="glass p-2 rounded-xl text-center text-white"><p class="text-[7px]">PIX</p><b>${fBR(m.pix)}</b></div><div class="glass p-2 rounded-xl text-center text-emerald-400"><p class="text-[7px]">CRÉDITO</p><b>${fBR(m.cre)}</b></div><div class="glass p-2 rounded-xl text-center"><p class="text-[7px]">DÉBITO</p><b>${fBR(m.deb)}</b></div><div class="glass p-2 rounded-xl text-center"><p class="text-[7px]">BOLETO</p><b>${fBR(m.bol)}</b></div><div class="glass p-2 rounded-xl text-center border-rose-500/30 text-rose-500"><p class="text-[7px]">VALES + ENTRADAS</p><b>${fBR(parseFloat(valesDB.evanio||0) + parseFloat(valesDB.willian||0) + vend.Evanio.entradas + vend.Willian.entradas)}</b></div><div class="glass p-2 rounded-xl text-center border-blue-500/30 text-blue-400"><p class="text-[7px]">REEMBOLSO TOTAL</p><b>${fBR(reembIndiv * 2)}</b></div>`;
            document.getElementById('comissao-card').innerHTML = `<h5 class="text-[10px] font-black text-blue-400 mb-3 uppercase text-center">Comissão Bruta Projeto</h5><div class="flex flex-col items-center justify-center h-full text-white"><p class="text-2xl font-black">${fBR(m.com)}</p></div>`;
            
            // ACERTO FINAL COM REGRA DE ENTRADA = VALE INDIVIDUAL
            document.getElementById('saldo-card').innerHTML = `<div class="text-center mb-4 border-b border-white/10 pb-2 font-black text-[10px] uppercase">Acerto Final (Individual)</div><div class="grid grid-cols-2 gap-4">
                <div class="bg-white/5 p-4 rounded-2xl text-white"><p class="text-[10px] font-black text-blue-400 uppercase mb-2">EVANIO</p><div class="text-[9px] space-y-1"><div>Comis: <b>+ ${fBR(vend.Evanio.com)}</b></div><div>Reemb: <b>+ ${fBR(reembIndiv)}</b></div><div class="text-rose-400">Vales: <b>- ${fBR(parseFloat(valesDB.evanio||0))}</b></div><div class="text-orange-400">Entradas: <b>- ${fBR(vend.Evanio.entradas)}</b></div><div class="text-xs font-black pt-1 border-t border-white/5 uppercase">Saldo: <span class="text-emerald-400">${fBR(vend.Evanio.com + reembIndiv - (parseFloat(valesDB.evanio)||0) - vend.Evanio.entradas)}</span></div></div></div>
                <div class="bg-white/5 p-4 rounded-2xl text-white text-white"><p class="text-[10px] font-black text-cyan-400 uppercase mb-2">WILLIAN</p><div class="text-[9px] space-y-1 text-white"><div>Comis: <b>+ ${fBR(vend.Willian.com)}</b></div><div>Reemb: <b>+ ${fBR(reembIndiv)}</b></div><div class="text-rose-400 text-white">Vales: <b>- ${fBR(parseFloat(valesDB.willian||0))}</b></div><div class="text-orange-400 text-white">Entradas: <b>- ${fBR(vend.Willian.entradas)}</b></div><div class="text-xs font-black pt-1 border-t border-white/5 uppercase">Saldo: <span class="text-emerald-400">${fBR(vend.Willian.com + reembIndiv - (parseFloat(valesDB.willian)||0) - vend.Willian.entradas)}</span></div></div></div></div>`;
            
            document.getElementById('extrato-tabela').innerHTML = list.filter(i=>i.resultado==="Venda").map(i => `<div class="flex justify-between py-1.5 border-b border-white/5 text-white"><span class="truncate max-w-[120px] font-bold">#${i.vendedor?.charAt(0)||'W'} ${i.nome_formando}</span><div class="flex gap-3"><span class="text-emerald-400">${fBR(i.valor)}</span></div></div>`).join('');
            document.getElementById('nq-tabela').innerHTML = list.filter(i=>i.resultado==="NQ").map(i=>`<div class="py-1 border-b border-white/5 text-slate-500 text-white">${i.nome_formando}</div>`).join('');
        };

        // --- GESTÃO CENTRALIZADA ---
        window.abrirGestaoCentralizada = () => {
            const c = custosDB; const p = projetoDB;
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            f.innerHTML = `<h3 class="text-blue-400 font-black text-[10px] uppercase mb-4">Configuração Projeto</h3><div class="space-y-3"><div><p class="text-[8px] text-slate-500 uppercase">Período</p><div class="flex gap-2"><input type="date" id="pDIn" value="${p.data_inicio||''}" class="input-compact flex-grow"><input type="date" id="pDFi" value="${p.data_fim||''}" class="input-compact flex-grow"></div></div><div><p class="text-[8px] text-slate-500 uppercase">Horários</p><textarea id="pHrs" class="input-compact h-16 text-[10px]">${p.horarios || '09:00, 09:30, 10:00, 10:30, 11:00, 11:30, 12:00, 12:30, 13:00, 13:30, 14:00, 14:30, 15:00, 15:30, 16:00, 16:30, 17:00, 17:30, 18:00, 18:30, 19:00, 19:30, 20:00, 20:30'}</textarea></div><hr class="opacity-10"><div><p class="text-[8px] text-slate-500 uppercase">Reembolso Individual</p><div class="flex gap-2 mb-2"><input type="number" id="cKMV" value="${c.km_valor||0.7}" class="input-compact flex-grow"><input type="number" id="cKMQ" value="${c.km_total||0}" class="input-compact flex-grow"></div><input type="number" id="cPed" value="${c.pedagio_total||0}" class="input-compact mb-2"><div class="flex gap-2"><input type="number" id="cHosp" value="${c.hosp_valor||0}" class="input-compact flex-grow"><input type="number" id="cHospQ" value="${c.hosp_qtd||0}" class="input-compact flex-grow"></div><div class="flex gap-2 mt-2"><input type="number" id="cAlim" value="${c.alim_valor||0}" class="input-compact flex-grow"><input type="number" id="cAlimQ" value="${c.alim_qtd||0}" class="input-compact flex-grow"></div></div></div><button onclick="window.salvarTudoProjeto()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs mt-6">Gravar Tudo</button>`;
        };
        window.salvarTudoProjeto = async () => {
            const upP = { data_inicio: document.getElementById('pDIn').value, data_fim: document.getElementById('pDFi').value, horarios: document.getElementById('pHrs').value };
            const upC = { km_valor: document.getElementById('cKMV').value, km_total: document.getElementById('cKMQ').value, pedagio_total: document.getElementById('cPed').value, hosp_valor: document.getElementById('cHosp').value, hosp_qtd: document.getElementById('cHospQ').value, alim_valor: document.getElementById('cAlim').value, alim_qtd: document.getElementById('cAlimQ').value, operacao_pessoas: 2 };
            await update(ref(db, `projetos/${projId}`), upP); await update(ref(db, `custos/${projId}`), upC); location.reload();
        };

        // --- REGISTRO DE VENDA v23.00 ---
        window.fluxoResultado = () => {
            document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden');
            const item = window.dadosCompletos.find(i => i.path === window.itemPath) || {}; window.tempPgs = item.pagamentos ? [...item.pagamentos] : []; 
            const dataHoje = new Date().toISOString().split('T')[0];
            f.innerHTML = `
                <h3 class="text-emerald-400 font-black text-[10px] uppercase mb-2">Registrar Venda</h3>
                <p class="text-[7px] text-slate-500 uppercase">Vendedor</p>
                <select id="vVend" class="input-compact mb-2"><option value="Evanio" ${item.vendedor==='Evanio'?'selected':''}>Evanio</option><option value="Willian" ${item.vendedor==='Willian'?'selected':''}>Willian</option></select>
                <p class="text-[7px] text-slate-500 uppercase">Data / Álbum</p>
                <div class="flex gap-2 mb-2"><input type="date" id="vData" value="${item.data || dataHoje}" class="input-compact flex-grow"><input type="text" id="vA" placeholder="Nº" value="${item.num_album||''}" class="input-compact w-20"></div>
                <input type="number" id="vT" placeholder="TOTAL DA VENDA" value="${item.valor||''}" class="input-compact text-xl font-black mb-3">
                <div class="grid grid-cols-2 gap-2 mb-3"><button onclick="window.addPg('Pix')" class="bg-slate-800 p-2 rounded text-[9px]">+ Pix</button><button onclick="window.addPg('Dinheiro')" class="bg-slate-800 p-2 rounded text-[9px]">+ Dinheiro</button><button onclick="window.addPg('Crédito')" class="bg-slate-800 p-2 rounded text-[9px]">+ Crédito</button><button onclick="window.addPg('Boleto')" class="bg-blue-900/40 p-2 rounded text-[9px] col-span-2">+ Boleto</button></div>
                <div id="lista-p" class="space-y-1 mb-2"></div>
                <button onclick="window.finalizarVenda()" class="btn-primary w-full p-4 rounded-xl font-black text-xs uppercase">Salvar Venda</button>`;
            window.atualizarListaInterface();
        };

        window.addPg = (t) => {
            const v = parseFloat(prompt(`Valor ${t}:`) || 0); if(v<=0) return;
            if(t === "Boleto") {
                const r = prompt("Tem ENTRADA?\n1-Sim\n2-Não");
                if(r==="1"){
                    const ve=parseFloat(prompt("VALOR ENTRADA:")||0); if(ve>0){
                        const te=prompt("FORMA ENTRADA:\n1-Pix\n2-Din\n3-Déb");
                        let txt=te==="1"?"Pix (Entrada)":te==="2"?"Dinheiro (Entrada)":te==="3"?"Débito (Entrada)":"";
                        if(txt){ window.tempPgs.push({tipo:txt, valor:ve}); if(v-ve>0) window.tempPgs.push({tipo:"Boleto", valor:v-ve}); }
                    }
                } else window.tempPgs.push({tipo:"Boleto", valor:v});
            } else { window.tempPgs.push({ tipo: t, valor: v }); }
            window.atualizarListaInterface();
        };

        window.finalizarVenda = async () => { 
            const d = { resultado:"Venda", valor:document.getElementById('vT').value, num_album:document.getElementById('vA').value, vendedor:document.getElementById('vVend').value, pagamentos:window.tempPgs, data: document.getElementById('vData').value }; 
            await window.salvarCommit(window.itemPath, d); 
        };

        // --- AUXILIARES ---
        window.switchView = (id) => { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active')); document.getElementById(id).classList.add('view-active'); window.scrollTo(0,0); };
        window.acessoAdmin = () => { if(prompt("Senha:")==="2025") { document.getElementById('controles-admin').classList.remove('hidden'); window.switchView('view-logistica'); } };
        window.fecharModalGestao = () => { document.getElementById('modalGestao').style.display='none'; document.getElementById('gestao-menu').classList.remove('hidden'); document.getElementById('gestao-form').classList.add('hidden'); };
        window.gerenciarItem = (p) => { window.itemPath = p; document.getElementById('modalGestao').style.display='flex'; };
        window.atualizarListaInterface = () => { document.getElementById('lista-p').innerHTML = window.tempPgs.map(p => `<div class="flex justify-between text-[10px] bg-white/5 p-1 text-white"><span>${p.tipo}</span><b>${fBR(p.valor)}</b></div>`).join(''); };
        window.salvarStatusSimples = async (s) => { await window.salvarCommit(window.itemPath, { resultado:s }); };
        window.confirmarExclusao = async () => { if(confirm("Excluir?")) { await remove(ref(db, window.itemPath)); window.carregarRelatorio(); window.fecharModalGestao(); } };
        window.limparRegistroVisita = async () => { if(confirm("Zerar visita?")) { await window.salvarCommit(window.itemPath, { resultado: "Pendente", valor: 0, pagamentos: null, num_album: "" }); } };
        window.gerarBotoesDatas = (i, f) => { const c = document.getElementById('day-selector'); c.innerHTML = ""; let cur = new Date(i + "T00:00:00"); const hoje = new Date().toISOString().split('T')[0]; while(cur <= new Date(f + "T00:00:00")) { const iso = cur.toISOString().split('T')[0]; if (iso >= hoje) c.innerHTML += `<button type="button" onclick="window.selecionarDia(this, '${iso}')" class="day-btn text-white">${cur.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</button>`; cur.setDate(cur.getDate() + 1); } };
        window.selecionarDia = (b, iso) => { document.querySelectorAll('.day-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); document.getElementById('data-selecionada').value = iso; const select = document.getElementById('horario'); select.innerHTML = '<option value="">Horário</option>'; let hs = projetoDB.horarios ? projetoDB.horarios.split(',') : ['09:00','10:00','11:00','14:00','15:00','17:00','20:00']; hs.forEach(h => { select.innerHTML += `<option value="${h.trim()}">${h.trim()}</option>`; }); };
        window.filtrarLogistica = () => { const cont = document.getElementById('lista-visitas'); if(!cont) return; cont.innerHTML = ''; const fD = document.getElementById('filtro-data-logistica').value; let list = fD ? window.dadosCompletos.filter(i => i.data === fD) : window.dadosCompletos; list.sort((a,b) => new Date(`${a.data}T${a.horario||'23:59'}`) - new Date(`${b.data}T${b.horario||'23:59'}`)); list.forEach(i => { let s = i.resultado || "PENDENTE"; let c = s==="Venda"?"text-emerald-500":s==="NQ"?"text-rose-500":"text-slate-600"; cont.innerHTML += `<div class="glass p-3 rounded-2xl flex flex-col gap-2 text-white"><div class="flex justify-between items-center text-white"><div class="flex items-center gap-3 text-white"><span class="text-[9px] font-black text-blue-400 uppercase">${i.horario||'DIR'}</span><span class="text-[12px] font-black ${c}">${s==="Venda"?"VENDIDO":s}</span><h3 class="text-sm font-black uppercase truncate max-w-[120px] text-white">${i.nome_formando}</h3></div><button onclick="window.gerenciarItem('${i.path}')" class="btn-primary px-3 py-1.5 rounded-lg text-[8px] font-black uppercase text-white">Gere.</button></div><div class="flex gap-1 border-t border-white/5 pt-2 text-white"><a href="https://wa.me/55${(i.telefone||'').replace(/\D/g,'')}" target="_blank" class="bg-emerald-500/10 p-1 rounded-lg text-emerald-400 text-[8px] font-black">Zap</a><a href="https://www.waze.com/ul?q=${encodeURIComponent(i.endereco||'')}&navigate=yes" target="_blank" class="bg-blue-500/10 p-1 rounded-lg text-blue-400 text-[8px] font-black uppercase">Waze</a></div></div>`; }); };
        window.abrirAvulso = () => { document.getElementById('modalGestao').style.display='flex'; document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); const dataHoje = new Date().toISOString().split('T')[0]; f.innerHTML = `<h3 class="text-white font-black text-xs uppercase mb-3">Novo Avulso</h3><input type="text" id="avN" placeholder="Nome" class="input-compact mb-2"><input type="date" id="avD" value="${dataHoje}" class="input-compact mb-2"><button onclick="window.salvarAvulso()" class="btn-primary w-full p-3 rounded-xl text-[10px] font-black uppercase text-white">Criar</button>`; };
        window.salvarAvulso = async () => { const p = `vendas/${projId}/avulsos/AV-${Date.now()}`; await set(ref(db, p), { nome_formando:document.getElementById('avN').value, data:document.getElementById('avD').value, resultado:"Pendente" }); window.itemPath = p; window.carregarRelatorio(); window.fluxoResultado(); };
        window.abrirGestaoVales = () => { document.getElementById('modalGestao').style.display = 'flex'; document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<h3 class="text-rose-400 font-black text-[10px] uppercase mb-4 text-white">Lançar Vales Fixos</h3><p class="text-[8px] text-slate-500">VALE EVANIO</p><input type="number" id="vEva" value="${valesDB.evanio||0}" class="input-compact mb-2"><p class="text-[8px] text-slate-500">VALE WILLIAN</p><input type="number" id="vWil" value="${valesDB.willian||0}" class="input-compact mb-4"><button onclick="window.salvarVales()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs">Salvar</button>`; };
        window.salvarVales = async () => { const d = { evanio: document.getElementById('vEva').value, willian: document.getElementById('vWil').value }; await update(ref(db, `vales/${projId}`), d); await window.carregarRelatorio(); window.fecharModalGestao(); };
        window.abrirNovoProjeto = () => { document.getElementById('modalGestao').style.display='flex'; document.getElementById('gestao-menu').classList.add('hidden'); const f = document.getElementById('gestao-form'); f.classList.remove('hidden'); f.innerHTML = `<h3 class="text-emerald-400 font-black text-[10px] uppercase mb-4">Novo Projeto</h3><input type="text" id="pCity" placeholder="Cidade" class="input-compact mb-2"><input type="text" id="pSchool" placeholder="Escola" class="input-compact mb-2"><div class="flex gap-2 mb-4"><input type="date" id="pStart" class="input-compact flex-grow"><input type="date" id="pEnd" class="input-compact flex-grow"></div><button onclick="window.salvarNovoProjeto()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs">Criar</button>`; };
        window.salvarNovoProjeto = async () => { const city = document.getElementById('pCity').value; const id = city.toLowerCase().replace(/\s+/g, '-'); const d = { cidade: city, escola: document.getElementById('pSchool').value, data_inicio: document.getElementById('pStart').value, data_fim: document.getElementById('pEnd').value }; await set(ref(db, `projetos/${id}`), d); await set(ref(db, "config/projeto_ativo"), id); location.reload(); };

        document.getElementById('form-agendamento').onsubmit = async (e) => { 
            e.preventDefault(); const dt = document.getElementById('data-selecionada').value; if(!dt) return alert("Data!"); const hr = document.getElementById('horario').value; const nm = document.getElementById('nome').value; const tel = document.getElementById('telefone').value;
            await set(ref(db, `dados/${projId}/agendamentos/${dt}/AG-${Date.now()}`), { nome_formando: nm, telefone: tel, endereco: document.getElementById('endereco').value, resultado: "Pendente", horario: hr }); 
            window.location.href = `https://wa.me/5516993291674?text=Olá! Acabei de agendar minha visita Elite.%0A%0A*Dados:*%0A📅 Data: ${dt.split('-').reverse().join('/')}%0A🕒 Hora: ${hr}%0A👤 Formando: ${nm}%0A📱 WhatsApp: ${tel}%0A%0A📍 *Localização:* Por favor, me envie sua localização por aqui!`;
        };
    </script>
</body>
</html>
